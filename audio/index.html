<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Service Account Audio</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: inline-block; }
        .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin: 10px; }
        .btn-rec { background: #ff4757; color: white; }
        .btn-save { background: #2ed573; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎤 Ghi âm & Tự động lưu</h2>
    <div id="status">Sẵn sàng</div>
    <button id="startBtn" class="btn-rec" onclick="startRecording()">Bắt đầu</button>
    <button id="stopBtn" class="btn" style="background:#747d8c; color:white" onclick="stopRecording()" disabled>Dừng</button>
    <button id="uploadBtn" class="btn-save" onclick="uploadToVercel()" disabled>Lưu vào Drive</button>
    <br><br>
    <audio id="preview" controls></audio>
</div>

<script>
    let mediaRec, chunks = [], audioBlob;

    async function startRecording() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRec = new MediaRecorder(stream);
        chunks = [];
        mediaRec.ondataavailable = e => chunks.push(e.data);
        mediaRec.onstop = () => {
            audioBlob = new Blob(chunks, { type: 'audio/mpeg' });
            document.getElementById('preview').src = URL.createObjectURL(audioBlob);
            document.getElementById('uploadBtn').disabled = false;
        };
        mediaRec.start();
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('status').innerText = "🔴 Đang ghi...";
    }

    function stopRecording() {
        mediaRec.stop();
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        document.getElementById('status').innerText = "Đã xong";
    }

    async function uploadToVercel() {
        document.getElementById('uploadBtn').innerText = "⏳ Đang tải...";
        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1];
            const res = await fetch('/api/drive', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    name: `Audio_${new Date().getTime()}.mp3`, 
                    base64Audio 
                })
            });
            const result = await res.json();
            if (result.status === "success") {
                alert("Đã lưu lên Drive qua Service Account!");
                location.reload();
            } else {
                alert("Lỗi: " + result.message);
            }
        };
    }
</script>
</body>
</html>
