<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .sticky-header { position: sticky; top: 0; background-color: #f4f4f9; padding-top: 20px; padding-bottom: 10px; z-index: 20; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; position: sticky; top: 115px; z-index: 10; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        
        .add-form { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .add-form input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .btn-add { background-color: #4CAF50; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-delete { background-color: #ff3b30; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .editable-cell { background-color: #fffde7; cursor: pointer; border: 1px dashed #caaf15 !important; }
        
        /* THEME NÚT GẠT PHONG CÁCH IPHONE - IOS SWITCH TOGGLE */
        .switch { position: relative; display: inline-block; width: 50px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #E9E9EA; transition: .3s; border-radius: 30px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
        input:checked + .slider { background-color: #34C759; }
        input:checked + .slider:before { transform: translateX(20px); }
        
        .filter-container { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: bold; }
        .filter-label { color: #333; }
    </style>
</head>
<body>
    <div class="sticky-header">
        <h2>Danh sách Task từ Server</h2>
        <div class="add-form">
            <input type="text" id="newTaskName" placeholder="Tên Task...">
            <input type="text" id="newTaskContent" placeholder="Nội dung...">
            <input type="text" id="newTaskStart" placeholder="Thời gian START (HH:mm)...">
            <button class="btn-add" onclick="addTask()">Thêm Mới</button>
        </div>
        <div class="filter-container">
            <span class="filter-label">Chỉ hiển thị Status = 1:</span>
            <label class="switch">
                <input type="checkbox" id="filterToggle" checked onchange="filterTasks()">
                <span class="slider"></span>
            </label>
        </div>
    </div>
    <div id="loading">Đang tải dữ liệu...</div>
    <table id="taskTable" style="display:none;">
        <thead>
            <tr id="headerRow"></tr>
        </thead>
        <tbody id="taskBody"></tbody>
    </table>
<script>
    const API_URL = 'https://hsk-gilt.vercel.app/api/gSheet';
    const PAYLOAD = { "sheet": "TASK", "act": "read", "spread": "1ezoFMSBVznSNcuufRRQRjxAmUmYyU9MjKDzl-v3wxl8" };
    const FILENAME = "task_management_index";
    let allRowsData = [];

    async function fetchData() {
        console.log("Bắt đầu tải dữ liệu từ server...");
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(PAYLOAD)
            });
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            console.log("Tải dữ liệu từ server thành công.", data);
            renderTable(data.values);
        } catch (error) {
            console.error("Lỗi xảy ra trong quá trình fetchData:", error);
            document.getElementById('loading').innerText = "Lỗi khi tải dữ liệu.";
        }
    }

    function renderTable(values) {
        console.log("Bắt đầu dựng cấu trúc bảng hiển thị...");
        const headerRow = document.getElementById('headerRow');
        const taskBody = document.getElementById('taskBody');
        const headers = values[0];
        
        // Loại bỏ cột NOTE khỏi giao diện danh sách thẻ th
        headerRow.innerHTML = headers.filter(h => h !== "ID" && h !== "NOTE").map(h => `<th>${h}</th>`).join('') + '<th>HÀNH ĐỘNG</th>';
        taskBody.innerHTML = "";
        
        allRowsData = JSON.parse(JSON.stringify(values));
        
        // Xác định vị trí cột START để thực hiện sắp xếp
        const startColIdx = headers.indexOf("START");
        
        // Tách dòng tiêu đề ra khỏi danh sách để thực hiện sort nội dung
        let dataRows = values.slice(1);
        if (startColIdx !== -1) {
            dataRows.sort((a, b) => {
                let valA = a[startColIdx] || "";
                let valB = b[startColIdx] || "";
                return valA.localeCompare(valB);
            });
        }
        
        for (let i = 0; i < dataRows.length; i++) {
            const rowData = dataRows[i];
            if (rowData.length < 2) continue;
            
            // Tìm lại chỉ mục hàng gốc chuẩn xác trong hệ thống allRowsData
            const originalRowIndex = allRowsData.findIndex(r => r[0] === rowData[0]);
            const tr = document.createElement('tr');
            tr.setAttribute('data-id', rowData[0]);
            let rowHtml = "";
            let isStatusActive = false;
            for (let j = 0; j < headers.length; j++) {
                if (headers[j] === "ID") continue;
                if (headers[j] === "NOTE") continue;
                let cellData = rowData[j] || "";
                if (headers[j] === "STATUS") {
                    if (cellData === "1") isStatusActive = true;
                    const isChecked = cellData === "1" ? "checked" : "";
                    rowHtml += `<td><label class="switch"><input type="checkbox" ${isChecked} onchange="toggleStatus('${rowData[0]}', this, ${originalRowIndex})"><span class="slider"></span></label></td>`;
                } else {
                    rowHtml += `<td class="editable-cell" contenteditable="true" onblur="updateCellData(this, ${originalRowIndex}, ${j})">${cellData.replace(/\n/g, '<br>')}</td>`;
                }
            }
            rowHtml += `<td><button class="btn-delete" onclick="deleteTask('${rowData[0]}', ${originalRowIndex})">Xóa</button></td>`;
            tr.setAttribute('data-status-active', isStatusActive ? "1" : "0");
            tr.innerHTML = rowHtml;
            taskBody.appendChild(tr);
        }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('taskTable').style.display = 'table';
        console.log("Dựng bảng hoàn tất. Tiến hành chạy bộ lọc khởi tạo.");
        filterTasks();
    }

    function filterTasks() {
        const isEnforceActive = document.getElementById('filterToggle').checked;
        console.log(`Áp dụng bộ lọc hiển thị iPhone Toggle. Chỉ hiện status=1: ${isEnforceActive}`);
        const rows = document.querySelectorAll('#taskBody tr');
        rows.forEach(row => {
            if (isEnforceActive) {
                if (row.getAttribute('data-status-active') === "1") {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            } else {
                row.style.display = '';
            }
        });
    }

    async function addTask() {
        const name = document.getElementById('newTaskName').value.trim();
        const content = document.getElementById('newTaskContent').value.trim();
        const startTime = document.getElementById('newTaskStart').value.trim();
        if (!name) { alert("Vui lòng nhập tên Task!"); return; }
        const newId = "ID_" + Date.now();
        console.log(`Bắt đầu xử lý thêm mới Task. Tên: ${name}, Nội dung: ${content}, Bắt đầu: ${startTime}`);
        
        const headers = allRowsData[0];
        const newRow = new Array(headers.length).fill("");
        const startColIdx = headers.indexOf("START");
        for(let j=0; j<headers.length; j++) {
            if (headers[j] === "ID") newRow[j] = newId;
            else if (headers[j] === "STATUS") newRow[j] = "1";
            else if (j === 1) newRow[j] = name;
            else if (j === 2) newRow[j] = content;
        }
        if (startColIdx !== -1) newRow[startColIdx] = startTime;

        const appendPayload = {
            "act": "updateByPosVal",
            "sheet": "TASK",
            "spread": "1ezoFMSBVznSNcuufRRQRjxAmUmYyU9MjKDzl-v3wxl8",
            "data": JSON.stringify(newRow)
        };

        console.log("Gửi yêu cầu append dòng mới lên server...", appendPayload);
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(appendPayload)
            });
            if (!response.ok) throw new Error('Mạng không ổn định khi append dữ liệu');
            console.log("Thêm mới Task lên server thành công.");
            allRowsData.push(newRow);
            document.getElementById('newTaskName').value = "";
            document.getElementById('newTaskContent').value = "";
            document.getElementById('newTaskStart').value = "";
            renderTable(allRowsData);
        } catch (error) {
            console.error("Lỗi khi thêm Task:", error);
        }
    }

    async function updateCellData(cellEl, rowIndex, colIndex) {
        const updatedText = cellEl.innerText.trim();
        const id = allRowsData[rowIndex][0];
        console.log(`Bắt đầu sự kiện cập nhật ô dữ liệu dòng ${rowIndex}, cột ${colIndex} -> Nội dung mới: ${updatedText}`);

        if(allRowsData[rowIndex][colIndex] === updatedText) return;

        allRowsData[rowIndex][colIndex] = updatedText;
        const updatedRowData = [...allRowsData[rowIndex]];

        const updatePayload = {
            "act": "updateByPosVal",
            "pos": 0,
            "val": id,
            "sheet": "TASK",
            "spread": "1ezoFMSBVznSNcuufRRQRjxAmUmYyU9MjKDzl-v3wxl8",
            "data": JSON.stringify(updatedRowData)
        };

        console.log(`Gửi gói tin cập nhật dữ liệu sửa ô của ID ${id} lên server...`, updatePayload);
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify(updatePayload)
            });
            if (!response.ok) throw new Error('Lỗi mạng khi update nội dung ô');
            console.log(`Cập nhật nội dung ô của Task ${id} thành công.`);
            renderTable(allRowsData);
        } catch (error) {
            console.error("Lỗi khi update ô dữ liệu:", error);
        }
    }

    async function deleteTask(id, rowIndex) {
        if (!confirm("Bạn có chắc chắn muốn xóa Task này không?")) return;
        console.log(`Kích hoạt tiến trình xóa Task ID: ${id} tại hàng chỉ mục: ${rowIndex}`);

        const deletePayload = {
            "act": "deleteByPosVal",
            "pos": 0,
            "val": id,
            "sheet": "TASK",
            "spread": "1ezoFMSBVznSNcuufRRQRjxAmUmYyU9MjKDzl-v3wxl8"
        };

        console.log("Truyền payload xóa dòng lên API server...", deletePayload);
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(deletePayload)
            });
            if (!response.ok) throw new Error('Lỗi phản hồi hệ thống khi thực hiện lệnh xóa');
            console.log(`Xóa Task ${id} thành công khỏi cơ sở dữ liệu server.`);
            allRowsData.splice(rowIndex, 1);
            renderTable(allRowsData);
        } catch (error) {
            console.error(`Gặp lỗi nghiêm trọng khi thực hiện xóa Task ${id}:`, error);
        }
    }

    async function toggleStatus(id, el, rowIndex) {
        const newStatus = el.checked ? "1" : "0";
        console.log(`Kích hoạt sự kiện thay đổi trạng thái Task ID: ${id} -> Trạng thái mới: ${newStatus}`);
        localStorage.setItem(FILENAME + "_" + id, newStatus);
        console.log(`Đã đồng bộ trạng thái cục bộ vào LocalStorage bằng key: ${FILENAME}_${id}`);

        const headers = allRowsData[0];
        const statusColIndex = headers.indexOf("STATUS") !== -1 ? headers.indexOf("STATUS") : 2;
        
        const updatedRowData = [...allRowsData[rowIndex]];
        updatedRowData[statusColIndex] = newStatus; 
        allRowsData[rowIndex] = updatedRowData;

        const targetRow = el.closest('tr');
        if (targetRow) {
            targetRow.setAttribute('data-status-active', newStatus);
        }

        const updatePayload = {
            "act": "updateByPosVal",
            "pos": 0,
            "val": id,
            "sheet": "TASK",
            "spread": "1ezoFMSBVznSNcuufRRQRjxAmUmYyU9MjKDzl-v3wxl8",
            "data": JSON.stringify(updatedRowData)
        };

        console.log("Đang truyền gói tin cập nhật dữ liệu lên máy chủ API...", updatePayload);
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify(updatePayload)
            });
            if (!response.ok) throw new Error('Lỗi phản hồi hệ thống mạng khi gửi API update');
            const resData = await response.json();
            console.log(`Đồng bộ trạng thái của Task ${id} lên hệ thống server thành công.`, resData);
            filterTasks();
        } catch (error) {
            console.error(`Xảy ra lỗi nghiêm trọng khi gọi API cập nhật trạng thái Task ${id}:`, error);
        }
    }
    fetchData();
</script>
</body>
</html>
