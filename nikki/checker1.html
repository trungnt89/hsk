<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyên Gia Chấm Điểm Phát Âm Nhật Ngữ</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #1e3799; --accent: #007bff; --bg: #f4f7f6; }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 0; 
            color: #333; 
            line-height: 1.5;
            height: 100vh;
            overflow: hidden;
        }
        
        .card { 
            width: 100%; 
            max-width: 100%; 
            background: white; 
            padding: 8px; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header-container { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #eee; 
            margin-bottom: 8px; 
            padding-bottom: 5px;
            flex-shrink: 0;
        }
        h2 { text-align: left; color: var(--primary); margin: 0; font-size: 1rem; }
        
        .tabs { 
            display: flex; 
            border-bottom: 2px solid #ddd; 
            margin-bottom: 5px; 
            gap: 5px; 
            background: white; 
            flex-shrink: 0;
        }
        .tab-btn { 
            padding: 6px 10px; border: none; background: #eee; cursor: pointer; 
            font-weight: bold; border-radius: 8px 8px 0 0; transition: 0.3s;
            font-size: 13px;
        }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .tab-content { 
            display: none; 
            flex: 1; 
            overflow-y: auto; 
            padding-right: 5px;
        }
        .tab-content.active { display: block; }

        #scriptDisplay { 
            padding: 12px; background: #fffbe6; border: 1px solid #ffe58f; 
            border-radius: 4px; font-size: 15px; min-height: 40px; margin-bottom: 10px;
            white-space: pre-wrap;
        }

        .form-group { margin-bottom: 5px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #555; font-size: 0.85rem; }
        
        input[type="text"], textarea { 
            width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; outline: none;
        }
        
        .audio-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
        button#analyzeBtn { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        button#analyzeBtn:hover { background: var(--primary); }
        button#analyzeBtn:disabled { background: #ccc; }
        
        #scoreDisplay { font-weight: bold; color: #c0c0c0; font-size: 1.2rem; font-family: monospace; }
        #audioPreview { flex-grow: 1; height: 35px; display: none; }

        #result { 
            padding: 15px; background: #fff; border-top: 4px solid var(--primary); 
            border-radius: 4px; border: 1px solid #e1e8ed;
            overflow-x: hidden; 
        }
        #result h1, #result h2, #result h3 { color: var(--primary); margin-top: 10px; font-size: 1.1rem; }
        
        #result table { 
            border-collapse: collapse; 
            margin: 10px 0; 
            font-size: 13px; 
            -webkit-overflow-scrolling: touch;
        }
        #result table, #result th, #result td { 
            border: 1px solid #ddd; padding: 6px; 
            word-break: break-word;
        }
        #result th { background-color: #f8f9fa; }

        /* Toast Styling */
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.5s; z-index: 1000; pointer-events: none; }
        .toast.show { opacity: 1; }

        @media (max-width: 600px) {
            .audio-row { align-items: center; }
            button#analyzeBtn { width: auto; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header-container">
        <h2>Phân Tích Phát Âm</h2>
        <div id="scoreDisplay">000</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-mainTab" onclick="openTab('mainTab')">Nội Dung</button>
        <button class="tab-btn" id="btn-resultTab" onclick="openTab('resultTab')">Phân Tích</button>
        <button class="tab-btn" id="btn-configTab" onclick="openTab('configTab')">Cấu Hình</button>
    </div>

    <div id="mainTab" class="tab-content active">
        <div class="audio-row">
            <button id="analyzeBtn">Bắt đầu phân tích</button>
            <audio id="audioPreview" controls></audio>
        </div>

        <div class="form-group">
            <label>Kịch bản gốc (Script):</label>
            <div id="scriptDisplay">Đang tải kịch bản...</div>
            <textarea id="originalScript" style="display:none;"></textarea>
        </div>
    </div>

    <div id="resultTab" class="tab-content">
        <div id="result">Chưa có kết quả phân tích.</div>
    </div>

    <div id="configTab" class="tab-content">
        <div class="form-group">
            <label>Cài đặt Gemini API Key:</label>
            <input type="text" id="apiKey" placeholder="Dán API Key vào đây...">
        </div>
        <p style="font-size: 0.75rem; color: #777;">* API Key được lưu trữ cục bộ trong trình duyệt của bạn.</p>
    </div>
</div>

<!-- Toast element -->
<div id="toast" class="toast"></div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxHrD3vVhHGOfkmEteluf1EdkyKpeL3MvR6oerOYpLJIPC9KJSlxt9cJOOjwzbbF6_N/exec";
    const DB_NAME = 'MediaCacheDB'; 
    const STORE_NAME = 'media';      
    const SETTINGS_DB_NAME = 'JP_Score_DB_v1';
    const SETTINGS_STORE_NAME = 'settings';

    const apiKeyInput = document.getElementById('apiKey');
    const scriptInput = document.getElementById('originalScript');
    const scriptDisplay = document.getElementById('scriptDisplay');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultDiv = document.getElementById('result');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const audioPreview = document.getElementById('audioPreview');

    function openTab(tabName) {
        const contents = document.querySelectorAll('.tab-content');
        const buttons = document.querySelectorAll('.tab-btn');
        contents.forEach(c => c.classList.remove('active'));
        buttons.forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        const targetBtn = document.getElementById('btn-' + tabName);
        if(targetBtn) targetBtn.classList.add('active');
        localStorage.setItem('activeTab', tabName);
    }

    function updateStatusWithScore(text, score) {
        if(score) {
            const formattedScore = String(score).padStart(3, '0');
            scoreDisplay.innerText = formattedScore;
            scoreDisplay.style.color = "#ef4444";
        }
    }

    let currentBlob = null;

    async function initSettingsDB() {
        return new Promise(res => {
            const req = indexedDB.open(SETTINGS_DB_NAME, 1);
            req.onupgradeneeded = e => {
                if (!e.target.result.objectStoreNames.contains(SETTINGS_STORE_NAME)) {
                    e.target.result.createObjectStore(SETTINGS_STORE_NAME);
                }
            };
            req.onsuccess = () => res(req.result);
        });
    }

    async function loadDataFromCache() {
        return new Promise(res => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onsuccess = e => {
                try {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        return res(null);
                    }
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const getReq = store.get('current_media');
                    getReq.onsuccess = () => res(getReq.result);
                    getReq.onerror = () => res(null);
                } catch (err) { res(null); }
            };
            req.onerror = () => res(null);
        });
    }

    window.onload = async () => {
        const savedTab = localStorage.getItem('activeTab');
        if (savedTab) openTab(savedTab);
        
        const settingsDb = await initSettingsDB();
        const txSettings = settingsDb.transaction(SETTINGS_STORE_NAME, 'readonly');
        const settingsStore = txSettings.objectStore(SETTINGS_STORE_NAME);
        const reqSettings = settingsStore.get('api_key');
        reqSettings.onsuccess = () => { 
            if(reqSettings.result) { 
                apiKeyInput.value = reqSettings.result; 
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const urlScore = urlParams.get('score');
        const urlAnalysis = urlParams.get('analysis');

        if (urlAnalysis) {
            resultDiv.innerHTML = marked.parse(decodeURIComponent(urlAnalysis));
            wrapTablesInDiv(resultDiv);
            updateStatusWithScore("", urlScore);
            openTab('resultTab');
        } else {
            const data = await loadDataFromCache();
            if (data) {
                scriptInput.value = data.paragraph || "";
                scriptDisplay.textContent = data.paragraph || "Không có kịch bản.";
                if (data.blob) {
                    currentBlob = data.blob;
                    audioPreview.src = URL.createObjectURL(data.blob);
                    audioPreview.style.display = "block";
                }
                const scoreMatch = data.analysis ? data.analysis.match(/(\d+)\/1000/) : null;
                if (data.analysis) {
                    resultDiv.innerHTML = marked.parse(data.analysis);
                    wrapTablesInDiv(resultDiv);
                    updateStatusWithScore("", scoreMatch ? scoreMatch[1] : null);
                }
            }
        }
    };

    apiKeyInput.onchange = async () => {
        const val = apiKeyInput.value.trim();
        const db = await initSettingsDB();
        const tx = db.transaction(SETTINGS_STORE_NAME, 'readwrite');
        tx.objectStore(SETTINGS_STORE_NAME).put(val, 'api_key');
    };

    analyzeBtn.onclick = async () => {
        const key = apiKeyInput.value.trim();
        const script = scriptInput.value.trim();
        const file = currentBlob;

        if(!file || !key) {
            alert("Thiếu API Key hoặc Audio (Chưa có dữ liệu từ DB)!");
            return;
        }

        analyzeBtn.disabled = true;

        try {
            const base64Data = await new Promise((resolve) => {
                const r = new FileReader();
                r.onload = () => resolve(r.result.split(',')[1]);
                r.readAsDataURL(file);
            });

            const models = ['gemini-2.5-flash', 'gemini-2.0-flash-exp', 'gemini-1.5-flash'];
            let responseData = null;
            let lastError = "";

            for (let modelName of models) {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${key}`;
                try {                    
                     const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [
                                { text: `Bạn là chuyên gia ngôn ngữ Nhật Bản. Dưới đây là kịch bản gốc và file ghi âm thực tế. Hãy thực hiện các yêu cầu sau bằng TIẾNG VIỆT:
                                    KỊCH BẢN GỐC: "${script || 'Không cung cấp - Hãy tự nhận diện nội dung'}"
                                    YÊU CẦU:
                                    1. SO SÁNH: Đối chiếu giữa kịch bản gốc và những gì người nói thực tế đã nói. Chỉ ra các từ bị nói sai, nói thiếu hoặc biến âm.
                                    2. NHẬT XÉT CHI TIẾT: Phân tích về phát âm (seion, dakuon, youon...), trường âm (chouon), âm ngắt (sokuon) và đặc biệt là Pitch Accent.
                                    3. CHẤM ĐIỂM: Đưa ra điểm số trên thang điểm 1000 dựa trên độ chính xác, ngữ điệu và sự tự nhiên (Ví dụ: 850/1000) và lý do tại sao đưa ra con số điểm đó mà không phải nhiều hơn hay ít hơn 50 điểm.
                                    4. KHUYÊN CẢI THIỆN: Đưa ra 2-3 lời khuyên thực tế để nói tốt hơn.
                                    Sử dụng định dạng Markdown (tiêu đề, danh sách, bảng) để trình bày rõ ràng.` },
                                { inline_data: { mime_type: file.type || "audio/mp4", data: base64Data } }
                            ]}]
                        })
                    });
                    responseData = await response.json();
                    if (responseData.candidates) break;
                } catch (e) { lastError = e.message; }
            }

            if (responseData && responseData.candidates) {
                const aiText = responseData.candidates[0].content.parts[0].text;
                resultDiv.innerHTML = marked.parse(aiText);
                wrapTablesInDiv(resultDiv);
                const scoreMatch = aiText.match(/(\d+)\/1000/);
                updateStatusWithScore("", scoreMatch ? scoreMatch[1] : null);
                openTab('resultTab');

                const urlParamsSync = new URLSearchParams(window.location.search);
                const fileIdFromUrl = urlParamsSync.get('fileId');
                const lessionID = urlParamsSync.get('lessionId');

                if (fileIdFromUrl) {
                    fetch(WEB_APP_URL, {
                        method: 'POST', mode: 'no-cors',
                        body: JSON.stringify({
                            action: 'score',
                            script: script,
                            lessionID: lessionID,
                            fileId: fileIdFromUrl,
                            score: scoreMatch ? scoreMatch[1] : "0",
                            analysis: aiText
                        })
                    }).then(() => showToast("Đã gửi yêu cầu lưu điểm lên Sheet!"));
                }
            } else { throw new Error(lastError || "Lỗi AI"); }
        } catch (err) {
            alert("Lỗi: " + err.message);
        } finally {
            analyzeBtn.disabled = false;
        }
    };

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function wrapTablesInDiv(container) {
        const tables = container.querySelectorAll('table');
        tables.forEach(table => {
            if (!table.parentElement.classList.contains('table-wrapper')) {
                const wrapper = document.createElement('div');
                wrapper.className = 'table-wrapper';
                wrapper.style.width = '100%';
                wrapper.style.overflowX = 'auto';
                table.style.width = '1200px';
                table.style.minWidth = '1200px';
                table.parentNode.insertBefore(wrapper, table);
                wrapper.appendChild(table);
            }
        });
    }
</script>
</body>
</html>
