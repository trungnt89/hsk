<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Dashboard - Optimized</title>
    <style>
        :root { --primary-color: #fe2c55; --bg-dark: #121212; }
        body { font-family: sans-serif; background-color: var(--bg-dark); color: #fff; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .status-log { font-size: 12px; color: #666; margin-top: 5px; }

        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
            max-width: 1600px; 
            margin: 0 auto; 
        }

        .video-card {
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            min-height: 500px; /* Giữ khung khi chưa kịp load */
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 177.77%; 
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .card-content { padding: 12px; border-top: 1px solid #333; }
        .timestamp { font-size: 11px; color: #888; }
        .video-title { font-weight: 600; color: var(--primary-color); font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎬 Danh sách Video TikTok</h1>
        <div id="status" class="status-log">Đang chuẩn bị dữ liệu...</div>
    </div>

    <div id="video-grid" class="container"></div>

    <script>
        const logger = (msg) => {
            document.getElementById('status').innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            console.log(msg);
        };

        async function init() {
            try {
                logger("Đang tải file list.txt...");
                const res = await fetch('./list.txt');
                const text = await res.text();
                render(text);
            } catch (err) {
                logger("Lỗi tải file: " + err.message);
            }
        }

        function render(rawData) {
            const grid = document.getElementById('video-grid');
            const entries = rawData.trim().split(/\n\s*\n/);
            logger(`Tìm thấy ${entries.length} mục. Đang tối ưu hiển thị...`);

            const fragment = document.createDocumentFragment();

            entries.forEach((entry, index) => {
                const urlMatch = entry.match(/Liên kết: (.*)/);
                const dateMatch = entry.match(/Ngày: (.*)/);

                if (urlMatch) {
                    const url = urlMatch[1].trim().replace(/\/$/, ""); // Xóa dấu / cuối
                    const videoId = url.split('/').pop();

                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <div class="video-wrapper">
                            <iframe 
                                src="https://www.tiktok.com/embed/v2/${videoId}" 
                                allowfullscreen 
                                scrolling="no"
                                loading="lazy"> </iframe>
                        </div>
                        <div class="card-content">
                            <span class="timestamp">${dateMatch ? dateMatch[1] : ''}</span>
                            <div class="video-title">Video #${index + 1}</div>
                        </div>
                    `;
                    fragment.appendChild(card);
                }
            });

            grid.appendChild(fragment);
            logger(`Hoàn tất! Đã tải ${entries.length} video.`);
        }

        window.onload = init;
    </script>
</body>
</html>
