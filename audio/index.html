<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Media Player</title>
    <style>
        /* UI chuyển sang tông màu trắng/sáng */
        body { font-family: sans-serif; background: #f8fafc; color: #1e293b; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 500px; }
        .card { background: #ffffff; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        #media-view { background: #000; border-radius: 12px; overflow: hidden; display: none; margin-bottom: 20px; }
        video, audio { width: 100%; display: block; }
        
        .list { max-height: 400px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 20px; background: #fff; }
        .item { padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; transition: background 0.2s; }
        .item:hover { background: #f1f5f9; color: #2563eb; }
        .item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
        
        .rec-box { border-top: 1px solid #f1f5f9; padding-top: 20px; text-align: center; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; }
        .btn-rec { background: #ef4444; color: white; }
        .btn-save { background: #10b981; color: white; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        #status { font-size: 12px; margin-bottom: 10px; color: #64748b; font-weight: bold; }
    </style>
</head>
<body>
<div class="app">
    <div class="card">
        <div id="media-view"></div>
        <div id="fileList" class="list">Đang tải danh sách...</div>
        <div class="rec-box">
            <div id="status">Sẵn sàng</div>
            <button id="startBtn" class="btn-rec" onclick="startRec()">BẮT ĐẦU GHI ÂM</button>
            <button id="stopBtn" style="background:#64748b; color:white" onclick="stopRec()" disabled>DỪNG</button>
            <button id="uploadBtn" class="btn-save" onclick="upload()" disabled>LƯU LÊN DRIVE (GAS)</button>
        </div>
    </div>
</div>
<script>
    let mediaRec, chunks = [], audioBlob;
    window.onload = loadFiles;

    async function loadFiles() {
        try {
            const res = await fetch('/api/drive');
            const files = await res.json();
            console.log("[LOG] Load files successfully"); // Log đầy đủ
            
            document.getElementById('fileList').innerHTML = files.map(f => {
                // Xử lý an toàn chuỗi để tránh lỗi SyntaxError
                const cleanName = f.name.replace(/[\r\n]+/g, ' ').replace(/'/g, "\\'");
                
                // Cắt ngắn tên hiển thị (giới hạn 30 ký tự)
                const displayName = f.name.length > 30 ? f.name.substring(0, 27) + "..." : f.name;

                return `
                    <div class="item" onclick="playMedia('${f.id}', '${f.mimeType}', '${cleanName}')">
                        <span>${f.mimeType.includes('video') ? '🎥' : '🎵'}</span>
                        <div class="item-text">${displayName}</div>
                    </div>
                `;
            }).join('');
        } catch (err) {
            console.error("[LOG] Error loading files:", err);
        }
    }

    function playMedia(id, mimeType, name) {
        const view = document.getElementById('media-view');
        view.style.display = 'block';
        const url = `/api/drive?id=${id}`;
        
        console.log("[LOG] User clicked play:", name);

        view.innerHTML = mimeType.includes('video') ? 
            `<video src="${url}" controls autoplay></video>` : 
            `<div style="padding:15px; text-align:center; font-size:12px; color:#1e293b; font-weight:bold">${name}<audio src="${url}" controls autoplay style="margin-top:10px"></audio></div>`;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function startRec() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRec = new MediaRecorder(stream);
        chunks = [];
        mediaRec.ondataavailable = e => chunks.push(e.data);
        mediaRec.onstop = () => { 
            audioBlob = new Blob(chunks, { type: 'audio/mpeg' }); 
            document.getElementById('uploadBtn').disabled = false; 
            console.log("[LOG] Recording blob ready");
        };
        mediaRec.start();
        document.getElementById('startBtn').disabled = true; 
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('status').innerText = "🔴 ĐANG GHI ÂM...";
    }

    function stopRec() { 
        mediaRec.stop(); 
        document.getElementById('startBtn').disabled = false; 
        document.getElementById('stopBtn').disabled = true; 
        document.getElementById('status').innerText = "Đã xong"; 
    }

    async function upload() {
        const btn = document.getElementById('uploadBtn'); 
        btn.innerText = "⏳ ĐANG LƯU...";
        btn.disabled = true;

        const reader = new FileReader(); 
        reader.readAsDataURL(audioBlob);
        reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1];
            try {
                const res = await fetch('/api/drive', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ name: `Rec_${Date.now()}.mp3`, base64Audio }) 
                });
                if (res.ok) {
                    console.log("[LOG] File uploaded to GAS");
                    location.reload();
                }
            } catch (err) {
                console.error("[LOG] Upload failed:", err);
                btn.innerText = "LỖI - THỬ LẠI";
                btn.disabled = false;
            }
        };
    }
</script>
</body>
</html>
