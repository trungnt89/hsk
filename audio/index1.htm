<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Media Player</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; color: #1e293b; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 500px; }
        .card { background: #ffffff; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        #media-view { background: #000; border-radius: 12px; overflow: hidden; display: none; margin-bottom: 20px; }
        video, audio { width: 100%; display: block; }
        .list { max-height: 400px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 20px; background: #fff; }
        .item { padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; transition: background 0.2s; -webkit-tap-highlight-color: transparent; }
        .item:active { background: #f1f5f9; }
        .item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
        .rec-box { border-top: 1px solid #f1f5f9; padding-top: 20px; text-align: center; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; font-size: 14px; }
        .btn-rec { background: #ef4444; color: white; }
        .btn-save { background: #10b981; color: white; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        #status { font-size: 12px; margin-bottom: 10px; color: #64748b; font-weight: bold; }
        .folder-header {
            padding: 8px 12px;
            font-size: 12px;
            font-weight: bold;
            background: #f1f5f9;
            color: #334155;
        }
    </style>
</head>

<body>
<div class="app">
    <div class="card">
        <div id="media-view"></div>
        <div id="fileList" class="list">Đang tải danh sách...</div>

        <div class="rec-box">
            <div id="status">Sẵn sàng</div>
            <button id="startBtn" class="btn-rec" onclick="startRec()">BẮT ĐẦU GHI ÂM</button>
            <button id="stopBtn" style="background:#64748b; color:white" onclick="stopRec()" disabled>DỪNG</button>
            <button id="uploadBtn" class="btn-save" onclick="upload()" disabled>LƯU LÊN DRIVE (GAS)</button>
        </div>
    </div>
</div>

<script>
let mediaRec, chunks = [], audioBlob;
window.onload = loadFiles;

/* ===========================
   LOAD FILES – GROUP BY FOLDER
   =========================== */
async function loadFiles() {
    try {
        const res = await fetch('/api/drive');
        const result = await res.json();
        const grouped = result.data || {};

        const container = document.getElementById('fileList');
        container.innerHTML = '';

        Object.entries(grouped).forEach(([folderName, files]) => {
            container.innerHTML += `
                <div class="folder-header">📁 ${folderName}</div>
            `;

            files.forEach(f => {
                const cleanName = f.name.replace(/['"]/g, '').replace(/[\r\n]+/g, ' ');
                const displayName = f.name.length > 30
                    ? f.name.substring(0, 27) + "..."
                    : f.name;

                const isVideo =
                    f.mimeType.includes('video') ||
                    f.name.endsWith('.mp4') ||
                    f.name.endsWith('.webm');

                container.innerHTML += `
                    <div class="item"
                         onclick="playMedia('${f.id}', '${f.mimeType}', '${cleanName}')">
                        <span>${isVideo ? '🎥' : '🎵'}</span>
                        <div class="item-text">${displayName}</div>
                    </div>
                `;
            });
        });
    } catch (err) {
        console.error("Lỗi tải danh sách:", err);
        document.getElementById('fileList').innerText = "Không thể tải danh sách.";
    }
}

/* ===========================
   PLAYER
   =========================== */
function playMedia(id, mimeType, name) {
    const view = document.getElementById('media-view');
    view.style.display = 'block';
    const url = `/api/drive?id=${id}`;

    const isVideo =
        mimeType.includes('video') ||
        name.toLowerCase().endsWith('.mp4') ||
        name.toLowerCase().endsWith('.webm');

    if (isVideo) {
        view.innerHTML = `
            <video controls autoplay playsinline>
                ${url}
            </video>
        `;
    } else {
        view.innerHTML = `
            <div style="padding:15px; text-align:center;">
                <div style="font-size:12px; font-weight:bold; margin-bottom:10px;">${name}</div>
                <audio controls autoplay>
                    ${url}
                </audio>
            </div>
        `;
    }

    window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ===========================
   RECORD
   =========================== */
async function startRec() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';

    mediaRec = new MediaRecorder(stream);
    chunks = [];

    mediaRec.ondataavailable = e => e.data.size && chunks.push(e.data);
    mediaRec.onstop = () => {
        audioBlob = new Blob(chunks, { type: mimeType });
        document.getElementById('uploadBtn').disabled = false;
    };

    mediaRec.start();
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('status').innerText = "🔴 ĐANG GHI ÂM...";
}

function stopRec() {
    mediaRec.stop();
    mediaRec.stream.getTracks().forEach(t => t.stop());
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    document.getElementById('status').innerText = "Đã xong";
}

/* ===========================
   UPLOAD
   =========================== */
async function upload() {
    const btn = document.getElementById('uploadBtn');
    btn.innerText = "⏳ ĐANG LƯU...";
    btn.disabled = true;

    const reader = new FileReader();
    reader.readAsDataURL(audioBlob);
    reader.onloadend = async () => {
        const base64Audio = reader.result.split(',')[1];
        const ext = audioBlob.type.includes('mp4') ? 'm4a' : 'webm';

        await fetch('/api/drive', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: `Rec_${Date.now()}.${ext}`,
                base64Audio,
                mimeType: audioBlob.type
            })
        });

        location.reload();
    };
}
</script>
</body>
</html>
