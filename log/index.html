<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JST Live Console</title>
    <script src="../com/assistive.js"></script>    
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; overflow: hidden; }
        .header { background: #111; padding: 20px 5px; border-bottom: 2px solid #222; display: flex; align-items: center; justify-content: space-between; }
        .container { padding: 15px; height: calc(100vh - 100px); overflow-y: auto; }
        
        #monitor-box {
            background: #050505;
            border: 1px solid #222;
            font-size: 16px;
            padding: 10px;
        }

        .log-entry {
            border-bottom: 1px solid #1a1a1a;
            padding: 8px 0;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        /* Tăng min-width để chứa đủ ngày giờ đầy đủ */
        .log-time { color: #888; min-width: 180px; font-family: 'Consolas', monospace; }
        .log-level { font-weight: bold; min-width: 60px; text-transform: uppercase; }
        .level-info { color: #2ecc71; }
        .level-error { color: #e74c3c; }
        .level-warn { color: #f1c40f; }

        #clock {
            font-family: 'Consolas', monospace;
            font-size: 32px;
            font-weight: bold;
            color: #2ecc71;
            text-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }
        h3 { font-size: 24px; margin: 0; color: #eee; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex; align-items:center; gap:15px;">
            <div style="width:15px; height:10px; background:#2ecc71; border-radius:50%; box-shadow: 0 0 15px #2ecc71;"></div>
            <h3>CONSOLE MONITOR (JST)</h3>
        </div>
        <div id="clock">--:--:--</div>
    </div>
    <div class="container">
        <div id="monitor-box">Đang tải dữ liệu log...</div>
    </div>

    <script src="../com/logger.js"></script>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxYrGbKghzwW1cKU37CJf-UFISCcvGkemZlTJZH1GWa7x4qrAOd2UKzVOR3vWAPOtyMww/exec";

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleString('ja-JP', {
                timeZone: 'Asia/Tokyo',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
        }

        async function fetchLogs() {
            try {
                console.log("[SYSTEM] Fetching logs from Google Sheet...");
                const response = await fetch(GAS_URL);
                const data = await response.json();
                const container = document.getElementById('monitor-box');
                
                if (!data || data.length === 0) {
                    container.innerHTML = "Không có dữ liệu log.";
                    return;
                }

                container.innerHTML = data.map(log => {
                    // Định dạng ngày giờ đầy đủ cho từng dòng log
                    const logDate = new Date(log.timestamp).toLocaleString('ja-JP', {
                        timeZone: 'Asia/Tokyo',
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit',
                        hour12: false
                    });

                    return `
                        <div class="log-entry">
                            <span class="log-time">[${logDate}]</span>
                            <span class="log-level level-${String(log.level).toLowerCase()}">${log.level}</span>
                            <span class="log-msg">${log.message}</span>
                        </div>
                    `;
                }).join('');

                console.log("[SUCCESS] Logs updated at: " + new Date().toISOString());
                
            } catch (error) {
                console.error("[ERROR] Failed to fetch logs:", error);
                document.getElementById('monitor-box').innerHTML = "Lỗi kết nối: " + error.message;
            }
        }

        setInterval(updateClock, 1000);
        setInterval(fetchLogs, 10000);

        window.onload = () => {
            updateClock();
            fetchLogs();
            if (typeof LoggerModule !== 'undefined') {
                LoggerModule.init("monitor-box");
            }
        };
    </script>
</body>
</html>
