<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Dashboard Pro</title>
    <style>
        :root { --primary-color: #fe2c55; --bg-dark: #121212; }
        body { font-family: sans-serif; background-color: var(--bg-dark); color: #fff; margin: 0; padding: 0; overflow: hidden; }
        
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .start-btn {
            background: var(--primary-color); border: none; color: white;
            padding: 15px 40px; border-radius: 30px; font-size: 18px; cursor: pointer;
        }

        .main-viewer {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; width: 100%;
        }

        #video-display-area {
            width: 100%; height: 80vh; max-width: 450px;
            background: #000; border-radius: 15px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Quan trọng: Cố định kích thước cho Tiktok Embed */
        .tiktok-embed { margin: 0 !important; width: 100% !important; height: 100% !important; }

        .controls { margin-top: 15px; display: flex; gap: 15px; align-items: center; }
        .nav-btn {
            background: #333; color: white; border: 1px solid #444;
            padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .nav-btn:hover { background: var(--primary-color); }
        .info { font-size: 13px; color: #888; margin-top: 8px; }
    </style>
    <script async src="https://www.tiktok.com/embed.js"></script>
</head>
<body>

    <div id="start-overlay">
        <h2>TikTok Dashboard</h2>
        <p style="color: #666;">Nhấn để bắt đầu và giữ âm thanh</p>
        <button class="start-btn" onclick="startApp()">BẮT ĐẦU</button>
    </div>

    <div class="main-viewer">
        <div id="video-display-area">
            <div id="video-container" style="width: 100%; height: 100%;"></div>
        </div>

        <div class="controls">
            <button class="nav-btn" onclick="changeVideo(-1)">⬅ TRƯỚC</button>
            <button class="nav-btn" style="background: var(--primary-color);" onclick="changeVideo(1)">SAU ➡</button>
        </div>
        
        <div id="video-info" class="info">Đang tải...</div>
    </div>

    <script>
        let allVideos = [];
        let currentIndex = 0;

        async function init() {
            try {
                const res = await fetch('./list.txt');
                const text = await res.text();
                const entries = text.trim().split(/\n\s*\n/);
                
                allVideos = entries.map((entry, index) => {
                    const urlMatch = entry.match(/Liên kết: (.*)/);
                    const dateMatch = entry.match(/Ngày: (.*)/);
                    const url = urlMatch ? urlMatch[1].trim().replace(/\/$/, "") : "";
                    return { id: url.split('/').pop(), date: dateMatch ? dateMatch[1] : 'N/A' };
                }).filter(v => v.id);
                updateStatus();
            } catch (err) { console.error("Lỗi nạp file:", err); }
        }

        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';
            loadVideo(0);
        }

        function changeVideo(step) {
            let nextIndex = currentIndex + step;
            if (nextIndex >= 0 && nextIndex < allVideos.length) {
                loadVideo(nextIndex);
            }
        }

        function loadVideo(index) {
            currentIndex = index;
            const container = document.getElementById('video-container');
            const video = allVideos[index];

            console.log(`[Log] Switching to: ${video.id}`);

            // Xóa sạch container để ngắt hoàn toàn video cũ
            container.innerHTML = "";

            // Tạo thẻ blockquote theo chuẩn SDK của TikTok
            const blockquote = document.createElement('blockquote');
            blockquote.className = 'tiktok-embed';
            blockquote.cite = `https://www.tiktok.com/@v/video/${video.id}`;
            blockquote.setAttribute('data-video-id', video.id);
            blockquote.style.width = '100%';
            blockquote.style.height = '100%';

            // Thêm phần thân bắt buộc của SDK
            blockquote.innerHTML = `<section></section>`;

            container.appendChild(blockquote);

            // GỌI SDK TIKTOK ĐỂ XỬ LÝ (Tăng khả năng giữ âm thanh)
            if (window.ttEmbedJs) {
                window.ttEmbedJs.load();
            }

            updateStatus();
        }

        function updateStatus() {
            const info = document.getElementById('video-info');
            info.innerText = `Video ${currentIndex + 1} / ${allVideos.length} | ${allVideos[currentIndex]?.date || ''}`;
        }

        window.onload = init;
    </script>
</body>
</html>
