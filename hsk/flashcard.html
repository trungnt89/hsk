<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Flashcards</title>
    <script src="../com/TTSClient.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            user-select: none;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
            width: 100%;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .progress-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 10px;
            margin-bottom: 5px;
        }

        .progress {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .stats {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Top Settings Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 10px;
            margin-bottom: 5px;
        }

        .toggle-btn {
            background-color: #cbd5e1;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #334155;
        }

        .toggle-btn.active {
            background-color: #22c55e;
            color: white;
        }

        /* Flashcard Container */
        .flashcard-wrapper {
            perspective: 1000px;
            width: 100%;
            height: 380px;
            cursor: pointer;
            position: relative;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .flashcard.flipped-vertical {
            transform: rotateX(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            border: 1px solid #e2e8f0;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #f1f5f9;
        }

        .flashcard.flipped-vertical .card-back {
            transform: rotateX(180deg);
        }

        /* Action Buttons inside Card Corner */
        .card-action-corner {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        .action-icon-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-icon-btn:hover {
            transform: scale(1.05);
            background: #e2e8f0;
        }

        .action-icon-btn.status-mastered {
            background: #dcfce7;
            border-color: #86efac;
            color: #15803d;
        }

        /* Front Content */
        .word {
            font-size: 5rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .hint {
            font-size: 0.9rem;
            color: var(--text-muted);
            border: 1px dashed var(--text-muted);
            padding: 4px 12px;
            border-radius: 12px;
            margin-top: 15px;
        }

        /* Back Content */
        .pinyin {
            font-size: 2.3rem;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .meaning {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 25px;
            text-align: center;
        }

        .example-box {
            width: 100%;
            border-top: 1px solid #cbd5e1;
            padding-top: 15px;
            text-align: center;
        }

        .example-cn {
            font-size: 1.8rem;
            color: #334155;
            margin-bottom: 4px;
        }

        .example-py {
            font-size: 1.3rem;
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 4px;
        }

        .example-vn {
            font-size: 1.3rem;
            color: #475569;
            font-weight: 500;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background-color: #e2e8f0;
            color: var(--text-main);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background-color: #cbd5e1;
        }

        /* Loading */
        .loading {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-top: 100px;
            font-weight: 500;
        }

        .error {
            color: var(--accent);
            text-align: center;
            margin-top: 100px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading">Đang tải dữ liệu từ Google Sheet...</div>
    <div id="error" class="error" style="display: none;">Không thể tải dữ liệu. Vui lòng kiểm tra lại kết nối hoặc API.</div>

    <div class="container" id="main-content" style="display: none;">
        <div class="header">
            <h1 id="sheet-title">HSK Flashcards</h1>
            <div class="top-bar">
                <button id="tts-toggle" class="toggle-btn active" onclick="toggleTts(event)">TTS: BẬT</button>
                <button id="filter-toggle" class="toggle-btn" onclick="toggleFilter(event)">Xem: Tất cả</button>
            </div>
            <div class="progress-box">
                <div class="progress" id="progress-text">0 / 0</div>
                <div class="stats" id="stats-text">Thuộc: 0 | Chưa thuộc: 0</div>
            </div>
        </div>

        <div class="flashcard-wrapper" onclick="flipCard()">
            <div class="flashcard" id="card">
                <div class="card-face card-front">
                    <div class="card-action-corner">
                        <button id="mark-btn-front" class="action-icon-btn" onclick="toggleMastered(event)" title="Đánh dấu thuộc">✓</button>
                    </div>
                    <div class="word" id="front-word">...</div>
                    <div class="hint">Nhấp để lật mặt sau hoặc vuốt để chuyển</div>
                </div>
                <div class="card-face card-face card-back">
                    <div class="card-action-corner">
                        <button id="mark-btn-back" class="action-icon-btn" onclick="toggleMastered(event)" title="Đánh dấu thuộc">✓</button>
                    </div>
                    <div class="pinyin" id="back-pinyin">...</div>
                    <div class="meaning" id="back-meaning">...</div>
                    <div class="example-box" id="example-box">
                        <div class="example-cn" id="ex-cn">...</div>
                        <div class="example-py" id="ex-py">...</div>
                        <div class="example-vn" id="ex-vn">...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-secondary" onclick="prevCard()">Trước đó</button>
            <button class="btn" onclick="nextCard()">Tiếp theo</button>
        </div>
    </div>

    <script>
        const apiUrl = 'https://hsk-gilt.vercel.app/api/gSheet?sheet=HSK1&act=read&spread=105i_4pdAfadq4G-ELDmrnopWW7H4pv0EZUg87xsPxtc';
        let rawFlashcards = [];
        let filteredFlashcards = [];
        let currentIndex = 0;
        
        // Trạng thái cấu hình chức năng thêm
        let isTtsEnabled = true;
        let currentFilter = 'all'; // all, mastered, unmastered
        let masteredIds = JSON.parse(localStorage.getItem('hsk_mastered_ids') || '[]');

        // Biến kiểm soát vuốt chạm (Swipe) trên mobile
        let touchStartX = 0;
        let touchEndX = 0;
        let touchStartY = 0;
        let touchEndY = 0;

        // Fetch dữ liệu từ API khi trang được tải
        async function fetchData() {
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Network response error');
                
                const data = await response.json();
                
                if (data && data.values && data.values.length > 1) {
                    const rows = data.values.slice(1);
                    
                    rawFlashcards = rows.map(row => ({
                        stt: row[0] || '',
                        word: row[1] || '',
                        pinyin: row[2] || '',
                        meaning: row[3] || '',
                        exCn: row[4] || '',
                        exPy: row[5] || '',
                        exVn: row[6] || ''
                    })).filter(item => item.word);

                    if (rawFlashcards.length > 0) {
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('error').style.display = 'none';
                        document.getElementById('main-content').style.display = 'flex';
                        applyFilterAndRender();
                        initSwipeEvents();
                    } else {
                        showError();
                    }
                } else {
                    showError();
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                showError();
            }
        }

        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }

        // Áp dụng bộ lọc danh sách thuộc / chưa thuộc
        function applyFilterAndRender() {
            if (currentFilter === 'all') {
                filteredFlashcards = [...rawFlashcards];
            } else if (currentFilter === 'mastered') {
                filteredFlashcards = rawFlashcards.filter(item => masteredIds.includes(item.stt));
            } else if (currentFilter === 'unmastered') {
                filteredFlashcards = rawFlashcards.filter(item => !masteredIds.includes(item.stt));
            }

            // Đồng bộ bộ đếm thống kê tổng
            const masteredCount = rawFlashcards.filter(item => masteredIds.includes(item.stt)).length;
            const unmasteredCount = rawFlashcards.length - masteredCount;
            document.getElementById('stats-text').innerText = `Thuộc: ${masteredCount} | Chưa thuộc: ${unmasteredCount}`;

            if (filteredFlashcards.length === 0) {
                document.getElementById('front-word').innerText = "Trống";
                document.getElementById('back-pinyin').innerText = "";
                document.getElementById('back-meaning').innerText = "Không có thẻ nào trong danh mục này";
                document.getElementById('example-box').style.display = 'none';
                document.getElementById('progress-text').innerText = "0 / 0";
                return;
            }

            if (currentIndex >= filteredFlashcards.length) {
                currentIndex = 0;
            }

            renderCard();
        }

        // Hiển thị nội dung thẻ hiện tại và điều khiển luồng phát âm thanh TTS
        function renderCard() {
            const cardElement = document.getElementById('card');
            cardElement.classList.remove('flipped');
            cardElement.classList.remove('flipped-vertical');

            const current = filteredFlashcards[currentIndex];
            
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${filteredFlashcards.length}`;
            document.getElementById('front-word').innerText = current.word;
            document.getElementById('back-pinyin').innerText = current.pinyin;
            document.getElementById('back-meaning').innerText = current.meaning;
            
            if(current.exCn) {
                document.getElementById('example-box').style.display = 'block';
                
                // Tô đỏ từ gốc có trong ví dụ chữ Hán
                if (current.word && current.exCn.includes(current.word)) {
                    const regex = new RegExp(current.word, 'g');
                    document.getElementById('ex-cn').innerHTML = current.exCn.replace(regex, `<span style="color: var(--accent); font-weight: bold;">${current.word}</span>`);
                } else {
                    document.getElementById('ex-cn').innerText = current.exCn;
                }
                
                document.getElementById('ex-py').innerText = current.exPy;
                document.getElementById('ex-vn').innerText = current.exVn;
            } else {
                document.getElementById('example-box').style.display = 'none';
            }

            // Đồng bộ hóa trạng thái nút Đánh dấu thuộc
            const isMastered = masteredIds.includes(current.stt);
            const frontMarkBtn = document.getElementById('mark-btn-front');
            const backMarkBtn = document.getElementById('mark-btn-back');
            if (isMastered) {
                frontMarkBtn.classList.add('status-mastered');
                backMarkBtn.classList.add('status-mastered');
            } else {
                frontMarkBtn.classList.remove('status-mastered');
                backMarkBtn.classList.remove('status-mastered');
            }

            // Phát âm tự động khi chuyển thẻ nếu bật TTS - Mặc định luôn đọc từ chính khi chuyển thẻ
            if (isTtsEnabled && typeof window.speakCommon === 'function') {
                window.speakCommon({ text: current.word, voice: "zh-CN-XiaoxiaoNeural" });
            }
        }

        // Hàm lật thẻ và đọc nội dung tương ứng
        function flipCard() {
            if (filteredFlashcards.length === 0) return;
            const cardElement = document.getElementById('card');
            
            // Nếu đang lật dọc (từ phím Up/Down), tiếp tục toggle lật dọc, ngược lại lật ngang
            if (cardElement.classList.contains('flipped-vertical') || currentFlipDirection === 'vertical') {
                cardElement.classList.toggle('flipped-vertical');
                cardElement.classList.remove('flipped');
            } else {
                cardElement.classList.toggle('flipped');
                cardElement.classList.remove('flipped-vertical');
            }
            currentFlipDirection = 'normal'; // Reset trạng thái hướng lật sau click trực tiếp
            
            const current = filteredFlashcards[currentIndex];

            // Phát âm tự động khi lật thẻ - Đọc theo mặt hiển thị sau khi lật
            if (isTtsEnabled && typeof window.speakCommon === 'function') {
                const isFlippedNow = cardElement.classList.contains('flipped') || cardElement.classList.contains('flipped-vertical');
                const textToSpeak = isFlippedNow ? (current.exCn || current.word) : current.word;
                window.speakCommon({ text: textToSpeak, voice: "zh-CN-XiaoxiaoNeural" });
            }
        }

        let currentFlipDirection = 'normal';

        // Chuyển sang thẻ tiếp theo
        function nextCard() {
            if (filteredFlashcards.length === 0) return;
            currentIndex = (currentIndex + 1) % filteredFlashcards.length;
            renderCard();
        }

        // Quay lại thẻ trước đó
        function prevCard() {
            if (filteredFlashcards.length === 0) return;
            currentIndex = (currentIndex - 1 + filteredFlashcards.length) % filteredFlashcards.length;
            renderCard();
        }

        // Bật / Tắt trạng thái TTS phát âm tự động
        function toggleTts(event) {
            event.stopPropagation();
            isTtsEnabled = !isTtsEnabled;
            const ttsBtn = document.getElementById('tts-toggle');
            if (isTtsEnabled) {
                ttsBtn.innerText = "TTS: BẬT";
                ttsBtn.classList.add('active');
                // Phát lại nội dung tương ứng với mặt hiện tại khi kích hoạt lại
                if (filteredFlashcards.length > 0 && typeof window.speakCommon === 'function') {
                    const current = filteredFlashcards[currentIndex];
                    const cardElement = document.getElementById('card');
                    const isFlippedNow = cardElement.classList.contains('flipped') || cardElement.classList.contains('flipped-vertical');
                    const textToSpeak = isFlippedNow ? (current.exCn || current.word) : current.word;
                    window.speakCommon({ text: textToSpeak, voice: "zh-CN-XiaoxiaoNeural" });
                }
            } else {
                ttsBtn.innerText = "TTS: TẮT";
                ttsBtn.classList.remove('active');
                if (typeof window.stopSpeak === 'function') {
                    window.stopSpeak();
                }
            }
        }

        // Chuyển đổi qua lại giữa các trạng thái bộ lọc (Tất cả / Thuộc / Chưa thuộc)
        function toggleFilter(event) {
            event.stopPropagation();
            const filterBtn = document.getElementById('filter-toggle');
            if (currentFilter === 'all') {
                currentFilter = 'unmastered';
                filterBtn.innerText = "Xem: Chưa thuộc";
                filterBtn.classList.add('active');
            } else if (currentFilter === 'unmastered') {
                currentFilter = 'mastered';
                filterBtn.innerText = "Xem: Đã thuộc";
                filterBtn.classList.add('active');
            } else {
                currentFilter = 'all';
                filterBtn.innerText = "Xem: Tất cả";
                filterBtn.classList.remove('active');
            }
            currentIndex = 0;
            applyFilterAndRender();
        }

        // Thêm / Xóa từ khỏi danh sách đã thuộc (Lưu LocalStorage)
        function toggleMastered(event) {
            event.stopPropagation();
            if (filteredFlashcards.length === 0) return;
            const current = filteredFlashcards[currentIndex];
            
            const index = masteredIds.indexOf(current.stt);
            if (index > -1) {
                masteredIds.splice(index, 1);
            } else {
                masteredIds.push(current.stt);
            }
            
            localStorage.setItem('hsk_mastered_ids', JSON.stringify(masteredIds));
            applyFilterAndRender();
        }

        // Thiết lập bộ sự kiện nhận diện thao tác vuốt di động (Swipe Touch)
        function initSwipeEvents() {
            const wrapper = document.querySelector('.flashcard-wrapper');
            if (!wrapper) return;
            
            wrapper.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });

            wrapper.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                touchEndY = e.changedTouches[0].screenY;
                handleSwipeGesture();
            }, { passive: true });
        }

        // Xử lý xác định khoảng cách vuốt hợp lệ để chuyển trang
        function handleSwipeGesture() {
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            // Đảm bảo thao tác vuốt theo phương ngang rõ rệt hơn phương dọc
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
                if (deltaX > 0) {
                    prevCard(); // Vuốt sang phải -> Thẻ trước
                } else {
                    nextCard(); // Vuốt sang trái -> Thẻ tiếp theo
                }
            }
        }

        // Lắng nghe sự kiện bàn phím (Phím mũi tên & Space) giúp học tiện lợi hơn
        document.addEventListener('keydown', (e) => {
            if (filteredFlashcards.length === 0) return;
            if (e.code === 'Space') {
                e.preventDefault();
                currentFlipDirection = 'normal';
                flipCard();
            } else if (e.code === 'ArrowRight') {
                nextCard();
            } else if (e.code === 'ArrowLeft') {
                prevCard();
            } else if (e.code === 'ArrowUp' || e.code === 'ArrowDown') {
                e.preventDefault();
                currentFlipDirection = 'vertical';
                flipCard();
            }
        });

        // Khởi chạy ứng dụng
        fetchData();
    </script>
</body>
</html>
