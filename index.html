<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindset Floating Cards - Responsive</title>
	<script src="../com/assistive.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: #0f172a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .floating-card {
            position: absolute;
            /* Điều chỉnh cho mobile: to hơn */
            width: 85%; 
            max-width: 320px;
            min-height: 140px;
            padding: 20px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #f1f5f9;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: grab;
            user-select: none;
            transition: border-color 0.3s, opacity 0.3s, box-shadow 0.3s, transform 0.3s;
            z-index: 10;
            opacity: 0.7;
            box-sizing: border-box;
            top: 0; left: 0;
        }

        .floating-card.selected {
            border-color: var(--gold);
            z-index: 150;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6);
            opacity: 1;
            transform: scale(1.05);
        }

        .category {
            font-size: 0.75rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .content {
            font-size: 1.1rem; /* Tăng cỡ chữ để dễ đọc trên mobile */
            line-height: 1.4;
            font-style: italic;
            white-space: pre-line;
        }

        #menu-btn { position: fixed; bottom: 20px; right: 20px; z-index: 1000; background: var(--gold); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; opacity: 0.3; }
        #menu-btn:hover { opacity: 1; }
        #settings-panel { position: fixed; bottom: 70px; right: 20px; z-index: 1000; background: var(--glass); backdrop-filter: blur(10px); padding: 15px; border-radius: 10px; border: 1px solid var(--gold); color: white; display: none; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

<div id="container"></div>

<button id="menu-btn">⚙️</button>
<div id="settings-panel">
    <label><input type="checkbox" id="filter-check" checked> Chỉ hiện cột 5 = TRUE</label>
    <label>
        <select id="order-select">
            <option value="random">Ngẫu nhiên</option>
            <option value="sequential">Tuần tự</option>
        </select>
    </label>
    <label>Thời gian chuyển (giây): <input type="number" id="interval-input" value="5" min="1" step="1" style="width: 50px; background: none; border: 1px solid var(--gold); color: white;"></label>
</div>

<script>
    async function fetchData() {
        console.log("[LOG] Fetching data from API...");
        try {
            const response = await fetch("https://hsk-gilt.vercel.app/api/gSheet", {
                method: "POST",
                headers: {
                    "content-type": "application/json"
                },
                body: JSON.stringify({
                    sheet: "DairyList",
                    act: "read",
                    spread: "1UiAS_mUhl6j6wHyPkNiol9pclzkQJWD4qzPIZD2sx3k"
                })
            });
            const data = await response.json();
            if (data && data.values) {
                window.allValues = data.values;
                loadSettings();
                initCards(data.values);
            }
        } catch (error) {
            console.error("[ERROR] Failed to fetch data:", error);
        }
    }

    const container = document.getElementById('container');
    const cards = [];
    let currentSelectedIndex = -1;
    let isDragging = false;

    function saveSettings() {
        const settings = {
            filter: document.getElementById('filter-check').checked,
            order: document.getElementById('order-select').value,
            interval: document.getElementById('interval-input').value
        };
        localStorage.setItem('mindset_settings', JSON.stringify(settings));
        console.log("[LOG] Settings saved:", settings);
    }

    function loadSettings() {
        const saved = localStorage.getItem('mindset_settings');
        if (saved) {
            const settings = JSON.parse(saved);
            document.getElementById('filter-check').checked = settings.filter;
            document.getElementById('order-select').value = settings.order;
            document.getElementById('interval-input').value = settings.interval;
            console.log("[LOG] Settings loaded.");
        }
    }

    function initCards(values) {
        console.log("[LOG] Initializing responsive cards...");
        container.innerHTML = '';
        cards.length = 0;
        
        const filterEnabled = document.getElementById('filter-check').checked;
        const filteredRows = filterEnabled ? values.filter(row => row[5] === "TRUE") : values;

        filteredRows.forEach((row, index) => {
            const quoteText = row[2]; 
            const div = document.createElement('div');
            div.className = 'floating-card';
            div.innerHTML = `
                <div class="content">${quoteText}</div>
            `;
            div.dataset.id = row[0]; 
            container.appendChild(div);

            const cardObj = {
                element: div,
                x: Math.random() * (window.innerWidth - 200),
                y: Math.random() * (window.innerHeight - 200),
                vx: Math.cos(Math.random() * 2 * Math.PI) * (0.5 + Math.random()),
                vy: Math.sin(Math.random() * 2 * Math.PI) * (0.5 + Math.random())
            };
            makeDraggable(cardObj);
            cards.push(cardObj);
        });

        highlightNextCard();
        if (window.highlightInterval) clearInterval(window.highlightInterval);
        const intervalSec = parseFloat(document.getElementById('interval-input').value) || 5;
        window.highlightInterval = setInterval(highlightNextCard, intervalSec * 1000);
    }

    function highlightNextCard() {
        if (cards.length === 0) return;
        if (currentSelectedIndex >= 0 && cards[currentSelectedIndex]) {
            cards[currentSelectedIndex].element.classList.remove('selected');
        }
        
        cards.forEach(card => card.element.onclick = function() { 
            if(!isDragging && this.classList.contains('selected')) {
                window.location.href = `https://hsk-gilt.vercel.app/nikki/index.html?id=${this.dataset.id}`;
            }
        });

        let nextIndex;
        const mode = document.getElementById('order-select').value;

        if (mode === 'random') {
            do {
                nextIndex = Math.floor(Math.random() * cards.length);
            } while (nextIndex === currentSelectedIndex && cards.length > 1);
        } else {
            nextIndex = (currentSelectedIndex + 1) % cards.length;
        }
        
        currentSelectedIndex = nextIndex;
        cards[currentSelectedIndex].element.classList.add('selected');
        console.log(`[LOG] Selected card index: ${currentSelectedIndex} (Mode: ${mode})`);
    }

    function makeDraggable(cardObj) {
        let startX, startY;
        const el = cardObj.element;

        const onStart = (e) => {
            console.log(`[LOG] Drag started on card ID: ${el.dataset.id}`);
        };

        const onMove = (e) => {
            if (!isDragging) return;
            const touch = e.type === 'touchmove' ? e.touches[0] : e;
            cardObj.x = touch.clientX - startX;
            cardObj.y = touch.clientY - startY;
        };

        const onEnd = () => {
            if(isDragging) console.log(`[LOG] Drag ended`);
            isDragging = false;
            el.style.cursor = 'grab';
        };

        el.addEventListener('mousedown', onStart);
        el.addEventListener('touchstart', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', onMove);
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchend', onEnd);
    }

    function animate() {
        cards.forEach(card => {
            const rect = card.element.getBoundingClientRect();
            
            if (!isDragging || currentSelectedIndex !== cards.indexOf(card)) {
                card.x += card.vx;
                card.y += card.vy;

                if (card.x <= 0 || card.x + rect.width >= window.innerWidth) {
                    card.vx *= -1;
                    card.x = Math.max(0, Math.min(card.x, window.innerWidth - rect.width));
                }

                if (card.y <= 0 || card.y + rect.height >= window.innerHeight) {
                    card.vy *= -1;
                    card.y = Math.max(0, Math.min(card.y, window.innerHeight - rect.height));
                }
            }

            card.element.style.transform = `translate3d(${card.x}px, ${card.y}px, 0)`;
        });

        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
        console.log("[LOG] Window resized, recalculating boundaries.");
        cards.forEach(card => {
            card.x = Math.min(card.x, window.innerWidth - card.element.offsetWidth);
            card.y = Math.min(card.y, window.innerHeight - card.element.offsetHeight);
        });
    });

    document.getElementById('menu-btn').onclick = () => {
        const panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    };

    document.getElementById('filter-check').onchange = () => {
        saveSettings();
        if(window.allValues) initCards(window.allValues);
    };

    document.getElementById('order-select').onchange = () => {
        saveSettings();
        if(window.allValues) initCards(window.allValues);
    };

    document.getElementById('interval-input').onchange = () => {
        saveSettings();
        if(window.allValues) initCards(window.allValues);
    };

    fetchData();
    animate();
</script>

</body>
</html>
