<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Dashboard - Click to Play</title>
    <style>
        :root { --primary-color: #fe2c55; --bg-dark: #121212; }
        body { font-family: sans-serif; background-color: var(--bg-dark); color: #fff; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .status-log { font-size: 12px; color: #666; font-family: monospace; }

        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            max-width: 1600px; margin: 0 auto; 
        }

        .video-card {
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .video-card:hover { border-color: var(--primary-color); }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 177.77%; 
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Nút Play giả lập */
        .play-placeholder {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
        .play-icon {
            width: 60px; height: 60px;
            background: rgba(254, 44, 85, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 10px;
        }

        iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
            z-index: 2;
        }

        .card-content { padding: 12px; background: #1a1a1a; }
        .timestamp { font-size: 11px; color: #888; }
        .video-title { font-weight: 600; color: #fff; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎬 TikTok Dashboard (${new Date().getFullYear()})</h1>
        <div id="status" class="status-log">Đang khởi tạo danh sách...</div>
    </div>

    <div id="video-grid" class="container"></div>

    <script>
        const logger = (msg) => {
            document.getElementById('status').innerText = `[LOG] ${msg}`;
            console.log(msg);
        };

        async function init() {
            try {
                logger("Đang tải list.txt...");
                const res = await fetch('./list.txt');
                if(!res.ok) throw new Error("Không thấy file list.txt");
                const text = await res.text();
                render(text);
            } catch (err) {
                logger("LỖI: " + err.message);
            }
        }

        function loadVideo(container, videoId) {
            console.log(`[LOG] Đang nạp Iframe cho ID: ${videoId}`);
            container.innerHTML = `
                <iframe 
                    src="https://www.tiktok.com/embed/v2/${videoId}?autoplay=1" 
                    allow="autoplay; fullscreen" 
                    allowfullscreen>
                </iframe>`;
        }

        function render(rawData) {
            const grid = document.getElementById('video-grid');
            const entries = rawData.trim().split(/\n\s*\n/);
            logger(`Tìm thấy ${entries.length} video. Click vào hình để xem.`);

            const fragment = document.createDocumentFragment();

            entries.forEach((entry, index) => {
                const urlMatch = entry.match(/Liên kết: (.*)/);
                const dateMatch = entry.match(/Ngày: (.*)/);

                if (urlMatch) {
                    const url = urlMatch[1].trim().replace(/\/$/, "");
                    const videoId = url.split('/').pop();

                    const card = document.createElement('div');
                    card.className = 'video-card';
                    
                    // Tạo giao diện chờ (Placeholder)
                    card.innerHTML = `
                        <div class="video-wrapper" id="wrapper-${videoId}" onclick="loadVideo(this, '${videoId}')">
                            <div class="play-placeholder">
                                <div class="play-icon">▶</div>
                                <span style="font-size:12px; color:#aaa;">Nhấn để tải video</span>
                            </div>
                        </div>
                        <div class="card-content">
                            <span class="timestamp">${dateMatch ? dateMatch[1] : ''}</span>
                            <div class="video-title">Video #${index + 1}</div>
                        </div>
                    `;
                    fragment.appendChild(card);
                }
            });

            grid.appendChild(fragment);
            logger(`Đã sẵn sàng ${entries.length} video. Chế độ tiết kiệm tài nguyên.`);
        }

        window.onload = init;
    </script>
</body>
</html>
