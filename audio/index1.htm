<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Drive Media Player Pro</title>
  <style>
    :root { --primary: #3b82f6; --danger: #ef4444; --success: #10b981; --bg: #f8fafc; }
    body { 
      font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: var(--bg); margin: 0; padding: 15px; color: #1e293b; 
      display: flex; justify-content: center; 
    }
    .app { width: 100%; max-width: 500px; }
    .card { background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    
    /* Player area */
    #media-view { 
      background: #000; border-radius: 14px; overflow: hidden; 
      display: none; margin-bottom: 20px; animation: slideDown 0.3s ease-out; 
    }
    video, audio { width: 100%; display: block; }
    
    /* List container */
    .list { 
      max-height: 420px; overflow-y: auto; border: 1px solid #e2e8f0; 
      border-radius: 12px; margin-bottom: 20px; background: #fff;
      -webkit-overflow-scrolling: touch;
    }

    /* Folder UI */
    .folder-group { border-bottom: 1px solid #f1f5f9; }
    .folder-header { 
      padding: 12px 15px; font-size: 12px; font-weight: 800; 
      background: #f8fafc; color: #475569; text-transform: uppercase; 
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; user-select: none; transition: background 0.2s;
      position: sticky; top: 0; z-index: 10;
    }
    .folder-header:hover { background: #f1f5f9; }
    .folder-header::after {
      content: '▶'; font-size: 10px; transition: transform 0.3s; color: #94a3b8;
    }
    .folder-header.open::after { transform: rotate(90deg); }

    .folder-content { display: none; overflow: hidden; background: #fff; }
    .folder-content.open { display: block; }

    /* Item UI */
    .item { 
      padding: 14px 15px; border-bottom: 1px solid #f8fafc; 
      display: flex; align-items: center; gap: 12px; cursor: pointer; 
      transition: background 0.1s; padding-left: 25px;
    }
    .item:active { background: #f1f5f9; }
    .item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; font-weight: 500; }
    
    /* Control Buttons */
    .rec-box { border-top: 2px dashed #f1f5f9; padding-top: 20px; text-align: center; }
    #status { font-size: 13px; margin-bottom: 12px; color: #64748b; font-weight: 600; }
    button { 
      width: 100%; padding: 15px; border-radius: 12px; border: none; 
      font-weight: 700; font-size: 14px; margin: 5px 0; cursor: pointer; 
      transition: transform 0.1s, opacity 0.2s; 
    }
    button:active { transform: scale(0.98); }
    .btn-rec { background: var(--danger); color: #fff; }
    .btn-stop { background: #64748b; color: #fff; }
    .btn-save { background: var(--success); color: #fff; }
    button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="app">
  <div class="card">
    <div id="media-view"></div>
    <div id="fileList" class="list">Đang tải dữ liệu...</div>
    
    <div class="rec-box">
      <div id="status">Hệ thống sẵn sàng</div>
      <button id="startBtn" class="btn-rec">BẮT ĐẦU GHI ÂM</button>
      <button id="stopBtn" class="btn-stop" disabled>DỪNG</button>
      <button id="uploadBtn" class="btn-save" disabled>LƯU LÊN DRIVE</button>
    </div>
  </div>
</div>

<script>
/**
 * BIẾN TOÀN CỤC & DOM CACHE
 */
let mediaRec, chunks = [], audioBlob;
const dom = {
  list: document.getElementById('fileList'),
  view: document.getElementById('media-view'),
  status: document.getElementById('status'),
  btnStart: document.getElementById('startBtn'),
  btnStop: document.getElementById('stopBtn'),
  btnUpload: document.getElementById('uploadBtn')
};

// Khởi chạy ứng dụng
window.onload = loadFiles;
dom.btnStart.onclick = startRec;
dom.btnStop.onclick = stopRec;
dom.btnUpload.onclick = upload;

/**
 * TẢI DỮ LIỆU VÀ NHÓM THEO PARENT ID
 */
async function loadFiles() {
  try {
    const res = await fetch(`/api/drive?_ts=${Date.now()}`, { cache: 'no-store' });
    const result = await res.json();
    const rawData = result.data || result;
    
    if (!Array.isArray(rawData)) throw new Error("Format error");

    const grouped = rawData.reduce((acc, f) => {
      const pId = (f.parents && f.parents.length > 0) ? f.parents[0] : 'CHUNG';
      if (!acc[pId]) acc[pId] = [];
      acc[pId].push(f);
      return acc;
    }, {});

    renderFast(grouped);
  } catch (e) {
    dom.list.innerHTML = '<div style="padding:20px; color:red; text-align:center;">Lỗi kết nối máy chủ</div>';
  }
}

/**
 * RENDER TỐI ƯU (DÙNG DOCUMENTFRAGMENT - KHÔNG INNERHTML TRONG LOOP)
 */
function renderFast(grouped) {
  const fragment = document.createDocumentFragment();
  dom.list.textContent = ''; // Clear danh sách cũ

  Object.entries(grouped).forEach(([parentId, files]) => {
    // 1. Tạo Group Container
    const groupDiv = document.createElement('div');
    groupDiv.className = 'folder-group';

    // 2. Tạo Header
    const header = document.createElement('div');
    header.className = 'folder-header';
    header.textContent = parentId === 'CHUNG' ? '📁 Mục Chung' : `📁 Thư mục: ${parentId.slice(0,8)}...`;
    
    // 3. Tạo Vùng chứa file
    const content = document.createElement('div');
    content.className = 'folder-content';

    // Sự kiện đóng/mở folder
    header.addEventListener('click', () => {
      header.classList.toggle('open');
      content.classList.toggle('open');
    });

    // 4. Duyệt file và tạo Element
    files.forEach(f => {
      const isVideo = f.mimeType?.includes('video') || /\.(mp4|webm|mov)$/i.test(f.name);
      
      const item = document.createElement('div');
      item.className = 'item';
      
      // Tạo icon
      const icon = document.createElement('span');
      icon.style.fontSize = '18px';
      icon.textContent = isVideo ? '🎥' : '🎵';
      
      // Tạo tên file
      const text = document.createElement('div');
      text.className = 'item-text';
      text.textContent = f.name;

      item.appendChild(icon);
      item.appendChild(text);

      // Sự kiện chọn file để phát
      item.addEventListener('click', (e) => {
        e.stopPropagation(); // Không làm đóng/mở folder khi chọn file
        playMedia(f.id, f.mimeType, f.name);
      });

      content.appendChild(item);
    });

    groupDiv.appendChild(header);
    groupDiv.appendChild(content);
    fragment.appendChild(groupDiv);
  });

  // Đẩy toàn bộ vào DOM 1 lần duy nhất
  dom.list.appendChild(fragment);
}

/**
 * PHÁT MEDIA
 */
function playMedia(id, mimeType, name) {
  dom.view.style.display = 'block';
  dom.view.textContent = ''; // Xóa trình phát cũ
  
  const url = `/api/drive?id=${id}`;
  const isVideo = mimeType?.includes('video') || /\.(mp4|webm|mov)$/i.test(name);

  if (isVideo) {
    const video = document.createElement('video');
    video.controls = true;
    video.autoplay = true;
    video.playsInline = true;
    video.style.width = '100%';
    
    const source = document.createElement('source');
    source.src = url;
    source.type = mimeType;
    
    video.appendChild(source);
    dom.view.appendChild(video);
  } else {
    const playerBox = document.createElement('div');
    playerBox.style.padding = '20px';
    playerBox.style.textAlign = 'center';
    
    const title = document.createElement('div');
    title.style.cssText = 'font-size:12px; color:#94a3b8; margin-bottom:10px; overflow:hidden; text-overflow:ellipsis;';
    title.textContent = name;

    const audio = document.createElement('audio');
    audio.controls = true;
    audio.autoplay = true;
    audio.style.width = '100%';
    
    const source = document.createElement('source');
    source.src = url;
    source.type = mimeType;

    audio.appendChild(source);
    playerBox.appendChild(title);
    playerBox.appendChild(audio);
    dom.view.appendChild(playerBox);
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/**
 * GHI ÂM (HỖ TRỢ IPHONE)
 */
async function startRec() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    
    // Không truyền mimeType, để trình duyệt tự chọn mặc định
    mediaRec = new MediaRecorder(stream); 
    chunks = [];

    mediaRec.ondataavailable = e => e.data.size > 0 && chunks.push(e.data);
    
    mediaRec.onstop = () => {
      // Lấy mimeType mặc định mà trình duyệt vừa dùng để ghi
      const actualType = mediaRec.mimeType; 
	  alert(actualType);
      audioBlob = new Blob(chunks, { type: actualType });
      
      console.log("Định dạng trình duyệt đã chọn:", actualType);
      dom.btnUpload.disabled = false;
    };

    mediaRec.start();
    dom.btnStart.disabled = true;
    dom.btnStop.disabled = false;
    dom.status.innerText = '🔴 ĐANG GHI ÂM (Mặc định)...';
  } catch (err) {
    alert('Không thể truy cập Micro.');
  }
}

function stopRec() {
  if (mediaRec && mediaRec.state !== 'inactive') {
    mediaRec.stop();
    mediaRec.stream.getTracks().forEach(t => t.stop());
    dom.btnStart.disabled = false;
    dom.btnStop.disabled = true;
    dom.status.innerText = 'Đã hoàn thành ghi âm';
  }
}

/**
 * TẢI LÊN DRIVE
 */
async function upload() {
  dom.btnUpload.innerText = '⏳ ĐANG TẢI LÊN...';
  dom.btnUpload.disabled = true;

  const reader = new FileReader();
  reader.readAsDataURL(audioBlob);
  reader.onloadend = async () => {
    const base64Audio = reader.result.split(',')[1];
    const ext = audioBlob.type.includes('mp4') ? 'm4a' : 'webm';
	alert(audioBlob.type);

	const d = new Date().toLocaleString('sv-SE', { timeZone: 'Asia/Tokyo' });
	const name = `Rec_${d.slice(0,10).replace(/-/g,'')}_${d.slice(11,19).replace(/:/g,'')}${new Date().getMilliseconds().toString().padStart(3,'0')}.${ext}`;

    try {
      const response = await fetch('/api/drive', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          name: name, 
          base64Audio, 
          mimeType: audioBlob.type 
        })
      });

      if (response.ok) {
        dom.status.innerText = '✅ Đã lưu thành công!';
        loadFiles();
      } else throw new Error();
    } catch (e) {
      dom.status.innerText = '❌ Lỗi tải lên';
      dom.btnUpload.disabled = false;
    } finally {
      dom.btnUpload.innerText = 'LƯU LÊN DRIVE';
    }
  };
}
</script>
</body>
</html>
