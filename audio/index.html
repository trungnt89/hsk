<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Media Pro</title>
    <style>
        :root { --p: #2563eb; --d: #ef4444; --s: #22c55e; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Media Player */
        #media-view { background: #000; border-radius: 12px; overflow: hidden; display: none; margin-bottom: 15px; }
        video, audio { width: 100%; display: block; }
        
        /* List */
        .list { max-height: 400px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 10px; }
        .item { padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .item:hover { background: #f8fafc; color: var(--p); }
        
        /* Recorder */
        .rec-box { text-align: center; border-top: 2px solid #f1f5f9; margin-top: 15px; padding-top: 15px; }
        button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-start { background: var(--d); color: white; }
        .btn-stop { background: #64748b; color: white; }
        .btn-save { background: var(--s); color: white; }
        button:disabled { opacity: 0.4; }
        
        .recording-dot { width: 10px; height: 10px; background: var(--d); border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="app">
    <div class="card">
        <h3 style="margin:0 0 15px 0">📂 Media Library</h3>
        
        <div id="media-view"></div>

        <div id="fileList" class="list">Đang tải...</div>

        <div class="rec-box">
            <div id="rec-status" style="font-size:12px; margin-bottom:10px; font-weight:bold"></div>
            <button id="startBtn" class="btn-start" onclick="startRec()">BẮT ĐẦU GHI ÂM</button>
            <button id="stopBtn" class="btn-stop" onclick="stopRec()" disabled>DỪNG</button>
            <button id="uploadBtn" class="btn-save" onclick="upload()" disabled>LƯU LÊN DRIVE</button>
        </div>
    </div>
</div>

<script>
    let mediaRec, chunks = [], audioBlob;

    window.onload = loadFiles;

    async function loadFiles() {
        const listDiv = document.getElementById('fileList');
        try {
            const res = await fetch('/api/drive');
            const files = await res.json();
            listDiv.innerHTML = files.map(f => `
                <div class="item" onclick="playMedia('${f.id}', '${f.mimeType}')">
                    ${f.mimeType.includes('video') ? '🎥' : '🎵'} 
                    <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${f.name}</span>
                </div>
            `).join('');
        } catch (e) { listDiv.innerHTML = "Lỗi kết nối."; }
    }

    function playMedia(id, mimeType) {
        const view = document.getElementById('media-view');
        view.style.display = 'block';
        const url = `/api/drive?id=${id}`;
        
        if (mimeType.includes('video')) {
            view.innerHTML = `<video src="${url}" controls autoplay></video>`;
        } else {
            view.innerHTML = `<div style="padding:10px"><audio src="${url}" controls autoplay></audio></div>`;
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function startRec() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRec = new MediaRecorder(stream);
        chunks = [];
        mediaRec.ondataavailable = e => chunks.push(e.data);
        mediaRec.onstop = () => {
            audioBlob = new Blob(chunks, { type: 'audio/mpeg' });
            document.getElementById('uploadBtn').disabled = false;
        };
        mediaRec.start();
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('rec-status').innerHTML = '<span class="recording-dot"></span> ĐANG GHI...';
    }

    function stopRec() {
        mediaRec.stop();
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        document.getElementById('rec-status').innerText = 'Đã ghi xong';
    }

    async function upload() {
        const btn = document.getElementById('uploadBtn');
        btn.innerText = "⏳ ĐANG LƯU...";
        btn.disabled = true;

        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1];
            const res = await fetch('/api/drive', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: `Rec_${Date.now()}.mp3`, base64Audio })
            });
            const result = await res.json();
            if (result.status === "success") {
                alert("Đã lưu!");
                location.reload();
            } else {
                alert("Lỗi: " + result.message);
                btn.disabled = false;
            }
        };
    }
</script>
</body>
</html>
