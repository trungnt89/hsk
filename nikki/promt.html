<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Danh sách Prompt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .loading { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="row m-2">
        <div class="col-12 text-center">
            <h2>Hệ thống Quản lý Prompt</h2>
            <p class="text-muted">Đồng bộ dữ liệu trực tiếp với Google Sheet</p>
        </div>
    </div>

    <!-- Khối Form Thêm / Sửa -->
    <div class="row mb-4">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <span id="form-title">Thêm Mới Prompt</span>
                </div>
                <div class="card-body">
                    <form id="prompt-form">
                        <input type="hidden" id="prompt-row-index"> <!-- Dùng để định vị dòng khi Sửa/Xóa nếu API yêu cầu -->
                        <div class="row g-3">
                            <div class="col-md-2">
                                <label for="prompt-id" class="form-label">ID</label>
                                <input type="text" class="form-control" id="prompt-id" placeholder="VD: P001" required>
                            </div>
                            <div class="col-md-7">
                                <label for="prompt-content" class="form-label">Prompt</label>
                                <input type="text" class="form-control" id="prompt-content" placeholder="Nhập nội dung prompt..." required>
                            </div>
                            <div class="col-md-3">
                                <label for="prompt-status" class="form-label">Status</label>
                                <select class="form-select" id="prompt-status">
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                    <option value="Pending">Pending</option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-3 text-end">
                            <button type="button" id="btn-cancel" class="btn btn-secondary d-none" onclick="resetForm()">Hủy</button>
                            <button type="submit" id="btn-submit" class="btn btn-success">Lưu Dữ Liệu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Khối Bảng Dữ Liệu -->
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <span>Danh Sách Dữ Liệu (Sheet: Promt)</span>
                    <button class="btn btn-sm btn-light" onclick="fetchData()">Tải lại dữ liệu</button>
                </div>
                <div class="card-body">
                    <!-- Trạng thái Loading -->
                    <div id="loading-status" class="text-center my-3 text-primary">
                        <div class="spinner-border spinner-border-sm" role="status"></div> 
                        <span> Đang xử lý dữ liệu với Google Sheet...</span>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th style="width: 15%">ID</th>
                                    <th style="width: 55%">PROMPT</th>
                                    <th style="width: 15%">STATUS</th>
                                    <th style="width: 15%" class="text-center">HÀNH ĐỘNG</th>
                                </tr>
                            </thead >
                            <tbody id="data-table-body">
                                <!-- Dữ liệu từ API sẽ map vào đây -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = 'https://hsk-gilt.vercel.app/api/gSheet';
    const SHEET_CONFIG = { sheet: "Promt", spread: "1UiAS_mUhl6j6wHyPkNiol9pclzkQJWD4qzPIZD2sx3k" };
    let isEditing = false;

    document.addEventListener('DOMContentLoaded', () => {
        fetchData();
        document.getElementById('prompt-form').addEventListener('submit', e => { e.preventDefault(); saveData(); });
    });

    const toggleLoading = show => document.getElementById('loading-status').style.display = show ? 'block' : 'none';

    async function callAPI(body) {
        const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        return res.ok ? res.json() : null;
    }

    async function fetchData() {
        toggleLoading(true);
        const tbody = document.getElementById('data-table-body');
        tbody.innerHTML = '';
        try {
            const res = await callAPI({ ...SHEET_CONFIG, act: "read" });
            if (res && res.values && res.values.length > 0) {
                res.values.forEach((row, idx) => {
                    const promptText = row[0] || '';
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>P${idx + 1}</strong></td>
                        <td>${promptText}</td>
                        <td><span class="badge bg-success">Active</span></td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-warning me-1" onclick="editMode('${idx}', '${promptText.replace(/'/g, "\\'")}')">Sửa</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteData('${idx}')">Xóa</button>
                        </td>`;
                    tbody.appendChild(tr);
                });
            } else tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Không có dữ liệu.</td></tr>`;
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">Lỗi kết nối API.</td></tr>`;
        } finally { toggleLoading(false); }
    }

    function editMode(id, prompt) {
        isEditing = true;
        document.getElementById('form-title').innerText = "Cập Nhật Kỷ Lục Prompt";
        document.getElementById('prompt-id').value = "P" + (parseInt(id) + 1);
        document.getElementById('prompt-id').disabled = true;
        document.getElementById('prompt-content').value = prompt;
        document.getElementById('prompt-row-index').value = id;
        document.getElementById('btn-cancel').classList.remove('d-none');
        document.getElementById('btn-submit').className = "btn btn-warning";
        document.getElementById('btn-submit').innerText = "Cập Nhật";
    }

    function resetForm() {
        isEditing = false;
        document.getElementById('form-title').innerText = "Thêm Mới Prompt";
        document.getElementById('prompt-id').value = '';
        document.getElementById('prompt-id').disabled = false;
        document.getElementById('prompt-content').value = '';
        document.getElementById('prompt-row-index').value = '';
        document.getElementById('btn-cancel').classList.add('d-none');
        document.getElementById('btn-submit').className = "btn btn-success";
        document.getElementById('btn-submit').innerText = "Lưu Dữ Liệu";
    }

    async function saveData() {
        toggleLoading(true);
        const val = document.getElementById('prompt-content').value;
        const pos = document.getElementById('prompt-row-index').value;
        const body = isEditing 
            ? { act: "updateByPosVal", pos: parseInt(pos), val: "1779530326166", data: "[]", ...SHEET_CONFIG }
            : { act: "add", data: "[]", ...SHEET_CONFIG };
        try {
            await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            alert(isEditing ? 'Cập nhật thành công!' : 'Thêm mới thành công!');
            resetForm(); fetchData();
        } catch (e) { alert('Lỗi kết nối API.'); } finally { toggleLoading(false); }
    }

    async function deleteData(pos) {
        if (!confirm('Bạn có chắc chắn muốn xóa bản ghi này?')) return;
        toggleLoading(true);
        try {
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ act: "deleteByPosVal", pos: parseInt(pos), val: "1779545920022", sheet: "DairyList", spread: SHEET_CONFIG.spread }) });
            alert('Xóa bản ghi thành công!');
            fetchData();
        } catch (e) { alert('Lỗi kết nối API.'); } finally { toggleLoading(false); }
    }
</script>
</body>
</html>
