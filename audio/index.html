<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Full Access</title>
    <style>
        :root { --primary: #2563eb; --accent: #f59e0b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 500px; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        /* Media Box */
        #media-container { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 20px; display: none; }
        video { width: 100%; display: block; }
        audio { width: 100%; height: 50px; display: block; }

        /* File List */
        .list-container { border-top: 1px solid #334155; padding-top: 15px; }
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .file-list { max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .file-item { padding: 12px 15px; background: #334155; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; font-size: 14px; }
        .file-item:hover { background: #475569; border-left: 4px solid var(--primary); }
        .file-info { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Control Buttons */
        .recorder { margin-top: 20px; border-top: 1px solid #334155; padding-top: 20px; text-align: center; }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; transition: 0.3s; }
        .btn-rec { background: #ef4444; color: white; }
        .btn-save { background: #10b981; color: white; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .pulse { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; display: inline-block; animation: pulse-red 1s infinite; margin-right: 8px; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>

<div class="app">
    <div class="card">
        <div id="media-container"></div>

        <div class="list-container">
            <div class="list-header">
                <h3 style="margin:0">📂 Thư viện (<span id="file-count">0</span>)</h3>
                <button onclick="loadFiles()" style="width:auto; padding:5px 10px; font-size:12px; background:#475569; color:white">Làm mới</button>
            </div>
            <div id="fileList" class="file-list">Đang tải...</div>
        </div>

        <div class="recorder">
            <div id="rec-status" style="margin-bottom:10px; font-size:13px; font-weight:bold; height:20px;"></div>
            <button id="startBtn" class="btn-rec" onclick="startRec()">BẮT ĐẦU GHI</button>
            <button id="stopBtn" style="background:#64748b; color:white" onclick="stopRec()" disabled>DỪNG</button>
            <button id="uploadBtn" class="btn-save" onclick="upload()" disabled>LƯU LÊN DRIVE (GAS)</button>
        </div>
    </div>
</div>

<script>
    let mediaRec, chunks = [], audioBlob;

    window.onload = loadFiles;

    async function loadFiles() {
        const listDiv = document.getElementById('fileList');
        try {
            const res = await fetch('/api/drive');
            const files = await res.json();
            document.getElementById('file-count').innerText = files.length;
            
            if (files.length === 0) {
                listDiv.innerHTML = "Không có file nào.";
                return;
            }

            listDiv.innerHTML = files.map(f => `
                <div class="file-item" onclick="playFile('${f.id}', '${f.mimeType}', '${f.name}')">
                    <span>${f.mimeType.includes('video') ? '🎥' : '🎵'}</span>
                    <div class="file-info">${f.name}</div>
                </div>
            `).join('');
        } catch (e) { listDiv.innerHTML = "Lỗi tải dữ liệu."; }
    }

    function playFile(id, mimeType, name) {
        const container = document.getElementById('media-container');
        container.style.display = 'block';
        const url = `/api/drive?id=${id}`;

        if (mimeType.includes('video')) {
            container.innerHTML = `<video src="${url}" controls autoplay></video>`;
        } else {
            container.innerHTML = `
                <div style="padding:15px; text-align:center">
                    <div style="font-size:12px; color:#94a3b8; margin-bottom:8px">Đang phát: ${name}</div>
                    <audio src="${url}" controls autoplay></audio>
                </div>`;
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- GHI ÂM ---
    async function startRec() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRec = new MediaRecorder(stream);
        chunks = [];
        mediaRec.ondataavailable = e => chunks.push(e.data);
        mediaRec.onstop = () => {
            audioBlob = new Blob(chunks, { type: 'audio/mpeg' });
            document.getElementById('uploadBtn').disabled = false;
        };
        mediaRec.start();
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('rec-status').innerHTML = '<span class="pulse"></span> ĐANG GHI ÂM...';
    }

    function stopRec() {
        mediaRec.stop();
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        document.getElementById('rec-status').innerText = 'Đã hoàn thành bản ghi';
    }

    async function upload() {
        const btn = document.getElementById('uploadBtn');
        btn.innerText = "⏳ ĐANG GỬI QUA VERCEL -> GAS...";
        btn.disabled = true;

        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1];
            const res = await fetch('/api/drive', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: `Rec_${Date.now()}.mp3`, base64Audio })
            });
            const result = await res.json();
            if (result.status === "success") {
                alert("✅ Thành công! GAS đã lưu file.");
                location.reload();
            } else {
                alert("❌ Lỗi: " + result.message);
                btn.disabled = false;
            }
        };
    }
</script>
</body>
</html>
