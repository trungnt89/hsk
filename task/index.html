<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .sticky-header { position: sticky; top: 0; background-color: #f4f4f9; padding-top: 20px; padding-bottom: 10px; z-index: 20; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; position: sticky; top: 115px; z-index: 10; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        
        /* THEME NÚT GẠT PHONG CÁCH IPHONE - IOS SWITCH TOGGLE */
        .switch { position: relative; display: inline-block; width: 50px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #E9E9EA; transition: .3s; border-radius: 30px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
        input:checked + .slider { background-color: #34C759; }
        input:checked + .slider:before { transform: translateX(20px); }
        
        .filter-container { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: bold; }
        .filter-label { color: #333; }
    </style>
</head>
<body>
    <div class="sticky-header">
        <h2>Danh sách Task từ Server</h2>
        <div class="filter-container">
            <span class="filter-label">Chỉ hiển thị Status = 1:</span>
            <label class="switch">
                <input type="checkbox" id="filterToggle" checked onchange="filterTasks()">
                <span class="slider"></span>
            </label>
        </div>
    </div>
    <div id="loading">Đang tải dữ liệu...</div>
    <table id="taskTable" style="display:none;">
        <thead>
            <tr id="headerRow"></tr>
        </heading>
        <tbody id="taskBody"></tbody>
    </table>
<script>
    const API_URL = 'https://hsk-gilt.vercel.app/api/gSheet';
    const PAYLOAD = { "sheet": "TASK", "act": "read", "spread": "1ezoFMSBVznSNcuufRRQRjxAmUmYyU9MjKDzl-v3wxl8" };
    const FILENAME = "task_management_index";
    let allRowsData = [];

    async function fetchData() {
        console.log("Bắt đầu tải dữ liệu từ server...");
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(PAYLOAD)
            });
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            console.log("Tải dữ liệu từ server thành công.", data);
            renderTable(data.values);
        } catch (error) {
            console.error("Lỗi xảy ra trong quá trình fetchData:", error);
            document.getElementById('loading').innerText = "Lỗi khi tải dữ liệu.";
        }
    }

    function renderTable(values) {
        console.log("Bắt đầu dựng cấu trúc bảng hiển thị...");
        const headerRow = document.getElementById('headerRow');
        const taskBody = document.getElementById('taskBody');
        const headers = values[0];
        headerRow.innerHTML = headers.filter(h => h !== "ID").map(h => `<th>${h}</th>`).join('');
        taskBody.innerHTML = "";
        
        // SỬA BUG: Thực hiện deep copy để giữ toàn vẹn dữ liệu gốc, không làm mất nội dung cột thứ 2
        allRowsData = JSON.parse(JSON.stringify(values));
        
        for (let i = 1; i < values.length; i++) {
            const rowData = values[i];
            if (rowData.length < 2) continue;
            const tr = document.createElement('tr');
            tr.setAttribute('data-id', rowData[0]);
            let rowHtml = "";
            let isStatusActive = false;
            for (let j = 0; j < headers.length; j++) {
                if (headers[j] === "ID") continue;
                let cellData = rowData[j] || "";
                if (headers[j] === "STATUS") {
                    if (cellData === "1") isStatusActive = true;
                    const isChecked = cellData === "1" ? "checked" : "";
                    rowHtml += `<td><label class="switch"><input type="checkbox" ${isChecked} onchange="toggleStatus('${rowData[0]}', this, ${i})"><span class="slider"></span></label></td>`;
                } else {
                    rowHtml += `<td>${cellData.replace(/\n/g, '<br>')}</td>`;
                }
            }
            tr.setAttribute('data-status-active', isStatusActive ? "1" : "0");
            tr.innerHTML = rowHtml;
            taskBody.appendChild(tr);
        }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('taskTable').style.display = 'table';
        console.log("Dựng bảng hoàn tất. Tiến hành chạy bộ lọc khởi tạo.");
        filterTasks();
    }

    function filterTasks() {
        const isEnforceActive = document.getElementById('filterToggle').checked;
        console.log(`Áp dụng bộ lọc hiển thị iPhone Toggle. Chỉ hiện status=1: ${isEnforceActive}`);
        const rows = document.querySelectorAll('#taskBody tr');
        rows.forEach(row => {
            if (isEnforceActive) {
                if (row.getAttribute('data-status-active') === "1") {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            } else {
                row.style.display = '';
            }
        });
    }

    async function toggleStatus(id, el, rowIndex) {
        const newStatus = el.checked ? "1" : "0";
        console.log(`Kích hoạt sự kiện thay đổi trạng thái Task ID: ${id} -> Trạng thái mới: ${newStatus}`);
        localStorage.setItem(FILENAME + "_" + id, newStatus);
        console.log(`Đã đồng bộ trạng thái cục bộ vào LocalStorage bằng key: ${FILENAME}_${id}`);

        const headers = allRowsData[0];
        // Tìm vị trí động của cột STATUS để tránh ghi đè nhầm cột thứ 2
        const statusColIndex = headers.indexOf("STATUS") !== -1 ? headers.indexOf("STATUS") : 2;
        
        const updatedRowData = [...allRowsData[rowIndex]];
        updatedRowData[statusColIndex] = newStatus; 
        allRowsData[rowIndex] = updatedRowData;

        const targetRow = el.closest('tr');
        if (targetRow) {
            targetRow.setAttribute('data-status-active', newStatus);
        }

        const updatePayload = {
            "act": "updateByPosVal",
            "pos": 0,
            "val": id,
            "sheet": "TASK",
            "spread": "1ezoFMSBVznSNcuufRRQRjxAmUmYyU9MjKDzl-v3wxl8",
            "data": JSON.stringify(updatedRowData)
        };

        console.log("Đang truyền gói tin cập nhật dữ liệu lên máy chủ API...", updatePayload);
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify(updatePayload)
            });
            if (!response.ok) throw new Error('Lỗi phản hồi hệ thống mạng khi gửi API update');
            const resData = await response.json();
            console.log(`Đồng bộ trạng thái của Task ${id} lên hệ thống server thành công.`, resData);
            filterTasks();
        } catch (error) {
            console.error(`Xảy ra lỗi nghiêm trọng khi gọi API cập nhật trạng thái Task ${id}:`, error);
        }
    }
    fetchData();
</script>
</body>
</html>
