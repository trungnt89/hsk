<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Mazii API v2</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #result { border: 1px solid #ddd; padding: 15px; margin-top: 10px; background: #f0f7ff; border-radius: 8px; white-space: pre-wrap; }
        .info { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <h3>Kiểm tra Mazii API (Search Mode)</h3>
    <input type="text" id="word" value="食べる">
    <button onclick="testMazii()">Tra cứu</button>
    <div id="result">Kết quả...</div>

    <script>
        async function testMazii() {
            const word = document.getElementById('word').value;
            const resDiv = document.getElementById('result');
            resDiv.innerText = "Đang tra cứu...";

            try {
                // Endpoint search của Mazii
                const response = await fetch("https://api.mazii.net/api/search", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "dict": "javi",
                        "type": "word",
                        "query": word
                    })
                });

                if (!response.ok) throw new Error("Lỗi HTTP: " + response.status);

                const data = await response.json();
                console.log("Data:", data);

                if (data.data && data.data.length > 0) {
                    const firstResult = data.data[0];
                    const meaning = firstResult.short_mean || firstResult.means[0].mean;
                    const phonetic = firstResult.phonetic || "";
                    
                    resDiv.innerHTML = `
                        <b style="color:blue; font-size: 1.2em;">${word}</b> [${phonetic}]<br>
                        <hr>
                        <b>Nghĩa:</b> ${meaning}
                    `;
                } else {
                    resDiv.innerText = "Không tìm thấy từ này trong từ điển Mazii.";
                }
            } catch (err) {
                resDiv.innerHTML = `<span style="color:red">Thất bại: ${err.message}</span><br>
                <small class="info">Nếu vẫn lỗi 404, có thể Mazii đã chặn IP hoặc yêu cầu Token.</small>`;
            }
        }
    </script>
</body>
</html>
