<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N3 Japanese Writer - Fixed 404</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        h1 { color: var(--primary); text-align: center; border-bottom: 3px solid var(--accent); padding-bottom: 10px; margin-bottom: 25px; }
        textarea { width: 100%; height: 150px; padding: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:disabled { background: #95a5a6; }
        .result-section { margin-top: 30px; display: none; }
        .output-box { background: #fffdf0; border-left: 5px solid var(--accent); padding: 20px; border-radius: 8px; white-space: pre-line; line-height: 1.8; font-size: 18px; color: #2c3e50; }
        .log-container { margin-top: 20px; background: #1e1e1e; color: #4af626; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 11px; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>N3 Japanese Content AI</h1>
    <textarea id="viInput" placeholder="Nhập nội dung Tiếng Việt của bạn..."></textarea>
    <button id="genBtn" onclick="generateN3()">BẮT ĐẦU CHUYỂN ĐỔI</button>

    <div id="resultSection" class="result-section">
        <div style="font-weight:bold; color:var(--accent); margin-bottom:10px;">KẾT QUẢ:</div>
        <div id="jpOutput" class="output-box"></div>
        <div class="log-container" id="logBox"></div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyAys_Hy1nUvuwGwZhOuKRbccNJAnU_Sa1w";

    function addLog(msg) {
        const logBox = document.getElementById('logBox');
        logBox.innerHTML += `> [${new Date().toLocaleTimeString()}] ${msg}<br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function generateN3() {
        const input = document.getElementById('viInput').value.trim();
        const btn = document.getElementById('genBtn');
        const output = document.getElementById('jpOutput');
        const section = document.getElementById('resultSection');

        if (!input) return alert("Vui lòng nhập nội dung!");

        btn.disabled = true;
        btn.innerText = "Đang xử lý...";
        section.style.display = 'block';
        output.innerText = "Đang kết nối API...";
        addLog("Bắt đầu quy trình.");

        const prompt = `Dịch sang tiếng Nhật N3 và giải thích ngữ pháp: "${input}"`;

        // Danh sách Model và URL cấu hình chuẩn để tránh 404
        const modelAttempts = [
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`
        ];

        for (let url of modelAttempts) {
            try {
                const modelName = url.includes("flash") ? "Gemini 1.5 Flash" : "Gemini Pro";
                addLog(`Đang thử model: ${modelName}...`);

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();

                if (response.ok && data.candidates) {
                    output.innerText = data.candidates[0].content.parts[0].text;
                    addLog(`THÀNH CÔNG với ${modelName}!`);
                    btn.disabled = false;
                    btn.innerText = "BẮT ĐẦU CHUYỂN ĐỔI";
                    return;
                } else if (response.status === 404) {
                    addLog(`Model ${modelName} báo lỗi 404. Đang chuyển sang dự phòng...`);
                } else {
                    throw new Error(data.error ? data.error.message : "Lỗi không xác định");
                }
            } catch (err) {
                addLog("LỖI: " + err.message);
            }
        }

        output.innerText = "Lỗi: Cả hai model đều báo 404. Có thể API Key của bạn cần thêm thời gian để kích hoạt sau khi tạo Project mới (thường mất 5-10 phút).";
        btn.disabled = false;
        btn.innerText = "BẮT ĐẦU CHUYỂN ĐỔI";
    }
</script>
</body>
</html>
