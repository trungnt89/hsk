<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player Pro - Fix Safari</title>
	<script src="../com/assistive.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; max-width: 1000px; margin: auto; border-left: 1px solid #333; border-right: 1px solid #333; }
        header { padding: 20px; background: #1f1f1f; text-align: center; border-bottom: 1px solid #333; }
        header h2 { font-size: 1.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #1db954; margin-bottom: 10px; }
        .settings-panel { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; background: #282828; padding: 10px; border-radius: 8px; font-size: 0.85rem; }
        .settings-panel input, .settings-panel select { background: #333; color: white; border: 1px solid #444; padding: 5px; border-radius: 4px; max-width: 140px; }
        #timer-display { color: #1db954; font-weight: bold; min-width: 80px; }
        .player-controls { padding: 20px; background: #1f1f1f; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        audio { width: 100%; filter: invert(100%); }
        .playlist-container { flex: 1; overflow-y: auto; background: #121212; }
        .playlist { list-style: none; }
        .playlist li { padding: 15px 20px; border-bottom: 1px solid #222; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .playlist li.active { background: #333; border-left: 4px solid #1db954; }
        .file-info { flex: 1; overflow: hidden; }
        .file-name { display: block; margin-bottom: 4px; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: #444; color: #bbb; }
        .status-badge.cached { background: #1db954; color: white; }
        #activation-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; cursor: pointer; }
        #activation-overlay h1 { color: #1db954; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="activation-overlay" onclick="activateAudio()">
    <h1>HỆ THỐNG ĐÃ SẴN SÀNG</h1>
    <p>Chạm vào màn hình ĐỂ KÍCH HOẠT âm thanh</p>
    <small style="margin-top:20px; color:#888;">(Bắt buộc sau khi tải trang hoặc reload)</small>
</div>

<div class="app-container">
    <header>
        <h2 id="current-title">Sẵn sàng</h2>
        <div class="settings-panel">
            <span>Hẹn giờ:</span>
            <input type="time" id="alarm-time">
            <select id="alarm-file-select"><option value="">-- Chọn bài --</option></select>
            <span id="timer-display">00:00:00</span>
        </div>
    </header>
    <div class="playlist-container"><ul class="playlist" id="playlist"></ul></div>
    <div class="player-controls"><audio id="audio-player" controls></audio></div>
</div>

<script>
    const API_BASE = "https://hsk-gilt.vercel.app/api/gRecorder";
    const FOLDER_ID = "1KCfoWrPS5RtDzsFFWINH3_Xq8MApjXlm";
    const DB_NAME = "AudioOfflineDB";
    const STORE_NAME = "audioFiles";
    const player = document.getElementById('audio-player');
    const playlistElem = document.getElementById('playlist');
    const titleElem = document.getElementById('current-title');
    const alarmTimeInput = document.getElementById('alarm-time');
    const alarmSelect = document.getElementById('alarm-file-select');
    const timerDisplay = document.getElementById('timer-display');

    let db, alarmInterval, isAudioActivated = false, warmupTimeout;

    async function activateAudio() {
        console.log("[LOG] Người dùng click kích hoạt. Bắt đầu warm-up 5s.");
        isAudioActivated = true;
        document.getElementById('activation-overlay').style.display = 'none';
        
        try {
            // Phát bản nhạc mặc định hoặc bản nhạc đang chọn để chiếm quyền Autoplay
            const fileId = alarmSelect.value;
            if (fileId) {
                const name = alarmSelect.options[alarmSelect.selectedIndex].dataset.name;
                await playFile(fileId, name);
            } else {
                player.src = "data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
                await player.play();
            }
            console.log("[LOG] Audio Context đã được cấp quyền.");
            warmupTimeout = setTimeout(() => {
                player.pause();
                player.currentTime = 0;
                console.log("[LOG] Đã tạm dừng sau 5s warm-up và reset về 0.");
            }, 5000);
        } catch (err) {
            console.error("[LOG ERROR] Kích hoạt thất bại:", err);
        }
    }

    const request = indexedDB.open(DB_NAME, 1);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
    };
    request.onsuccess = (e) => {
        db = e.target.result;
        loadPlaylist();
        initSettings();
    };

    async function loadPlaylist() {
        titleElem.innerText = "Đang tải danh sách...";
        try {
            const response = await fetch(`${API_BASE}?action=byfolder&folderId=${FOLDER_ID}`);
            const files = await response.json();
            playlistElem.innerHTML = "";
            for (const file of files) {
                const isCached = await checkCache(file.id);
                const li = document.createElement('li');
                li.id = `item-${file.id}`;
                li.innerHTML = `<div class="file-info"><span class="file-name">${file.name}</span><span class="status-badge ${isCached ? 'cached' : ''}" id="status-${file.id}">${isCached ? 'OFFLINE' : 'ONLINE'}</span></div>`;
                li.onclick = () => playFile(file.id, file.name);
                playlistElem.appendChild(li);
                const opt = document.createElement('option');
                opt.value = file.id; opt.dataset.name = file.name; opt.textContent = file.name;
                alarmSelect.appendChild(opt);
            }
            alarmSelect.value = localStorage.getItem('alarmFileId') || "";
            titleElem.innerText = "Sẵn sàng";
        } catch (error) {
            console.error("[ERROR]", error);
            titleElem.innerText = "Lỗi tải danh sách";
        }
    }

    function checkCache(id) {
        return new Promise((r) => {
            const tx = db.transaction([STORE_NAME], "readonly");
            const req = tx.objectStore(STORE_NAME).get(id);
            req.onsuccess = () => r(!!req.result);
        });
    }

    async function playFile(id, name, forceRestart = false) {
        if (!isAudioActivated) { alert("Vui lòng kích hoạt hệ thống trước!"); return; }
        if (warmupTimeout) clearTimeout(warmupTimeout);
        titleElem.innerText = `Đang chuẩn bị: ${name}`;
        const tx = db.transaction([STORE_NAME], "readonly");
        const getRequest = tx.objectStore(STORE_NAME).get(id);

        getRequest.onsuccess = async () => {
            let sourceUrl;
            if (getRequest.result) {
                console.log(`[LOG] Phát từ Cache: ${name}`);
                sourceUrl = URL.createObjectURL(getRequest.result);
            } else {
                console.log(`[LOG] Tải từ Server: ${name}`);
                const resp = await fetch(`${API_BASE}?action=audio&fileId=${id}`);
                const blob = await resp.blob();
                const saveTx = db.transaction([STORE_NAME], "readwrite");
                saveTx.objectStore(STORE_NAME).put(blob, id);
                sourceUrl = URL.createObjectURL(blob);
            }
            player.loop = false;
            player.volume = 1.0;
            player.src = sourceUrl;
            player.load(); // Quan trọng cho Safari
            if (forceRestart) player.currentTime = 0;
            player.play().then(() => titleElem.innerText = name)
                  .catch(e => console.error("[LOG ERROR] Chặn phát:", e));
        };
    }

    function initSettings() {
        alarmTimeInput.value = localStorage.getItem('alarmTime') || "";
        alarmTimeInput.onchange = (e) => localStorage.setItem('alarmTime', e.target.value);
        alarmSelect.onchange = (e) => localStorage.setItem('alarmFileId', e.target.value);
        startTimer();
    }

    function startTimer() {
        if (alarmInterval) clearInterval(alarmInterval);
        alarmInterval = setInterval(() => {
            const now = new Date();
            const curTime = now.toTimeString().slice(0, 5);
            const setTime = alarmTimeInput.value;
            const fileId = alarmSelect.value;

            if (setTime && fileId) {
                const [ah, am] = setTime.split(':');
                let target = new Date(); target.setHours(ah, am, 0, 0);
                if (target < now) target.setDate(target.getDate() + 1);
                const diff = target - now;
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                timerDisplay.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

                if (curTime === setTime && now.getSeconds() === 0) {
                    if (!isAudioActivated) {
                        console.error("[ALARM ERROR] Chưa kích hoạt Audio khi đến giờ!");
                        alert("ĐÃ ĐẾN GIỜ BÁO THỨC! Chạm vào đây để nghe nhạc.");
                        return;
                    }
                    const name = alarmSelect.options[alarmSelect.selectedIndex].dataset.name;
                    console.log("[LOG] Đến giờ báo thức. Phát lại từ đầu.");
                    playFile(fileId, name, true);
                }
            }
            if (now.getSeconds() % 30 === 0) console.log(`[LOG] Heartbeat: ${curTime}, UI Status: ${isAudioActivated}`);
        }, 1000);
    }
</script>
</body>
</html>
