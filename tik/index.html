<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Dashboard - Manual Navigation</title>
    <style>
        :root { --primary-color: #fe2c55; --bg-dark: #121212; }
        body { font-family: sans-serif; background-color: var(--bg-dark); color: #fff; margin: 0; padding: 0; overflow: hidden; }
        
        /* Màn hình chờ kích hoạt âm thanh */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .start-btn {
            background: var(--primary-color); border: none; color: white;
            padding: 15px 40px; border-radius: 30px; font-size: 18px; cursor: pointer;
        }

        /* Khung hiển thị chính */
        .main-viewer {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; width: 100%; position: relative;
        }

        #video-display-area {
            width: 100%; height: 80vh; max-width: 450px;
            background: #000; position: relative; border-radius: 15px; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Thanh điều khiển */
        .controls {
            margin-top: 20px; display: flex; gap: 20px; align-items: center;
        }
        .nav-btn {
            background: #333; color: white; border: 1px solid #444;
            padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .nav-btn:hover { background: var(--primary-color); }
        .info { font-size: 14px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2 style="margin-bottom: 10px;">TikTok Dashboard</h2>
        <p style="color: #666; margin-bottom: 20px;">Nhấn để xem và tự động bật âm thanh</p>
        <button class="start-btn" onclick="startApp()">BẮT ĐẦU XEM</button>
    </div>

    <div class="main-viewer">
        <div id="video-display-area">
            <div id="placeholder" style="display:flex; align-items:center; justify-content:center; height:100%; color:#444;">
                Đang chờ tải video...
            </div>
        </div>

        <div class="controls">
            <button class="nav-btn" onclick="changeVideo(-1)">⬅ TRƯỚC</button>
            <button class="nav-btn" style="background: var(--primary-color);" onclick="changeVideo(1)">SAU ➡</button>
        </div>
        
        <div id="video-info" class="info">Video 0 / 0</div>
    </div>

    <script>
        let allVideos = [];
        let currentIndex = 0;

        async function init() {
            try {
                console.log("[Log] Đang nạp danh sách list.txt...");
                const res = await fetch('./list.txt');
                const text = await res.text();
                const entries = text.trim().split(/\n\s*\n/);
                
                allVideos = entries.map((entry, index) => {
                    const urlMatch = entry.match(/Liên kết: (.*)/);
                    const dateMatch = entry.match(/Ngày: (.*)/);
                    const url = urlMatch ? urlMatch[1].trim().replace(/\/$/, "") : "";
                    return {
                        id: url.split('/').pop(),
                        date: dateMatch ? dateMatch[1] : 'N/A'
                    };
                }).filter(v => v.id);

                updateInfo();
            } catch (err) {
                console.error("[Log Error] Lỗi fetch:", err);
            }
        }

        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';
            loadVideo(0);
        }

        function changeVideo(step) {
            let nextIndex = currentIndex + step;
            if (nextIndex >= 0 && nextIndex < allVideos.length) {
                loadVideo(nextIndex);
            }
        }

        function loadVideo(index) {
            const displayArea = document.getElementById('video-display-area');
            const video = allVideos[index];
            currentIndex = index;

            console.log(`[Log] Đang dừng video cũ và nạp Video #${index + 1} (ID: ${video.id})`);

            // BƯỚC QUAN TRỌNG: Xóa sạch nội dung cũ trước khi nạp mới để ngắt âm thanh hoàn toàn
            displayArea.innerHTML = ""; 

            // Tạo Iframe mới
            const iframe = document.createElement('iframe');
            iframe.src = `https://www.tiktok.com/embed/v2/${video.id}?autoplay=1`;
            iframe.allow = "autoplay; fullscreen";
            iframe.allowFullscreen = true;

            displayArea.appendChild(iframe);
            updateInfo();
        }

        function updateInfo() {
            const info = document.getElementById('video-info');
            info.innerText = `Video ${currentIndex + 1} / ${allVideos.length} | Ngày: ${allVideos[currentIndex]?.date || '...'}`;
        }

        window.onload = init;
    </script>
</body>
</html>
