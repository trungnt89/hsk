<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Navigation Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #1e1e1e; }
        
        /* Sidebar */
        #sidebar {
            width: 250px;
            background: #252526;
            color: #ccc;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
            z-index: 10;
        }
        .sidebar-header { padding: 20px; font-weight: bold; color: #007acc; border-bottom: 1px solid #333; }
        .menu-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: 0.2s;
            border-left: 3px solid transparent;
        }
        .menu-item:hover { background: #2a2d2e; color: white; }
        .menu-item.active { background: #37373d; color: white; border-left: 3px solid #007acc; }

        /* Content Area */
        #content { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        
        /* Cố gắng ép iframe hiển thị */
        #main-frame {
            width: 100%;
            flex-grow: 1;
            border: none;
            background: white;
        }

        #log-area {
            height: 100px;
            background: #000;
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            padding: 10px;
            overflow-y: auto;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">MENU ĐIỀU HƯỚNG</div>
    <div class="menu-item" onclick="loadInternal(this, 'https://vercel.com/trungnt6541s-projects/hsk/deployments')">Vercel Deployments</div>
    <div class="menu-item" onclick="loadInternal(this, 'https://docs.google.com/spreadsheets/d/1g2COnzVdo8SlqJVq5osT5hfNVfdTsXqzYp0bN1S8ZIc/edit?gid=0#gid=0')">Google Sheets</div>
    <div class="menu-item" onclick="loadInternal(this, 'https://aistudio.google.com/spend?project=gen-lang-client-0273316723')">AI Studio Spend</div>
</div>

<div id="content">
    <iframe id="main-frame" src="about:blank"></iframe>
    <div id="log-area"></div>
</div>

<script>
    function writeLog(msg) {
        const log = document.getElementById('log-area');
        log.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
        console.log(msg);
    }

    function loadInternal(el, url) {
        writeLog("--- Yêu cầu tải nội dung nội bộ ---");
        
        // Cập nhật trạng thái menu
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');

        const frame = document.getElementById('main-frame');
        
        /* Mẹo: Thêm tham số ngẫu nhiên để tránh cache 
           và sử dụng thuộc tính loading="lazy"
        */
        const finalUrl = url + (url.includes('?') ? '&' : '?') + 'view=iframe_mode';
        
        writeLog(`Đang thử nạp URL: ${url}`);
        frame.src = url;

        // Kiểm tra sau 2 giây xem có lỗi hiển thị không
        setTimeout(() => {
            writeLog("Kiểm tra trạng thái: Nếu khung hình trắng, website đích đang chặn Frame.");
            writeLog("Giải pháp: Cần cài đặt Extension 'Ignore X-Frame-Options' trên trình duyệt để bypass.");
        }, 2000);
    }

    window.onload = () => {
        writeLog("Hệ thống Dashboard sẵn sàng.");
        const first = document.querySelector('.menu-item');
        if(first) first.click();
    }
</script>

</body>
</html>
