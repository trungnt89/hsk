<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Japanese Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="../com/assistive.js"></script>
  <script src="../com/TTSClient.js"></script>
  <script type="module" src="../com/japanese-lookup.js?v=1"></script>
  <style>
    body { font-family: system-ui, -apple-system; max-width: 700px; margin: auto; padding: 12px; background: #fff; color: #333; }
    
    .toolbar { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
    .nav-top { display: flex; justify-content: center; align-items: center; gap: 12px; }
    .controls-row { display: flex; justify-content: flex-start; align-items: center; gap: 6px; flex-wrap: wrap; }
    
    .group { display: flex; align-items: center; gap: 4px; border-right: 1px solid #eee; padding-right: 8px; }
    .group:last-child { border-right: none; }

    button { padding: 4px 10px; border-radius: 6px; border: 1px solid #ccc; background: #fff; font-size: 13px; cursor: pointer; height: 32px; display: flex; align-items: center; }
    button.active { background: #e0f2fe; border-color: #2563eb; color: #2563eb; font-weight: bold; }
    select { height: 32px; border-radius: 6px; border: 1px solid #ccc; font-size: 12px; }

    .display-box { min-height: 150px; padding: 10px 0; }
    
    .ja-text { 
      display: block; 
      width: 100%;
      color: #000; 
      white-space: pre-wrap; 
      cursor: pointer;
      min-height: 50px;
    }

    .vi-text { 
      display: block; 
      width: 100%;
      font-size: 1em; 
      color: #666; 
      font-style: italic; 
      white-space: pre-wrap; 
      line-height: 1.5; 
    }

    hr {
      border: 0;
      border-top: 1px dashed #ccc;
      margin: 20px 0;
      display: block;
      width: 100%;
    }

    .hl-now { background-color: #fef08a; border-radius: 2px; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: #fff; padding: 16px; border-radius: 12px; width: 90%; max-width: 450px; }
    textarea { width: 100%; border: 1px solid #ccc; border-radius: 8px; padding: 10px; height: 150px; box-sizing: border-box; }
  </style>
</head>
<body>

<div class="toolbar">
  <div class="nav-top">
    <button onclick="prevPage()" id="btnPrev">◀</button>
    <span id="pageInfo" style="font-size: 13px; font-weight: bold; min-width: 50px; text-align: center;">0 / 0</span>
    <button onclick="nextPage()" id="btnNext">▶</button>
  </div>

  <div class="controls-row">
    <div class="group">
      <button id="btnPlayCur" onclick="playCurrent()">▶️</button>
      <button id="btnAudioToggle" onclick="toggleAudio()">🔊</button>
    </div>
    <div class="group">
      <button id="btnRepeatOne" onclick="toggleRepeatOne()">🔂</button>
      <button id="btnRepeatAll" onclick="toggleRepeatAll()">🔁</button>
    </div>
    <div class="group">
      <select id="voice">
        <option value="ja-JP-KeitaNeural">Nam</option>
        <option value="ja-JP-NanamiNeural">Nữ</option>
        <option value="highlight">Highlight</option>
      </select>
      <select id="rate">
        <option value="0.6">0.6</option>
		<option value="0.7">0.7</option>
        <option value="0.8">0.8</option>
		<option value="0.9">0.9</option>
        <option value="1.0" selected>1.0</option>
      </select>
    </div>
    <button onclick="openEditor()">✏️</button>
  </div>
</div>

<div class="display-box">
  <div class="ja-text" id="currentJa"></div>
  <hr id="separator">
  <div class="vi-text" id="currentVi"></div>
</div>

<div id="editorModal" class="modal">
  <div class="modal-content">
    <textarea id="textInput"></textarea>
    <div style="display: flex; gap: 8px; margin-top: 12px;">
      <button onclick="addText()" style="flex:1">Thêm</button>
      <button onclick="updateText()" style="flex:1">Lưu</button>
      <button onclick="deleteText()" style="color:red">Xoá</button>
      <button onclick="closeEditor()">Đóng</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyNX96iC37hc8AunT8zWlG_yTFB2ipZp90-XivW8hWzVYVne9nftCC3mSFoTk10v93t/exec";
let texts = [], currentIndex = 0, repeatOne = false, repeatAll = false, isAudioEnabled = true;

const jaDisplay = document.getElementById("currentJa"), viDisplay = document.getElementById("currentVi"), pageInfo = document.getElementById("pageInfo");

function loadSettings() {
  const v = localStorage.getItem("voice"), r = localStorage.getItem("rate");
  if (v) document.getElementById("voice").value = v; 
  if (r) document.getElementById("rate").value = r;
  currentIndex = parseInt(localStorage.getItem("lastIndex") || 0);
  isAudioEnabled = localStorage.getItem("audioEnabled") !== "false";
  repeatOne = localStorage.getItem("repeatOne") === "true";
  repeatAll = localStorage.getItem("repeatAll") === "true";
  updateUIStates();
}

function updateUIStates() {
  document.getElementById("btnRepeatOne").classList.toggle("active", repeatOne);
  document.getElementById("btnRepeatAll").classList.toggle("active", repeatAll);
  const btnAudio = document.getElementById("btnAudioToggle");
  btnAudio.textContent = isAudioEnabled ? "🔊" : "🔇";
  btnAudio.classList.toggle("active", isAudioEnabled);
}

function toggleAudio() { 
  isAudioEnabled = !isAudioEnabled; 
  localStorage.setItem("audioEnabled", isAudioEnabled); 
  if (!isAudioEnabled) window.speechSynthesis.cancel();
  updateUIStates(); 
}

function renderCurrent() {
  if (!texts.length) return;
  if (currentIndex >= texts.length) currentIndex = 0;
  
  console.log("Rendering text for index:", currentIndex);
  jaDisplay.textContent = texts[currentIndex].ja;
  viDisplay.textContent = texts[currentIndex].vi;
  document.getElementById("separator").style.display = texts[currentIndex].ja ? "block" : "none";

  pageInfo.textContent = `${currentIndex + 1} / ${texts.length}`;
  document.getElementById("btnPrev").disabled = (currentIndex <= 0);
  document.getElementById("btnNext").disabled = (currentIndex >= texts.length - 1 && !repeatAll);
  localStorage.setItem("lastIndex", currentIndex);

  // Ép module tra từ nhận diện lại nội dung mới
  if (typeof JapaneseLookup !== 'undefined' && JapaneseLookup.render) {
      JapaneseLookup.render();
  }
}

async function loadTexts() {
  try {
    const res = await fetch(GAS_URL + `?_t=${Date.now()}`);
    const data = await res.json();
    texts = Array.isArray(data) ? data.filter(i => i.ja) : [];
    renderCurrent();
  } catch (e) { console.error("Data Load Error"); }
}

async function playCurrent() {
  if (!texts[currentIndex] || !isAudioEnabled) return;
  const mode = document.getElementById("voice").value;
  const btnPlay = document.getElementById("btnPlayCur");
  const originalText = texts[currentIndex].ja;

  btnPlay.classList.add("active");

  if (mode === "highlight") {
    jaDisplay.innerHTML = originalText.split('').map((c, i) => `<span id="char-${i}">${c}</span>`).join('');
    const msg = new SpeechSynthesisUtterance(originalText);
    msg.lang = 'ja-JP';
    msg.rate = parseFloat(document.getElementById("rate").value);
    msg.onboundary = (e) => {
      const span = document.getElementById(`char-${e.charIndex}`);
      if (span) {
        document.querySelectorAll('.hl-now').forEach(s => s.className = '');
        span.className = 'hl-now';
      }
    };
    msg.onend = () => { 
        btnPlay.classList.remove("active"); 
        jaDisplay.textContent = originalText;
        if (typeof JapaneseLookup !== 'undefined' && JapaneseLookup.render) JapaneseLookup.render();
        onAudioEnded(); 
    };
    window.speechSynthesis.cancel(); window.speechSynthesis.speak(msg);
  } else {
    try {
      await speakCommon({ text: originalText, voice: mode, rate: document.getElementById("rate").value });
    } finally { btnPlay.classList.remove("active"); onAudioEnded(); }
  }
}

function onAudioEnded() {
  if (!isAudioEnabled) return;
  if (repeatOne) playCurrent();
  else if (repeatAll || currentIndex < texts.length - 1) setTimeout(nextPage, 600);
}

function navigate(idx) {
  if (idx >= 0 && idx < texts.length) { currentIndex = idx; renderCurrent(); if (isAudioEnabled) playCurrent(); }
  else if (repeatAll && texts.length > 0) { currentIndex = 0; renderCurrent(); if (isAudioEnabled) playCurrent(); }
}
function nextPage() { navigate(currentIndex + 1); }
function prevPage() { navigate(currentIndex - 1); }

function openEditor() { 
  const cur = texts[currentIndex];
  document.getElementById("textInput").value = cur ? `${cur.ja} | ${cur.vi}` : ""; 
  document.getElementById("editorModal").style.display = "flex"; 
}
function closeEditor() { document.getElementById("editorModal").style.display = "none"; }

async function callGas(d) { return fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(d) }); }
async function addText() { await callGas({ action: "add", text: document.getElementById("textInput").value }); setTimeout(loadTexts, 1000); closeEditor(); }
async function updateText() { await callGas({ action: "update", index: currentIndex, text: document.getElementById("textInput").value }); setTimeout(loadTexts, 1000); closeEditor(); }
async function deleteText() { if(confirm("Xoá câu này?")) { await callGas({ action: "delete", index: currentIndex }); setTimeout(loadTexts, 1000); closeEditor(); } }

function toggleRepeatOne() { repeatOne = !repeatOne; if(repeatOne) repeatAll = false; saveRep(); }
function toggleRepeatAll() { repeatAll = !repeatAll; if(repeatAll) repeatOne = false; saveRep(); }
function saveRep() { localStorage.setItem("repeatOne", repeatOne); localStorage.setItem("repeatAll", repeatAll); updateUIStates(); }

document.getElementById("voice").onchange = (e) => localStorage.setItem("voice", e.target.value);
document.getElementById("rate").onchange = (e) => localStorage.setItem("rate", e.target.value);

loadSettings();
loadTexts();
</script>
</body>
</html>
