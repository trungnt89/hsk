<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Next Player (Thẻ Video Chuẩn)</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #00ff88;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-color);
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .container { 
            width: 90%; 
            max-width: 900px; 
            background-color: var(--container-bg); 
            padding: 20px; 
            border-radius: 12px; 
        }
        h1 { text-align: center; font-size: 1.4rem; color: var(--accent-color); }
        .main-layout { display: flex; gap: 15px; flex-direction: column; }
        @media (min-width: 600px) { .main-layout { flex-direction: row; } }
        .player-section { flex: 2; }
        .playlist-section { 
            flex: 1; 
            background-color: #2c2c2c; 
            padding: 10px; 
            border-radius: 8px; 
            max-height: 400px; 
            overflow-y: auto; 
        }
        .video-wrapper { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            background-color: #000; 
            border-radius: 8px; 
            overflow: hidden; 
        }
        video { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            outline: none; 
        }
        .playlist-item { 
            padding: 10px; 
            background-color: #1e1e1e; 
            margin-bottom: 8px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 13px; 
        }
        .playlist-item.active { 
            border: 1px solid var(--accent-color); 
            background-color: #25382c; 
        }
        .controls { 
            margin-top: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        button { 
            padding: 10px 15px; 
            border-radius: 6px; 
            border: none; 
            background-color: var(--accent-color); 
            color: #000; 
            font-weight: bold; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hệ Thống Tự Động Chuyển Video (Direct Stream)</h1>
    <div class="main-layout">
        <div class="player-section">
            <div class="video-wrapper">
                <video id="main-player" controls autoplay muted preload="auto">Trình duyệt không hỗ trợ thẻ video.</video>
            </div>
            <div class="controls">
                <span id="playing-title" style="font-size:14px; color: #aaa;">Đang nạp dữ liệu...</span>
                <button id="next-btn">Bài Tiếp Theo ⏭️</button>
            </div>
        </div>
        <div class="playlist-section">
            <h3 style="margin-top:0; font-size:14px; color: var(--accent-color);">Danh sách phát</h3>
            <div id="playlist-container"></div>
        </div>
    </div>
</div>

<script>
    let playlist = [];
    let currentVideoIndex = 0;
    
    const player = document.getElementById('main-player');
    const playlistContainer = document.getElementById('playlist-container');
    const playingTitle = document.getElementById('playing-title');
    const nextBtn = document.getElementById('next-btn');

    async function loadPlaylist() {
        playingTitle.textContent = 'Đang nạp playlist...';
        try {
            const response = await fetch('/api/video');
            const result = await response.json();
            
            if (result.success && result.data.length > 0) {
                playlist = result.data;
                initPlaylist();
                playVideoAtIndex(0);
            }
        } catch (error) {
            playingTitle.textContent = 'Lỗi kết nối!';
        }
    }

    function initPlaylist() {
        playlistContainer.innerHTML = '';
        playlist.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `playlist-item ${index === currentVideoIndex ? 'active' : ''}`;
            div.textContent = `${index + 1}. ${item.title}`;
            div.onclick = () => playVideoAtIndex(index);
            playlistContainer.appendChild(div);
        });
    }

    function playVideoAtIndex(index) {
        if (playlist.length === 0) return;
        if (index >= playlist.length) { index = 0; }
        
        currentVideoIndex = index;
        const videoData = playlist[index];
        
        initPlaylist();
        playingTitle.textContent = `Đang phát: ${videoData.title}`;
        
        const safeId = String(videoData.id).trim();
        player.src = `/api/video?id=${safeId}`;
        player.play().catch(e => console.log('Tự động phát bị chặn (Cần click):', e));
    }

    // 🌟 ĐÂY LÀ TÍNH NĂNG BẠN CẦN: Tự động chuyển bài khi hết video
    player.onended = () => {
        console.log('Hết video, tự động chuyển bài.');
        playVideoAtIndex(currentVideoIndex + 1);
    };

    nextBtn.addEventListener('click', () => {
        playVideoAtIndex(currentVideoIndex + 1);
    });

    loadPlaylist();
</script>
</body>
</html>
