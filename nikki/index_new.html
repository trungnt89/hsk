<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diary - AI Integrated</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="module">
        import JapaneseLookup from '../com/japanese-lookup.js?v=1';
    </script>
    <style>
        /* Chỉ giữ lại các định dạng bổ trợ không có sẵn trong Bootstrap hoặc để đảm bảo cấu trúc layout cố định */
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 14px; }
        :root {
            --bg-color: #f5f7fb; --primary-color: #6c5ce7; --secondary-color: #a29bfe;
            --text-color: #2d3436; --text-light: #636e72; --card-bg: #ffffff;
            --danger-color: #ff7675; --edit-color: #0984e3; --success-color: #2ecc71;
            --ai-color: #00b894;
        }
        body { background-color: #f5f7fb; color: #2d3436; height: 100vh; overflow: hidden; }
        header { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
        
        .toggle-container { display: inline-flex; align-items: center; cursor: pointer; position: relative; margin-left: 4px; }
        .toggle-switch { position: relative; width: 30px; height: 16px; background-color: #ccc; border-radius: 10px; transition: 0.3s; }
        .toggle-switch::after { content: ''; position: absolute; width: 12px; height: 12px; border-radius: 50%; background-color: white; top: 2px; left: 2px; transition: 0.3s; }
        .toggle-active .toggle-switch { background-color: #2ecc71; }
        .toggle-active .toggle-switch::after { left: 16px; }
        .toggle-label { font-size: 0.6rem; margin-right: 2px; color: inherit; font-weight: bold; display: none; }

        .diary-item { border-left: 4px solid #dfe6e9; cursor: pointer; position: relative; }
        .diary-item.pinned { border-left-color: #f1c40f; background-color: #fffdf0 !important; }
        .diary-item.selected { border-left-color: #e67e22 !important; background-color: #fff3e0 !important; outline: 3px solid #ffcc80; outline-offset: -3px; }
        
        .ai-content-box { border-left: 4px solid #00b894; color: #2c3e50; }
        .item-action-btn { background: none; border: none; font-size: 0.75rem; cursor: pointer; font-weight: 600; flex: 1; text-align: center; padding: 5px 0; white-space: nowrap; border-right: 1px solid #eee; }
        .item-action-btn:last-child { border-right: none; }
        .item-action-btn.disabled { color: #ccc !important; cursor: not-allowed; pointer-events: none; opacity: 0.6; }
        
        .audio-modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .audio-modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; height: 80%; background: white; border-radius: 12px; overflow: hidden; }
        iframe#audioFrame { width: 100%; height: calc(100% - 40px); border: none; }
    </style>
</head>
<body class="d-flex flex-column">
    <script src="../com/assistive.js"></script>
    <script src="../com/TTSClient.js"></script>

    <header class="text-white p-2 text-center shadow-sm flex-shrink-0">
        <h1 class="fs-6 fw-bold m-0" style="font-size: 1.2rem !important;">Diary & AI</h1>
    </header>

    <main class="flex-grow-1 overflow-hidden p-2 d-flex flex-column gap-2">
        <div class="write-card bg-white p-2 rounded-3 shadow-sm flex-shrink-0">
            <textarea id="diaryInput" class="form-control" style="height: 120px; resize: none; font-size: 15px;" placeholder="Hôm nay của bạn thế nào?..."></textarea>
            <div class="action-area d-flex justify-content-between align-items-center mt-2 gap-1 w-100">
                <button id="cancelBtn" class="btn btn-light btn-sm text-nowrap" style="display:none; font-size: 13px; padding: 6px 12px;">Hủy</button>
                <button id="saveBtn" class="btn text-white btn-sm fw-bold text-nowrap" style="background-color: #6c5ce7; font-size: 13px; padding: 6px 12px;">Lưu lại</button>
                <div class="tts-controls d-flex align-items-center gap-1 ms-auto flex-grow-1 justify-content-end overflow-hidden">
                    <button id="btnMainSpeak" class="btn text-white fw-bold rounded-pill text-nowrap" style="background-color: #00b894; font-size: 0.75rem; padding: 4px 10px; min-width: 65px;" onclick="handleGlobalSpeak()" disabled>🔊 Đọc</button>
                    <button id="btnRepeat" class="btn btn-light btn-sm border" style="padding: 4px 8px; font-size: 12px;" onclick="toggleRepeat()">🔂</button>
                    <select id="voiceSelect" class="form-select form-select-sm d-inline-block w-auto" style="padding: 2px 24px 2px 8px; font-size: 11px;" onchange="saveTTSSettings()">
                        <option value="ja-JP-KeitaNeural" selected>Nam (JP)</option>
                        <option value="ja-JP-NanamiNeural">Nữ (JP)</option>
                    </select>
                    <select id="rateSelect" class="form-select form-select-sm d-inline-block w-auto" style="padding: 2px 24px 2px 8px; font-size: 11px;" onchange="saveTTSSettings()">
                        <option value="0.65">0.65</option>
                        <option value="0.68">0.68</option>
                        <option value="0.70" selected>0.70</option>
                        <option value="0.72">0.72</option>
                        <option value="0.75">0.75</option>
                        <option value="0.80">0.80</option>
                        <option value="1.0">1.0</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="tabs d-flex bg-light rounded-3 p-1 mt-1 flex-shrink-0">
            <button class="btn btn-sm flex-grow-1 fw-bold d-flex align-items-center justify-content-center gap-1 active bg-white shadow-sm text-primary" id="tab-btn-0" style="font-size: 0.8rem; padding: 8px;" onclick="switchTab(0)">
                <span>📝 Nhật ký</span>
                <div class="toggle-container" id="pinToggleWrapper" onclick="event.stopPropagation(); togglePinFilter()">
                    <span class="toggle-label" id="pinLabelText">Tất cả</span>
                    <div class="toggle-switch"></div>
                </div>
            </button>
            <button class="btn btn-sm flex-grow-1 fw-bold text-secondary d-flex align-items-center justify-content-center" id="tab-btn-1" style="font-size: 0.8rem; padding: 8px; background: transparent;" onclick="switchTab(1)">📖 Đoạn văn</button>
            <button class="btn btn-sm flex-grow-1 fw-bold text-secondary d-flex align-items-center justify-content-center" id="tab-btn-2" style="font-size: 0.8rem; padding: 8px; background: transparent;" onclick="switchTab(2)">💬 Hội thoại</button>
        </div>

        <div id="tab-diary" class="tab-content active flex-grow-1 overflow-auto pb-4" style="scroll-behavior: smooth;">
            <div id="diaryContainer"><p class="text-center text-muted p-4 fs-6" style="font-size: 0.9rem !important;">Đang tải dữ liệu...</p></div>
        </div>
        <div id="tab-paragraph" class="tab-content flex-grow-1 overflow-auto pb-4" style="display: none; scroll-behavior: smooth;"><div id="paragraphContainer"></div></div>
        <div id="tab-conversation" class="tab-content flex-grow-1 overflow-auto pb-4" style="display: none; scroll-behavior: smooth;"><div id="conversationContainer"></div></div>
    </main>

    <div id="audioModal" class="audio-modal">
        <div class="audio-modal-content shadow-lg">
            <div class="audio-modal-header bg-light p-2 d-flex justify-content-between align-items-center border-bottom">
                <button class="btn btn-sm btn-outline-danger fw-bold" style="font-size: 12px; padding: 4px 12px;" onclick="closeAudioModal()">✕ ĐÓNG</button>
                <button class="btn btn-sm btn-outline-success fw-bold" style="font-size: 12px; padding: 4px 12px;" onclick="reloadAudioModal()">F5 RELOAD</button>
                <button class="btn btn-sm btn-outline-primary fw-bold" style="font-size: 12px; padding: 4px 12px;" onclick="backAudioModal()">BACK ↩</button>
            </div>
            <iframe id="audioFrame" src=""></iframe>
        </div>
    </div>

    <script>
        // CONFIG URLS
        const VERCEL_URL = 'https://hsk-gilt.vercel.app/api/gSheet';
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwoSa8pQjddIlaP5cv-whNGFAd2j4sX3XuaFXHnwyQzdVvQ7nO8CWQTc2ykbHpO7OEw/exec';

        let currentDiaries = [];
        let editingId = null;
        let urlId = new URLSearchParams(window.location.search).get('id');
        let selectedDiaryId = urlId || localStorage.getItem("diary_selected_id") || null;
        if (urlId && urlId !== localStorage.getItem("diary_selected_id")) localStorage.setItem("diary_selected_id", urlId);
        let isRepeating = localStorage.getItem("diary_repeat") === "true";
        let currentTabIndex = parseInt(localStorage.getItem("diary_current_tab")) || 0;
        let showPinnedOnly = localStorage.getItem("diary_show_pinned_only") === "true";

        document.addEventListener('DOMContentLoaded', () => {
            console.log("[System] App Initialized");
            initApp();
            loadTTSSettings();
            document.getElementById('saveBtn').addEventListener('click', () => {
                editingId ? updateDiary() : saveDiary();
            });
            document.getElementById('cancelBtn').addEventListener('click', clearEditMode);
        });

        async function initApp() {
            loadDiaries();
        }

        async function loadDiaries() {
            try {
                const response = await fetch(VERCEL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        sheet: 'DairyList', 
                        act: 'read', 
                        spread: '1UiAS_mUhl6j6wHyPkNiol9pclzkQJWD4qzPIZD2sx3k' 
                    })
                });
                const data = await response.json();
                if (data.values) {
                    currentDiaries = data.values.map(r => ({
                        id: r[0], date: r[1], text: r[2], paragraph: r[3], conversation: r[4], pinned: String(r[5]).toLowerCase() === 'true', voiceCount: parseInt(r[6] || 0)
                    })).reverse();
                    renderList(currentDiaries);
                    if (selectedDiaryId) selectRecord(selectedDiaryId, true);
                }
            } catch (err) { console.warn("[Sync] Offline mode"); }
        }

        async function callAPI(paramsObj) {
            try {
                const response = await fetch(VERCEL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(paramsObj)
                });
                return await response.json();
            } catch (e) {
                console.error("[Sync Error]:", e);
                return { status: 'error', message: "Lỗi kết nối server" };
            }
        }

        async function callGAS(paramsObj) {
            console.log("[GAS Action]:", paramsObj.action);
            const params = new URLSearchParams();
            for (const key in paramsObj) if (paramsObj[key] != null) params.append(key, paramsObj[key]);
            try {
                const response = await fetch(`${GAS_URL}?${params.toString()}`);
                return await response.json();
            } catch (e) {
                console.error("[Sync Error]:", e);
                return { status: 'error', message: "Lỗi kết nối" };
            }
        }
        
        function renderList(diaries) {
            const container = document.getElementById('diaryContainer');
            container.innerHTML = '';
            const toggleWrapper = document.getElementById('pinToggleWrapper');
            const pinLabel = document.getElementById('pinLabelText');
            if(toggleWrapper) {
                toggleWrapper.classList.toggle('toggle-active', showPinnedOnly);
                if(pinLabel) pinLabel.innerText = showPinnedOnly ? "Ghim" : "Tất cả";
            }
            let displayData = diaries;
            if (showPinnedOnly) {
                displayData = diaries.filter(d => d.pinned);
            }
            displayData.forEach((item) => container.appendChild(createItemEl(item)));
            getLessonTotalScore(); 
        }

        function createItemEl(item) {
            const isGen = !!(item.paragraph || item.conversation);
            const div = document.createElement('div');
            div.className = `diary-item bg-white p-3 rounded-2 mb-2 shadow-sm ${item.id == selectedDiaryId ? 'selected' : ''} ${item.pinned ? 'pinned' : ''}`;
            div.id = `item-${item.id}`;
            div.onclick = (e) => {
                if (!e.target.closest('.item-action-btn') && !e.target.closest('.count-trigger')) {
                    selectRecord(item.id);
                }
            };
            div.innerHTML = `
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="diary-date text-muted fw-bold m-0" style="font-size: 0.75rem;">
                        ${item.date} - ${item.id}
                        <span class="count-trigger text-white rounded-pill ms-2 fw-bold d-inline-block" 
                              onclick="event.stopPropagation(); handleRecordBadgeClick('${item.id}')" 
                              style="background:${item.voiceCount > 0 ? '#e67e22' : '#ccc'}; padding:2px 8px; font-size:0.7rem; cursor:pointer;">
                            🎙️ ${item.voiceCount || 0}
                        </span>
                    </div>
                    <div class="d-flex gap-2">
                        <div class="item-action-btn p-0 border-0 text-primary fw-bold" style="font-size:0.75rem;" onclick="event.stopPropagation(); startEdit('${item.id}', \`${item.text.replace(/`/g, '\\`')}\`)">✏️ Sửa</div>
                        <div class="item-action-btn p-0 border-0 text-danger fw-bold" style="font-size:0.75rem;" onclick="event.stopPropagation(); deleteDiary('${item.id}')">🗑️ Xóa</div>
                    </div>
                </div>
                <div class="diary-content text-dark mb-2" style="font-size: 1.1rem; line-height: 1.5; white-space: pre-wrap;">${item.text}</div>
                <div class="item-actions d-flex justify-content-between align-items-center border-top pt-2 w-100">
                    <div class="item-action-btn text-warning" onclick="event.stopPropagation(); togglePin('${item.id}')">${item.pinned ? '📍 Bỏ' : '📌 Ghim'}</div>
                    <div class="item-action-btn" style="color:#6c5ce7; font-size:0.75rem;" onclick="event.stopPropagation(); selectRecord('${item.id}'); switchTab(1)">📖 Đoạn</div>
                    <div class="item-action-btn" style="color:#e67e22; font-size:0.75rem;" onclick="event.stopPropagation(); selectRecord('${item.id}'); switchTab(2)">💬 Hội thoại</div>
                    <div class="item-action-btn ai-btn ${isGen ? 'text-success' : 'text-info'}" style="font-size:0.75rem;" onclick="event.stopPropagation(); askAI('${item.id}', \`${item.text.replace(/`/g, '\\`')}\`)">${isGen ? '✅ AI' : '✨ AI'}</div>
                </div>
            `;
            return div;
        }

        function handleRecordBadgeClick(id) {
            selectRecord(id);
            const modal = document.getElementById('audioModal');
            document.getElementById('audioFrame').src = `./recorder.html?lessionId=${id}&tab=1`;
            modal.style.display = 'block';
        }

        function closeAudioModal() {
            document.getElementById('audioFrame').src = "";
            document.getElementById('audioModal').style.display = 'none';
        }

        function backAudioModal() {
            const iframe = document.getElementById('audioFrame');
            if (iframe.contentWindow) iframe.contentWindow.history.back();
        }

        function reloadAudioModal() {
            const iframe = document.getElementById('audioFrame');
            if (iframe.src) iframe.src = iframe.src;
        }

        async function saveDiary() {
            const text = document.getElementById('diaryInput').value.trim();
            if (!text) return;
            const id = Date.now().toString(), date = new Date().toLocaleString('vi-VN');
            const newItem = { id, date, text, paragraph: "", conversation: "", pinned: false, voiceCount: 0 };
            currentDiaries.unshift(newItem);
            renderList(currentDiaries);
            document.getElementById('diaryInput').value = '';
            const rowData = [id, date, text, "", "", "false", 0];
            await callAPI({ act: 'add', sheet: 'DairyList', spread: '1UiAS_mUhl6j6wHyPkNiol9pclzkQJWD4qzPIZD2sx3k', data: JSON.stringify(rowData) });
            selectRecord(id, true);
        }

        function startEdit(id, text) {
            editingId = id;
            document.getElementById('diaryInput').value = text;
            document.getElementById('saveBtn').innerText = 'Cập nhật';
            document.getElementById('cancelBtn').style.display = 'inline-block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function updateDiary() {
            const text = document.getElementById('diaryInput').value.trim();
            const idx = currentDiaries.findIndex(i => i.id == editingId);
            if (idx === -1) return;
            const item = currentDiaries[idx];
            item.text = text;
            renderList(currentDiaries);
            const tid = editingId;
            clearEditMode();
            const rowData = [item.id, item.date, item.text, item.paragraph, item.conversation, String(item.pinned), item.voiceCount];
            await callAPI({ act: 'updateByPosVal', pos: 0, val: tid, sheet: 'DairyList', spread: '1UiAS_mUhl6j6wHyPkNiol9pclzkQJWD4qzPIZD2sx3k', data: JSON.stringify(rowData) });
        }

        async function deleteDiary(id) {
            if (confirm("Xóa nhật ký này?")) {
                currentDiaries = currentDiaries.filter(i => i.id != id);
                renderList(currentDiaries);
                await callAPI({ act: 'deleteByPosVal', pos: 0, val: id, sheet: 'DairyList', spread: '1UiAS_mUhl6j6wHyPkNiol9pclzkQJWD4qzPIZD2sx3k' });
            }
        }

        function togglePinFilter() {
            showPinnedOnly = !showPinnedOnly;
            localStorage.setItem("diary_show_pinned_only", showPinnedOnly);
            renderList(currentDiaries);
        }

        async function togglePin(id) {
            const idx = currentDiaries.findIndex(d => d.id == id);
            if (idx === -1) return;
            const item = currentDiaries[idx];
            item.pinned = !item.pinned;
            renderList(currentDiaries);
            const rowData = [item.id, item.date, item.text, item.paragraph, item.conversation, String(item.pinned), item.voiceCount];
            await callAPI({ act: 'updateByPosVal', pos: 0, val: id, sheet: 'DairyList', spread: '1UiAS_mUhl6j6wHyPkNiol9pclzkQJWD4qzPIZD2sx3k', data: JSON.stringify(rowData) });
        }

        async function askAI(id, content) {
            selectRecord(id); switchTab(1);
            const pContainer = document.getElementById('paragraphContainer'), cContainer = document.getElementById('conversationContainer');
            pContainer.innerHTML = cContainer.innerHTML = '<p class="text-center text-muted p-4 fs-6" style="font-size: 0.9rem !important;">🤖 Đang biên soạn nội dung...</p>';
            const res = await (await fetch('https://hsk-gilt.vercel.app/api/aiGenerate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content, lessionId: id })
            })).json();
            if (res.status === 'success') {
                const idx = currentDiaries.findIndex(d => d.id == id);
                if (idx !== -1) {
                    currentDiaries[idx].paragraph = res.paragraph;
                    currentDiaries[idx].conversation = res.conversation;
                    renderList(currentDiaries); updateAIView();
                }
            }else{
                alert(res.message);
                switchTab(0);
            }
        }

        function switchTab(index) {
            currentTabIndex = index;
            localStorage.setItem("diary_current_tab", index);
            
            // Xử lý ẩn hiện nội dung tab bằng Bootstrap logic kết hợp d-none
            document.querySelectorAll('.tab-content').forEach((tab, i) => {
                if (i === index) {
                    tab.style.display = 'block';
                    tab.classList.add('active');
                } else {
                    tab.style.display = 'none';
                    tab.classList.remove('active');
                }
            });
            
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                if (i === index) {
                    btn.classList.add('active', 'bg-white', 'shadow-sm', 'text-primary');
                    btn.classList.remove('text-secondary');
                    btn.style.background = '';
                } else {
                    btn.classList.remove('active', 'bg-white', 'shadow-sm', 'text-primary');
                    btn.classList.add('text-secondary');
                    btn.style.background = 'transparent';
                }
            });
            updateAIView();
        }

        function selectRecord(id, scroll = true) {
            selectedDiaryId = id; localStorage.setItem("diary_selected_id", id);
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('id', id);
            window.history.replaceState({}, '', newUrl); 
            document.querySelectorAll('.diary-item').forEach(el => el.classList.remove('selected'));
            const el = document.getElementById(`item-${id}`);
            if (el) { el.classList.add('selected'); if (scroll) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100); }
            updateAIView();
        }

        function updateAIView() {
            const item = currentDiaries.find(d => d.id == selectedDiaryId);
            if (!item) return;
            const pContent = item.paragraph;
            const cContent = item.conversation;
            document.getElementById('paragraphContainer').innerHTML = pContent ? `<div id="p-content" class="ai-content-box bg-white p-3 rounded-2 m-0 mb-2" style="line-height: 1.7; font-size: 1rem; white-space: pre-wrap;">${pContent}</div>` : `<p class="text-center text-muted p-4 fs-6" style="font-size: 0.9rem !important;">Chưa có nội dung AI.</p>`;
            document.getElementById('conversationContainer').innerHTML = cContent ? `<div id="c-content" class="ai-content-box bg-white p-3 rounded-2 m-0 mb-2" style="line-height: 1.7; font-size: 1rem; white-space: pre-wrap;">${cContent}</div>` : `<p class="text-center text-muted p-4 fs-6" style="font-size: 0.9rem !important;">Chưa có nội dung AI.</p>`;
            const btnSpeak = document.getElementById('btnMainSpeak');
            btnSpeak.disabled = (currentTabIndex === 1) ? !pContent : (currentTabIndex === 2 ? !cContent : true);
        }

        function loadTTSSettings() {
            const v = localStorage.getItem("diary_voice"), r = localStorage.getItem("diary_rate");
            if(v) document.getElementById("voiceSelect").value = v;
            if(r) document.getElementById("rateSelect").value = r;
            document.getElementById("btnRepeat").classList.toggle("btn-info", isRepeating);
            document.getElementById("btnRepeat").classList.toggle("btn-light", !isRepeating);
        }

        function saveTTSSettings() {
            localStorage.setItem("diary_voice", document.getElementById("voiceSelect").value);
            localStorage.setItem("diary_rate", document.getElementById("rateSelect").value);
            localStorage.setItem("diary_repeat", isRepeating);
        }

        function toggleRepeat() { 
            isRepeating = !isRepeating; 
            document.getElementById("btnRepeat").classList.toggle("btn-info", isRepeating); 
            document.getElementById("btnRepeat").classList.toggle("btn-light", !isRepeating); 
            saveTTSSettings(); 
            if (document.getElementById('btnMainSpeak').classList.contains("btn-danger")) {
                handleGlobalSpeak(); handleGlobalSpeak(); 
            }
        }

        async function speakText(elId, btnId) {
            const el = document.getElementById(elId), btn = document.getElementById(btnId);
            if(!el || !window.speakCommon) return;
            btn.classList.remove("text-white");
            btn.style.backgroundColor = "";
            btn.classList.add("btn-danger"); btn.innerHTML = '⏹ Dừng';
            await window.speakCommon({ 
                text: el.innerText, 
                voice: document.getElementById("voiceSelect").value, 
                rate: document.getElementById("rateSelect").value, 
                filename: `Diary_AI_${selectedDiaryId}`,
                loop: isRepeating 
            });
            if (!isRepeating) resetSpeakBtns();
        }

        function handleGlobalSpeak() {
            const btn = document.getElementById('btnMainSpeak');
            if (btn.classList.contains("btn-danger")) { 
                if (window.stopSpeak) window.stopSpeak(); 
                resetSpeakBtns(); 
                return; 
            }
            const tid = currentTabIndex === 1 ? 'p-content' : (currentTabIndex === 2 ? 'c-content' : null);
            if (tid) speakText(tid, 'btnMainSpeak');
        }

        function resetSpeakBtns() { 
            const b = document.getElementById('btnMainSpeak'); 
            b.classList.remove('btn-danger'); 
            b.style.backgroundColor = "#00b894";
            b.classList.add('text-white');
            b.innerHTML = '🔊 Đọc'; 
        }
        function clearEditMode() { editingId = null; document.getElementById('diaryInput').value = ''; document.getElementById('saveBtn').innerText = 'Lưu lại'; document.getElementById('cancelBtn').style.display = 'none'; }
    </script>
    <script>
        async function getLessonTotalScore() {
            try {
                const res = await fetch(VERCEL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        sheet: 'ScoreList', 
                        act: 'read', 
                        spread: '1_OuLRGiUEzXUpMf-QmPeNYCQee0L1ueGAZcUvNELp8A' 
                    })
                });
                const result = await res.json();
                if (result.values && Array.isArray(result.values)) {
                    document.querySelectorAll('.count-trigger').forEach(badge => {
                        const match = badge.getAttribute('onclick').match(/'([^']+)'/);
                        if (match && match[1]) {
                            const lessonID = match[1];
                            let count = 0, maxScore = 0;
                            result.values.forEach(row => {
                                if (row[0] === lessonID) {
                                    count++;
                                    const score = parseInt(row[3]) || 0;
                                    if (score > maxScore) maxScore = score;
                                }
                            });
                            badge.innerHTML = `🎙️ ${count} | 🏆 ${maxScore}`;
                            if (count > 0) badge.style.backgroundColor = '#e67e22';
                        }
                    });
                }
            } catch (err) { console.error("[Summary Error]:", err); }
        }
    </script>
