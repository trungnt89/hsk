<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N3 Japanese AI Writer</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        h1 { color: var(--primary); text-align: center; border-bottom: 3px solid var(--accent); padding-bottom: 10px; margin-bottom: 25px; }
        
        .input-section { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; }
        textarea { 
            width: 100%; height: 160px; padding: 15px; border: 1px solid #ddd; border-radius: 10px; 
            font-size: 16px; box-sizing: border-box; transition: border 0.3s; font-family: inherit;
        }
        textarea:focus { border-color: var(--accent); outline: none; }
        
        button { 
            width: 100%; padding: 16px; background: var(--primary); color: white; 
            border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #34495e; transform: translateY(-2px); }
        button:disabled { background: #95a5a6; cursor: not-allowed; }

        .result-section { margin-top: 30px; display: none; border-top: 2px solid #eee; padding-top: 20px; }
        .output-box { 
            background: #fffdf0; border-left: 5px solid var(--accent); padding: 20px; 
            border-radius: 0 8px 8px 0; white-space: pre-line; line-height: 1.8; font-size: 18px; color: #2c3e50;
        }
        
        .log-container { 
            margin-top: 20px; background: #1e1e1e; color: #4af626; padding: 12px; 
            border-radius: 8px; font-family: 'Courier New', monospace; font-size: 11px;
            max-height: 120px; overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>N3 Japanese Content AI</h1>

    <div class="input-section">
        <label>Nhập nội dung Tiếng Việt:</label>
        <textarea id="viInput" placeholder="Ví dụ: Muốn an toàn tài chính cần kiếm thêm thu nhập thụ động..."></textarea>
    </div>

    <button id="genBtn" onclick="generateN3()">BẮT ĐẦU CHUYỂN ĐỔI</button>

    <div id="resultSection" class="result-section">
        <div style="font-weight:bold; color:var(--accent); margin-bottom:15px; font-size: 1.1rem;">KẾT QUẢ TỪ GIÁO VIÊN AI (N3):</div>
        <div id="jpOutput" class="output-box"></div>
        
        <div class="log-container" id="logBox"></div>
    </div>
</div>

<script>
    // Cấu hình với Key mới từ My Gemini Project
    const CONFIG = {
        API_KEY: "AIzaSyAys_Hy1nUvuwGwZhOuKRbccNJAnU_Sa1w",
        MODEL_URL: "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent"
    };

    function addLog(msg) {
        const logBox = document.getElementById('logBox');
        logBox.innerHTML += `> [${new Date().toLocaleTimeString()}] ${msg}<br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function generateN3() {
        const input = document.getElementById('viInput').value.trim();
        const btn = document.getElementById('genBtn');
        const output = document.getElementById('jpOutput');
        const section = document.getElementById('resultSection');

        if (!input) {
            alert("Vui lòng nhập nội dung!");
            return;
        }

        // Giao diện chờ
        btn.disabled = true;
        btn.innerText = "Đang kết nối AI...";
        section.style.display = 'block';
        output.innerText = "Đang xử lý dữ liệu trình độ N3...";
        addLog("Khởi tạo yêu cầu.");

        // Prompt chuyên sâu N3
        const prompt = `Hãy đóng vai một giáo viên tiếng Nhật. 
        Dịch nội dung sau sang tiếng Nhật trình độ N3, sử dụng các liên từ logic (しかし, なぜなら...) và các mẫu ngữ pháp N3. 
        Sau đoạn văn, hãy giải thích ngắn gọn 3 cấu trúc N3 đã dùng.
        Nội dung: "${input}"`;

        try {
            addLog("Đang gửi yêu cầu đến Gemini 1.5 Flash...");
            const response = await fetch(`${CONFIG.MODEL_URL}?key=${CONFIG.CONFIG_API_KEY || CONFIG.API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();
            
            if (data.error) throw new Error(data.error.message);

            if (data.candidates && data.candidates[0].content) {
                output.innerText = data.candidates[0].content.parts[0].text;
                addLog("THÀNH CÔNG: Đã nhận phản hồi.");
            } else {
                throw new Error("API không trả về nội dung hợp lệ.");
            }

        } catch (error) {
            output.innerText = "Lỗi: " + error.message;
            addLog("LỖI: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "BẮT ĐẦU CHUYỂN ĐỔI";
        }
    }
</script>

</body>
</html>
