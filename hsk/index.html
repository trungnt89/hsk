
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Flashcards</title>
    <script src="https://hsk-gilt.vercel.app/com/HanVietData.js"></script>
    <script>
        // Tải các script hệ thống bất đồng bộ để tránh lỗi biên dịch tĩnh của Vite
        (function() {
            const scripts = ['https://hsk-gilt.vercel.app/com/TTSClient.js', 'https://hsk-gilt.vercel.app/com/assistive.js'];
            scripts.forEach(src => {
                const script = document.createElement('script');
                script.src = src;
                script.async = false;
                document.head.appendChild(script);
            });
        })();
    </script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            user-select: none;
            overflow-x: hidden;
            overscroll-behavior: none;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 5px;
        }

        .header {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 2px;
        }

        /* Unified and compact Row 1 */
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 8px;
            padding: 0 4px;
        }

        .top-row h1 {
            color: var(--primary);
            font-size: 1.35rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.025em;
            line-height: 1;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .select-box {
            padding: 4px 8px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 0.8rem;
            font-weight: 600;
            background-color: white;
            color: #334155;
            cursor: pointer;
            outline: none;
            height: 32px;
            line-height: normal;
        }

        .toggle-btn-icon {
            background-color: white;
            border: 1px solid #cbd5e1;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: #334155;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            outline: none;
        }

        .toggle-btn-icon:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
        }

        .toggle-btn-icon.active {
            background-color: #22c55e;
            color: white;
            border-color: #22c55e;
            box-shadow: 0 2px 4px rgba(34, 197, 94, 0.15);
        }

        /* Row 2: Compact Inline Pagination */
        .pagination-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 5px 10px;
            background-color: #f1f5f9;
            border-radius: 12px;
            gap: 10px;
        }

        .pagination-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .pagination-item label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #64748b;
        }

        /* Row 3: Compact Progress */
        .progress-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 5px;
        }

        .progress {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .stats {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Flashcard Container */
        .flashcard-wrapper {
            perspective: 1000px;
            width: 100%;
            height: 500px;
            cursor: pointer;
            position: relative;
            touch-action: none;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .flashcard.flipped-vertical {
            transform: rotateX(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            border: 1px solid #e2e8f0;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #f1f5f9;
        }

        .flashcard.flipped-vertical .card-back {
            transform: rotateX(180deg);
        }

        /* Page Flip Animations */
        .page-flip-next-out {
            animation: flipNextOut 0.3s forwards cubic-bezier(0.4, 0, 0.2, 1);
            transition: none !important;
        }
        .page-flip-next-in {
            animation: flipNextIn 0.3s forwards cubic-bezier(0.4, 0, 0.2, 1);
            transition: none !important;
        }
        .page-flip-prev-out {
            animation: flipPrevOut 0.3s forwards cubic-bezier(0.4, 0, 0.2, 1);
            transition: none !important;
        }
        .page-flip-prev-in {
            animation: flipPrevIn 0.3s forwards cubic-bezier(0.4, 0, 0.2, 1);
            transition: none !important;
        }

        @keyframes flipNextOut {
            0% {
                transform: rotateY(0deg);
                transform-origin: center center;
                opacity: 1;
            }
            100% {
                transform: rotateY(-90deg);
                transform-origin: center center;
                opacity: 0;
            }
        }
        @keyframes flipNextIn {
            0% {
                transform: rotateY(90deg);
                transform-origin: center center;
                opacity: 0;
            }
            100% {
                transform: rotateY(0deg);
                transform-origin: center center;
                opacity: 1;
            }
        }
        @keyframes flipPrevOut {
            0% {
                transform: rotateY(0deg);
                transform-origin: center center;
                opacity: 1;
            }
            100% {
                transform: rotateY(90deg);
                transform-origin: center center;
                opacity: 0;
            }
        }
        @keyframes flipPrevIn {
            0% {
                transform: rotateY(-90deg);
                transform-origin: center center;
                opacity: 0;
            }
            100% {
                transform: rotateY(0deg);
                transform-origin: center center;
                opacity: 1;
            }
        }

        /* Action Buttons inside Card Corner */
        .card-action-corner {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        .action-icon-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-icon-btn:hover {
            transform: scale(1.05);
            background: #e2e8f0;
        }

        .action-icon-btn.status-mastered {
            background: #dcfce7;
            border-color: #86efac;
            color: #15803d;
        }

        /* Front Content */
        .word {
            font-size: 6rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .hint {
            font-size: 0.9rem;
            color: var(--text-muted);
            border: 1px dashed var(--text-muted);
            padding: 4px 12px;
            border-radius: 12px;
            margin-top: 15px;
        }

        /* Back Content */
        .pinyin {
            font-size: 1.3rem;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .meaning {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 25px;
            text-align: center;
        }

        .example-box {
            width: 100%;
            border-top: 1px solid #cbd5e1;
            padding-top: 15px;
            text-align: center;
        }

        .example-cn {
            font-size: 2.8rem;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .example-py {
            font-size: 1.3rem;
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 4px;
        }

        .example-vn {
            font-size: 1.3rem;
            color: #475569;
            font-weight: 500;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            width: 100%;
            margin-top: 10px;
        }

        .btn-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            border: 1px solid #cbd5e1;
            background-color: white;
            color: #334155;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            outline: none;
        }

        .btn-icon:hover {
            transform: translateY(-2px);
            background-color: #f1f5f9;
            border-color: #94a3b8;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .btn-icon:active {
            transform: translateY(1px);
        }

        .btn-icon.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-icon.active:hover {
            background-color: var(--primary-hover);
        }

        /* Loading */
        .loading {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-top: 100px;
            font-weight: 500;
        }

        .error {
            color: var(--accent);
            text-align: center;
            margin-top: 100px;
            font-weight: 500;
        }

        /* Word List Panel & Modal Styles */
        .word-list-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .word-list-modal.open {
            opacity: 1;
            pointer-events: auto;
        }

        .word-list-content {
            background-color: #ffffff;
            width: calc(100% - 10px);
            max-width: 490px;
            height: 94vh;
            height: 94dvh;
            border-radius: 24px;
            margin-bottom: 5px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15), 0 -10px 25px -5px rgba(0, 0, 0, 0.15);
            transform: translateY(110%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .word-list-modal.open .word-list-content {
            transform: translateY(0);
        }

        .word-list-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .word-list-header h2 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
        }

        .word-list-close {
            background: #f1f5f9;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            color: #475569;
            transition: all 0.2s ease;
        }

        .word-list-close:hover {
            background: #e2e8f0;
            transform: scale(1.05);
        }

        .word-list-search-box {
            padding: 12px 20px;
            border-bottom: 1px solid #f1f5f9;
            background-color: #f8fafc;
        }

        .search-input {
            width: 100%;
            padding: 10px 40px 10px 16px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: all 0.2s;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1), inset 0 1px 2px rgba(0,0,0,0.02);
            background-color: #ffffff;
        }

        .word-list-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px 20px; /* Thêm khoảng đệm cho vùng cuộn không sát mép dưới */
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .word-list-item {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .word-list-item:hover {
            background-color: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .word-list-item.active-word {
            background-color: #f5f3ff;
            border-color: #c4b5fd;
            border-left: 5px solid var(--primary);
        }

        .item-index {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 700;
            min-width: 18px;
            background: #f1f5f9;
            border-radius: 6px;
            padding: 2px 4px;
            text-align: center;
        }

        .item-word-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .item-word-zh {
            font-size: 1.4rem;
            font-weight: 750;
            color: var(--accent);
            line-height: 1.2;
        }

        .item-word-py {
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 600;
        }

        .item-word-meaning {
            font-size: 0.9rem;
            color: var(--text-main);
            font-weight: 500;
        }

        .item-action-btn {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #64748b;
            flex-shrink: 0;
            outline: none;
        }

        .item-action-btn:hover {
            transform: scale(1.1);
            background: #f1f5f9;
        }

        .item-action-btn.item-mastered {
            background: #dcfce7;
            border-color: #86efac;
            color: #15803d;
        }

        .list-filter-tabs {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .list-filter-btn {
            flex: 1;
            background-color: white;
            color: #64748b;
            border: 1px solid #cbd5e1;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            height: 32px;
        }

        .list-filter-btn:hover {
            background-color: #f1f5f9;
            color: #334155;
            border-color: #cbd5e1;
        }

        .list-filter-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2), 0 2px 4px -1px rgba(79, 70, 229, 0.1);
        }
    </style>
</head>
<body>

    <div id="loading" class="loading">Đang tải dữ liệu từ Google Sheet...</div>
    <div id="error" class="error" style="display: none;">Không thể tải dữ liệu. Vui lòng kiểm tra lại kết nối hoặc API.</div>

    <div class="container" id="main-content" style="display: none;">
        <div class="header">
            <div class="top-row">
                <h1 id="sheet-title">HSK</h1>
                <div class="top-actions">
                    <select id="hsk-level-select" class="select-box" onchange="changeHskLevel(event)">
                        <option value="HSK1">HSK1</option>
                        <option value="HSK2">HSK2</option>
                        <option value="HSK3">HSK3</option>
                        <option value="HSK4">HSK4</option>
                        <option value="HSK5">HSK5</option>
                        <option value="HSK6">HSK6</option>
                    </select>
                    <button id="tts-toggle" class="toggle-btn-icon active" onclick="toggleTts(event)" title="Âm thanh (TTS): BẬT">🔊</button>
                    <button id="display-mode-toggle" class="toggle-btn-icon" onclick="toggleDisplayMode(event)" title="Chế độ: Tuần tự">🔁</button>
                    <button id="filter-toggle" class="toggle-btn-icon" onclick="toggleFilter(event)" title="Xem: Tất cả">🗂️</button>
                </div>
            </div>
            <div class="pagination-bar">
                <div class="pagination-item">
                    <label style="font-size: 0.75rem; font-weight: 600; color: #64748b;">Số dòng:</label>
                    <select id="records-per-page-select" class="select-box" onchange="changeRecordsPerPage(event)">
                        <option value="10">10</option>
                        <option value="20">20</option>
                        <option value="30">30</option>
                        <option value="40">40</option>
                        <option value="50">50</option>
                        <option value="all" selected>Tất cả</option>
                    </select>
                </div>
                <div class="pagination-item">
                    <label id="page-select-label" style="font-size: 0.75rem; font-weight: 600; color: #64748b;">Trang:</label>
                    <select id="page-select" class="select-box" onchange="changePage(event)">
                    </select>
                </div>
            </div>
            <div class="progress-box">
                <div class="progress" id="progress-text">0 / 0</div>
                <div class="stats" id="stats-text">Thuộc: 0 | Chưa thuộc: 0</div>
            </div>
        </div>

        <div class="flashcard-wrapper" onclick="flipCard()">
            <div class="flashcard" id="card">
                <div class="card-face card-front">
                    <div class="card-action-corner">
                        <button id="mark-btn-front" class="action-icon-btn" onclick="toggleMastered(event)" title="Đánh dấu thuộc">✓</button>
                    </div>
                    <div class="word" id="front-word">...</div>
                    <div id="front-hanviet" style="font-size: 1.4rem; font-weight: bold; color: #475569; margin-top: -5px; margin-bottom: 10px; text-transform: uppercase; display: none;"></div>
                    <div class="hint">Nhấp để lật mặt sau hoặc vuốt để chuyển</div>
                </div>
                <div class="card-face card-back">
                    <div class="card-action-corner">
                        <button id="mark-btn-back" class="action-icon-btn" onclick="toggleMastered(event)" title="Đánh dấu thuộc">✓</button>
                    </div>
                    <div class="pinyin" id="back-pinyin">...</div>
                    <div id="back-hanviet" style="font-size: 1.0rem; font-weight: bold; color: #475569; margin-bottom: 15px; text-transform: uppercase; display: none;"></div>
                    <div class="meaning" id="back-meaning">...</div>
                    <div class="example-box" id="example-box">
                        <div class="example-cn" id="ex-cn">...</div>
                        <div class="example-py" id="ex-py">...</div>
                        <div class="example-vn" id="ex-vn">...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="word-list-toggle" class="btn-icon" onclick="toggleWordList(event)" title="Xem danh sách từ">📋</button>
            <button id="speak-card-btn" class="btn-icon active" onclick="speakCurrentCardManual(event)" title="Phát âm thẻ hiện tại">🔊</button>
            <button id="auto-play-btn" class="btn-icon" onclick="toggleAutoPlay()" title="Tự động lật & đọc: TẮT">▶</button>
        </div>
    </div>

    <script>
        let rawFlashcards = [];
        let filteredFlashcards = [];
        let paginatedFlashcards = [];
        let currentIndex = 0;
        
        // Trạng thái cấu hình chức năng thêm
        let isTtsEnabled = true;
        let currentFilter = 'all'; // all, mastered, unmastered
        let masteredIds = []; // Sẽ đọc bất đồng bộ từ IndexedDB/LocalStorage khi khởi động
        let displayMode = 'sequential'; // sequential, random
        let isAutoPlaying = false;
        let autoPlayMode = 1; // 1: Chỉ mặt trước, 2: 2 mặt phát âm Trung, 3: 2 mặt phát âm Trung + Việt
        let autoPlayTimeout = null;
        let silentAudioHelper = null;
        let autoPlayState = 0; // 0: Đọc từ (mặt trước), 1: Đọc ví dụ (mặt sau), 2: Đọc nghĩa của từ (mặt sau), 3: Chờ chuyển thẻ
        let autoPlayStateTimeLimit = 3000; // Thời gian chờ của state hiện tại (ms)
        let autoPlayElapsedTime = 0; // Thời gian đã trôi qua trong state hiện tại (ms)
        let lastTickTime = Date.now();
        let currentHskLevel = 'HSK1';
        let recordsPerPage = 'all'; // 10, 20, 30, 40, 50, all
        let currentPage = 1;
        let listFilterMode = 'all'; // all, mastered, unmastered
        let showListPinyin = true;
        let showListMeaning = true;
        let showListHanViet = true;

        // Biến kiểm soát vuốt chạm (Swipe) trên mobile
        let touchStartX = 0;
        let touchEndX = 0;
        let touchStartY = 0;
        let touchEndY = 0;

        // Cấu hình IndexedDB để lưu trữ setting
        const dbName = "HskFlashcardsDB";
        const dbVersion = 1;
        let db = null;

        function initDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, dbVersion);
                request.onerror = (event) => {
                    console.error("IndexedDB error:", event.target.error);
                    resolve(null);
                };
                request.onsuccess = (event) => {
                    db = event.target.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains("settings")) {
                        database.createObjectStore("settings", { keyPath: "key" });
                    }
                };
            });
        }

        function saveSetting(key, value) {
            if (!db) return;
            const transaction = db.transaction(["settings"], "readwrite");
            const store = transaction.objectStore("settings");
            store.put({ key: key, value: value });
        }

        function loadSetting(key, defaultValue) {
            return new Promise((resolve) => {
                if (!db) {
                    resolve(defaultValue);
                    return;
                }
                const transaction = db.transaction(["settings"], "readonly");
                const store = transaction.objectStore("settings");
                const request = store.get(key);
                request.onsuccess = (event) => {
                    if (event.target.result) {
                        resolve(event.target.result.value);
                    } else {
                        resolve(defaultValue);
                    }
                };
                request.onerror = () => {
                    resolve(defaultValue);
                };
            });
        }

        // Hàm xáo trộn mảng bằng giải thuật Fisher-Yates shuffle
        function shuffleList(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Fetch dữ liệu từ API dựa trên giá trị selectbox kết hợp hỗ trợ Offline/Cache chất lượng cao từ IndexedDB
        async function fetchData(preservePosition = false) {
            let hasCache = false;

            // Nạp lại danh sách masteredIds từ bộ lưu trữ để đồng bộ chính xác khi chuyển lớp
            const localMastered = JSON.parse(localStorage.getItem('hsk_mastered_ids') || '[]');
            masteredIds = await loadSetting('masteredIds', localMastered) || localMastered;

            // Thử nạp danh sách từ IndexedDB trước tiên (Trực quan hóa tức thời, không bị gián đoạn mạng)
            const cachedList = await loadSetting('rawFlashcards_' + currentHskLevel, null);
            if (cachedList && cachedList.length > 0) {
                rawFlashcards = cachedList;
                hasCache = true;
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                
                await applyFilterAndRender(preservePosition);
            } else {
                // Hiển thị màn hình chờ nếu chưa có sẵn cache của cấp độ này
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('loading').style.display = 'block';
                document.getElementById('error').style.display = 'none';
            }

            const baseUrl = 'https://hsk-gilt.vercel.app/api/gSheet';
            const spreadId = '105i_4pdAfadq4G-ELDmrnopWW7H4pv0EZUg87xsPxtc';
            const apiUrl = `${baseUrl}?sheet=${currentHskLevel}&act=read&spread=${spreadId}`;

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Network response error');
                
                const data = await response.json();
                
                if (data && data.values && data.values.length > 1) {
                    const rows = data.values.slice(1);
                    
                    const remoteFlashcards = rows.map(row => {
                        const item = {
                            stt: row[0] || '',
                            word: row[1] || '',
                            pinyin: row[2] || '',
                            meaning: row[3] || '',
                            exCn: row[4] || '',
                            exPy: row[5] || '',
                            exVn: row[6] || ''
                        };
                        const sheetStatus = row[7];
                        const mKey = currentHskLevel + '_' + item.stt;

                        if (sheetStatus === '1') {
                            if (!masteredIds.includes(mKey)) {
                                masteredIds.push(mKey);
                            }
                        } else if (sheetStatus === '0') {
                            const idx = masteredIds.indexOf(mKey);
                            if (idx > -1) {
                                masteredIds.splice(idx, 1);
                            }
                        }
                        return item;
                    }).filter(item => item.word);

                    // Đồng bộ ngược lại về IndexedDB và LocalStorage sau khi hòa trộn từ Google Sheets
                    localStorage.setItem('hsk_mastered_ids', JSON.stringify(masteredIds));
                    saveSetting('masteredIds', masteredIds);

                    if (remoteFlashcards.length > 0) {
                        // Lưu trữ danh sách mới tải từ server vào bộ nhớ IndexedDB
                        rawFlashcards = remoteFlashcards;
                        saveSetting('rawFlashcards_' + currentHskLevel, remoteFlashcards);

                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('error').style.display = 'none';
                        document.getElementById('main-content').style.display = 'flex';
                        
                        await applyFilterAndRender(preservePosition);
                    } else if (!hasCache) {
                        showError();
                    }
                } else if (!hasCache) {
                    showError();
                }
            } catch (error) {
                console.error('Error fetching data from server:', error);
                // Nếu chưa có cache thì mới hiển thị màn hình báo lỗi
                if (!hasCache) {
                    showError();
                }
            }
        }

        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }

        // Áp dụng bộ lọc danh sách thuộc / chưa thuộc và chế độ ngẫu nhiên cố định danh sách
        async function applyFilterAndRender(preservePosition = false) {
            let baseList = [];
            if (currentFilter === 'all') {
                baseList = [...rawFlashcards];
            } else if (currentFilter === 'mastered') {
                baseList = rawFlashcards.filter(item => masteredIds.includes(currentHskLevel + '_' + item.stt));
            } else if (currentFilter === 'unmastered') {
                baseList = rawFlashcards.filter(item => !masteredIds.includes(currentHskLevel + '_' + item.stt));
            }

            // Với yêu cầu mới, không xáo trộn toàn bộ list mà chỉ xáo trộn cục bộ theo phân trang
            filteredFlashcards = baseList;

            // Đồng bộ bộ đếm thống kê tổng
            const masteredCount = rawFlashcards.filter(item => masteredIds.includes(currentHskLevel + '_' + item.stt)).length;
            const unmasteredCount = rawFlashcards.length - masteredCount;
            document.getElementById('stats-text').innerText = `Thuộc: ${masteredCount} | Chưa thuộc: ${unmasteredCount}`;

            if (preservePosition) {
                const savedPage = await loadSetting('currentPage_' + currentHskLevel, 1);
                currentPage = parseInt(savedPage) || 1;
            } else {
                currentPage = 1;
                saveSetting('currentPage_' + currentHskLevel, currentPage);
            }
            await updatePagination(preservePosition);

            // Tải lại giao diện danh sách từ trong modal nếu đang mở để đồng bộ ngay tức thời
            if (document.getElementById('word-list-modal').classList.contains('open')) {
                renderWordListItems(document.getElementById('word-search').value);
            }
        }

        // Lấy danh sách từ tuần tự của trang hiện tại
        function getPageSequentialItems() {
            if (recordsPerPage === 'all' || filteredFlashcards.length === 0) {
                return [...filteredFlashcards];
            } else {
                const size = parseInt(recordsPerPage);
                const totalPages = Math.ceil(filteredFlashcards.length / size);
                if (currentPage > totalPages) currentPage = 1;
                const start = (currentPage - 1) * size;
                const end = start + size;
                return filteredFlashcards.slice(start, end);
            }
        }

        // Cập nhật giao diện phân trang dựa trên số records hiển thị
        async function updatePagination(preservePosition = false) {
            const pageSelect = document.getElementById('page-select');
            const pageSelectLabel = document.getElementById('page-select-label');
            pageSelect.innerHTML = '';

            const pageItems = getPageSequentialItems();
            if (displayMode === 'random') {
                paginatedFlashcards = shuffleList([...pageItems]);
            } else {
                paginatedFlashcards = pageItems;
            }

            if (recordsPerPage === 'all' || filteredFlashcards.length === 0) {
                pageSelect.style.display = 'none';
                pageSelectLabel.style.display = 'none';
            } else {
                const size = parseInt(recordsPerPage);
                const totalPages = Math.ceil(filteredFlashcards.length / size);

                pageSelect.style.display = 'inline-block';
                pageSelectLabel.style.display = 'inline-block';

                for (let i = 1; i <= totalPages; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.innerText = `Trang ${i}`;
                    if (i === currentPage) {
                        option.selected = true;
                    }
                    pageSelect.appendChild(option);
                }
            }

            if (preservePosition) {
                const savedIndex = await loadSetting('currentIndex_' + currentHskLevel, 0);
                currentIndex = parseInt(savedIndex) || 0;
                if (currentIndex >= paginatedFlashcards.length) {
                    currentIndex = 0;
                }
            } else {
                currentIndex = 0;
                saveSetting('currentIndex_' + currentHskLevel, currentIndex);
            }
            renderCard();
        }

        function changeRecordsPerPage(event) {
            recordsPerPage = event.target.value;
            saveSetting('recordsPerPage', recordsPerPage);
            currentPage = 1;
            saveSetting('currentPage_' + currentHskLevel, currentPage);
            updatePagination(false);
        }

        function changePage(event) {
            currentPage = parseInt(event.target.value);
            saveSetting('currentPage_' + currentHskLevel, currentPage);
            const cardElement = document.getElementById('card');
            if (cardElement && !isTransitioning) {
                isTransitioning = true;
                
                // Clear any vertical flip classes before horizontal page flip starts to prevent rotation conflicts
                cardElement.classList.remove('flipped');
                cardElement.classList.remove('flipped-vertical');
                
                cardElement.classList.add('page-flip-next-out');
                setTimeout(() => {
                    updatePagination(false);
                    cardElement.classList.remove('page-flip-next-out');
                    cardElement.classList.add('page-flip-next-in');
                    setTimeout(() => {
                        cardElement.classList.remove('page-flip-next-in');
                        isTransitioning = false;
                    }, 300);
                }, 300);
            } else {
                updatePagination(false);
            }
        }

        // Hiển thị nội dung thẻ hiện tại và điều khiển luồng phát âm thanh TTS
        function renderCard() {
            const cardElement = document.getElementById('card');
            cardElement.classList.remove('flipped');
            cardElement.classList.remove('flipped-vertical');

            if (paginatedFlashcards.length === 0) {
                document.getElementById('front-word').innerText = "Trống";
                document.getElementById('back-pinyin').innerText = "";
                document.getElementById('back-meaning').innerText = "Không có thẻ nào trong danh mục này";
                document.getElementById('example-box').style.display = 'none';
                document.getElementById('progress-text').innerText = "0 / 0";
                return;
            }

            const current = paginatedFlashcards[currentIndex];
            
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${paginatedFlashcards.length}`;
            document.getElementById('front-word').innerText = current.word;
            document.getElementById('back-pinyin').innerText = current.pinyin;
            document.getElementById('back-meaning').innerText = current.meaning;

            const hanViet = (window.getHanVietForWord && typeof window.getHanVietForWord === 'function') ? window.getHanVietForWord(current.word) : '';
            const frontHvEl = document.getElementById('front-hanviet');
            const backHvEl = document.getElementById('back-hanviet');
            if (showListHanViet && hanViet && hanViet !== ' ') {
                backHvEl.innerText = `[${hanViet}]`;
                backHvEl.style.display = 'block';
            } else {
                backHvEl.style.display = 'none';
            }
            
            if(current.exCn) {
                document.getElementById('example-box').style.display = 'block';
                
                // Tô màu khác (primary) cho từ gốc có trong ví dụ chữ Hán (vốn có màu đỏ accent)
                if (current.word && current.exCn.includes(current.word)) {
                    const regex = new RegExp(current.word, 'g');
                    document.getElementById('ex-cn').innerHTML = current.exCn.replace(regex, `<span style="color: var(--primary); font-weight: bold;">${current.word}</span>`);
                } else {
                    document.getElementById('ex-cn').innerText = current.exCn;
                }
                
                document.getElementById('ex-py').innerText = current.exPy;
                document.getElementById('ex-vn').innerText = current.exVn;
            } else {
                document.getElementById('example-box').style.display = 'none';
            }

            // Đồng bộ hóa trạng thái nút Đánh dấu thuộc
            const isMastered = masteredIds.includes(currentHskLevel + '_' + current.stt);
            const frontMarkBtn = document.getElementById('mark-btn-front');
            const backMarkBtn = document.getElementById('mark-btn-back');
            if (isMastered) {
                frontMarkBtn.classList.add('status-mastered');
                backMarkBtn.classList.add('status-mastered');
            } else {
                frontMarkBtn.classList.remove('status-mastered');
                backMarkBtn.classList.remove('status-mastered');
            }

            // Nếu đang trong chế độ chạy tự động, không kích hoạt speak tại renderCard để tránh trùng lặp
            if (!isAutoPlaying) {
                // Phát âm tự động khi chuyển thẻ nếu bật TTS - Mặc định luôn đọc từ chính khi chuyển thẻ
                if (isTtsEnabled) {
                    speakUniversalText(current.word, false);
                }
            }
        }

        // Hàm lật thẻ và đọc nội dung tương ứng
        function flipCard() {
            if (paginatedFlashcards.length === 0 || isTransitioning) return;
            const cardElement = document.getElementById('card');
            
            cardElement.classList.toggle('flipped-vertical');
            cardElement.classList.remove('flipped');
            currentFlipDirection = 'normal'; // Reset trạng thái hướng lật sau click trực tiếp
            
            const current = paginatedFlashcards[currentIndex];

            // Chỉ kích hoạt speak thủ công khi không chạy tự động
            if (!isAutoPlaying) {
                // Phát âm tự động khi lật thẻ - Đọc theo mặt hiển thị sau khi lật
                if (isTtsEnabled) {
                    const isFlippedNow = cardElement.classList.contains('flipped-vertical');
                    const textToSpeak = isFlippedNow ? (current.exCn || current.word) : current.word;
                    speakUniversalText(textToSpeak, false);
                }
            }
        }

        let currentFlipDirection = 'normal';
        let isTransitioning = false;

        // Chuyển sang thẻ tiếp theo
        function nextCard() {
            if (paginatedFlashcards.length === 0 || isTransitioning) return;
            if (isAutoPlaying) {
                toggleAutoPlay(true);
            }
            isTransitioning = true;
            
            const cardElement = document.getElementById('card');
            
            // Clear any vertical flip classes before horizontal page flip starts to prevent rotation conflicts
            cardElement.classList.remove('flipped');
            cardElement.classList.remove('flipped-vertical');
            
            cardElement.classList.add('page-flip-next-out');
            
            setTimeout(() => {
                let nextIdx = (currentIndex + 1) % paginatedFlashcards.length;
                if (nextIdx === 0 && displayMode === 'random' && paginatedFlashcards.length > 1) {
                    paginatedFlashcards = shuffleList([...getPageSequentialItems()]);
                }
                currentIndex = nextIdx;
                saveSetting('currentIndex_' + currentHskLevel, currentIndex);
                renderCard();
                cardElement.classList.remove('page-flip-next-out');
                cardElement.classList.add('page-flip-next-in');
                
                setTimeout(() => {
                    cardElement.classList.remove('page-flip-next-in');
                    isTransitioning = false;
                }, 300);
            }, 300);
        }

        // Quay lại thẻ trước đó
        function prevCard() {
            if (paginatedFlashcards.length === 0 || isTransitioning) return;
            if (isAutoPlaying) {
                toggleAutoPlay(true);
            }
            isTransitioning = true;
            
            const cardElement = document.getElementById('card');
            
            // Clear any vertical flip classes before horizontal page flip starts to prevent rotation conflicts
            cardElement.classList.remove('flipped');
            cardElement.classList.remove('flipped-vertical');
            
            cardElement.classList.add('page-flip-prev-out');
            
            setTimeout(() => {
                let prevIdx = (currentIndex - 1 + paginatedFlashcards.length) % paginatedFlashcards.length;
                if (currentIndex === 0 && displayMode === 'random' && paginatedFlashcards.length > 1) {
                    paginatedFlashcards = shuffleList([...getPageSequentialItems()]);
                }
                currentIndex = prevIdx;
                saveSetting('currentIndex_' + currentHskLevel, currentIndex);
                renderCard();
                cardElement.classList.remove('page-flip-prev-out');
                cardElement.classList.add('page-flip-prev-in');
                
                setTimeout(() => {
                    cardElement.classList.remove('page-flip-prev-in');
                    isTransitioning = false;
                }, 300);
            }, 300);
        }

        // Quay lại trang trước đó (bàn phím số 7)
        function prevPage() {
            if (recordsPerPage === 'all' || isTransitioning) return;
            const size = parseInt(recordsPerPage);
            const totalPages = Math.ceil(filteredFlashcards.length / size);

            if (isAutoPlaying) {
                toggleAutoPlay(true);
            }

            if (currentPage <= 1) {
                currentPage = totalPages;
            } else {
                currentPage--;
            }
            saveSetting('currentPage_' + currentHskLevel, currentPage);

            const pageSelect = document.getElementById('page-select');
            if (pageSelect) {
                pageSelect.value = currentPage;
            }

            isTransitioning = true;
            const cardElement = document.getElementById('card');
            if (cardElement) {
                cardElement.classList.remove('flipped');
                cardElement.classList.remove('flipped-vertical');
                cardElement.classList.add('page-flip-prev-out');

                setTimeout(() => {
                    updatePagination(false);
                    cardElement.classList.remove('page-flip-prev-out');
                    cardElement.classList.add('page-flip-prev-in');
                    setTimeout(() => {
                        cardElement.classList.remove('page-flip-prev-in');
                        isTransitioning = false;
                    }, 300);
                }, 300);
            } else {
                updatePagination(false);
                isTransitioning = false;
            }
        }

        // Tiến thêm 1 trang (bàn phím số 9)
        function nextPage() {
            if (recordsPerPage === 'all' || isTransitioning) return;
            const size = parseInt(recordsPerPage);
            const totalPages = Math.ceil(filteredFlashcards.length / size);

            if (isAutoPlaying) {
                toggleAutoPlay(true);
            }

            if (currentPage >= totalPages) {
                currentPage = 1;
            } else {
                currentPage++;
            }
            saveSetting('currentPage_' + currentHskLevel, currentPage);

            const pageSelect = document.getElementById('page-select');
            if (pageSelect) {
                pageSelect.value = currentPage;
            }

            isTransitioning = true;
            const cardElement = document.getElementById('card');
            if (cardElement) {
                cardElement.classList.remove('flipped');
                cardElement.classList.remove('flipped-vertical');
                cardElement.classList.add('page-flip-next-out');

                setTimeout(() => {
                    updatePagination(false);
                    cardElement.classList.remove('page-flip-next-out');
                    cardElement.classList.add('page-flip-next-in');
                    setTimeout(() => {
                        cardElement.classList.remove('page-flip-next-in');
                        isTransitioning = false;
                    }, 300);
                }, 300);
            } else {
                updatePagination(false);
                isTransitioning = false;
            }
        }

        // Bật / Tắt trạng thái TTS phát âm tự động
        function toggleTts(event) {
            event.stopPropagation();
            isTtsEnabled = !isTtsEnabled;
            saveSetting('isTtsEnabled', isTtsEnabled);
            const ttsBtn = document.getElementById('tts-toggle');
            if (isTtsEnabled) {
                ttsBtn.innerHTML = "🔊";
                ttsBtn.title = "Âm thanh (TTS): BẬT";
                ttsBtn.classList.add('active');
                // Phát lại nội dung tương ứng với mặt hiện tại khi kích hoạt lại
                if (paginatedFlashcards.length > 0 && !isAutoPlaying) {
                    const current = paginatedFlashcards[currentIndex];
                    const cardElement = document.getElementById('card');
                    const isFlippedNow = cardElement.classList.contains('flipped-vertical');
                    const textToSpeak = isFlippedNow ? (current.exCn || current.word) : current.word;
                    speakUniversalText(textToSpeak, false);
                }
            } else {
                ttsBtn.innerHTML = "🔇";
                ttsBtn.title = "Âm thanh (TTS): TẮT";
                ttsBtn.classList.remove('active');
                if (isAutoPlaying) {
                    toggleAutoPlay(true); // Tắt tự động chạy nếu tắt TTS
                }
                if (typeof window.stopSpeak === 'function') {
                    window.stopSpeak();
                }
            }
        }

        // Chuyển đổi chế độ hiển thị danh sách (Tuần tự / Ngẫu nhiên)
        async function toggleDisplayMode(event) {
            event.stopPropagation();
            
            // Lấy stt của từ hiện tại để lát duy trì đúng từ này
            let currentStt = null;
            if (paginatedFlashcards.length > 0 && paginatedFlashcards[currentIndex]) {
                currentStt = paginatedFlashcards[currentIndex].stt;
            }
            
            const modeBtn = document.getElementById('display-mode-toggle');
            if (displayMode === 'sequential') {
                displayMode = 'random';
                modeBtn.innerHTML = "🔀";
                modeBtn.title = "Chế độ: Ngẫu nhiên";
                modeBtn.classList.add('active');
            } else {
                displayMode = 'sequential';
                modeBtn.innerHTML = "🔁";
                modeBtn.title = "Chế độ: Tuần tự";
                modeBtn.classList.remove('active');
            }
            saveSetting('displayMode', displayMode);
            
            // Bảo toàn trang hiện tại (gọi với preservePosition = true)
            await applyFilterAndRender(true);
            
            // Tìm lại vị trí index của từ đang học trong list trang mới sau khi đã chuyển ngẫu nhiên / tuần tự
            if (currentStt && paginatedFlashcards.length > 0) {
                const foundIndex = paginatedFlashcards.findIndex(item => item.stt === currentStt);
                if (foundIndex !== -1) {
                    currentIndex = foundIndex;
                    saveSetting('currentIndex_' + currentHskLevel, currentIndex);
                }
            }
            renderCard();
        }

        // Khởi tạo audio im lặng giúp giữ tiến trình chạy ngầm mượt mà trên iOS Safari
        function initSilentAudioHelper() {
            if (!silentAudioHelper) {
                // File WAV im lặng khoảng 1 giây, lặp liên tiếp để duy trì luồng phát phương tiện nền trên iOS
                silentAudioHelper = new Audio("data:audio/wav;base64,UklGRpwAAABXQVZFZm10IBAAAAABAAEAIlYAAESsAAACABAAZGF0YXBCAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA");
                silentAudioHelper.loop = true;
                
                // Đăng ký bộ lắng nghe timeupdate hoạt động ngay cả khi tắt màn hình khóa trên iOS
                silentAudioHelper.addEventListener('timeupdate', () => {
                    if (isAutoPlaying) {
                        runAutoPlayTimeUpdate();
                    }
                });
            }
        }

        // Cập nhật thời gian trôi qua của State Machine
        function runAutoPlayTimeUpdate() {
            if (!isAutoPlaying || paginatedFlashcards.length === 0) return;
            
            const now = Date.now();
            const delta = now - lastTickTime;
            lastTickTime = now;
            
            // Xử lý bù đắp nếu delta bị nhảy lệch quá lớn khi trình duyệt bị treo tạm thời
            if (delta <= 0 || delta > 2000) {
                autoPlayElapsedTime += 250;
            } else {
                autoPlayElapsedTime += delta;
            }
            
            if (autoPlayElapsedTime >= autoPlayStateTimeLimit) {
                autoPlayElapsedTime = 0;
                advanceAutoPlayState();
            }
        }

        // State Machine điều hướng Autoplay chạy tốt kể cả khi khóa màn hình
        function advanceAutoPlayState() {
            if (!isAutoPlaying || paginatedFlashcards.length === 0) return;
            
            const cardElement = document.getElementById('card');
            const current = paginatedFlashcards[currentIndex];
            if (!current) return;
            
            if (autoPlayState === 0) {
                // Hết thời gian đọc mặt trước (3s) -> Lật và đọc mặt sau
                if (autoPlayMode === 1) {
                    // Chế độ 1: Chỉ đọc mặt trước -> Chuyển sang State 3 (Chờ chuyển thẻ)
                    autoPlayState = 3;
                    autoPlayStateTimeLimit = document.hidden ? 50 : 600;
                    transitionToNextCardAutoPlay();
                } else {
                    // Chế độ 2 & Chế độ 3: Lật mặt sau và đọc tiếng Trung
                    autoPlayState = 1;
                    autoPlayStateTimeLimit = (autoPlayMode === 3) ? 4000 : 4500;
                    
                    if (cardElement) {
                        cardElement.classList.add('flipped-vertical');
                    }
                    const textToSpeak = current.exCn || current.word;
                    speakUniversalText(textToSpeak, false);
                }
            } else if (autoPlayState === 1) {
                // Hết thời gian đọc tiếng Trung mặt sau
                if (autoPlayMode === 2) {
                    // Chế độ 2: Chỉ đọc Trung -> Chuyển sang State 3 (Chờ chuyển thẻ)
                    autoPlayState = 3;
                    autoPlayStateTimeLimit = document.hidden ? 50 : 600;
                    transitionToNextCardAutoPlay();
                } else if (autoPlayMode === 3) {
                    // Chế độ 3: Đọc tiếp nghĩa tiếng Việt
                    autoPlayState = 2;
                    autoPlayStateTimeLimit = 3500;
                    
                    const textToSpeakVn = current.exVn || current.meaning;
                    speakUniversalText(textToSpeakVn, true);
                }
            } else if (autoPlayState === 2) {
                // Hết thời gian đọc nghĩa Việt -> Chuyển sang State 3 (Chờ chuyển thẻ)
                autoPlayState = 3;
                autoPlayStateTimeLimit = document.hidden ? 50 : 600;
                transitionToNextCardAutoPlay();
            } else if (autoPlayState === 3) {
                // Hoàn tất chờ chuyển thẻ -> Reset trạng thái về State 0 và đọc từ mới
                autoPlayState = 0;
                autoPlayStateTimeLimit = 3000;
                autoPlayElapsedTime = 0;
                
                if (cardElement) {
                    cardElement.classList.remove('flipped');
                    cardElement.classList.remove('flipped-vertical');
                }
                speakUniversalText(current.word, false);
            }
        }

        // Bật / Tắt chế độ tự động đọc chuyển từ tuần tự/ngẫu nhiên luân phiên 3 chế độ

            } else if (autoPlayMode === 2) {

        // Chuyển thẻ tự động trong quá trình lặp Autoplay
        function transitionToNextCardAutoPlay() {
            if (!isAutoPlaying) return;
            
            const cardElement = document.getElementById('card');
            
            let nextIdx = (currentIndex + 1) % paginatedFlashcards.length;
            if (nextIdx === 0 && displayMode === 'random' && paginatedFlashcards.length > 1) {
                paginatedFlashcards = shuffleList([...getPageSequentialItems()]);
            }
            currentIndex = nextIdx;
            saveSetting('currentIndex_' + currentHskLevel, currentIndex);

            if (document.hidden) {
                // Tắt hoàn toàn transition để xử lý đồng bộ và tức thời khi tắt màn hình/chạy ngầm
                renderCard();
                autoPlayState = 3; // Tiếp tục ở State 3
                autoPlayStateTimeLimit = 50; // Chờ 50ms rồi tự động chuyển qua State 0 để phát tiếng
                autoPlayElapsedTime = 0;
            } else {
                isTransitioning = true;
                if (cardElement) {
                    cardElement.classList.remove('flipped');
                    cardElement.classList.remove('flipped-vertical');
                    cardElement.classList.add('page-flip-next-out');
                }
                
                setTimeout(() => {
                    renderCard();
                    if (cardElement) {
                        cardElement.classList.remove('page-flip-next-out');
                        cardElement.classList.add('page-flip-next-in');
                    }
                    
                    setTimeout(() => {
                        if (cardElement) {
                            cardElement.classList.remove('page-flip-next-in');
                        }
                        isTransitioning = false;
                    }, 300);
                }, 300);
            }
        }

        // Cập nhật trạng thái nhớ/chưa nhớ trực tiếp lên Google Sheet qua API
        async function updateMasteredOnSheet(wordItem, isMastered) {
            const baseUrl = 'https://hsk-gilt.vercel.app/api/gSheet';
            const spreadId = '105i_4pdAfadq4G-ELDmrnopWW7H4pv0EZUg87xsPxtc';

            const rowData = [
                wordItem.stt || '',
                wordItem.word || '',
                wordItem.pinyin || '',
                wordItem.meaning || '',
                wordItem.exCn || '',
                wordItem.exPy || '',
                wordItem.exVn || '',
                isMastered ? '1' : '0'
            ];

            try {
                const response = await fetch(baseUrl, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        act: 'updateByPosVal',
                        pos: 1,
                        val: wordItem.word,
                        sheet: currentHskLevel,
                        spread: spreadId,
                        data: JSON.stringify(rowData)
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP status error: ${response.status}`);
                }

                const result = await response.json();
                console.log('Cập nhật trạng thái lên Google Sheet thành công:', result);
            } catch (error) {
                console.error('Lỗi khi cập nhật trạng thái lên Google Sheet:', error);
            }
        }

        // Thêm / Xóa từ khỏi danh sách đã thuộc (Lưu IndexedDB và LocalStorage)
        function toggleMastered(event) {
            event.stopPropagation();
            if (paginatedFlashcards.length === 0) return;
            const current = paginatedFlashcards[currentIndex];
            const mKey = currentHskLevel + '_' + current.stt;
            
            const index = masteredIds.indexOf(mKey);
            let isNowMastered = false;
            if (index > -1) {
                masteredIds.splice(index, 1);
            } else {
                masteredIds.push(mKey);
                isNowMastered = true;
            }
            localStorage.setItem('hsk_mastered_ids', JSON.stringify(masteredIds));
            saveSetting('masteredIds', masteredIds);

            // Cập nhật lại giao diện bộ đếm thống kê tổng
            const masteredCount = rawFlashcards.filter(item => masteredIds.includes(currentHskLevel + '_' + item.stt)).length;
            const unmasteredCount = rawFlashcards.length - masteredCount;
            document.getElementById('stats-text').innerText = `Thuộc: ${masteredCount} | Chưa thuộc: ${unmasteredCount}`;

            // Gửi bất đồng bộ lên Google Sheet
            updateMasteredOnSheet(current, isNowMastered);

            // Nếu đang xem ở chế độ lọc Thuộc hoặc Chưa thuộc, xóa thẻ ra khỏi danh sách đang render hiện tại
            if (currentFilter !== 'all') {
                if (isAutoPlaying) toggleAutoPlay(true);
                applyFilterAndRender(true);
            } else {
                // Nếu ở chế độ Tất cả, chỉ cập nhật trạng thái icon Active của thẻ
                const isMasteredNow = masteredIds.includes(mKey);
                const frontMarkBtn = document.getElementById('mark-btn-front');
                const backMarkBtn = document.getElementById('mark-btn-back');
                if (isMasteredNow) {
                    frontMarkBtn.classList.add('status-mastered');
                    backMarkBtn.classList.add('status-mastered');
                } else {
                    frontMarkBtn.classList.remove('status-mastered');
                    backMarkBtn.classList.remove('status-mastered');
                }
            }
        }

        // Lăng nghe sự kiện điều khiển bàn phím Máy tính (Desktop PC)
        document.addEventListener('keydown', (event) => {
            // Tránh kích hoạt hotkeys khi đang gõ vào ô nhập liệu hoặc ô tìm kiếm
            if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA' || event.target.isContentEditable) {
                if (event.key === 'Escape') {
                    const wordListModal = document.getElementById('word-list-modal');
                    const isModalOpen = wordListModal && wordListModal.classList.contains('open');
                    if (isModalOpen) {
                        event.preventDefault();
                        closeWordList();
                    }
                }
                return;
            }

            // Kiểm tra nếu danh sách từ đang mở
            const wordListModal = document.getElementById('word-list-modal');
            const isModalOpen = wordListModal && wordListModal.classList.contains('open');

            if (isModalOpen) {
                if (event.key === 'Escape') {
                    event.preventDefault();
                    closeWordList();
                }
                return; // Tạm dừng mọi phím di chuyển/lật thẻ lúc gõ tìm kiếm từ
            }

            if (document.getElementById('main-content').style.display === 'none') return;

            if (event.key === 'ArrowRight' || event.key === ' ') {
                event.preventDefault();
                nextCard();
            } else if (event.key === 'ArrowLeft') {
                event.preventDefault();
                prevCard();
            } else if (event.key === 'ArrowUp' || event.key === 'ArrowDown') {
                event.preventDefault();
                currentFlipDirection = 'vertical';
                flipCard();
            } else if (event.key.toLowerCase() === 'm' || event.key === 'Enter') {
                event.preventDefault();
                toggleMastered(event);
            } else if (event.key.toLowerCase() === 'p') {
                event.preventDefault();
                toggleAutoPlay();
            } else if (event.key === '7') {
                event.preventDefault();
                prevPage();
            } else if (event.key === '9') {
                event.preventDefault();
                nextPage();
            }
        });

        // Xử lý vuốt màn hình (Swipe Gesture) trên thiết bị di động
        const cardWrapper = document.querySelector('.flashcard-wrapper');

        cardWrapper.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        cardWrapper.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        cardWrapper.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipeGesture();
        }, { passive: true });

        function handleSwipeGesture() {
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            const threshold = 50; // Khoảng cách vuốt tối thiểu pixel

            // Ưu tiên xác định vuốt ngang hay vuốt dọc dựa trên khoảng cách lớn nhất
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > threshold) {
                    if (diffX > 0) {
                        prevCard(); // Vuốt sang phải -> Quay lại thẻ trước
                    } else {
                        nextCard(); // Vuốt sang trái -> Chuyển thẻ tiếp theo
                    }
                }
            } else {
                if (Math.abs(diffY) > threshold) {
                    currentFlipDirection = 'vertical';
                    flipCard(); // Vuốt dọc -> Kích hoạt lật thẻ đứng
                }
            }
        }

        // Hàm phát âm chung: Chỉ gọi đến TTS hệ thống qua window.speakCommon
        function speakUniversalText(text, isVietnamese = false) {
            if (!text) return;
            const voice = isVietnamese ? "vi-VN-NamMinhNeural" : "zh-CN-XiaoxiaoNeural";

            if (typeof window.speakCommon === 'function') {
                window.speakCommon({ text: text, voice: voice });

            }
        }

        function speakWordFromList(event, word) {
