<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Phát Âm Pinyin Tiếng Trung Toàn Diện</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #cbd5e1;
            --th-bg: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
        }

        /* Thanh lọc Thanh mẫu nhanh */
        .filter-container {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            justify-content: center;
            border: 1px solid #e2e8f0;
        }

        .filter-btn {
            background: var(--bg-main);
            border: 1px solid #e2e8f0;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Khung chứa bảng cuộn */
        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
            border: 1px solid var(--border);
        }

        /* Thiết kế Bảng phát âm duy nhất */
        .pinyin-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            min-width: 600px;
        }

        .pinyin-table th {
            background-color: var(--th-bg);
            color: var(--text-main);
            font-weight: 700;
            padding: 1rem;
            border-bottom: 2px solid var(--border);
            font-size: 1rem;
        }

        .pinyin-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
        }

        .pinyin-table tr:hover {
            background-color: #f1f5f9;
        }

        .pinyin-table tr:last-child td {
            border-bottom: none;
        }

        /* Cột tiêu đề âm gốc */
        .row-base-title {
            font-weight: bold;
            color: var(--primary);
            font-size: 1.1rem;
            background-color: #f8fafc;
            border-right: 1px solid var(--border);
            width: 15%;
        }

        /* Thẻ nút bấm phát âm bên trong ô bảng */
        .cell-tone-btn {
            display: block;
            width: 100%;
            background: white;
            border: 1px solid #e2e8f0;
            padding: 0.6rem;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 1px 2px rgb(0 0 0 / 0.05);
        }

        .cell-tone-btn:hover {
            background-color: #e0e7ff;
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
        }

        .cell-tone-btn:active {
            transform: translateY(1px);
        }

        /* Nhãn hiển thị phụ trợ cho Thanh Điệu ở Header */
        .tone-label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: normal;
            margin-top: 0.2rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Bảng Phát Âm Tiếng Trung Tập Trung</h1>
        <p>Bảng ma trận so sánh 4 thanh điệu song song. Nhấp vào âm tiết bất kỳ để nghe giọng đọc bản xứ.</p>
    </header>

    <div class="filter-container" id="filterContainer">
        <button class="filter-btn active" onclick="filterInitial('all')">Tất cả các âm</button>
    </div>

    <div class="table-container">
        <table class="pinyin-table">
            <thead>
                <tr>
                    <th style="border-right: 1px solid var(--border);">Âm gốc</th>
                    <th>Thanh 1 ( ¯ )<span class="tone-label">Cao, phẳng</span></th>
                    <th>Thanh 2 ( ´ )<span class="tone-label">Lên giọng</span></th>
                    <th>Thanh 3 ( ˇ )<span class="tone-label">Xuống rồi lên</span></th>
                    <th>Thanh 4 ( ` )<span class="tone-label">Nhấn mạnh, xuống</span></th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

    Object.keys(mapData).forEach(initial => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = initial === 'zero_initial' ? 'Vần độc lập' : initial;
        btn.onclick = () => filterInitial(initial, btn);
        filterContainer.appendChild(btn);
    });

    // API phát âm Text-to-Speech tiếng Trung
    function speakPinyin(text) {
        window.speechSynthesis.cancel(); // Dừng âm trước đó ngay lập tức để tránh chồng chéo
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.8; // Đặt tốc độ hơi chậm để nghe rõ độ cao dấu
        window.speechSynthesis.speak(utterance);
    }

    // Hàm render bảng dữ liệu tập trung
    function renderTable(targetInitial = 'all') {
        tableBody.innerHTML = '';

        Object.keys(mapData).forEach(initial => {
            if (targetInitial !== 'all' && targetInitial !== initial) return;

            const syllables = mapData[initial];
            
            Object.keys(syllables).forEach(base => {
                const tr = document.createElement('tr');

                // Ô 1: Hiển thị âm gốc ghép vần (ví dụ: ba, pa, ma...)
                const tdBase = document.createElement('td');
                tdBase.className = 'row-base-title';
                tdBase.textContent = base;
                tr.appendChild(tdBase);

                // Các ô tiếp theo: 4 thanh điệu song song trên cùng 1 hàng
                const tones = syllables[base];
                for (let i = 0; i < 4; i++) {
                    const tdTone = document.createElement('td');
                    
                    if (tones[i]) {
                        const btn = document.createElement('button');
                        btn.className = 'cell-tone-btn';
                        btn.textContent = tones[i];
                        btn.onclick = () => speakPinyin(tones[i]);
                        tdTone.appendChild(btn);
                    } else {
                        tdTone.textContent = '-';
                    }
                    
                    tr.appendChild(tdTone);
                }

                tableBody.appendChild(tr);
            });
        });
    }

    // Xử lý khi nhấn bộ lọc thanh mẫu
    function filterInitial(initial, clickedBtn = null) {
        const buttons = filterContainer.getElementsByClassName('filter-btn');
        for (let btn of buttons) {
            btn.classList.remove('active');
        }
        
        if (clickedBtn) {
            clickedBtn.classList.add('active');
        } else {
            buttons[0].classList.add('active');
        }

        renderTable(initial);
    }

    // Chạy tải dữ liệu toàn bộ lần đầu tiên
    renderTable('all');
