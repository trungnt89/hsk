<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player Pro - Offline Support</title>
	<script src="../com/assistive.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; overflow: hidden; }
        
        .app-container { display: flex; flex-direction: column; height: 100vh; max-width: 1000px; margin: auto; border-left: 1px solid #333; border-right: 1px solid #333; }
        
        /* Header */
        header { padding: 20px; background: #1f1f1f; text-align: center; border-bottom: 1px solid #333; }
        header h2 { font-size: 1.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #1db954; margin-bottom: 10px; }

        .settings-panel { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; background: #282828; padding: 10px; border-radius: 8px; font-size: 0.85rem; }
        .settings-panel input, .settings-panel select { background: #333; color: white; border: 1px solid #444; padding: 5px; border-radius: 4px; max-width: 140px; text-overflow: ellipsis; }
        #timer-display { color: #1db954; font-weight: bold; min-width: 80px; }

        /* Player Area */
        .player-controls { padding: 20px; background: #1f1f1f; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        audio { width: 100%; filter: invert(100%); }

        /* Playlist Area */
        .playlist-container { flex: 1; overflow-y: auto; background: #121212; }
        .playlist { list-style: none; }
        .playlist li { 
            padding: 15px 20px; border-bottom: 1px solid #222; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .playlist li:hover { background: #282828; }
        .playlist li.active { background: #333; border-left: 4px solid #1db954; }
        .file-info { flex: 1; overflow: hidden; }
        .file-name { display: block; margin-bottom: 4px; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: #444; color: #bbb; }
        .status-badge.cached { background: #1db954; color: white; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* Safari Activation Overlay */
        #activation-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; cursor: pointer; }
        #activation-overlay h1 { color: #1db954; margin-bottom: 20px; }
        #activation-overlay p { font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="activation-overlay" onclick="activateAudio()">
    <h1>HỆ THỐNG ĐÃ SẴN SÀNG</h1>
    <p>Chạm vào màn hình để kích hoạt báo thức và âm thanh</p>
    <small style="margin-top:20px; color:#888;">(Bắt buộc đối với Safari iOS)</small>
</div>

<div class="app-container">
    <header>
        <h2 id="current-title">Sẵn sàng</h2>
        <div class="settings-panel">
            <span>Hẹn giờ:</span>
            <input type="time" id="alarm-time">
            <select id="alarm-file-select">
                <option value="">-- Chọn bài --</option>
            </select>
            <span id="timer-display">00:00:00</span>
        </div>
    </header>

    <div class="playlist-container">
        <ul class="playlist" id="playlist">
            <li style="justify-content: center;">Đang khởi tạo hệ thống...</li>
        </ul>
    </div>

    <div class="player-controls">
        <audio id="audio-player" controls></audio>
    </div>
</div>

<script>
    const API_BASE = "https://hsk-gilt.vercel.app/api/gRecorder";
    const FOLDER_ID = "1KCfoWrPS5RtDzsFFWINH3_Xq8MApjXlm";
    const DB_NAME = "AudioOfflineDB";
    const STORE_NAME = "audioFiles";
    
    const player = document.getElementById('audio-player');
    const playlistElem = document.getElementById('playlist');
    const titleElem = document.getElementById('current-title');
    const alarmTimeInput = document.getElementById('alarm-time');
    const alarmSelect = document.getElementById('alarm-file-select');
    const timerDisplay = document.getElementById('timer-display');

    let db;
    let alarmInterval;
    let isAudioActivated = false;

    // 0. Kích hoạt Audio Safari
    function activateAudio() {
        console.log("[LOG] Người dùng đã click kích hoạt audio.");
        isAudioActivated = true;
        player.play().then(() => {
            player.pause();
            player.currentTime = 0;
            document.getElementById('activation-overlay').style.display = 'none';
            console.log("[LOG] Audio đã được mở khóa và Overlay đã ẩn.");
        }).catch(err => {
            console.error("[LOG ERROR] Lỗi kích hoạt mồi audio:", err);
        });
    }

    // 1. Khởi tạo IndexedDB
    const request = indexedDB.open(DB_NAME, 1);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
            console.log(`[DB] Đã tạo store: ${STORE_NAME}`);
        }
    };
    request.onsuccess = (e) => {
        db = e.target.result;
        console.log("[DB] Kết nối thành công");
        loadPlaylist();
        initSettings();
    };

    // 2. Tải danh sách từ API
    async function loadPlaylist() {
        try {
            const response = await fetch(`${API_BASE}?action=byfolder&folderId=${FOLDER_ID}`);
            const files = await response.json();
            playlistElem.innerHTML = "";
            alarmSelect.innerHTML = '<option value="">-- Chọn bài --</option>';

            for (const file of files) {
                const isCached = await checkCache(file.id);
                const li = document.createElement('li');
                li.id = `item-${file.id}`;
                li.innerHTML = `
                    <div class="file-info">
                        <span class="file-name">${file.name}</span>
                        <span class="status-badge ${isCached ? 'cached' : ''}" id="status-${file.id}">
                            ${isCached ? 'OFFLINE' : 'ONLINE'}
                        </span>
                    </div>
                `;
                li.onclick = () => playFile(file.id, file.name);
                playlistElem.appendChild(li);

                const opt = document.createElement('option');
                opt.value = file.id;
                opt.dataset.name = file.name;
                opt.textContent = file.name;
                alarmSelect.appendChild(opt);
            }
            // Khôi phục giá trị đã lưu
            alarmSelect.value = localStorage.getItem('alarmFileId') || "";
            console.log(`[LOG] Đã tải ${files.length} file.`);
        } catch (error) {
            console.error("[ERROR]", error);
            playlistElem.innerHTML = "<li>Lỗi kết nối API</li>";
        }
    }

    // 3. Kiểm tra xem file đã có trong DB chưa
    function checkCache(id) {
        return new Promise((resolve) => {
            const transaction = db.transaction([STORE_NAME], "readonly");
            const store = transaction.objectStore(STORE_NAME);
            const request = store.get(id);
            request.onsuccess = () => resolve(!!request.result);
        });
    }

    // 4. Xử lý phát nhạc (Cache Logic)
    async function playFile(id, name) {
        titleElem.innerText = `Đang tải: ${name}`;
        document.querySelectorAll('.playlist li').forEach(el => el.classList.remove('active'));
        document.getElementById(`item-${id}`).classList.add('active');

        const transaction = db.transaction([STORE_NAME], "readonly");
        const store = transaction.objectStore(STORE_NAME);
        const getRequest = store.get(id);

        getRequest.onsuccess = async () => {
            if (getRequest.result) {
                console.log(`[LOG] Phát từ CACHE: ${name}`);
                const blobUrl = URL.createObjectURL(getRequest.result);
                player.src = blobUrl;
                player.play().catch(e => console.error("[LOG ERROR] Safari chặn phát tự động:", e));
                titleElem.innerText = name;
            } else {
                console.log(`[LOG] Tải từ SERVER & Lưu cache: ${name}`);
                try {
                    const streamUrl = `${API_BASE}?action=audio&fileId=${id}`;
                    const response = await fetch(streamUrl);
                    const blob = await response.blob();

                    // Lưu vào IndexedDB
                    const saveTx = db.transaction([STORE_NAME], "readwrite");
                    saveTx.objectStore(STORE_NAME).put(blob, id);
                    
                    saveTx.oncomplete = () => {
                        console.log(`[DB] Đã lưu xong: ${name}`);
                        const badge = document.getElementById(`status-${id}`);
                        badge.innerText = "OFFLINE";
                        badge.classList.add('cached');
                    };

                    const blobUrl = URL.createObjectURL(blob);
                    player.src = blobUrl;
                    player.play().catch(e => console.error("[LOG ERROR] Safari chặn phát:", e));
                    titleElem.innerText = name;
                } catch (err) {
                    console.error("[ERROR] Tải file thất bại", err);
                }
            }
        };
    }

    // 5. Logic Hẹn giờ & Cài đặt
    function initSettings() {
        alarmTimeInput.value = localStorage.getItem('alarmTime') || "";

        alarmTimeInput.onchange = (e) => localStorage.setItem('alarmTime', e.target.value);
        alarmSelect.onchange = (e) => localStorage.setItem('alarmFileId', e.target.value);

        startTimer();
    }

    function startTimer() {
        if (alarmInterval) clearInterval(alarmInterval);
        alarmInterval = setInterval(() => {
            const now = new Date();
            const currentTimeStr = now.toTimeString().slice(0, 5);
            const alarmTime = alarmTimeInput.value;
            const selectedFileId = alarmSelect.value;

            if (alarmTime && selectedFileId) {
                const [ah, am] = alarmTime.split(':');
                let target = new Date();
                target.setHours(parseInt(ah), parseInt(am), 0, 0);

                if (target < now) target.setDate(target.getDate() + 1);

                const diff = target - now;
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                timerDisplay.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

                if (currentTimeStr === alarmTime && now.getSeconds() === 0) {
                    console.log("[ALARM] Kích hoạt phát nhạc tự động");
                    const name = alarmSelect.options[alarmSelect.selectedIndex].dataset.name;
                    playFile(selectedFileId, name);
                }
            } else {
                timerDisplay.innerText = "00:00:00";
            }
            if (now.getSeconds() % 10 === 0) console.log(`[LOG] Timer active: ${currentTimeStr}. Audio Status: ${isAudioActivated}`);
        }, 1000);
    }
</script>

</body>
</html>
