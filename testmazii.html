<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mazii API v3 Test</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background: #f4f7f6; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 70%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; border-left: 5px solid #2563eb; background: #fafafa; display: none; }
        .word { font-size: 1.5em; color: #1e40af; font-weight: bold; }
        .phonetic { color: #64748b; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h3>Mazii API v3 (Latest)</h3>
    <input type="text" id="query" value="マックス">
    <button onclick="searchMazii()">Tra cứu</button>

    <div id="result"></div>
</div>

<script>
    async function searchMazii() {
        const query = document.getElementById('query').value;
        const resDiv = document.getElementById('result');
        resDiv.style.display = 'block';
        resDiv.innerHTML = "Đang tra cứu...";

        try {
            // Sử dụng endpoint v3 lấy từ network log của bạn
            const response = await fetch("https://mazii.net/api/search/word/v3", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    "dict": "javi",
                    "type": "word",
                    "query": query,
                    "limit": 1
                })
            });

            if (!response.ok) throw new Error("Lỗi HTTP: " + response.status);

            const data = await response.json();
            console.log("Dữ liệu Mazii:", data);

            if (data.data && data.data.length > 0) {
                const item = data.data[0];
                const meaning = item.short_mean || (item.means && item.means[0].mean) || "Không rõ nghĩa";
                const phonetic = item.phonetic || "";

                resDiv.innerHTML = `
                    <div class="word">${query}</div>
                    <div class="phonetic">Phiên âm: ${phonetic}</div>
                    <hr>
                    <div><b>Nghĩa:</b> ${meaning}</div>
                `;
            } else {
                resDiv.innerHTML = "Không tìm thấy kết quả.";
            }
        } catch (error) {
            resDiv.innerHTML = `<b style="color:red">Lỗi:</b> ${error.message}<br>
            <small>Gợi ý: Nếu chạy trên local file, hãy kiểm tra lỗi CORS trong Console.</small>`;
        }
    }
</script>

</body>
</html>
