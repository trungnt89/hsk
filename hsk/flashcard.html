<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Flashcards</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .progress {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Flashcard Container */
        .flashcard-wrapper {
            perspective: 1000px;
            width: 100%;
            height: 380px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            border: 1px solid #e2e8f0;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #f1f5f9;
        }

        /* Front Content */
        .word {
            font-size: 5rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .hint {
            font-size: 0.9rem;
            color: var(--text-muted);
            border: 1px dashed var(--text-muted);
            padding: 4px 12px;
            border-radius: 12px;
            margin-top: 15px;
        }

        /* Back Content */
        .pinyin {
            font-size: 1.8rem;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .meaning {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 25px;
            text-align: center;
        }

        .example-box {
            width: 100%;
            border-top: 1px solid #cbd5e1;
            padding-top: 15px;
            text-align: center;
        }

        .example-cn {
            font-size: 1.3rem;
            color: #334155;
            margin-bottom: 4px;
        }

        .example-py {
            font-size: 1rem;
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 4px;
        }

        .example-vn {
            font-size: 1rem;
            color: #475569;
            font-weight: 500;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background-color: #e2e8f0;
            color: var(--text-main);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background-color: #cbd5e1;
        }

        /* Loading */
        .loading {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-top: 100px;
            font-weight: 500;
        }

        .error {
            color: var(--accent);
            text-align: center;
            margin-top: 100px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading">Đang tải dữ liệu từ Google Sheet...</div>
    <div id="error" class="error" style="display: none;">Không thể tải dữ liệu. Vui lòng kiểm tra lại kết nối hoặc API.</div>

    <div class="container" id="main-content" style="display: none;">
        <div class="header">
            <h1 id="sheet-title">HSK Flashcards</h1>
            <div class="progress" id="progress-text">0 / 0</div>
        </div>

        <div class="flashcard-wrapper" onclick="flipCard()">
            <div class="flashcard" id="card">
                <!-- Mặt trước -->
                <div class="card-face card-front">
                    <div class="word" id="front-word">...</div>
                    <div class="hint">Nhấp để lật mặt sau</div>
                </div>
                <!-- Mặt sau -->
                <div class="card-face card-back">
                    <div class="pinyin" id="back-pinyin">...</div>
                    <div class="meaning" id="back-meaning">...</div>
                    <div class="example-box" id="example-box">
                        <div class="example-cn" id="ex-cn">...</div>
                        <div class="example-py" id="ex-py">...</div>
                        <div class="example-vn" id="ex-vn">...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-secondary" onclick="prevCard()">Trước đó</button>
            <button class="btn" onclick="nextCard()">Tiếp theo</button>
        </div>
    </div>

    <script>
        const apiUrl = 'https://hsk-gilt.vercel.app/api/gSheet?sheet=HSK1&act=read&spread=105i_4pdAfadq4G-ELDmrnopWW7H4pv0EZUg87xsPxtc';
        let flashcards = [];
        let currentIndex = 0;

        // Fetch dữ liệu từ API khi trang được tải
        async function fetchData() {
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Network response error');
                
                const data = await response.json();
                
                if (data && data.values && data.values.length > 1) {
                    // Loại bỏ dòng tiêu đề đầu tiên (STT, Từ mới, Phiên âm,...)
                    const rows = data.values.slice(1);
                    
                    // Map data thành mảng object dễ xử lý
                    flashcards = rows.map(row => ({
                        stt: row[0] || '',
                        word: row[1] || '',
                        pinyin: row[2] || '',
                        meaning: row[3] || '',
                        exCn: row[4] || '',
                        exPy: row[5] || '',
                        exVn: row[6] || ''
                    })).filter(item => item.word); // Lọc bỏ dòng trống nếu có

                    if (flashcards.length > 0) {
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('main-content').style.display = 'flex';
                        renderCard();
                    } else {
                        showError();
                    }
                } else {
                    showError();
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                showError();
            }
        }

        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }

        // Hiển thị nội dung thẻ hiện tại
        function renderCard() {
            const cardElement = document.getElementById('card');
            // Reset trạng thái lật về mặt trước khi đổi từ mới
            cardElement.classList.remove('flipped');

            const current = flashcards[currentIndex];
            
            // Cập nhật tiến độ
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${flashcards.length}`;
            
            // Cập nhật mặt trước
            document.getElementById('front-word').innerText = current.word;
            
            // Cập nhật mặt sau
            document.getElementById('back-pinyin').innerText = current.pinyin;
            document.getElementById('back-meaning').innerText = current.meaning;
            
            // Hiển thị ví dụ nếu có
            if(current.exCn) {
                document.getElementById('example-box').style.display = 'block';
                document.getElementById('ex-cn').innerText = current.exCn;
                document.getElementById('ex-py').innerText = current.exPy;
                document.getElementById('ex-vn').innerText = current.exVn;
            } else {
                document.getElementById('example-box').style.display = 'none';
            }
        }

        // Hàm lật thẻ
        function flipCard() {
            document.getElementById('card').classList.toggle('flipped');
        }

        // Chuyển sang thẻ tiếp theo
        function nextCard() {
            if (flashcards.length === 0) return;
            currentIndex = (currentIndex + 1) % flashcards.length;
            renderCard();
        }

        // Quay lại thẻ trước đó
        function prevCard() {
            if (flashcards.length === 0) return;
            currentIndex = (currentIndex - 1 + flashcards.length) % flashcards.length;
            renderCard();
        }

        // Lắng nghe sự kiện bàn phím (Phím mũi tên & Space) giúp học tiện lợi hơn
        document.addEventListener('keydown', (e) => {
            if (flashcards.length === 0) return;
            if (e.code === 'Space') {
                e.preventDefault();
                flipCard();
            } else if (e.code === 'ArrowRight') {
                nextCard();
            } else if (e.code === 'ArrowLeft') {
                prevCard();
            }
        });

        // Khởi chạy ứng dụng
        fetchData();
    </script>
</body>
</html>
