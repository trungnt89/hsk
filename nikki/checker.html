<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyên Gia Chấm Điểm Phát Âm Nhật Ngữ</title>
    <style>
        :root { --primary: #1e3799; --accent: #007bff; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 20px; color: #333; line-height: 1.6; }
        .card { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        input[type="text"], input[type="file"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        textarea { height: 100px; resize: vertical; font-family: inherit; }
        input[type="text"]:focus, textarea:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 5px rgba(0,123,255,0.2); }
        button { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: var(--primary); transform: translateY(-1px); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin: 15px 0; font-weight: bold; color: #666; display: flex; align-items: center; }
        #status::before { content: "●"; margin-right: 8px; color: #e67e22; }
        #result { margin-top: 25px; padding: 25px; background: #fff; border-left: 6px solid var(--primary); border-radius: 4px; white-space: pre-wrap; display: none; border: 1px solid #e1e8ed; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .log-box { margin-top: 30px; background: #2d3436; color: #00ff00; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 11px; max-height: 150px; overflow-y: auto; }
        #audioPreview { margin-top: 10px; width: 100%; height: 40px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Phân Tích & Chấm Điểm Phát Âm</h2>
    
    <div class="form-group">
        <label>Gemini API Key:</label>
        <input type="text" id="apiKey" placeholder="Nhập API Key...">
    </div>

    <div class="form-group">
        <label>Kịch bản gốc (Script tiếng Nhật):</label>
        <textarea id="originalScript" placeholder="Nhập đoạn văn bản tiếng Nhật bạn định nói vào đây..."></textarea>
    </div>

    <div class="form-group">
        <label>File ghi âm (.m4a, .mp3, .wav):</label>
        <input type="file" id="audioFile" accept="audio/*">
        <audio id="audioPreview" controls></audio>
    </div>

    <button id="analyzeBtn">Phân Tích & Chấm Điểm</button>

    <div id="status">Trạng thái: Sẵn sàng</div>
    <div id="result"></div>

    <div class="log-box" id="logBox">Logs: Hệ thống đã sẵn sàng với model Gemini 2.5 Flash.</div>
</div>

<script>
    const DB_NAME = 'ShadowVoiceDB'; // Tên DB từ Module
    const STORE_NAME = 'voices';     // Store chứa blob/script
    const SETTINGS_DB = 'JP_Score_DB_v1';
    const SETTINGS_STORE = 'settings';

    const apiKeyInput = document.getElementById('apiKey');
    const scriptInput = document.getElementById('originalScript');
    const audioInput = document.getElementById('audioFile');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultDiv = document.getElementById('result');
    const statusDiv = document.getElementById('status');
    const logBox = document.getElementById('logBox');
    const audioPreview = document.getElementById('audioPreview');

    let currentBlob = null;

    function addLog(msg) {
        const t = new Date().toLocaleTimeString();
        logBox.innerText += `\n[${t}] ${msg}`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function initSettingsDB() {
        return new Promise(res => {
            const req = indexedDB.open(SETTINGS_DB, 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore(SETTINGS_STORE);
            req.onsuccess = () => res(req.result);
        });
    }

    // Lấy dữ liệu âm thanh/script từ Module ShadowGame
    async function loadDataFromModule(fileId) {
        return new Promise(res => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onsuccess = e => {
                try {
                    const tx = e.target.result.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const getReq = store.get(fileId);
                    getReq.onsuccess = () => res(getReq.result);
                } catch (err) { res(null); }
            };
            req.onerror = () => res(null);
        });
    }

    window.onload = async () => {
        // Load API Key
        const db = await initSettingsDB();
        const req = db.transaction(STORE_NAME).objectStore(STORE_NAME).get('api_key');
        req.onsuccess = () => { if(req.result) apiKeyInput.value = req.result; };

        // Xử lý fileId từ URL
        const fileId = new URLSearchParams(window.location.search).get('fileId');
        if (fileId) {
            addLog(`Đang tìm dữ liệu cho ID: ${fileId}`);
            const data = await loadDataFromModule(fileId);
            if (data) {
                scriptInput.value = data.script || "";
                if (data.blob) {
                    currentBlob = data.blob;
                    audioPreview.src = URL.createObjectURL(data.blob);
                    audioPreview.style.display = "block";
                    addLog("✅ Đã nạp Script và Audio từ bộ nhớ.");
                }
            }
        }
    };

    apiKeyInput.onchange = async () => {
        const db = await initSettingsDB();
        db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).put(apiKeyInput.value.trim(), 'api_key');
        addLog("Đã lưu API Key.");
    };

    audioInput.onchange = (e) => {
        currentBlob = e.target.files[0];
        if (currentBlob) {
            audioPreview.src = URL.createObjectURL(currentBlob);
            audioPreview.style.display = "block";
        }
    };

    analyzeBtn.onclick = async () => {
        const key = apiKeyInput.value.trim();
        const script = scriptInput.value.trim();
        const file = currentBlob;

        if(!file || !key) {
            alert("Vui lòng cung cấp API Key và dữ liệu âm thanh!");
            return;
        }

        analyzeBtn.disabled = true;
        statusDiv.innerText = "Trạng thái: Đang chấm điểm...";
        resultDiv.style.display = "none";
        addLog("Bắt đầu gọi Gemini 2.5 Flash...");

        try {
            const base64Data = await new Promise(res => {
                const r = new FileReader();
                r.onload = () => res(r.result.split(',')[1]);
                r.readAsDataURL(file);
            });

            // GIỮ NGUYÊN MODEL 2.5 FLASH THEO YÊU CẦU
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: `Bạn là chuyên gia ngôn ngữ Nhật Bản. Dưới đây là kịch bản gốc và file ghi âm thực tế. Hãy thực hiện các yêu cầu sau bằng TIẾNG VIỆT:
                            KỊCH BẢN GỐC: "${script || 'Không cung cấp'}"
                            YÊU CẦU:
                            1. SO SÁNH nội dung nói.
                            2. NHẬN XÉT CHI TIẾT phát âm và Pitch Accent.
                            3. CHẤM ĐIỂM /100.
                            4. KHUYÊN CẢI THIỆN.` },
                            { inline_data: { mime_type: "audio/mp4", data: base64Data } }
                        ]
                    }]
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            if (data.candidates && data.candidates.length > 0) {
                resultDiv.innerText = data.candidates[0].content.parts[0].text;
                resultDiv.style.display = "block";
                statusDiv.innerText = "Trạng thái: Đã có kết quả!";
                addLog("Chấm điểm hoàn tất.");
            }
        } catch (err) {
            addLog("Lỗi: " + err.message);
            statusDiv.innerText = "Trạng thái: Lỗi.";
        } finally {
            analyzeBtn.disabled = false;
        }
    };
</script>
</body>
</html>
