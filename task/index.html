<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4CAF50; }
        input:checked + .slider:before { transform: translateX(18px); }
        .countdown-cell { font-family: monospace; font-weight: bold; color: #d35400; }
    </style>
</head>
<body>
    <h2>Danh sách Task từ Server</h2>
    <div id="loading">Đang tải dữ liệu...</div>
    <table id="taskTable" style="display:none;">
        <thead>
            <tr id="headerRow"></tr>
        </thead>
        <tbody id="taskBody"></tbody>
    </table>
<script>
    const API_URL = 'https://hsk-gilt.vercel.app/api/gSheet';
    const PAYLOAD = { "sheet": "TASK", "act": "read", "spread": "1ezoFMSBVznSNcuufRRQRjxAmUmYyU9MjKDzl-v3wxl8" };
    let globalTasks = [];

    async function fetchData() {
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(PAYLOAD)
            });
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            renderTable(data.values);
        } catch (error) {
            document.getElementById('loading').innerText = "Lỗi khi tải dữ liệu.";
        }
    }

    function renderTable(values) {
        const headerRow = document.getElementById('headerRow');
        const taskBody = document.getElementById('taskBody');
        const headers = values[0];
        headerRow.innerHTML = headers.map(h => `<th>${h}</th>`).join('') + "<th>COUNTDOWN</th>";
        taskBody.innerHTML = "";
        globalTasks = [];
        for (let i = 1; i < values.length; i++) {
            const rowData = values[i];
            if (rowData.length < 2) continue;
            globalTasks.push({ id: rowData[0], freg: rowData[5], lastTime: rowData[6] });
            const tr = document.createElement('tr');
            let rowHtml = "";
            for (let j = 0; j < headers.length; j++) {
                let cellData = rowData[j] || "";
                if (headers[j] === "STATUS") {
                    const isChecked = cellData === "1" ? "checked" : "";
                    rowHtml += `<td><label class="switch"><input type="checkbox" ${isChecked} onchange="toggleStatus('${rowData[0]}', this)"><span class="slider"></span></label></td>`;
                } else {
                    rowHtml += `<td>${cellData.replace(/\n/g, '<br>')}</td>`;
                }
            }
            rowHtml += `<td id="timer-${rowData[0]}" class="countdown-cell">--:--:--</td>`;
            tr.innerHTML = rowHtml;
            taskBody.appendChild(tr);
        }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('taskTable').style.display = 'table';
        startTimer();
    }

    function startTimer() {
        setInterval(() => {
            globalTasks.forEach(task => {
                const timerEl = document.getElementById(`timer-${task.id}`);
                if (!timerEl || !task.lastTime || !task.freg) return;
                const lastTime = new Date(task.lastTime.replace('-', ''));
                const targetTime = new Date(lastTime.getTime() + parseInt(task.freg) * 60000);
                const now = new Date();
                const diff = targetTime - now;
                if (diff <= 0) { timerEl.innerText = "00:00:00"; return; }
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                timerEl.innerText = `${h}:${m}:${s}`;
            });
        }, 1000);
    }

    function toggleStatus(id, el) {
        const newStatus = el.checked ? "1" : "0";
        console.log(`Task ${id} updated to ${newStatus}`);
    }
    fetchData();
</script>
</body>
</html>
