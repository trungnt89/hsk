<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Học Flashcard HSK / JLPT</title>
    <script src="../com/TTSClient.js"></script>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ec4b6;
            --danger-color: #e71d36;
            --text-color: #2b2d42;
            --bg-color: #f8f9fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 24px;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Thẻ Flashcard với hiệu ứng lật 3D */
        .flashcard-wrapper {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border-radius: 15px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .card-front {
            color: var(--text-color);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #f1f7fe;
            border-left: 5px solid var(--primary-color);
        }

        /* Chi tiết nội dung hiển thị trong thẻ */
        .word {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .meaning {
            font-size: 22px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .example {
            font-size: 15px;
            color: #6c757d;
            font-style: italic;
            margin-top: 10px;
            max-width: 90%;
        }

        /* Khu vực nút chức năng điều khiển âm thanh độc lập */
        .audio-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .btn-audio {
            background: #f8f9fa;
            border: 1px solid #e2e8f0;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .btn-audio:hover {
            background: #edf2f7;
            transform: scale(1.05);
        }

        .btn-audio.active {
            background: #fed7d7;
            border-color: var(--danger-color);
        }

        /* Thanh điều khiển chính */
        .controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn-prev { background-color: #e2e8f0; color: #4a5568; }
        .btn-prev:hover { background-color: #cbd5e0; }

        .btn-next { background-color: var(--primary-color); color: #ffffff; }
        .btn-next:hover { background-color: #357abd; }

        /* Tiến trình học */
        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            color: #718096;
            margin-top: 5px;
        }

        .progress-bar-bg {
            flex: 1;
            height: 6px;
            background-color: #e2e8f0;
            border-radius: 3px;
            margin: 0 15px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--success-color);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <header>
        <h1>Flashcard Học Tập</h1>
        <p>Học từ vựng tích hợp hệ thống phát âm dữ liệu Cache</p>
    </header>

    <div class="container">
        <div class="flashcard-wrapper" id="cardWrapper">
            <div class="flashcard" id="flashcard">
                
                <div class="card-face card-front">
                    <div class="audio-actions">
                        <button class="btn-audio" id="btnLoop" title="Lặp lại âm thanh">🔁</button>
                        <button class="btn-audio" id="btnSpeak" title="Phát âm">🔊</button>
                    </div>
                    <div class="word" id="frontWord">---</div>
                </div>

                <div class="card-face card-back">
                    <div class="meaning" id="backMeaning">---</div>
                    <div class="example" id="backExample">---</div>
                </div>

            </div>
        </div>

        <div class="controls">
            <button class="btn btn-prev" id="btnPrev">Trước đó</button>
            <button class="btn btn-next" id="btnNext">Tiếp theo</button>
        </div>

        <div class="progress-container">
            <span id="progressText">0/0</span>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
        </div>
    </div>

    <script>
        // Mock dữ liệu từ vựng mẫu (Có thể mở rộng cấu trúc linh hoạt cho HSK/JLPT)
        const vocabularyData = [
            { text: "学习", meaning: "Học tập (Xuéxí)", example: "我们必须努力学习。", voice: "zh-CN-XiaoxiaoNeural" },
            { text: "电脑", meaning: "Máy tính (Diànnǎo)", example: "这台电脑很好用。", voice: "zh-CN-XiaoxiaoNeural" },
            { text: "高兴", meaning: "Vui vẻ (Gāoxìng)", example: "认识你很高兴。", voice: "zh-CN-XiaoxiaoNeural" }
        ];

        let currentIndex = 0;
        let isLooping = false;

        const flashcard = document.getElementById('flashcard');
        const cardWrapper = document.getElementById('cardWrapper');
        const frontWord = document.getElementById('frontWord');
        const backMeaning = document.getElementById('backMeaning');
        const backExample = document.getElementById('backExample');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const btnSpeak = document.getElementById('btnSpeak');
        const btnLoop = document.getElementById('btnLoop');
        const progressText = document.getElementById('progressText');
        const progressBar = document.getElementById('progressBar');

        // Khởi tạo hiển thị dữ liệu thẻ ban đầu
        function updateCard() {
            if (vocabularyData.length === 0) return;
            
            const currentItem = vocabularyData[currentIndex];
            
            // Đảm bảo thẻ quay về mặt trước khi đổi từ
            flashcard.classList.remove('flipped');
            
            // Cập nhật text nội dung sau khi lật mượt
            setTimeout(() => {
                frontWord.textContent = currentItem.text;
                backMeaning.textContent = currentItem.meaning;
                backExample.textContent = currentItem.example || "";
            }, 150);

            // Cập nhật thanh tiến trình học tập
            const total = vocabularyData.length;
            progressText.textContent = `${currentIndex + 1}/${total}`;
            progressBar.style.width = `${((currentIndex + 1) / total) * 100}%`;

            // Tự động dừng mọi âm thanh cũ khi chuyển dịch thẻ qua lại
            if (typeof window.stopSpeak === 'function') {
                window.stopSpeak();
                isLooping = false;
                btnLoop.classList.remove('active');
            }
        }

        // Sự kiện click để lật thẻ (loại trừ vùng click nút audio)
        cardWrapper.addEventListener('click', (e) => {
            if (e.target.closest('.audio-actions')) return;
            flashcard.classList.toggle('flipped');
        });

        // Xử lý phát âm từ vựng thông qua TTSClient toàn cục
        async function handleSpeak(loopMode = false) {
            if (typeof window.speakCommon !== 'function') {
                console.error("Lỗi: window.speakCommon chưa sẵn sàng. Kiểm tra lại nhúng script.");
                return;
            }

            const currentItem = vocabularyData[currentIndex];
            
            await window.speakCommon({
                text: currentItem.text,
                voice: currentItem.voice || "zh-CN-XiaoxiaoNeural",
                rate: "1.0",
                filename: "flashcard_data",
                loop: loopMode
            });
        }

        // Đăng ký sự kiện các nút điều hướng và âm thanh độc lập
        btnSpeak.addEventListener('click', () => handleSpeak(isLooping));
        
        btnLoop.addEventListener('click', () => {
            isLooping = !isLooping;
            btnLoop.classList.toggle('active', isLooping);
            // Kích hoạt phát ngay lập tức kèm trạng thái loop tương ứng
            handleSpeak(isLooping);
        });

        btnPrev.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        });

        btnNext.addEventListener('click', () => {
            if (currentIndex < vocabularyData.length - 1) {
                currentIndex++;
                updateCard();
            }
        });

        // Chạy khởi tạo lần đầu tiên khi tải xong Dom
        document.addEventListener('DOMContentLoaded', updateCard);
    </script>
</body>
</html>
