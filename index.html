<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindset Floating Cards - Responsive</title>
	<script src="../com/assistive.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: #0f172a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .floating-card {
            position: absolute;
            /* Điều chỉnh cho mobile: to hơn */
            width: 85%; 
            max-width: 320px;
            min-height: 140px;
            padding: 20px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #f1f5f9;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: border-color 0.3s, opacity 0.3s, box-shadow 0.3s, transform 0.3s;
            z-index: 10;
            opacity: 0.7;
            box-sizing: border-box;
            top: 0; left: 0;
        }

        .floating-card.selected {
            border-color: var(--gold);
            z-index: 150;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6);
            opacity: 1;
            transform: scale(1.05);
        }

        .category {
            font-size: 0.75rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .content {
            font-size: 1.1rem; /* Tăng cỡ chữ để dễ đọc trên mobile */
            line-height: 1.4;
            font-style: italic;
            white-space: pre-line;
        }
    </style>
</head>
<body>

<div id="container"></div>

<script>
    async function fetchData() {
        console.log("[LOG] Fetching data from API...");
        try {
            const response = await fetch("https://hsk-gilt.vercel.app/api/gSheet", {
                method: "POST",
                headers: {
                    "content-type": "application/json"
                },
                body: JSON.stringify({
                    sheet: "DairyList",
                    act: "read",
                    spread: "1UiAS_mUhl6j6wHyPkNiol9pclzkQJWD4qzPIZD2sx3k"
                })
            });
            const data = await response.json();
            if (data && data.values) {
                initCards(data.values);
            }
        } catch (error) {
            console.error("[ERROR] Failed to fetch data:", error);
        }
    }

    const container = document.getElementById('container');
    const cards = [];
    let currentSelectedIndex = -1;

    function initCards(values) {
        console.log("[LOG] Initializing responsive cards...");
        values.filter(row => row[5] === "TRUE").forEach((row, index) => {
            const quoteText = row[2]; // Lấy giá trị thứ 3 (câu nói)
            const div = document.createElement('div');
            div.className = 'floating-card';
            div.innerHTML = `
                <div class="content">${quoteText}</div>
            `;
            
            container.appendChild(div);

            const cardObj = {
                element: div,
                x: Math.random() * (window.innerWidth - 200),
                y: Math.random() * (window.innerHeight - 200),
                vx: Math.cos(Math.random() * 2 * Math.PI) * (0.5 + Math.random()),
                vy: Math.sin(Math.random() * 2 * Math.PI) * (0.5 + Math.random())
            };
            cards.push(cardObj);
        });

        highlightNextCard();
        setInterval(highlightNextCard, 10000);
    }

    function highlightNextCard() {
        if (cards.length === 0) return;
        if (currentSelectedIndex >= 0) {
            cards[currentSelectedIndex].element.classList.remove('selected');
        }
        
        let nextIndex;
        do {
            nextIndex = Math.floor(Math.random() * cards.length);
        } while (nextIndex === currentSelectedIndex && cards.length > 1);
        
        currentSelectedIndex = nextIndex;
        cards[currentSelectedIndex].element.classList.add('selected');
        console.log(`[LOG] Randomly selected card index: ${currentSelectedIndex}`);
    }

    function animate() {
        cards.forEach(card => {
            const rect = card.element.getBoundingClientRect();
            
            card.x += card.vx;
            card.y += card.vy;

            if (card.x <= 0 || card.x + rect.width >= window.innerWidth) {
                card.vx *= -1;
                card.x = Math.max(0, Math.min(card.x, window.innerWidth - rect.width));
            }

            if (card.y <= 0 || card.y + rect.height >= window.innerHeight) {
                card.vy *= -1;
                card.y = Math.max(0, Math.min(card.y, window.innerHeight - rect.height));
            }

            card.element.style.transform = `translate3d(${card.x}px, ${card.y}px, 0)`;
        });

        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
        console.log("[LOG] Window resized, recalculating boundaries.");
        cards.forEach(card => {
            card.x = Math.min(card.x, window.innerWidth - card.element.offsetWidth);
            card.y = Math.min(card.y, window.innerHeight - card.element.offsetHeight);
        });
    });

    fetchData();
    animate();
</script>

</body>
</html>
