<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Media Player Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f8fafc; color: #1e293b; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 500px; }
        .card { background: #ffffff; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Media Player */
        #media-view { background: #000; border-radius: 12px; overflow: hidden; display: none; margin-bottom: 20px; }
        video, audio { width: 100%; display: block; }
        
        /* Grouping UI */
        .list { max-height: 450px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 20px; background: #fff; }
        
        .folder-group { border-bottom: 1px solid #e2e8f0; }
        .folder-header { 
            background: #f1f5f9; padding: 10px 15px; cursor: pointer; 
            font-weight: bold; font-size: 13px; display: flex; 
            justify-content: space-between; align-items: center;
            user-select: none;
        }
        .folder-header:hover { background: #e2e8f0; }
        .folder-header::after { content: '▼'; font-size: 10px; transition: 0.3s; }
        .folder-header.closed::after { transform: rotate(-90deg); }
        
        .folder-content { display: block; }
        .folder-content.hidden { display: none; }

        .item { padding: 12px 15px; border-bottom: 1px solid #f8fafc; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; transition: 0.2s; }
        .item:last-child { border-bottom: none; }
        .item:hover { background: #f1f5f9; color: #2563eb; }
        .item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
        
        /* Recording Controls */
        .rec-box { border-top: 1px solid #f1f5f9; padding-top: 20px; text-align: center; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; }
        .btn-rec { background: #ef4444; color: white; }
        .btn-save { background: #10b981; color: white; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        #status { font-size: 12px; margin-bottom: 10px; color: #64748b; font-weight: bold; }
    </style>
</head>
<body>
<div class="app">
    <div class="card">
        <div id="media-view"></div>
        <div id="fileList" class="list">Đang tải danh sách...</div>
        <div class="rec-box">
            <div id="status">Sẵn sàng</div>
            <button id="startBtn" class="btn-rec" onclick="startRec()">BẮT ĐẦU GHI ÂM</button>
            <button id="stopBtn" style="background:#64748b; color:white" onclick="stopRec()" disabled>DỪNG</button>
            <button id="uploadBtn" class="btn-save" onclick="upload()" disabled>LƯU LÊN DRIVE</button>
        </div>
    </div>
</div>

<script>
    let mediaRec, chunks = [], audioBlob;
    const isIOS = () => /iPhone|iPad|iPod/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    window.onload = loadFiles;

    // Hàm lấy tên file theo yêu cầu: id_val_YYYYMMDD_HHMMSSsss
    function generateFileName(extension) {
        const now = new Date();
        const pad = (n, width = 2) => n.toString().padStart(width, '0');
        
        // Lấy tham số id từ URL
        const urlParams = new URLSearchParams(window.location.search);
        const idParam = urlParams.get('id') || "unknown";

        const yyyy = now.getFullYear();
        const mm = pad(now.getMonth() + 1);
        const dd = pad(now.getDate());
        const hh = pad(now.getHours());
        const min = pad(now.getMinutes());
        const ss = pad(now.getSeconds());
        const sss = pad(now.getMilliseconds(), 3); // Lấy miligiây (sss)

        return `id_${idParam}_${yyyy}${mm}${dd}_${hh}${min}${ss}${sss}.${extension}`;
    }

    async function loadFiles() {
        try {
            const res = await fetch('/api/drive');
            const files = await res.json();
            
            const groups = files.reduce((acc, file) => {
                const parent = (file.parents && file.parents[0]) || "Khác";
                if (!acc[parent]) acc[parent] = [];
                acc[parent].push(file);
                return acc;
            }, {});

            renderGroups(groups);
        } catch (err) {
            document.getElementById('fileList').innerText = "Lỗi tải dữ liệu";
        }
    }

    function renderGroups(groups) {
        const container = document.getElementById('fileList');
        container.innerHTML = '';

        Object.keys(groups).forEach(parentId => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'folder-group';

            const header = document.createElement('div');
            header.className = 'folder-header closed';
            header.innerText = `📁 Thư mục: ${parentId.substring(0, 8)}... (${groups[parentId].length})`;
            
            const content = document.createElement('div');
            content.className = 'folder-content hidden';

            header.onclick = () => {
                header.classList.toggle('closed');
                content.classList.toggle('hidden');
            };

            const itemsHtml = groups[parentId].map(f => {
                const cleanName = f.name.replace(/[\r\n]+/g, ' ').replace(/'/g, "\\'");
                const displayName = f.name.length > 30 ? f.name.substring(0, 27) + "..." : f.name;
                return `
                    <div class="item" onclick="playMedia('${f.id}', '${f.mimeType}', '${cleanName}')">
                        <span>${f.mimeType.includes('video') ? '🎥' : '🎵'}</span>
                        <div class="item-text">${displayName}</div>
                    </div>`;
            }).join('');

            content.innerHTML = itemsHtml;
            groupDiv.appendChild(header);
            groupDiv.appendChild(content);
            container.appendChild(groupDiv);
        });
    }

    function playMedia(id, mimeType, name) {
        const view = document.getElementById('media-view');
        view.style.display = 'block';
        const url = `/api/drive?id=${id}`;
        view.innerHTML = mimeType.includes('video') ? 
            `<video src="${url}" controls autoplay playsinline></video>` : 
            `<div style="padding:15px; text-align:center; font-size:12px; font-weight:bold">${name}<audio src="${url}" controls autoplay style="margin-top:10px"></audio></div>`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function startRec() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRec = new MediaRecorder(stream);
        chunks = [];
        mediaRec.ondataavailable = e => chunks.push(e.data);
        
        mediaRec.onstop = async () => {
            const rawBlob = new Blob(chunks);
            if (!isIOS()) {
                document.getElementById('status').innerText = "⏳ ĐANG CONVERT MP3...";
                audioBlob = await convertToMp3(rawBlob);
            } else {
                audioBlob = new Blob(chunks, { type: 'audio/mp4' });
            }
            document.getElementById('uploadBtn').disabled = false;
            document.getElementById('status').innerText = "✅ Sẵn sàng tải lên";
        };

        mediaRec.start();
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('status').innerText = "🔴 ĐANG GHI ÂM...";
    }

    function stopRec() {
        mediaRec.stop();
        mediaRec.stream.getTracks().forEach(t => t.stop());
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        document.getElementById('status').innerText = "Đã dừng";
    }

    async function convertToMp3(blob) {
        const arrayBuffer = await blob.arrayBuffer();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        const samples = audioBuffer.getChannelData(0);
        const sampleRate = audioBuffer.sampleRate;
        const mp3encoder = new lamejs.Mp3Encoder(1, sampleRate, 128);
        const mp3Data = [];

        const samplesInt16 = new Int16Array(samples.length);
        for (let i = 0; i < samples.length; i++) {
            let s = Math.max(-1, Math.min(1, samples[i]));
            samplesInt16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }

        const blockSize = 1152;
        for (let i = 0; i < samplesInt16.length; i += blockSize) {
            const chunk = samplesInt16.subarray(i, i + blockSize);
            const mp3buf = mp3encoder.encodeBuffer(chunk);
            if (mp3buf.length > 0) mp3Data.push(mp3buf);
        }
        const flush = mp3encoder.flush();
        if (flush.length > 0) mp3Data.push(flush);
        return new Blob(mp3Data, { type: 'audio/mp3' });
    }

    async function upload() {
        const btn = document.getElementById('uploadBtn');
        btn.innerText = "⏳ ĐANG LƯU...";
        btn.disabled = true;

        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1];
            const extension = isIOS() ? 'm4a' : 'mp3';
            
            // Sử dụng hàm generateFileName mới
            const fileName = generateFileName(extension);
            
            try {
                const res = await fetch('/api/drive', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: fileName, base64Audio })
                });
                if (res.ok) location.reload();
            } catch (err) {
                btn.innerText = "LỖI - THỬ LẠI";
                btn.disabled = false;
            }
        };
    }
</script>
</body>
</html>
