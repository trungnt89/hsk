        // Cập nhật trạng thái nhớ/chưa nhớ trực tiếp lên Google Sheet qua API
        async function updateMasteredOnSheet(wordItem, isMastered, showSuccessToast = false) {
            const API_GSHEET_URL = 'https://hsk-gilt.vercel.app/api/gSheet';
            const spreadId = '105i_4pdAfadq4G-ELDmrnopWW7H4pv0EZUg87xsPxtc';

            const rowData = [
                String(wordItem.stt !== undefined && wordItem.stt !== null ? wordItem.stt : ''),
                String(wordItem.word !== undefined && wordItem.word !== null ? wordItem.word : ''),
                String(wordItem.pinyin !== undefined && wordItem.pinyin !== null ? wordItem.pinyin : ''),
                String(wordItem.meaning !== undefined && wordItem.meaning !== null ? wordItem.meaning : ''),
                String(wordItem.exCn !== undefined && wordItem.exCn !== null ? wordItem.exCn : ''),
                String(wordItem.exPy !== undefined && wordItem.exPy !== null ? wordItem.exPy : ''),
                String(wordItem.exVn !== undefined && wordItem.exVn !== null ? wordItem.exVn : ''),
                isMastered ? '1' : '0'
            ];

            try {
                const response = await fetch(API_GSHEET_URL, {
                    method: 'POST',
                    headers: {
                        'accept': 'application/json',
                        'content-type': 'application/json'
                    },
                    body: JSON.stringify({
                        act: 'updateByPosVal',
                        pos: 1,
                        val: wordItem.word,
                        sheet: currentHskLevel,
                        spread: spreadId,
                        data: JSON.stringify(rowData),
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP status error: ${response.status}`);
                }

                const result = await response.json();
                console.log('Cập nhật trạng thái lên Google Sheet thành công:', result);
                if (showSuccessToast) {
                    showToast(`Đã lưu thay đổi cho từ "${wordItem.word}"`);
                }
            } catch (error) {
                console.error('Lỗi khi cập nhật trạng thái lên Google Sheet:', error);
                if (showSuccessToast) {
                    showToast(`Lỗi đồng bộ Google Sheets, nhưng đã lưu trên thiết bị.`);
                }
            }
        }

        // Thêm / Xóa từ khỏi danh sách đã thuộc (Lưu IndexedDB và LocalStorage)
        function toggleMastered(event) {
            event.stopPropagation();
            if (paginatedFlashcards.length === 0) return;
            const current = paginatedFlashcards[currentIndex];
            const mKey = currentHskLevel + '_' + current.stt;
            
            const index = masteredIds.indexOf(mKey);
            let isNowMastered = false;
            if (index > -1) {
                masteredIds.splice(index, 1);
            } else {
                masteredIds.push(mKey);
                isNowMastered = true;
            }
            localStorage.setItem('hsk_mastered_ids', JSON.stringify(masteredIds));
            saveSetting('masteredIds', masteredIds);

            // Cập nhật lại giao diện bộ đếm thống kê tổng
            const masteredCount = rawFlashcards.filter(item => masteredIds.includes(currentHskLevel + '_' + item.stt)).length;
            const unmasteredCount = rawFlashcards.length - masteredCount;
            document.getElementById('stats-text').innerText = `Thuộc: ${masteredCount} | Chưa thuộc: ${unmasteredCount}`;

            // Gửi bất đồng bộ lên Google Sheet
            updateMasteredOnSheet(current, isNowMastered);

            // Nếu đang xem ở chế độ lọc Thuộc hoặc Chưa thuộc, xóa thẻ ra khỏi danh sách đang render hiện tại
            if (currentFilter !== 'all') {
                if (isAutoPlaying) toggleAutoPlay(true);
                applyFilterAndRender(true);
            } else {
                // Nếu ở chế độ Tất cả, chỉ cập nhật trạng thái icon Active của thẻ
                const isMasteredNow = masteredIds.includes(mKey);
                const frontMarkBtn = document.getElementById('mark-btn-front');
                const backMarkBtn = document.getElementById('mark-btn-back');
                if (isMasteredNow) {
                    frontMarkBtn.classList.add('status-mastered');
                    backMarkBtn.classList.add('status-mastered');
                } else {
                    frontMarkBtn.classList.remove('status-mastered');
                    backMarkBtn.classList.remove('status-mastered');
                }
            }
        }

        // Hàm chuyển từ tiếp theo hoặc trước đó trong danh sách từ dạng vòng lặp
        function navigateWordList(direction) {
            const container = document.getElementById('word-list-items-container');
            if (!container) return;
            const items = Array.from(container.querySelectorAll('.grid-cell:not(.empty-cell)'));
            if (items.length === 0) return;

            let activeIdx = items.findIndex(el => el.classList.contains('active-word'));
            let targetIdx = 0;

            if (activeIdx === -1) {
                targetIdx = direction === 'next' ? 0 : items.length - 1;
            } else {
                if (direction === 'next') {
                    targetIdx = (activeIdx + 1) % items.length;
                } else {
                    targetIdx = (activeIdx - 1 + items.length) % items.length;
                }
            }

            const targetEl = items[targetIdx];
            if (targetEl) {
                targetEl.click();
                if (targetIdx === 0) {
                    container.scrollTop = 0;
                } else if (targetIdx === items.length - 1) {
                    container.scrollTop = container.scrollHeight;
                } else {
                    targetEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }
        }

        // Lăng nghe sự kiện điều khiển bàn phím Máy tính (Desktop PC)
        document.addEventListener('keydown', (event) => {
            const wordListModal = document.getElementById('word-list-modal');
            const isModalOpen = wordListModal && wordListModal.classList.contains('open');
            const pinyinModal = document.getElementById('pinyin-modal');
            const isPinyinModalOpen = pinyinModal && pinyinModal.classList.contains('open');

            // Tránh kích hoạt hotkeys khi đang gõ vào ô nhập liệu hoặc ô tìm kiếm ngoại trừ điều hướng danh sách từ
            if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA' || event.target.isContentEditable) {
                if (event.target.id === 'typing-input') {
                    // Cho phép các phím mũi tên điều hướng đi qua để lật/chuyển thẻ
                    if (event.key === 'ArrowLeft' || event.key === 'ArrowRight' || event.key === 'ArrowUp' || event.key === 'ArrowDown') {
                        // Đi tiếp tới xử lý phím mũi tên điều hướng thẻ
                    } else {
                        return;
                    }
                } else {
                    if (isModalOpen) {
                        if (event.key === 'Escape') {
                            event.preventDefault();
                            closeWordList();
                            return;
                        }
                        if (event.key === 'ArrowDown') {
                            event.preventDefault();
                            navigateWordList('next');
                            return;
                        }
                        if (event.key === 'ArrowUp') {
                            event.preventDefault();
                            navigateWordList('prev');
                            return;
                        }
                    }
                    if (isPinyinModalOpen) {
                        if (event.key === 'Escape') {
                            event.preventDefault();
                            closePinyinModal();
                            return;
                        }
                    }
                    return;
                }
            }

            if (isPinyinModalOpen) {
                if (event.key === 'Escape') {
                    event.preventDefault();
                    closePinyinModal();
                    return;
                }
                return; // Ngăn chặn các phím điều hướng ảnh hưởng tới flashcard khi đang mở Pinyin
            }

            if (isModalOpen) {
                if (event.key === 'Escape') {
                    event.preventDefault();
                    closeWordList();
                    return;
                }
                if (event.key === 'ArrowRight' || event.key === 'ArrowDown') {
                    event.preventDefault();
                    navigateWordList('next');
                    return;
                }
                if (event.key === 'ArrowLeft' || event.key === 'ArrowUp') {
                    event.preventDefault();
                    navigateWordList('prev');
                    return;
                }
                return; // Tạm dừng mọi phím di chuyển/lật thẻ lúc mở danh sách
            }

            if (document.getElementById('main-content').style.display === 'none') return;

            if (event.key === 'ArrowRight' || event.key === ' ') {
                event.preventDefault();
                nextCard();
            } else if (event.key === 'ArrowLeft') {
                event.preventDefault();
                prevCard();
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                currentFlipDirection = 'vertical';
                flipCard();
            } else if (event.key === 'ArrowDown') {
                event.preventDefault();
                speakCurrentCardManual(event);
            } else if (event.key.toLowerCase() === 'm' || event.key === 'Enter') {
                event.preventDefault();
                toggleMastered(event);
            } else if (event.key.toLowerCase() === 'p') {
                event.preventDefault();
                toggleAutoPlay();
            } else if (event.key === '7') {
                event.preventDefault();
                prevPage();
            } else if (event.key === '9') {
                event.preventDefault();
                nextPage();
            } else if (event.key === '0') {
                event.preventDefault();
                toggleDisplayMode(event);
            }
        });

        // Xử lý vuốt màn hình (Swipe Gesture) trên thiết bị di động
        const cardWrapper = document.querySelector('.flashcard-wrapper');

        cardWrapper.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        cardWrapper.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        cardWrapper.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipeGesture();
        }, { passive: true });

        function handleSwipeGesture() {
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            const threshold = 50; // Khoảng cách vuốt tối thiểu pixel

            // Ưu tiên xác định vuốt ngang hay vuốt dọc dựa trên khoảng cách lớn nhất
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > threshold) {
                    if (diffX > 0) {
                        prevCard(); // Vuốt sang phải -> Quay lại thẻ trước
                    } else {
                        nextCard(); // Vuốt sang trái -> Chuyển thẻ tiếp theo
                    }
                }
            } else {
                if (Math.abs(diffY) > threshold) {
                    currentFlipDirection = 'vertical';
                    flipCard(); // Vuốt dọc -> Kích hoạt lật thẻ đứng
                }
            }
        }

        // Hàm phát âm chung: Chỉ gọi đến TTS hệ thống qua window.speakCommon
        function speakUniversalText(text, isVietnamese = false) {
            if (!text) return;
            const voice = isVietnamese ? "vi-VN-NamMinhNeural" : "zh-CN-XiaoxiaoNeural";

            if (window.currentWordInfo) {
                const cardElement = document.getElementById('card');
                window.currentWordInfo.isFlipped = !!(cardElement && cardElement.classList.contains('flipped-vertical'));
            }

            if (typeof window.speakCommon === 'function') {
                window.speakCommon({ text: text, voice: voice });
            } else {
                console.warn('Hệ thống TTS (window.speakCommon) chưa sẵn sàng.');
            }
        }

        // Phát âm từ vựng trực tiếp từ danh mục của word list
        function speakWordFromList(event, word, item) {
            if (event && typeof event.stopPropagation === 'function') {
                event.stopPropagation();
            }
            if (item) {
                window.currentWordInfo = {
                    ...item,
                    isFlipped: false
                };
            }
            speakUniversalText(word, false);
        }

        // Phát âm thủ công thẻ flashcard dựa trên mặt đang hiển thị (mặt trước: từ, mặt sau: ví dụ)
        function speakCurrentCardManual(event) {
            if (event && typeof event.stopPropagation === 'function') {
                event.stopPropagation();
            }
            if (!paginatedFlashcards || paginatedFlashcards.length === 0) return;
            const current = paginatedFlashcards[currentIndex];
            if (!current) return;
            const cardElement = document.getElementById('card');
            const isFlippedNow = cardElement && cardElement.classList.contains('flipped-vertical');
            const textToSpeak = isFlippedNow ? (current.exCn || current.word) : current.word;
            
            speakUniversalText(textToSpeak, false);
        }

        // Xử lý khi nhấn vào ô lưới từ: chọn từ, đổi trạng thái thuộc/chưa thuộc, phát âm, và hiển thị phần nghĩa và câu ví dụ
        function onGridCellClick(event, stt, escapedTargetText) {
            // 1. Đồng bộ chọn từ và chuyển trang chính (đặt trạng thái active)
            selectWordFromList(stt, true);
            // 2. Thay đổi trạng thái thuộc/chưa thuộc của từ và lưu trữ, tự động cập nhật màu mới
            toggleMasteredFromList(event, stt);
            // 3. Phát âm từ đó
            speakWordFromList(null, escapedTargetText, rawFlashcards.find(x => String(x.stt) === String(stt)));
            // 4. Hiển thị thông tin chi tiết ví dụ và nghĩa (sau khi đã cập nhật trạng thái thuộc)
            showExampleDetail(stt);
        }

        // Hiển thị chi tiết câu ví dụ đầy đủ lên phía trên cùng dưới các nút lọc
        function showExampleDetail(stt) {
            const item = rawFlashcards.find(x => String(x.stt) === String(stt));
            const displayEl = document.getElementById('example-detail-display');
            if (!item || !displayEl) return;

            displayEl.setAttribute('data-stt', stt);

            const isMastered = masteredIds.includes(currentHskLevel + '_' + item.stt);
            const masteredStatusBtn = `
                <button onclick="toggleMasteredFromDetail(event, '${item.stt}')" 
                        style="background: ${isMastered ? '#dcfce7' : 'white'}; border: 1px solid ${isMastered ? '#86efac' : '#cbd5e1'}; border-radius: 50%; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.75rem; cursor: pointer; color: ${isMastered ? '#15803d' : '#475569'};" 
                        title="${isMastered ? 'Đã thuộc' : 'Đánh dấu thuộc'}">
                    ${isMastered ? '✅' : '⏳'}
                </button>
            `;

            const wordHanViet = (window.getHanVietForWord && typeof window.getHanVietForWord === 'function') ? window.getHanVietForWord(item.word) : '';
            const hanVietSpan = wordHanViet ? ` <span style="color: #475569; font-size: 0.75rem; text-transform: uppercase; font-weight: bold;">[${wordHanViet}]</span>` : '';

            displayEl.innerHTML = `
                <button onclick="hideExampleDetail(event)" style="position: absolute; top: 8px; right: 8px; background: #cbd5e1; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 0.75rem; color: #475569; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; line-height: 1; transition: all 0.2s; z-index: 20;">✕</button>
                <div style="padding-right: 22px; display: flex; flex-direction: column; gap: 4px;">
                    <div style="font-size: 0.75rem; color: #64748b; font-weight: bold; border-bottom: 1px dashed #cbd5e1; padding-bottom: 6px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center;">
                        <div style="display: flex; flex-direction: column; gap: 2px; text-align: left;">
                            <div style="font-size: 0.8rem;">Từ #${item.stt}: <b style="font-size: 1.0rem; color: var(--accent);">${item.word}</b>${hanVietSpan}</div>
                            <div style="margin-top: 1px;"><span style="color: var(--primary); font-size: 0.8rem;">[${item.pinyin}]</span> - <span style="color: var(--text-main); font-weight: 500; font-size: 0.8rem;">${item.meaning}</span></div>
                        </div>
                        <div style="display: flex; gap: 6px; align-items: center; flex-shrink: 0; margin-left: 8px;">
                            ${masteredStatusBtn}
                            <button onclick="speakUniversalText('${item.exCn.replace(/'/g, "\\'")}', false); event.stopPropagation();" style="background: white; border: 1px solid #cbd5e1; border-radius: 50%; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.75rem; cursor: pointer;" title="Đọc câu ví dụ">🔊</button>
                        </div>
                    </div>
                    <div style="font-size: 1.15rem; font-weight: bold; color: var(--accent); line-height: 1.3; word-break: break-all; white-space: normal;">${item.exCn || ''}</div>
                    <div style="font-size: 0.85rem; color: var(--primary); font-weight: 600; font-style: italic; word-break: break-all; white-space: normal;">${item.exPy || ''}</div>
                    <div style="font-size: 0.85rem; color: #475569; font-weight: 500; word-break: break-all; white-space: normal;">${item.exVn || ''}</div>
                </div>
            `;
            displayEl.style.display = 'block';
        }

        // Đánh dấu thuộc nhanh trực tiếp từ chi tiết câu ví dụ
        function toggleMasteredFromDetail(event, stt) {
            if (event) event.stopPropagation();
            toggleMasteredFromList(event, stt);
            showExampleDetail(stt);
        }

        // Khi click vào vùng hiển thị nghĩa và câu ví dụ thì đọc câu ví dụ
        function speakExampleFromDetail(event) {
            if (event.target.tagName === 'BUTTON' || event.target.closest('button')) {
                return;
            }
            const displayEl = document.getElementById('example-detail-display');
            if (!displayEl) return;
            const stt = displayEl.getAttribute('data-stt');
            if (!stt) return;
            const item = rawFlashcards.find(x => String(x.stt) === String(stt));
            if (item && item.exCn) {
                speakUniversalText(item.exCn, false);
            }
        }

        // Ẩn chi tiết câu ví dụ
        function hideExampleDetail(event) {
            if (event) event.stopPropagation();
            const displayEl = document.getElementById('example-detail-display');
            if (displayEl) {
                displayEl.style.display = 'none';
            }
        }

        // Hiển thị danh sách từ dưới dạng 1 bảng duy nhất gồm 5 cột và 20 dòng, không phân trang, hiển thị 1 nội dung tương ứng chế độ
        function renderWordListItems(filterText = '') {
            const container = document.getElementById('word-list-items-container');
            const savedScrollTop = container ? container.scrollTop : 0;
            const tableContainerBefore = container ? container.querySelector('.word-list-table-container') : null;
            const savedScrollLeft = tableContainerBefore ? tableContainerBefore.scrollLeft : 0;

            container.innerHTML = '';
            
            const query = filterText.toLowerCase().trim();
            
            // Toàn bộ các từ và ví dụ khớp với từ khóa tìm kiếm
            const queryMatched = rawFlashcards.filter(item => {
                if (!query) return true;
                const wordHanViet = (window.getHanVietForWord && typeof window.getHanVietForWord === 'function') 
                    ? window.getHanVietForWord(item.word) 
                    : '';
                return (item.word && item.word.toLowerCase().includes(query)) ||
                       (item.pinyin && item.pinyin.toLowerCase().includes(query)) ||
                       (item.meaning && item.meaning.toLowerCase().includes(query)) ||
                       (wordHanViet && wordHanViet.toLowerCase().includes(query)) ||
                       (item.exCn && item.exCn.toLowerCase().includes(query)) ||
                       (item.exPy && item.exPy.toLowerCase().includes(query)) ||
                       (item.exVn && item.exVn.toLowerCase().includes(query));
            });

            const totalCount = queryMatched.length;
            const masteredCount = queryMatched.filter(item => masteredIds.includes(currentHskLevel + '_' + item.stt)).length;
            const unmasteredCount = totalCount - masteredCount;

            // Cập nhật số đếm trực tiếp vào các tab lọc
            const tabAll = document.getElementById('list-filter-all');
            const tabMastered = document.getElementById('list-filter-mastered');
            const tabUnmastered = document.getElementById('list-filter-unmastered');
            if (tabAll) {
                tabAll.innerHTML = `🗂️ <b>${totalCount}</b>`;
                tabAll.title = `Tất cả (${totalCount})`;
            }
            if (tabMastered) {
                tabMastered.innerHTML = `✅ <b>${masteredCount}</b>`;
                tabMastered.title = `Đã thuộc (${masteredCount})`;
            }
            if (tabUnmastered) {
                tabUnmastered.innerHTML = `⏳ <b>${unmasteredCount}</b>`;
                tabUnmastered.title = `Chưa thuộc (${unmasteredCount})`;
            }

            // Lọc danh sách hiển thị theo tab đã chọn
            const filtered = queryMatched.filter(item => {
                const isMastered = masteredIds.includes(currentHskLevel + '_' + item.stt);
                if (listFilterMode === 'mastered') {
                    return isMastered;
                } else if (listFilterMode === 'unmastered') {
                    return !isMastered;
                }
                return true;
            });

            // Lấy từ đang hiển thị ở thẻ chính để bôi đậm
            const currentItem = paginatedFlashcards[currentIndex];

            // Xây dựng Table HTML gồm đúng 5 cột và 20 dòng
            let tableHtml = `
                <div class="word-list-table-container" style="width: 100%;">
                    <table class="word-list-table" style="width: 100%; border-collapse: collapse; table-layout: fixed; margin: 0;">
                        <tbody>
            `;

            for (let row = 0; row < 20; row++) {
                tableHtml += `<tr>`;
                for (let col = 0; col < 5; col++) {
                    const index = row * 5 + col;
                    const item = filtered[index];

                    if (item) {
                        const isMastered = masteredIds.includes(currentHskLevel + '_' + item.stt);
                        const isActive = currentItem && currentItem.stt === item.stt;
                        
                        const targetText = item.word;
                        const escapedTargetText = targetText.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                        const clickHandler = `onGridCellClick(event, '${item.stt}', '${escapedTargetText}');`;

                        const cellFontSize = '1.3rem';

                        tableHtml += `
                            <td class="grid-cell ${isActive ? 'active-word' : ''} ${isMastered ? 'item-mastered' : ''}" 
                                onclick="${clickHandler}" 
                                data-stt="${item.stt}"
                                style="font-size: ${cellFontSize};">
                                <span style="position: absolute; top: 2px; left: 4px; font-size: 0.65rem; color: #94a3b8; font-weight: bold; line-height: 1;">${item.stt}</span>
                                <span class="cell-text">${targetText}</span>
                            </td>
                        `;
                    } else {
                        // Ô trống để đủ 5 cột và 20 dòng
                        tableHtml += `
                            <td class="grid-cell empty-cell" 
                                style="border: 1px dashed #e2e8f0; height: 60px; background-color: #f8fafc; cursor: default; pointer-events: none;">
                                &nbsp;
                            </td>
                        `;
                    }
                }
                tableHtml += `</tr>`;
            }

            tableHtml += `
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = tableHtml;

            // Khôi phục lại vị trí cuộn dọc và cuộn ngang
            if (container) {
                container.scrollTop = savedScrollTop;
                const tableContainerAfter = container.querySelector('.word-list-table-container');
                if (tableContainerAfter) {
                    tableContainerAfter.scrollLeft = savedScrollLeft;
                }
            }
        }

        // Chuyển đổi trạng thái bộ lọc của danh sách từ
        function changeListFilter(mode) {
            listFilterMode = mode;
            
            // Cập nhật trạng thái class active cho các phím lọc
            document.querySelectorAll('.list-filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            const filterBtn = document.getElementById('list-filter-' + mode);
            if (filterBtn) {
                filterBtn.classList.add('active');
            }
            
            // Vẽ lại danh sách từ theo bộ lọc mới
            const query = document.getElementById('word-search').value;
            renderWordListItems(query);
        }

        function filterWordListItems() {
            const searchInput = document.getElementById('word-search');
            const clearBtn = document.getElementById('word-search-clear');
            const query = searchInput ? searchInput.value : '';
            
            if (clearBtn) {
                clearBtn.style.display = query ? 'flex' : 'none';
            }
            renderWordListItems(query);
        }

        function clearWordSearch() {
            const searchInput = document.getElementById('word-search');
            if (searchInput) {
                searchInput.value = '';
                searchInput.focus();
            }
            filterWordListItems();
        }

        // Thay đổi hiển thị pinyin/nghĩa/hán việt trong danh sách từ và thẻ học
        function toggleListFormat(type) {
            if (type === 'pinyin') {
                const pinyinChk = document.getElementById('show-pinyin-setting');
                if (pinyinChk) {
                    showListPinyin = pinyinChk.checked;
                    saveSetting('showListPinyin', showListPinyin);
                }
            } else if (type === 'meaning') {
                const meaningChk = document.getElementById('show-meaning-setting');
                if (meaningChk) {
                    showListMeaning = meaningChk.checked;
                    saveSetting('showListMeaning', showListMeaning);
                }
            } else if (type === 'hanviet') {
                const hanvietChk = document.getElementById('show-hanviet-setting');
                if (hanvietChk) {
                    showListHanViet = hanvietChk.checked;
                    saveSetting('showListHanViet', showListHanViet);
                    // Cập nhật lại giao diện thẻ chính ngay lập tức để ẩn/hiện Hán Việt trên thẻ
                    renderCard();
                }
            }
            const queryInput = document.getElementById('word-search');
            const query = queryInput ? queryInput.value : '';
            renderWordListItems(query);
        }

        // Chuyển đổi giữa chế độ hiển thị Từ (mặc định luôn hiển thị từ)
        function setListContentMode(mode) {
            listContentMode = 'word';
            saveSetting('listContentMode', 'word');
            
            // Đồng bộ hiển thị chi tiết nghĩa và câu ví dụ của từ hiện tại
            const detailDisplay = document.getElementById('example-detail-display');
            if (detailDisplay) {
                const currentItem = paginatedFlashcards[currentIndex];
                if (currentItem) {
                    showExampleDetail(currentItem.stt);
                } else {
                    detailDisplay.style.display = 'none';
                }
            }
            
            const queryInput = document.getElementById('word-search');
            const query = queryInput ? queryInput.value : '';
            renderWordListItems(query);
        }

        // Đồng bộ chuyển trang/vị trí thẻ khi click chọn từ từ danh sách
        function selectWordFromList(stt, preventSpeak = false) {
            // Tìm từ trong toàn bộ danh sách HSK gốc
            const itemIndexInRaw = rawFlashcards.findIndex(item => String(item.stt) === String(stt));
            if (itemIndexInRaw === -1) return;

            // Kiểm tra xem từ có nằm trong bộ lọc hiện không, nếu không thì reset bộ lọc về 'all'
            const matchInFiltered = filteredFlashcards.findIndex(item => String(item.stt) === String(stt));
            if (matchInFiltered === -1) {
                currentFilter = 'all';
                const filterBtn = document.getElementById('filter-toggle');
                filterBtn.innerHTML = "🗂️";
                filterBtn.title = "Xem: Tất cả";
                filterBtn.classList.remove('active');
                saveSetting('currentFilter', currentFilter);
                
                // Nếu chế độ là ngẫu nhiên, ta đưa về tuần tự để có tính định vị tự nhiên
                if (displayMode === 'random') {
                    displayMode = 'sequential';
                    const modeBtn = document.getElementById('display-mode-toggle');
                    modeBtn.innerHTML = "🔁";
                    modeBtn.title = "Chế độ: Tuần tự";
                    modeBtn.classList.remove('active');
                    saveSetting('displayMode', displayMode);
                }
                
                filteredFlashcards = [...rawFlashcards];
                const masteredCount = rawFlashcards.filter(item => masteredIds.includes(currentHskLevel + '_' + item.stt)).length;
                const unmasteredCount = rawFlashcards.length - masteredCount;
                document.getElementById('stats-text').innerText = `Thuộc: ${masteredCount} | Chưa thuộc: ${unmasteredCount}`;
            }

            // Tìm lại vị trí trong filteredFlashcards (vốn là thứ tự sequential chuẩn)
            const finalIndex = filteredFlashcards.findIndex(item => String(item.stt) === String(stt));
            if (finalIndex !== -1) {
                if (recordsPerPage === 'all') {
                    currentPage = 1;
                } else {
                    const size = parseInt(recordsPerPage);
                    currentPage = Math.floor(finalIndex / size) + 1;
                }
                saveSetting('currentPage_' + currentHskLevel, currentPage);
                
                // Đồng bộ hóa dropdown chọn trang
                const pageSelect = document.getElementById('page-select');
                const pageSelectLabel = document.getElementById('page-select-label');
                pageSelect.innerHTML = '';

                const pageItems = getPageSequentialItems();
                if (displayMode === 'random') {
                    paginatedFlashcards = shuffleList([...pageItems]);
                } else {
                    paginatedFlashcards = pageItems;
                }

                if (recordsPerPage === 'all') {
                    pageSelect.style.display = 'none';
                    pageSelectLabel.style.display = 'none';
                } else {
                    const size = parseInt(recordsPerPage);
                    const totalPages = Math.ceil(filteredFlashcards.length / size);

                    pageSelect.style.display = 'inline-block';
                    pageSelectLabel.style.display = 'inline-block';

                    for (let i = 1; i <= totalPages; i++) {
                        const option = document.createElement('option');
                        option.value = i;
                        option.innerText = `Trang ${i}`;
                        if (i === currentPage) {
                            option.selected = true;
                        }
                        pageSelect.appendChild(option);
                    }
                }

                // Định hướng đúng vị trí của stt đã chọn trong paginatedFlashcards (có thể đã shuffle)
                const foundIndex = paginatedFlashcards.findIndex(item => String(item.stt) === String(stt));
                if (foundIndex !== -1) {
                    currentIndex = foundIndex;
                } else {
                    currentIndex = 0;
                }
                saveSetting('currentIndex_' + currentHskLevel, currentIndex);
                renderCard(preventSpeak);
            }

            // Cập nhật trạng thái hiển thị 'active' của các phần tử trong danh sách từ mà không cần đóng modal hay vẽ lại toàn bộ
            const container = document.getElementById('word-list-items-container');
            if (container) {
                container.querySelectorAll('.grid-cell:not(.empty-cell)').forEach(el => {
                    if (el.getAttribute('data-stt') === String(stt)) {
                        el.classList.add('active-word');
                    } else {
                        el.classList.remove('active-word');
                    }
                });
            }
        }

        // Cho phép đánh dấu thuộc nhanh trực tiếp từ danh sách từ
        function toggleMasteredFromList(event, stt) {
            event.stopPropagation();
            const mKey = currentHskLevel + '_' + stt;
            
            const index = masteredIds.indexOf(mKey);
            let isNowMastered = false;
            if (index > -1) {
                masteredIds.splice(index, 1);
            } else {
                masteredIds.push(mKey);
                isNowMastered = true;
            }
            localStorage.setItem('hsk_mastered_ids', JSON.stringify(masteredIds));
            saveSetting('masteredIds', masteredIds);

            // Tìm thông tin từ gốc để sync lên Google Sheet
            const originalWordItem = rawFlashcards.find(item => String(item.stt) === String(stt));
            if (originalWordItem) {
                updateMasteredOnSheet(originalWordItem, isNowMastered);
            }

            // Cập nhật bộ đếm trong app nền
            const masteredCount = rawFlashcards.filter(item => masteredIds.includes(currentHskLevel + '_' + item.stt)).length;
            const unmasteredCount = rawFlashcards.length - masteredCount;
            document.getElementById('stats-text').innerText = `Thuộc: ${masteredCount} | Chưa thuộc: ${unmasteredCount}`;

            // Cập nhật CSS class của ô được click trực tiếp để không bị vẽ lại, không làm nhảy scroll
            const container = document.getElementById('word-list-items-container');
            if (container) {
                const cellEl = container.querySelector(`.grid-cell[data-stt="${stt}"]`);
                if (cellEl) {
                    if (isNowMastered) {
                        cellEl.classList.add('item-mastered');
                    } else {
                        cellEl.classList.remove('item-mastered');
                    }
                }
            }

            // Đồng bộ bộ đếm trên các tab bộ lọc
            const queryVal = document.getElementById('word-search').value.toLowerCase().trim();
            const queryMatched = rawFlashcards.filter(item => {
                if (!queryVal) return true;
                const wordHanViet = (window.getHanVietForWord && typeof window.getHanVietForWord === 'function') 
                    ? window.getHanVietForWord(item.word) 
                    : '';
                return (item.word && item.word.toLowerCase().includes(queryVal)) ||
                       (item.pinyin && item.pinyin.toLowerCase().includes(queryVal)) ||
                       (item.meaning && item.meaning.toLowerCase().includes(queryVal)) ||
                       (wordHanViet && wordHanViet.toLowerCase().includes(queryVal)) ||
                       (item.exCn && item.exCn.toLowerCase().includes(queryVal)) ||
                       (item.exPy && item.exPy.toLowerCase().includes(queryVal)) ||
                       (item.exVn && item.exVn.toLowerCase().includes(queryVal));
            });
            const qTotalCount = queryMatched.length;
            const qMasteredCount = queryMatched.filter(item => masteredIds.includes(currentHskLevel + '_' + item.stt)).length;
            const qUnunmasteredCount = qTotalCount - qMasteredCount;

            const tabAll = document.getElementById('list-filter-all');
            const tabMastered = document.getElementById('list-filter-mastered');
            const tabUnmastered = document.getElementById('list-filter-unmastered');
            if (tabAll) tabAll.innerHTML = `🗂️ <b>${qTotalCount}</b>`;
            if (tabMastered) tabMastered.innerHTML = `✅ <b>${qMasteredCount}</b>`;
            if (tabUnmastered) tabUnmastered.innerHTML = `⏳ <b>${qUnunmasteredCount}</b>`;

            // Cập nhật nút bôi đỏ/xanh mặt thẻ nếu thẻ hiện tại trùng từ vừa tick
            const currentItem = paginatedFlashcards[currentIndex];
            if (currentItem && String(currentItem.stt) === String(stt)) {
                const isMasteredNow = masteredIds.includes(mKey);
                const frontMarkBtn = document.getElementById('mark-btn-front');
                const backMarkBtn = document.getElementById('mark-btn-back');
                if (isMasteredNow) {
                    frontMarkBtn.classList.add('status-mastered');
                    backMarkBtn.classList.add('status-mastered');
                } else {
                    frontMarkBtn.classList.remove('status-mastered');
                    backMarkBtn.classList.remove('status-mastered');
                }
            }
        }

        // Lưu nghĩa tiếng Việt khi move out (blur) khỏi ô sửa
        function saveMeaningFromList(event, stt) {
            const newMeaning = event.target.innerText.trim();
            const wordItem = rawFlashcards.find(item => String(item.stt) === String(stt));
            if (!wordItem) return;

            // Nếu không thay đổi gì thì không cần lưu
            if (wordItem.meaning === newMeaning) return;

            wordItem.meaning = newMeaning;

            // Đồng bộ sang các mảng phụ khác
            const filteredItem = filteredFlashcards.find(item => String(item.stt) === String(stt));
            if (filteredItem) filteredItem.meaning = newMeaning;

            const paginatedItem = paginatedFlashcards.find(item => String(item.stt) === String(stt));
            if (paginatedItem) paginatedItem.meaning = newMeaning;

            // Lưu cache local IndexedDB
            saveSetting('rawFlashcards_' + currentHskLevel, rawFlashcards);

            // Cập nhật card hiển thị chính nếu đúng từ đang hoạt động
            const currentItem = paginatedFlashcards[currentIndex];
            if (currentItem && String(currentItem.stt) === String(stt)) {
                renderCard(true); // render lại mà không phát âm
            }

            // Gửi lên Google Sheet với hàm updateMasteredOnSheet chuẩn
            const isMastered = masteredIds.includes(currentHskLevel + '_' + wordItem.stt);
            updateMasteredOnSheet(wordItem, isMastered, true);
        }

        // Lưu câu dịch tiếng Việt khi move out (blur) khỏi ô sửa (ở chế độ ví dụ)
        function saveExVnFromList(event, stt) {
            const newExVn = event.target.innerText.trim();
            const wordItem = rawFlashcards.find(item => String(item.stt) === String(stt));
            if (!wordItem) return;

            // Nếu không thay đổi gì thì không cần lưu
            if (wordItem.exVn === newExVn) return;

            wordItem.exVn = newExVn;

            // Đồng bộ sang các mảng phụ khác
            const filteredItem = filteredFlashcards.find(item => String(item.stt) === String(stt));
            if (filteredItem) filteredItem.exVn = newExVn;

            const paginatedItem = paginatedFlashcards.find(item => String(item.stt) === String(stt));
            if (paginatedItem) paginatedItem.exVn = newExVn;

            // Lưu cache local IndexedDB
            saveSetting('rawFlashcards_' + currentHskLevel, rawFlashcards);

            // Cập nhật card hiển thị chính nếu đúng từ đang hoạt động
            const currentItem = paginatedFlashcards[currentIndex];
            if (currentItem && String(currentItem.stt) === String(stt)) {
                renderCard(true); // render lại mà không phát âm
            }

            // Gửi lên Google Sheet với hàm updateMasteredOnSheet chuẩn
            const isMastered = masteredIds.includes(currentHskLevel + '_' + wordItem.stt);
            updateMasteredOnSheet(wordItem, isMastered, true);
        }

        // Khởi tạo ứng dụng sau khi load cấu hình IndexedDB xong
        window.addEventListener('DOMContentLoaded', async () => {
            await initDatabase();
            
            // Khôi phục các trạng thái cấu hình từ database
            isTtsEnabled = await loadSetting('isTtsEnabled', true);
            currentFilter = await loadSetting('currentFilter', 'all');
            displayMode = await loadSetting('displayMode', 'sequential');
            currentHskLevel = await loadSetting('currentHskLevel', 'HSK10');
            recordsPerPage = await loadSetting('recordsPerPage', 'all');
            showListPinyin = await loadSetting('showListPinyin', true);
            showListMeaning = await loadSetting('showListMeaning', true);
            showListHanViet = await loadSetting('showListHanViet', true);
            listContentMode = await loadSetting('listContentMode', 'word');

            // Đồng bộ bộ nhớ danh sách đã học từ IndexedDB hoặc tự động nhập từ LocalStorage cũ nếu có
            const localMastered = JSON.parse(localStorage.getItem('hsk_mastered_ids') || '[]');
            masteredIds = await loadSetting('masteredIds', null);
            if (!masteredIds) {
                masteredIds = localMastered;
                saveSetting('masteredIds', masteredIds);
            }

            // Đồng bộ trạng thái UI tương ứng với cấu hình khôi phục
            document.getElementById('hsk-level-select').value = currentHskLevel;
            document.getElementById('records-per-page-select').value = recordsPerPage;
            
            // Đồng bộ chế độ hiển thị bảng từ
            setListContentMode(listContentMode);
            
            const ttsBtn = document.getElementById('tts-toggle');
            if (isTtsEnabled) {
                ttsBtn.innerHTML = "🔊";
                ttsBtn.title = "Âm thanh (TTS): BẬT";
                ttsBtn.classList.add('active');
            } else {
                ttsBtn.innerHTML = "🔇";
                ttsBtn.title = "Âm thanh (TTS): TẮT";
                ttsBtn.classList.remove('active');
            }

            const modeBtn = document.getElementById('display-mode-toggle');
            if (displayMode === 'random') {
                modeBtn.innerHTML = "🔀";
                modeBtn.title = "Chế độ: Ngẫu nhiên";
                modeBtn.classList.add('active');
            } else {
                modeBtn.innerHTML = "🔁";
                modeBtn.title = "Chế độ: Tuần tự";
                modeBtn.classList.remove('active');
            }

            const filterBtn = document.getElementById('filter-toggle');
            if (currentFilter === 'unmastered') {
                filterBtn.innerHTML = "⏳";
                filterBtn.title = "Xem: Chưa thuộc";
                filterBtn.classList.add('active');
            } else if (currentFilter === 'mastered') {
                filterBtn.innerHTML = "✅";
                filterBtn.title = "Xem: Đã thuộc";
                filterBtn.classList.add('active');
            } else {
                filterBtn.innerHTML = "🗂️";
                filterBtn.title = "Xem: Tất cả";
                filterBtn.classList.remove('active');
            }

            // Gọi tải dữ liệu và yêu cầu phục hồi đúng vị trí thẻ học của phiên làm việc trước đó
            fetchData(true);
        });
    </script>

    <!-- Word List Panel & Modal (Bottom Sheet style) -->
    <div id="word-list-modal" class="word-list-modal" onclick="closeWordListOnOverlay(event)">
        <div class="word-list-content">
            <div class="word-list-header" style="justify-content: flex-start; gap: 12px;">
                <button class="word-list-close" onclick="closeWordList(event)">✕</button>
                <h2 id="modal-title">Danh sách từ HSK</h2>
            </div>
            <div class="word-list-search-box">
                <div style="position: relative; width: 100%;">
                    <input type="text" id="word-search" class="search-input" placeholder="Tìm kiếm chữ Hán, Pinyin, nghĩa, ví dụ..." oninput="filterWordListItems()">
                    <button id="word-search-clear" onclick="clearWordSearch()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #cbd5e1; border: none; font-size: 0.75rem; color: #475569; cursor: pointer; display: none; padding: 0; border-radius: 50%; width: 20px; height: 20px; align-items: center; justify-content: center; line-height: 1; font-weight: bold; transition: all 0.2s;">✕</button>
                </div>
                <div class="list-filter-tabs" style="margin-top: 6px;">
                    <button id="list-filter-all" class="list-filter-btn active" onclick="changeListFilter('all')" title="Tất cả">🗂️ <b>-</b></button>
                    <button id="list-filter-mastered" class="list-filter-btn" onclick="changeListFilter('mastered')" title="Đã thuộc">✅ <b>-</b></button>
                    <button id="list-filter-unmastered" class="list-filter-btn" onclick="changeListFilter('unmastered')" title="Chưa thuộc">⏳ <b>-</b></button>
                </div>
                <div id="example-detail-display" onclick="speakExampleFromDetail(event)" style="display: none; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 12px; padding: 10px 12px; margin-top: 10px; display: flex; flex-direction: column; gap: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); position: relative; text-align: left; cursor: pointer;" title="Nhấn vào đây để nghe phát âm câu ví dụ">
                    <!-- Content will be inserted dynamically -->
                </div>
            </div>
            <div class="word-list-body" id="word-list-items-container">
                <!-- Nội dung được tự động kết nạp từ JS -->
            </div>
        </div>
    </div>

    <!-- Pinyin Panel & Modal -->
    <div id="pinyin-modal" class="pinyin-modal" onclick="closePinyinModalOnOverlay(event)">
        <div class="pinyin-content">
            <div class="pinyin-header" style="justify-content: space-between; gap: 12px; border-bottom: 1px solid #e2e8f0;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <button class="word-list-close" onclick="closePinyinModal(event)">✕</button>
                    <h2 style="font-size: 1.15rem; font-weight: bold; color: var(--primary);">Học Pinyin</h2>
                </div>
                <div>
                    <button class="select-box" onclick="window.open('https://hsk-gilt.vercel.app/hsk/pinin.html', '_blank')" style="display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 0.8rem; background-color: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 12px; padding: 4px 10px; cursor: pointer; color: #334155;">
                        Mở tab mới ↗
                    </button>
                </div>
            </div>
            <div class="pinyin-iframe-container" style="flex: 1; width: 100%; height: calc(100vh - 68px); overflow: hidden;">
                <iframe id="pinyin-iframe" class="pinyin-iframe" src="" style="width: 100%; height: 100%; border: none;"></iframe>
            </div>
        </div>
    </div>
</body>
</html>
