<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Japanese Reading</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="../com/assistive.js"></script>
  <script src="../com/TTSClient.js"></script>
  <script type="module" src="../com/japanese-lookup.js"></script>
  <style>
    body { font-family: system-ui, -apple-system; max-width: 800px; margin: auto; padding: 10px; background: #fff; color: #333; }
    
    /* Toolbar phẳng */
    .toolbar { 
      display: flex; align-items: center; justify-content: flex-start; 
      gap: 8px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #eee;
      flex-wrap: wrap;
    }
    .group { display: flex; align-items: center; gap: 4px; border-right: 1px solid #eee; padding-right: 8px; }
    .group:last-child { border-right: none; }
    
    button { 
      padding: 4px 8px; border-radius: 6px; border: 1px solid #ddd; 
      background: #fdfdfd; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; min-width: 32px; height: 32px;
    }
    button.active { background: #e0f2fe; border-color: #7dd3fc; color: #0369a1; }
    button:disabled { opacity: 0.2; }

    select { padding: 4px; font-size: 12px; border-radius: 6px; border: 1px solid #ddd; height: 32px; background: #fff; }

    /* Nội dung hiển thị - QUAN TRỌNG: Giữ nguyên format xuống dòng */
    .content-area { min-height: 120px; padding: 5px 0; }
    
    .ja-text { 
      font-size: 1.1em; color: #000; margin-bottom: 12px; 
      white-space: pre-wrap; /* Giữ nguyên xuống dòng */
      line-height: 1.6; 
    }
    
    .vi-text { 
      font-size: 0.95em; color: #666; font-style: italic; 
      white-space: pre-wrap; /* GIỮ NGUYÊN FORMAT XUỐNG DÒNG TIẾNG VIỆT */
      line-height: 1.5; 
      border-top: 1px dashed #eee; padding-top: 8px;
    }

    /* Modal */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; padding: 15px; border-radius: 12px; width: 90%; max-width: 450px; }
    textarea { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 8px; height: 150px; box-sizing: border-box; font-family: inherit; }
  </style>
</head>
<body>

<div class="toolbar">
  <div class="group">
    <button onclick="prevPage()" id="btnPrev">◀</button>
    <span id="pageInfo" style="font-size: 12px; font-weight: bold; min-width: 35px; text-align: center;">0/0</span>
    <button onclick="nextPage()" id="btnNext">▶</button>
  </div>

  <div class="group">
    <button id="btnPlayCur" onclick="playCurrent()" title="Phát âm">▶️</button>
    <button id="btnAudioToggle" onclick="toggleAudio()" title="Loa">🔊</button>
    <button id="btnRepeatOne" onclick="toggleRepeatOne()" title="Lặp 1">🔂</button>
    <button id="btnRepeatAll" onclick="toggleRepeatAll()" title="Tự động chuyển">🔁</button>
  </div>
  
  <div class="group">
    <select id="voice">
      <option value="ja-JP-KeitaNeural">Nam</option>
      <option value="ja-JP-NanamiNeural">Nữ</option>
    </select>
    <select id="rate">
      <option value="0.8">Chậm</option>
      <option value="1.0" selected>Chuẩn</option>
      <option value="1.2">Nhanh</option>
    </select>
  </div>

  <div class="group">
    <button onclick="openEditor()">✏️</button>
  </div>
</div>

<div class="content-area">
  <div class="ja-text" id="currentJa">Đang tải...</div>
  <div class="vi-text" id="currentVi"></div>
</div>

<div id="editorModal" class="modal">
  <div class="modal-content">
    <label style="font-size: 12px; color: #666;">Nhập nội dung (Dùng dấu | để tách Việt - Nhật)</label>
    <textarea id="textInput" placeholder="Ví dụ: こんにちは | Xin chào"></textarea>
    <div style="display: flex; gap: 5px; margin-top: 10px;">
      <button onclick="addText()" style="flex:1">Thêm</button>
      <button onclick="updateText()" style="flex:1">Lưu</button>
      <button onclick="deleteText()" style="color:red">Xoá</button>
      <button onclick="closeEditor()">Đóng</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyNX96iC37hc8AunT8zWlG_yTFB2ipZp90-XivW8hWzVYVne9nftCC3mSFoTk10v93t/exec";
let texts = [], currentIndex = 0, repeatOne = false, repeatAll = false, isAudioEnabled = true;

const jaDisplay = document.getElementById("currentJa"), viDisplay = document.getElementById("currentVi"), pageInfo = document.getElementById("pageInfo");

function loadSettings() {
  const v = localStorage.getItem("voice"), r = localStorage.getItem("rate");
  if (v) document.getElementById("voice").value = v; 
  if (r) document.getElementById("rate").value = r;
  currentIndex = parseInt(localStorage.getItem("lastIndex") || 0);
  isAudioEnabled = localStorage.getItem("audioEnabled") !== "false";
  repeatOne = localStorage.getItem("repeatOne") === "true";
  repeatAll = localStorage.getItem("repeatAll") === "true";
  updateUIStates();
}

function updateUIStates() {
  document.getElementById("btnRepeatOne").classList.toggle("active", repeatOne);
  document.getElementById("btnRepeatAll").classList.toggle("active", repeatAll);
  const btnAudio = document.getElementById("btnAudioToggle");
  btnAudio.textContent = isAudioEnabled ? "🔊" : "🔇";
  btnAudio.classList.toggle("active", isAudioEnabled);
}

function toggleAudio() { 
  isAudioEnabled = !isAudioEnabled; 
  localStorage.setItem("audioEnabled", isAudioEnabled); 
  if (!isAudioEnabled && window.speechSynthesis) window.speechSynthesis.cancel();
  updateUIStates(); 
}

function openEditor() { 
  const current = texts[currentIndex];
  // Hiển thị dạng Nhật | Việt trong ô sửa để dễ chỉnh sửa format
  document.getElementById("textInput").value = current ? `${current.ja} | ${current.vi}` : ""; 
  document.getElementById("editorModal").style.display = "flex"; 
}
function closeEditor() { document.getElementById("editorModal").style.display = "none"; }

async function loadTexts() {
  try {
    const res = await fetch(GAS_URL + `?_t=${Date.now()}`);
    const data = await res.json();
    texts = Array.isArray(data) ? data.filter(i => i.ja) : [];
    renderCurrent();
  } catch (e) { jaDisplay.textContent = "Lỗi kết nối"; }
}

function renderCurrent() {
  if (!texts.length) { jaDisplay.textContent = "Trống"; viDisplay.textContent = ""; return; }
  if (currentIndex >= texts.length) currentIndex = 0;
  jaDisplay.textContent = texts[currentIndex].ja;
  viDisplay.textContent = texts[currentIndex].vi;
  pageInfo.textContent = `${currentIndex + 1}/${texts.length}`;
  document.getElementById("btnPrev").disabled = (currentIndex <= 0);
  document.getElementById("btnNext").disabled = (currentIndex >= texts.length - 1 && !repeatAll);
  localStorage.setItem("lastIndex", currentIndex);
}

function navigate(idx) {
  if (idx >= 0 && idx < texts.length) { currentIndex = idx; renderCurrent(); if (isAudioEnabled) playCurrent(); }
  else if (repeatAll && texts.length > 0) { currentIndex = 0; renderCurrent(); if (isAudioEnabled) playCurrent(); }
}

function nextPage() { navigate(currentIndex + 1); }
function prevPage() { navigate(currentIndex - 1); }

async function playCurrent() {
  if (!texts[currentIndex] || !isAudioEnabled) return;
  const btnPlay = document.getElementById("btnPlayCur");
  btnPlay.classList.add("active");
  try {
    await speakCommon({ 
      text: texts[currentIndex].ja, 
      voice: document.getElementById("voice").value, 
      rate: document.getElementById("rate").value 
    });
  } finally {
    btnPlay.classList.remove("active");
    if (isAudioEnabled) {
      if (repeatOne) playCurrent();
      else if (repeatAll || currentIndex < texts.length - 1) setTimeout(nextPage, 600);
    }
  }
}

async function callGas(d) { return fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(d) }); }
async function addText() { await callGas({ action: "add", text: document.getElementById("textInput").value }); location.reload(); }
async function updateText() { await callGas({ action: "update", index: currentIndex, text: document.getElementById("textInput").value }); location.reload(); }
async function deleteText() { if(confirm("Xoá?")) { await callGas({ action: "delete", index: currentIndex }); location.reload(); } }

function toggleRepeatOne() { repeatOne = !repeatOne; if(repeatOne) repeatAll = false; saveRepeat(); }
function toggleRepeatAll() { repeatAll = !repeatAll; if(repeatAll) repeatOne = false; saveRepeat(); }
function saveRepeat() { localStorage.setItem("repeatOne", repeatOne); localStorage.setItem("repeatAll", repeatAll); updateUIStates(); }

document.getElementById("voice").onchange = (e) => localStorage.setItem("voice", e.target.value);
document.getElementById("rate").onchange = (e) => localStorage.setItem("rate", e.target.value);

loadSettings();
loadTexts();
</script>
</body>
</html>
