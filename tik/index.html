<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS Drive Auto-Next Player</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #00ff88;
            --error-color: #cf6679;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-color);
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .container { 
            width: 90%; 
            max-width: 900px; 
            background-color: var(--container-bg); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
        }
        h1 { 
            text-align: center; 
            font-size: 1.4rem; 
            margin-top: 0; 
            color: var(--accent-color); 
        }
        .main-layout { 
            display: flex; 
            gap: 15px; 
            flex-direction: column; 
        }
        @media (min-width: 600px) { 
            .main-layout { flex-direction: row; } 
        }
        .player-section { flex: 2; }
        .playlist-section { 
            flex: 1; 
            background-color: #2c2c2c; 
            padding: 10px; 
            border-radius: 8px; 
            max-height: 400px; 
            overflow-y: auto; 
        }
        .video-wrapper { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            background-color: #000; 
            border-radius: 8px; 
            overflow: hidden; 
        }
        video { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            outline: none; 
        }
        .playlist-item { 
            padding: 10px; 
            background-color: #1e1e1e; 
            margin-bottom: 8px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 13px; 
            transition: background 0.2s; 
            border: 1px solid transparent; 
        }
        .playlist-item:hover { background-color: #3a3a3a; }
        .playlist-item.active { 
            border-color: var(--accent-color); 
            background-color: #25382c; 
        }
        .controls { 
            margin-top: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        button { 
            padding: 10px 15px; 
            border-radius: 6px; 
            border: none; 
            background-color: var(--accent-color); 
            color: #000; 
            font-weight: bold; 
            cursor: pointer; 
        }
        button:hover { opacity: 0.9; }
        #error-msg { 
            color: var(--error-color); 
            font-size: 13px; 
            margin-top: 10px; 
            display: none; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hệ Thống Tự Động Chuyển Video (Sử Dụng GAS)</h1>
    <div class="main-layout">
        <div class="player-section">
            <div class="video-wrapper">
                <video id="main-player" controls autoplay muted preload="auto">Trình duyệt không hỗ trợ thẻ video.</video>
            </div>
            <div class="controls">
                <span id="playing-title" style="font-size:14px; color: #aaa;">Đang nạp dữ liệu...</span>
                <button id="next-btn">Bài Tiếp Theo ⏭️</button>
            </div>
            <div id="error-msg"></div>
        </div>
        <div class="playlist-section">
            <h3 style="margin-top:0; font-size:14px; color: var(--accent-color);">Danh sách phát</h3>
            <div id="playlist-container"></div>
        </div>
    </div>
</div>

<script>
    // Hàm ghi log Frontend đúng quy chuẩn yêu cầu
    function logEvent(message, data = '') {
        const timestamp = new Date().toISOString();
        console.log(`[FRONTEND][${timestamp}] ${message}`, data);
    }

    // ⚠️ DÁN LINK GAS CỦA BẠN VÀO ĐÂY
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycby0kzPC-MjF90ATSyYAvoSNlJRlY0hKNXrlKJbRFb_z_5ZqpYIGHI18In4Eu3yQmmrq_A/exec";

    let playlist = [];
    let currentVideoIndex = 0;
    
    const player = document.getElementById('main-player');
    const playlistContainer = document.getElementById('playlist-container');
    const playingTitle = document.getElementById('playing-title');
    const errorMsg = document.getElementById('error-msg');
    const nextBtn = document.getElementById('next-btn');

    // Gọi GAS để lấy danh sách
    async function loadPlaylistFromGAS() {
        logEvent('Đang gửi yêu cầu lấy danh sách tới GAS...');
        playingTitle.textContent = 'Đang quét thư mục Drive...';
        
        try {
            const response = await fetch(GAS_API_URL);
            const result = await response.json();
            
            if (result.success && result.data.length > 0) {
                playlist = result.data;
                logEvent(`Đã lấy thành công ${playlist.length} video.`);
                initPlaylist();
                playVideoAtIndex(0);
            } else {
                throw new Error(result.message || 'Thư mục trống hoặc lỗi kết nối.');
            }
        } catch (error) {
            logEvent('LỖI không nạp được danh sách:', error.message);
            errorMsg.textContent = 'Không thể kết nối tới Google Apps Script. Hãy kiểm tra lại URL hoặc phân quyền GAS.';
            errorMsg.style.display = 'block';
            playingTitle.textContent = 'Lỗi kết nối!';
        }
    }

    function initPlaylist() {
        playlistContainer.innerHTML = '';
        playlist.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `playlist-item ${index === currentVideoIndex ? 'active' : ''}`;
            div.textContent = `${index + 1}. ${item.title}`;
            div.onclick = () => playVideoAtIndex(index);
            playlistContainer.appendChild(div);
        });
    }

    function playVideoAtIndex(index) {
        if (playlist.length === 0) return;
        if (index >= playlist.length) { 
            logEvent('Hết danh sách, quay lại đầu.'); 
            index = 0; 
        }
        
        currentVideoIndex = index;
        const videoData = playlist[index];
        errorMsg.style.display = 'none';
        
        logEvent(`Đang nạp video:`, videoData.title);
        initPlaylist();
        playingTitle.textContent = `Đang phát: ${videoData.title}`;
        
        // Nạp thẳng link bypass đã được GAS xử lý sẵn
        player.src = videoData.src;
        player.play().catch(e => logEvent('Tự động phát bị chặn (Cần click tương tác):', e));
    }

    // Sự kiện TỰ ĐỘNG CHUYỂN BÀI khi hết video
    player.onended = () => {
        logEvent('Hết video, tự động chuyển bài.');
        playVideoAtIndex(currentVideoIndex + 1);
    };

    // Sự kiện nút Bấm Next thủ công
    nextBtn.addEventListener('click', () => {
        logEvent('Bấm Next thủ công.');
        playVideoAtIndex(currentVideoIndex + 1);
    });

    player.onerror = () => {
        logEvent('LỖI nạp luồng video từ Google Drive.');
        errorMsg.textContent = 'Lỗi nạp video! Vui lòng kiểm tra quyền chia sẻ công khai của file trên Google Drive.';
        errorMsg.style.display = 'block';
    };

    // Khởi chạy
    loadPlaylistFromGAS();
</script>
</body>
</html>
