<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Media Scheduler Pro</title>
</head>
<body>

<h1>🎶 Media Scheduler</h1>

<button id="auth_button">
    🔗 Kết nối Google Photos
</button>

<div id="media-display"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
const CLIENT_ID =
'468623053565-0km0r3d4du83a3vjsk94ilnkv35qplge.apps.googleusercontent.com';

const SCOPES =
'https://www.googleapis.com/auth/photoslibrary.readonly';

let tokenClient = null;
let accessToken = null;

function initializeGoogleAuth() {

    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,

        callback: async (response) => {

            if (response.error) {
                console.error("OAuth Error:", response);
                alert("Đăng nhập thất bại");
                return;
            }

            accessToken = response.access_token;

            console.log("Access Token:", accessToken);

            await listPhotos();
        }
    });

    console.log("Google Auth Initialized");
}

window.onload = () => {

    const waitGoogle = setInterval(() => {

        if (window.google &&
            google.accounts &&
            google.accounts.oauth2) {

            clearInterval(waitGoogle);

            initializeGoogleAuth();
        }

    }, 300);
};

document
.getElementById('auth_button')
.onclick = () => {

    if (!tokenClient) {
        alert("Google Client chưa sẵn sàng");
        return;
    }

    tokenClient.requestAccessToken({
        prompt: 'consent'
    });
};

async function listPhotos() {

    if (!accessToken) {
        alert("Chưa có token");
        return;
    }

    try {

        const response = await fetch(
            'https://photoslibrary.googleapis.com/v1/mediaItems?pageSize=20',
            {
                method: 'GET',
                headers: {
                    Authorization: `Bearer ${accessToken}`
                }
            }
        );

        const data = await response.json();

        console.log("API Response:", data);

        if (!response.ok) {

            console.error(data);

            alert(
                "Google Photos API lỗi:\n" +
                JSON.stringify(data, null, 2)
            );

            return;
        }

        renderPhotos(data.mediaItems || []);

    } catch (err) {

        console.error("Fetch Error:", err);

    }
}

function renderPhotos(items) {

    const div = document.getElementById('media-display');

    div.innerHTML = '';

    items.forEach(item => {

        const img = document.createElement('img');

        img.src = item.baseUrl + '=w300-h300';

        img.style.width = '200px';
        img.style.margin = '10px';

        div.appendChild(img);
    });
}
</script>

</body>
</html>
