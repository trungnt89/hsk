<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diary - AI Integrated</title>
    <script type="module">
        import JapaneseLookup from '../com/japanese-lookup.js?v=1';
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Đã xóa toàn bộ CSS theo yêu cầu */
    </style>
</head>
<body class="bg-light text-dark d-flex flex-column vh-100 overflow-hidden">
    <script src="../com/assistive.js"></script>
    <script src="../com/TTSClient.js"></script>

    <header class="bg-primary bg-gradient text-white py-2 px-3 text-center shadow-sm flex-shrink-0">
        <h1 class="fs-5 fw-semibold m-0">Diary & AI</h1>
    </header>

    <main class="flex-grow-1 overflow-hidden p-2 d-flex flex-column gap-2">
        <div class="bg-white p-2 rounded-3 shadow-sm flex-shrink-0">
            <textarea id="diaryInput" class="form-control" style="resize: none; height: 120px;" placeholder="Hôm nay của bạn thế nào?..."></textarea>
            <div class="d-flex justify-content-between align-items-center mt-2 gap-1 w-100">
                <button id="cancelBtn" class="btn btn-secondary btn-sm" style="display:none;">Hủy</button>
                <button id="saveBtn" class="btn btn-primary btn-sm flex-shrink-1">Lưu lại</button>
                <div class="d-flex align-items-center gap-1 ms-auto flex-grow-1 justify-content-end overflow-hidden">
                    <button id="btnMainSpeak" class="btn btn-success btn-sm rounded-pill flex-shrink-1" style="min-width: 65px;" onclick="handleGlobalSpeak()" disabled>🔊 Đọc</button>
                    <button id="btnRepeat" class="btn btn-outline-secondary btn-sm" onclick="toggleRepeat()">🔂</button>
                    <select id="voiceSelect" class="form-select form-select-sm w-auto" style="width: auto; font-size: 11px;" onchange="saveTTSSettings()">
                        <option value="ja-JP-KeitaNeural" selected>Nam (JP)</option>
                        <option value="ja-JP-NanamiNeural" >Nữ (JP)</option>
                    </select>
                    <select id="rateSelect" class="form-select form-select-sm w-auto" style="width: auto; font-size: 11px;" onchange="saveTTSSettings()">
                        <option value="0.65">0.65</option>
                        <option value="0.68">0.68</option>
                        <option value="0.70" selected>0.70</option>
                        <option value="0.72">0.72</option>
                        <option value="0.75">0.75</option>
                        <option value="0.80">0.80</option>
                        <option value="1.0">1.0</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="d-flex bg-light rounded-2 p-1 gap-1 flex-shrink-0">
            <button class="tab-btn flex-grow-1 btn btn-outline-secondary btn-sm active" id="tab-btn-0" onclick="switchTab(0)">
                <span>📝 Nhật ký</span>
                <div class="toggle-container d-inline-flex align-items-center position-relative ms-1" id="pinToggleWrapper" onclick="event.stopPropagation(); togglePinFilter()">
                    <span class="toggle-label small me-1 fw-bold d-none" id="pinLabelText">Tất cả</span>
                    <div class="toggle-switch position-relative" style="width: 30px; height: 16px; background-color: #ccc; border-radius: 10px; transition: 0.3s;"></div>
                </div>
            </button>
            <button class="tab-btn flex-grow-1 btn btn-outline-secondary btn-sm" id="tab-btn-1" onclick="switchTab(1)">📖 Đoạn văn</button>
            <button class="tab-btn flex-grow-1 btn btn-outline-secondary btn-sm" id="tab-btn-2" onclick="switchTab(2)">💬 Hội thoại</button>
        </div>

        <div id="tab-diary" class="tab-content flex-grow-1 overflow-auto pb-4" style="display: block;">
            <div id="diaryContainer"><p class="text-center py-5 text-secondary">Đang tải dữ liệu...</p></div>
        </div>
        <div id="tab-paragraph" class="tab-content flex-grow-1 overflow-auto pb-4" style="display: none;"><div id="paragraphContainer"></div></div>
        <div id="tab-conversation" class="tab-content flex-grow-1 overflow-auto pb-4" style="display: none;"><div id="conversationContainer"></div></div>
    </main>

    <div id="audioModal" class="modal fade" tabindex="-1" style="display: none;">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header py-2 px-3 bg-light">
                    <button class="btn btn-sm btn-outline-danger" onclick="closeAudioModal()">✕ ĐÓNG</button>
                    <button class="btn btn-sm btn-outline-success" onclick="reloadAudioModal()">F5 RELOAD</button>
                    <button class="btn btn-sm btn-outline-primary" onclick="backAudioModal()">BACK ↩</button>
                </div>
                <div class="modal-body p-0">
                    <iframe id="audioFrame" class="w-100 border-0" style="height: 500px;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIG URLS
        const VERCEL_URL = 'https://hsk-gilt.vercel.app/api/gSheet';
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwoSa8pQjddIlaP5cv-whNGFAd2j4sX3XuaFXHnwyQzdVvQ7nO8CWQTc2ykbHpO7OEw/exec';

        let currentDiaries = [];
        let editingId = null;
        let urlId = new URLSearchParams(window.location.search).get('id');
        let selectedDiaryId = urlId || localStorage.getItem("diary_selected_id") || null;
        if (urlId && urlId !== localStorage.getItem("diary_selected_id")) localStorage.setItem("diary_selected_id", urlId);
        let isRepeating = localStorage.getItem("diary_repeat") === "true";
        let currentTabIndex = parseInt(localStorage.getItem("diary_current_tab")) || 0;
        let showPinnedOnly = localStorage.getItem("diary_show_pinned_only") === "true";

        document.addEventListener('DOMContentLoaded', () => {
            console.log("[System] App Initialized");
            initApp();
            loadTTSSettings();
            document.getElementById('saveBtn').addEventListener('click', () => {
                editingId ? updateDiary() : saveDiary();
            });
            document.getElementById('cancelBtn').addEventListener('click', clearEditMode);
        });

        async function initApp() {
            loadDiaries();
        }

        async function loadDiaries() {
            try {
                const response = await fetch(VERCEL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        sheet: 'DairyList', 
                        act: 'read', 
                        spread: '1UiAS_mUhl6j6wHyPkNiol9pclzkQJWD4qzPIZD2sx3k' 
                    })
                });
                const data = await response.json();
                if (data.values) {
                    currentDiaries = data.values.map(r => ({
                        id: r[0], date: r[1], text: r[2], paragraph: r[3], conversation: r[4], pinned: String(r[5]).toLowerCase() === 'true', voiceCount: parseInt(r[6] || 0)
                    })).reverse();
                    renderList(currentDiaries);
                    if (selectedDiaryId) selectRecord(selectedDiaryId, true);
                }
            } catch (err) { console.warn("[Sync] Offline mode"); }
        }

        async function callAPI(paramsObj) {
            try {
                const response = await fetch(VERCEL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(paramsObj)
                });
                return await response.json();
            } catch (e) {
                console.error("[Sync Error]:", e);
                return { status: 'error', message: "Lỗi kết nối server" };
            }
        }

        async function callGAS(paramsObj) {
            console.log("[GAS Action]:", paramsObj.action);
            const params = new URLSearchParams();
            for (const key in paramsObj) if (paramsObj[key] != null) params.append(key, paramsObj[key]);
            try {
                const response = await fetch(`${GAS_URL}?${params.toString()}`);
                return await response.json();
            } catch (e) {
                console.error("[Sync Error]:", e);
                return { status: 'error', message: "Lỗi kết nối" };
            }
        }
        
        function renderList(diaries) {
            const container = document.getElementById('diaryContainer');
            container.innerHTML = '';
            const toggleWrapper = document.getElementById('pinToggleWrapper');
            const pinLabel = document.getElementById('pinLabelText');
            if(toggleWrapper) {
                if(showPinnedOnly){
                    toggleWrapper.classList.add('active');
                    toggleWrapper.querySelector('.toggle-switch').style.backgroundColor = '#2ecc71';
                    toggleWrapper.querySelector('.toggle-switch').style.setProperty('background-color', '#2ecc71', 'important');
                } else {
                    toggleWrapper.classList.remove('active');
                    toggleWrapper.querySelector('.toggle-switch').style.backgroundColor = '#ccc';
                }
                if(pinLabel) pinLabel.innerText = showPinnedOnly ? "Ghim" : "Tất cả";
            }
            let displayData = diaries;
            if (showPinnedOnly) {
                displayData = diaries.filter(d => d.pinned);
            }
            displayData.forEach((item) => container.appendChild(createItemEl(item)));
            getLessonTotalScore(); 
        }

        function createItemEl(item) {
            const isGen = !!(item.paragraph || item.conversation);
            const div = document.createElement('div');
            div.className = `card mb-2 rounded-2 border-start border-4 ${item.id == selectedDiaryId ? 'border-warning bg-warning bg-opacity-10' : 'border-secondary'} ${item.pinned ? 'border-warning bg-warning bg-opacity-25' : ''}`;
            div.id = `item-${item.id}`;
            div.style.cursor = 'pointer';
            div.onclick = (e) => {
                if (!e.target.closest('.item-action-btn') && !e.target.closest('.count-trigger')) {
                    selectRecord(item.id);
                }
            };
            div.innerHTML = `
                <div class="card-body p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div class="small text-secondary fw-semibold">
                            ${item.date} - ${item.id}
                            <span class="count-trigger d-inline-block ms-2 text-white rounded-pill px-2 py-1 small fw-bold" 
                                  onclick="event.stopPropagation(); handleRecordBadgeClick('${item.id}')" 
                                  style="background-color:${item.voiceCount > 0 ? '#e67e22' : '#ccc'}; cursor:pointer;">
                                🎙️ ${item.voiceCount || 0}
                            </span>
                        </div>
                        <div class="d-flex gap-2">
                            <div class="item-action-btn text-primary small fw-semibold" style="cursor:pointer;" onclick="event.stopPropagation(); startEdit('${item.id}', \`${item.text.replace(/`/g, '\\`')}\`)">✏️ Sửa</div>
                            <div class="item-action-btn text-danger small fw-semibold" style="cursor:pointer;" onclick="event.stopPropagation(); deleteDiary('${item.id}')">🗑️ Xóa</div>
                        </div>
                    </div>
                    <div class="diary-content fs-6 lh-base mb-2">${item.text}</div>
                    <div class="d-flex justify-content-between align-items-center pt-2 border-top">
                        <div class="item-action-btn text-warning small fw-semibold flex-grow-1 text-center" style="cursor:pointer;" onclick="event.stopPropagation(); togglePin('${item.id}')">${item.pinned ? '📍 Bỏ' : '📌 Ghim'}</div>
                        <div class="item-action-btn text-primary small fw-semibold flex-grow-1 text-center ${item.paragraph ? '' : 'opacity-50'}" style="cursor:pointer;" onclick="event.stopPropagation(); selectRecord('${item.id}'); switchTab(1)">📖 Đoạn</div>
                        <div class="item-action-btn text-warning small fw-semibold flex-grow-1 text-center ${item.conversation ? '' : 'opacity-50'}" style="cursor:pointer;" onclick="event.stopPropagation(); selectRecord('${item.id}'); switchTab(2)">💬 Hội thoại</div>
                        <div class="item-action-btn text-success small fw-semibold flex-grow-1 text-center ${isGen ? 'fw-bold' : ''}" style="cursor:pointer;" onclick="event.stopPropagation(); askAI('${item.id}', \`${item.text.replace(/`/g, '\\`')}\`)">${isGen ? '✅ AI' : '✨ AI'}</div>
                    </div>
                </div>
            `;
            return div;
        }

        function handleRecordBadgeClick(id) {
            selectRecord(id);
            const modalEl = document.getElementById('audioModal');
            const modal = new bootstrap.Modal(modalEl);
            document.getElementById('audioFrame').src = `./recorder.html?lessionId=${id}&tab=1`;
            modal.show();
        }

        function closeAudioModal() {
            const modalEl = document.getElementById('audioModal');
            const modal = bootstrap.Modal.getInstance(modalEl);
            if(modal) modal.hide();
            document.getElementById('audioFrame').src = "";
        }

        function backAudioModal() {
            const iframe = document.getElementById('audioFrame');
            if (iframe.contentWindow) iframe.contentWindow.history.back();
        }

        function reloadAudioModal() {
            const iframe = document.getElementById('audioFrame');
            if (iframe.src) iframe.src = iframe.src;
        }

        async function saveDiary() {
            const text = document.getElementById('diaryInput').value.trim();
            if (!text) return;
            const id = Date.now().toString(), date = new Date().toLocaleString('vi-VN');
            const newItem = { id, date, text, paragraph: "", conversation: "", pinned: false, voiceCount: 0 };
            currentDiaries.unshift(newItem);
            renderList(currentDiaries);
            document.getElementById('diaryInput').value = '';
            const rowData = [id, date, text, "", "", "false", 0];
            await callAPI({ act: 'add', sheet: 'DairyList', spread: '1UiAS_mUhl6j6wHyPkNiol9pclzkQJWD4qzPIZD2sx3k', data: JSON.stringify(rowData) });
            selectRecord(id, true);
        }

        function startEdit(id, text) {
            editingId = id;
            document.getElementById('diaryInput').value = text;
            document.getElementById('saveBtn').innerText = 'Cập nhật';
            document.getElementById('cancelBtn').style.display = 'inline-block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function updateDiary() {
            const text = document.getElementById('diaryInput').value.trim();
            const idx = currentDiaries.findIndex(i => i.id == editingId);
            if (idx === -1) return;
            const item = currentDiaries[idx];
            item.text = text;
            renderList(currentDiaries);
            const tid = editingId;
            clearEditMode();
            const rowData = [item.id, item.date, item.text, item.paragraph, item.conversation, String(item.pinned), item.voiceCount];
            await callAPI({ act: 'updateByPosVal', pos: 0, val: tid, sheet: 'DairyList', spread: '1UiAS_mUhl6j6wHyPkNiol9pclzkQJWD4qzPIZD2sx3k', data: JSON.stringify(rowData) });
        }

        async function deleteDiary(id) {
            if (confirm("Xóa nhật ký này?")) {
                currentDiaries = currentDiaries.filter(i => i.id != id);
                renderList(currentDiaries);
                await callAPI({ act: 'deleteByPosVal', pos: 0, val: id, sheet: 'DairyList', spread: '1UiAS_mUhl6j6wHyPkNiol9pclzkQJWD4qzPIZD2sx3k' });
            }
        }

        function togglePinFilter() {
            showPinnedOnly = !showPinnedOnly;
            localStorage.setItem("diary_show_pinned_only", showPinnedOnly);
            renderList(currentDiaries);
        }

        async function togglePin(id) {
            const idx = currentDiaries.findIndex(d => d.id == id);
            if (idx === -1) return;
            const item = currentDiaries[idx];
            item.pinned = !item.pinned;
            renderList(currentDiaries);
            const rowData = [item.id, item.date, item.text, item.paragraph, item.conversation, String(item.pinned), item.voiceCount];
            await callAPI({ act: 'updateByPosVal', pos: 0, val: id, sheet: 'DairyList', spread: '1UiAS_mUhl6j6wHyPkNiol9pclzkQJWD4qzPIZD2sx3k', data: JSON.stringify(rowData) });
        }

        async function askAI(id, content) {
            selectRecord(id); switchTab(1);
            const pContainer = document.getElementById('paragraphContainer'), cContainer = document.getElementById('conversationContainer');
            pContainer.innerHTML = cContainer.innerHTML = '<p class="text-center py-5 text-secondary">🤖 Đang biên soạn nội dung...</p>';
            const res = await (await fetch('https://hsk-gilt.vercel.app/api/aiGenerate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content, lessionId: id })
            })).json();
            if (res.status === 'success') {
                const idx = currentDiaries.findIndex(d => d.id == id);
                if (idx !== -1) {
                    currentDiaries[idx].paragraph = res.paragraph;
                    currentDiaries[idx].conversation = res.conversation;
                    renderList(currentDiaries); updateAIView();
                }
            }else{
                alert(res.message);
                switchTab(0);
            }
        }

        function switchTab(index) {
            currentTabIndex = index;
            localStorage.setItem("diary_current_tab", index);
            document.querySelectorAll('.tab-content').forEach((tab, i) => {
                tab.style.display = i === index ? 'block' : 'none';
            });
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                if(i === index){
                    btn.classList.add('active', 'btn-primary');
                    btn.classList.remove('btn-outline-secondary');
                } else {
                    btn.classList.remove('active', 'btn-primary');
                    btn.classList.add('btn-outline-secondary');
                }
            });
            updateAIView();
        }

        function selectRecord(id, scroll = true) {
            selectedDiaryId = id; localStorage.setItem("diary_selected_id", id);
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('id', id);
            window.history.replaceState({}, '', newUrl); 
            document.querySelectorAll('.diary-item').forEach(el => el.classList.remove('selected'));
            const el = document.getElementById(`item-${id}`);
            if (el) { 
                el.classList.add('selected'); 
                if (scroll) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100); 
            }
            updateAIView();
        }

        function updateAIView() {
            const item = currentDiaries.find(d => d.id == selectedDiaryId);
            if (!item) return;
            const pContent = item.paragraph;
            const cContent = item.conversation;
            document.getElementById('paragraphContainer').innerHTML = pContent ? `<div id="p-content" class="card p-3 mb-2 rounded-2 border-start border-4 border-success bg-white lh-base">${pContent}</div>` : `<p class="text-center py-5 text-secondary">Chưa có nội dung AI.</p>`;
            document.getElementById('conversationContainer').innerHTML = cContent ? `<div id="c-content" class="card p-3 mb-2 rounded-2 border-start border-4 border-success bg-white lh-base">${cContent}</div>` : `<p class="text-center py-5 text-secondary">Chưa có nội dung AI.</p>`;
            const btnSpeak = document.getElementById('btnMainSpeak');
            btnSpeak.disabled = (currentTabIndex === 1) ? !pContent : (currentTabIndex === 2 ? !cContent : true);
        }

        function loadTTSSettings() {
            const v = localStorage.getItem("diary_voice"), r = localStorage.getItem("diary_rate");
            if(v) document.getElementById("voiceSelect").value = v;
            if(r) document.getElementById("rateSelect").value = r;
            document.getElementById("btnRepeat").classList.toggle("active", isRepeating);
            if(isRepeating) document.getElementById("btnRepeat").classList.add('btn-primary');
            else document.getElementById("btnRepeat").classList.remove('btn-primary');
        }

        function saveTTSSettings() {
            localStorage.setItem("diary_voice", document.getElementById("voiceSelect").value);
            localStorage.setItem("diary_rate", document.getElementById("rateSelect").value);
            localStorage.setItem("diary_repeat", isRepeating);
        }

        function toggleRepeat() { 
            isRepeating = !isRepeating; 
            document.getElementById("btnRepeat").classList.toggle("active", isRepeating); 
            if(isRepeating) document.getElementById("btnRepeat").classList.add('btn-primary');
            else document.getElementById("btnRepeat").classList.remove('btn-primary');
            saveTTSSettings(); 
            if (document.getElementById('btnMainSpeak').classList.contains("playing")) {
                handleGlobalSpeak(); handleGlobalSpeak(); 
            }
        }

        async function speakText(elId, btnId) {
            const el = document.getElementById(elId), btn = document.getElementById(btnId);
            if(!el || !window.speakCommon) return;
            btn.classList.add("playing"); btn.innerHTML = '⏹ Dừng';
            await window.speakCommon({ 
                text: el.innerText, 
                voice: document.getElementById("voiceSelect").value, 
                rate: document.getElementById("rateSelect").value, 
                filename: `Diary_AI_${selectedDiaryId}`,
                loop: isRepeating 
            });
            if (!isRepeating) resetSpeakBtns();
        }

        function handleGlobalSpeak() {
            const btn = document.getElementById('btnMainSpeak');
            if (btn.classList.contains("playing")) { 
                if (window.stopSpeak) window.stopSpeak(); 
                resetSpeakBtns(); 
                return; 
            }
            const tid = currentTabIndex === 1 ? 'p-content' : (currentTabIndex === 2 ? 'c-content' : null);
            if (tid) speakText(tid, 'btnMainSpeak');
        }

        function resetSpeakBtns() { const b = document.getElementById('btnMainSpeak'); b.classList.remove('playing'); b.innerHTML = '🔊 Đọc'; }
        function clearEditMode() { editingId = null; document.getElementById('diaryInput').value = ''; document.getElementById('saveBtn').innerText = 'Lưu lại'; document.getElementById('cancelBtn').style.display = 'none'; }
    </script>
    <script>
        async function getLessonTotalScore() {
            try {
                const res = await fetch(VERCEL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        sheet: 'ScoreList', 
                        act: 'read', 
                        spread: '1_OuLRGiUEzXUpMf-QmPeNYCQee0L1ueGAZcUvNELp8A' 
                    })
                });
                const result = await res.json();
                if (result.values && Array.isArray(result.values)) {
                    document.querySelectorAll('.count-trigger').forEach(badge => {
                        const match = badge.getAttribute('onclick').match(/'([^']+)'/);
                        if (match && match[1]) {
                            const lessonID = match[1];
                            let count = 0, maxScore = 0;
                            result.values.forEach(row => {
                                if (row[0] === lessonID) {
                                    count++;
                                    const score = parseInt(row[3]) || 0;
                                    if (score > maxScore) maxScore = score;
                                }
                            });
                            badge.innerHTML = `🎙️ ${count} | 🏆 ${maxScore}`;
                            if (count > 0) badge.style.backgroundColor = '#e67e22';
                        }
                    });
                }
            } catch (err) { console.error("[Summary Error]:", err); }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
