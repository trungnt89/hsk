<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TikTok Dashboard - Swipe Friendly</title>
    <style>
        :root { --primary-color: #fe2c55; --bg-dark: #121212; }
        body { 
            font-family: sans-serif; background-color: var(--bg-dark); 
            color: #fff; margin: 0; padding: 0; 
            overflow: hidden; touch-action: pan-y; /* Cho phép vuốt dọc toàn trang */
        }
        
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .start-btn {
            background: var(--primary-color); border: none; color: white;
            padding: 15px 40px; border-radius: 30px; font-size: 18px; cursor: pointer;
        }

        .main-viewer {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; width: 100%;
        }

        /* Vùng chứa Iframe - Thu nhỏ để lộ lề vuốt */
        #video-display-area {
            width: 90%; /* Chỉ chiếm 90% chiều rộng */
            height: 75vh; 
            max-width: 400px;
            background: #000; 
            position: relative; 
            border-radius: 15px; 
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 10;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .controls {
            margin-top: 20px; display: flex; gap: 15px; align-items: center; z-index: 20;
        }
        .nav-btn {
            background: #333; color: white; border: 1px solid #444;
            padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-btn:active { background: var(--primary-color); }
        .info { font-size: 13px; color: #888; margin-top: 10px; }

        /* Vùng đệm lề hỗ trợ vuốt */
        .swipe-margin {
            position: fixed; top: 0; width: 5%; height: 100%; z-index: 5;
            /* background: rgba(255,255,255,0.05);  Bật cái này nếu muốn nhìn thấy vùng vuốt */
        }
        .left { left: 0; }
        .right { right: 0; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2>TikTok Dashboard</h2>
        <button class="start-btn" onclick="startApp()">BẮT ĐẦU XEM</button>
    </div>

    <div class="swipe-margin left"></div>
    <div class="swipe-margin right"></div>

    <div class="main-viewer">
        <div id="video-display-area">
            <div id="placeholder" style="display:flex; align-items:center; justify-content:center; height:100%; color:#444;">
                Đang nạp video...
            </div>
        </div>

        <div class="controls">
            <button class="nav-btn" onclick="changeVideo(-1)">⬅ TRƯỚC</button>
            <button class="nav-btn" style="background: var(--primary-color);" onclick="changeVideo(1)">SAU ➡</button>
        </div>
        
        <div id="video-info" class="info">Video 0 / 0</div>
    </div>

    <script>
        let allVideos = [];
        let currentIndex = 0;

        async function init() {
            try {
                const res = await fetch('./list.txt');
                const text = await res.text();
                const entries = text.trim().split(/\n\s*\n/);
                allVideos = entries.map((entry, index) => {
                    const urlMatch = entry.match(/Liên kết: (.*)/);
                    const dateMatch = entry.match(/Ngày: (.*)/);
                    const url = urlMatch ? urlMatch[1].trim().replace(/\/$/, "") : "";
                    return { id: url.split('/').pop(), date: dateMatch ? dateMatch[1] : 'N/A' };
                }).filter(v => v.id);
                updateInfo();
            } catch (err) { console.error(err); }
        }

        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';
            loadVideo(0);
        }

        function changeVideo(step) {
            let nextIndex = currentIndex + step;
            if (nextIndex >= 0 && nextIndex < allVideos.length) {
                // Việc bấm nút này chính là tương tác giúp duy trì âm thanh
                loadVideo(nextIndex);
            }
        }

        function loadVideo(index) {
            const displayArea = document.getElementById('video-display-area');
            displayArea.innerHTML = ""; 
            
            currentIndex = index;
            const video = allVideos[index];

            const iframe = document.createElement('iframe');
            // Thêm mute=0 vào src để cố gắng gọi âm thanh
            iframe.src = `https://www.tiktok.com/embed/v2/${video.id}?autoplay=1&mute=0`;
            iframe.allow = "autoplay; fullscreen";
            
            displayArea.appendChild(iframe);
            updateInfo();
        }

        function updateInfo() {
            document.getElementById('video-info').innerText = 
                `Video ${currentIndex + 1} / ${allVideos.length} | ${allVideos[currentIndex]?.date || ''}`;
        }

        window.onload = init;
    </script>
</body>
</html>
