<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script src="../com/assistive.js"></script>
    <title>JST Pro Console</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; overflow: hidden; }
        .header { background: #111; padding: 10px 15px; border-bottom: 2px solid #222; display: flex; align-items: center; justify-content: space-between; height: 60px; box-sizing: border-box; }
        .container { padding: 0; height: calc(100vh - 60px); overflow-y: auto; box-sizing: border-box; }
        
        #monitor-box { background: #050505; min-height: 100%; }

        /* Hiệu ứng nhấp nháy khi đang load */
        .loading { padding: 20px; color: #444; text-align: center; font-style: italic; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        .log-entry {
            border-bottom: 1px solid #1a1a1a;
            padding: 10px; 
            display: flex;
            gap: 12px; 
            align-items: center;
        }

        /* Cột 1: Thời gian - 2 dòng chữ bằng nhau */
        .log-time { 
            color: #888; 
            flex: 1; 
            font-family: 'Consolas', monospace; 
            font-size: 12px; /* Hai dòng bằng nhau */
            line-height: 1.2;
            text-align: left;
            font-weight: bold;
        }
        .log-time span { display: block; }

        /* Cột 2: Level nhỏ gọn */
        .log-level { 
            flex: 1; 
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 2px 0;
            border-radius: 3px;
            text-align: center;
            background: rgba(255,255,255,0.05);
        }

        /* Cột 3: Nội dung Log - TO & RÕ */
        .log-msg { 
            flex: 10; 
            word-break: break-word;
            white-space: pre-wrap;
            color: #fff;
            font-size: 11px; 
            line-height: 1.3;
        }

        .level-info, .level-voice_gas { color: #2ecc71; }
        .level-error { color: #e74c3c; }
        .level-warn { color: #f1c40f; }

        #clock { font-family: 'Consolas', monospace; font-size: 28px; color: #2ecc71; text-align: right; line-height: 1; }
        .clock-date { font-size: 12px; color: #666; display: block; margin-bottom: 2px; }
        h3 { font-size: 14px; margin: 0; color: #888; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="width:8px; height:8px; background:#2ecc71; border-radius:50%;"></div>
            <h3>Live Monitor</h3>
        </div>
        <div id="clock">
            <span class="clock-date" id="date-part">----/--/--</span>
            <span id="time-part">--:--:--</span>
        </div>
    </div>
    <div class="container">
        <div id="monitor-box">
            <div class="loading">Đang kết nối và tải dữ liệu...</div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const jst = new Intl.DateTimeFormat('ja-JP', { timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).formatToParts(now);
            const d = `${jst.find(p => p.type === 'year').value}-${jst.find(p => p.type === 'month').value}-${jst.find(p => p.type === 'day').value}`;
            const t = `${jst.find(p => p.type === 'hour').value}:${jst.find(p => p.type === 'minute').value}:${jst.find(p => p.type === 'second').value}`;
            document.getElementById('date-part').innerText = d;
            document.getElementById('time-part').innerText = t;
        }

        async function fetchLogs() {
            const GAS_URL = "https://script.google.com/macros/s/AKfycbxYrGbKghzwW1cKU37CJf-UFISCcvGkemZlTJZH1GWa7x4qrAOd2UKzVOR3vWAPOtyMww/exec";
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                const container = document.getElementById('monitor-box');
                
                if (!data || data.length === 0) {
                    container.innerHTML = "<div class='loading'>Không có dữ liệu log.</div>";
                    return;
                }

                container.innerHTML = data.map(log => {
                    const dt = new Date(log.timestamp);
                    const dateStr = `${(dt.getMonth()+1).toString().padStart(2,'0')}-${dt.getDate().toString().padStart(2,'0')}`;
                    const timeStr = dt.toLocaleTimeString('ja-JP', { hour12:false });
                    const levelClass = String(log.level).toLowerCase().replace(/\s+/g, '_');
                    
                    let displayMsg = log.message;
                    try {
                        const parsed = (typeof log.message === 'string') ? JSON.parse(log.message) : log.message;
                        if (typeof parsed === 'object' && parsed !== null) {
                            displayMsg = JSON.stringify(parsed, null, 2);
                        }
                    } catch (e) {}

                    return `
                        <div class="log-entry">
                            <div class="log-time">
                                <span>${dateStr}</span>
                                <span>${timeStr}</span>
                            </div>
                            <div class="log-level level-${levelClass}">${log.level}</div>
                            <div class="log-msg">${displayMsg}</div>
                        </div>
                    `;
                }).join('');
            } catch (e) { 
                console.error(e);
                document.getElementById('monitor-box').innerHTML = `<div class='loading' style='color:#e74c3c'>Lỗi kết nối hệ thống...</div>`;
            }
        }

        setInterval(updateClock, 1000);
        setInterval(fetchLogs, 20000);
        window.onload = () => { updateClock(); fetchLogs(); };
    </script>
</body>
</html>
