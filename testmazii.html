<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Mazii API</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #result { 
            margin-top: 20px; padding: 15px; border: 1px solid #ccc; 
            background: #f9f9f9; min-height: 50px; border-radius: 8px;
        }
        .error { color: red; font-weight: bold; }
        .success { color: green; font-weight: bold; }
        input { padding: 10px; width: 250px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Kiểm tra kết nối Mazii API</h2>
    <p>Nhập từ tiếng Nhật để test:</p>
    <input type="text" id="jaText" value="こんにちは">
    <button onclick="testMazii()">Dịch thử</button>

    <div id="result">Kết quả sẽ hiển thị ở đây...</div>

    <script>
        async function testMazii() {
            const text = document.getElementById('jaText').value;
            const resDiv = document.getElementById('result');
            const MAZII_API = "https://api.mazii.net/api/gtrans";

            resDiv.innerHTML = " đang gửi yêu cầu...";
            console.log("[Log] Đang gọi Mazii cho từ:", text);

            try {
                const response = await fetch(MAZII_API, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        content: text,
                        source: "ja",
                        target: "vi"
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log("[Log] Dữ liệu nhận được:", data);

                resDiv.innerHTML = `
                    <p class="success">Kết nối thành công!</p>
                    <p><b>Từ gốc:</b> ${text}</p>
                    <p><b>Nghĩa (Mazii):</b> ${data.data || "Không thấy data"}</p>
                `;
            } catch (error) {
                console.error("[Error]:", error);
                resDiv.innerHTML = `
                    <p class="error">Lỗi kết nối hoặc lỗi CORS!</p>
                    <p style="font-size: 12px; color: #666;">Chi tiết: ${error.message}</p>
                    <p><i>Lưu ý: Nếu lỗi "Failed to fetch", Mazii có thể đang chặn request từ trình duyệt (CORS).</i></p>
                `;
            }
        }
    </script>
</body>
</html>
