              "sha": ["shā", "shá", "shǎ", "shà"], "she": ["shē", "shé", "shě", "shè"], "shi": ["shī", "shí", "shǐ", "shì"], "shai": ["shāi", "shái", "shǎi", "shài"], "shei": ["shēi", "shéi", "shěi", "shèi"], "shao": ["shāo", "sháo", "shǎo", "shào"], "shou": ["shōu", "shóu", "shǒu", "shòu"], "shan": ["shān", "shán", "shǎn", "shàn"], "shen": ["shēn", "shén", "shěn", "shèn"], "shang": ["shāng", "sháng", "shǎng", "shàng"], "sheng": ["shēng", "shéng", "shěng", "shèng"], "shu": ["shū", "shú", "shǔ", "shù"], "shua": ["shuā", "shuá", "shuǎ", "shuà"], "shuo": ["shuō", "shuó", "shuǒ", "shuò"], "shuai": ["shuāi", "shuái", "shuǎi", "shuài"], "shui": ["shuī", "shuí", "shuǐ", "shuì"], "shuan": ["shuān", "shuán", "shuǎn", "shuàn"], "shun": ["shūn", "shún", "shǔn", "shùn"], "shuang": ["shuāng", "shuáng", "shuǎng", "shuàng"]
            },
            "r": {
              "re": ["rē", "ré", "rě", "rè"], "ri": ["rī", "rí", "rǐ", "rì"], "rao": ["ráo", "ráo", "rǎo", "rào"], "rou": ["rōu", "róu", "rǒu", "ròu"], "ran": ["rān", "rán", "rǎn", "ràn"], "ren": ["rēn", "rén", "rěn", "rèn"], "rang": ["rāng", "ráng", "rǎng", "ràng"], "reng": ["rēng", "réng", "rěng", "rèng"], "rong": ["rōng", "róng", "rǒng", "ròng"], "ru": ["rū", "rú", "rǔ", "rù"], "rua": ["ruā", "ruá", "ruǎ", "ruà"], "ruo": ["ruō", "ruó", "ruǒ", "ruò"], "rui": ["ruī", "ruí", "ruǐ", "ruì"], "ruan": ["ruān", "ruán", "ruǎn", "ruàn"], "run": ["rūn", "rún", "rǔn", "rùn"]
            },
            "z": {
              "za": ["zā", "zá", "zǎ", "zà"], "ze": ["zē", "zé", "zě", "zè"], "zi": ["zī", "zí", "zǐ", "zì"], "zai": ["zāi", "zái", "zǎi", "zài"], "zei": ["zēi", "zéi", "zěi", "zèi"], "zao": ["zāo", "záo", "zǎo", "zào"], "zou": ["zōu", "zóu", "zǒu", "zòu"], "zan": ["zān", "zán", "zǎn", "zàn"], "zen": ["zēn", "zén", "zěn", "zèn"], "zang": ["zāng", "záng", "zǎng", "zàng"], "zeng": ["zēng", "zéng", "zěng", "zèng"], "zong": ["zōng", "zóng", "zǒng", "zòng"], "zu": ["zū", "zú", "zǔ", "zù"], "zuo": ["zuō", "zuó", "zuǒ", "zuò"], "zui": ["zuī", "zuí", "zuǐ", "zuì"], "zuan": ["zuān", "zuán", "zuǎn", "zuàn"], "zun": ["zūn", "zún", "zǔn", "zùn"]
            },
            "c": {
              "ca": ["cā", "cá", "cǎ", "cà"], "ce": ["cē", "cé", "cě", "cè"], "ci": ["cī", "cí", "cǐ", "cì"], "cai": ["cāi", "cái", "cǎi", "cài"], "cao": ["cāo", "cáo", "cǎo", "cào"], "cou": ["cōu", "cóu", "cǒu", "còu"], "can": ["cān", "cán", "cǎn", "càn"], "cen": ["cēn", "cén", "cěn", "cèn"], "cang": ["cāng", "cáng", "cǎng", "càng"], "ceng": ["cēng", "céng", "cěng", "cèng"], "cong": ["cōng", "cóng", "cǒng", "còng"], "cu": ["cū", "cú", "cǔ", "cù"], "cuo": ["cuō", "cuó", "cuǒ", "cuò"], "cui": ["cuī", "cuí", "cuǐ", "cuì"], "cuan": ["cuān", "cuán", "cuǎn", "cuàn"], "cun": ["cūn", "cún", "cǔn", "cùn"]
            },
            "s": {
              "sa": ["sā", "sá", "sǎ", "sà"], "se": ["sē", "sé", "sě", "sè"], "si": ["sī", "sí", "sǐ", "sì"], "sai": ["sāi", "sái", "sǎi", "sài"], "sao": ["sāo", "sáo", "sǎo", "sào"], "sou": ["sōu", "sóu", "sǒu", "sòu"], "san": ["sān", "sán", "sǎn", "sàn"], "sen": ["sēn", "sén", "sěn", "sèn"], "sang": ["sāng", "sáng", "sǎng", "sàng"], "seng": ["sēng", "séng", "sěng", "sèng"], "song": ["sōng", "sóng", "sǒng", "sòng"], "su": ["sū", "sú", "sǔ", "sù"], "suo": ["suō", "suó", "suǒ", "suò"], "sui": ["suī", "suí", "suǐ", "suì"], "suan": ["suān", "suán", "suǎn", "suàn"], "sun": ["sūn", "sún", "sǔn", "sùn"]
            },
            "zero_initial": {
              "a": ["ā", "á", "ǎ", "à"], "o": ["ō", "ó", "ǒ", "ò"], "e": ["ē", "é", "ě", "è"], "er": ["ēr", "ér", "ěr", "èr"], "ai": ["āi", "ái", "ǎi", "ài"], "ei": ["ēi", "éi", "ěi", "èi"], "ao": ["āo", "áo", "ǎo", "ào"], "ou": ["ōu", "óu", "ǒu", "òu"], "an": ["ān", "án", "ǎn", "àn"], "en": ["ēn", "én", "ěn", "èn"], "ang": ["āng", "áng", "ǎng", "àng"], "eng": ["ēng", "éng", "ěng", "èng"], "yi": ["yī", "yí", "yǐ", "yì"], "ya": ["yā", "yá", "yǎ", "yà"], "ye": ["yē", "yé", "yě", "yè"], "yao": ["yāo", "yáo", "yǎo", "yào"], "you": ["yōu", "yóu", "yǒu", "yòu"], "yan": ["yān", "yán", "yǎn", "yàn"], "yin": ["yīn", "yín", "yǐn", "yìn"], "yang": ["yāng", "yáng", "yǎng", "yàng"], "ying": ["yīng", "yíng", "yǐng", "yìng"], "yong": ["yōng", "yóng", "yǒng", "yòng"], "wu": ["wū", "wú", "wǔ", "wù"], "wa": ["wā", "wá", "wǎ", "wà"], "wo": ["wō", "wó", "wǒ", "wò"], "wai": ["wāi", "wái", "wǎi", "wài"], "wei": ["wēi", "wéi", "wěi", "wèi"], "wan": ["wān", "wán", "wǎn", "wàn"], "wen": ["wēn", "wén", "wěn", "wèn"], "wang": ["wāng", "wáng", "wǎng", "wàng"], "weng": ["wēng", "wéng", "wěng", "wèng"], "yu": ["yū", "yú", "yǔ", "yù"], "yue": ["yuē", "yué", "yuě", "yuè"], "yuan": ["yuān", "yuán", "yuǎn", "yuàn"], "yun": ["yūn", "yún", "yǔn", "yìn"]
            }
          }
        };

        const INITIAL_PRETTY_NAMES = {
          "b": "b", "p": "p", "m": "m", "f": "f",
          "d": "d", "t": "t", "n": "n", "l": "l",
          "g": "g", "k": "k", "h": "h",
          "j": "j", "q": "q", "x": "x",
          "zh": "zh", "ch": "ch", "sh": "sh", "r": "r",
          "z": "z", "c": "c", "s": "s",
          "zero_initial": "Ø"
        };

        let selectedInitial = "b";
        let selectedSyllable = "ba";
        let currentPlayingTone = null;
        let activeAudio = null;

        const consonantContainer = document.getElementById("consonantContainer");
        const vowelContainer = document.getElementById("vowelContainer");
        const tonesContainer = document.getElementById("tonesContainer");
        const selectedWordLabel = document.getElementById("selectedWordLabel");

        // Khởi tạo các Phụ Âm (Dòng 1)
        function initConsonants() {
            consonantContainer.innerHTML = "";
            Object.keys(pinyinData.pinyin_tones_map).forEach(initial => {
                const btn = document.createElement("button");
                btn.className = getBtnClass(initial === selectedInitial, "indigo");
                btn.textContent = INITIAL_PRETTY_NAMES[initial] || initial;
                btn.onclick = () => selectInitial(initial);
                consonantContainer.appendChild(btn);
            });
        }

        // Khởi tạo Nguyên Âm (Dòng 2) dựa theo Phụ âm đã chọn
        function initVowels() {
            vowelContainer.innerHTML = "";
            const syllables = Object.keys(pinyinData.pinyin_tones_map[selectedInitial] || {});
            
            syllables.forEach(syllable => {
                // Rút trích phần Nguyên âm hiển thị
                let displayVowel = syllable;
                if (selectedInitial !== "zero_initial" && syllable.startsWith(selectedInitial)) {
                    displayVowel = syllable.slice(selectedInitial.length);
                }

                const btn = document.createElement("button");
                btn.className = getBtnClass(syllable === selectedSyllable, "emerald");
                btn.textContent = displayVowel;
                btn.onclick = () => selectSyllable(syllable);
                vowelContainer.appendChild(btn);
            });
        }

        // Cập nhật bảng 4 Thanh điệu phía dưới
        function renderTonesTable() {
            tonesContainer.innerHTML = "";
            selectedWordLabel.innerText = selectedSyllable;
            
            const tones = pinyinData.pinyin_tones_map[selectedInitial]?.[selectedSyllable] || [];
            
            for (let i = 1; i <= 4; i++) {
                const toneWord = tones[i - 1];
                if (!toneWord) continue;

                const cardBox = document.createElement("button");
                const isPlaying = currentPlayingTone === i;

                cardBox.className = `p-4 h-28 rounded-xl border text-center transition-all flex flex-col items-center justify-center space-y-2 cursor-pointer relative ${
                    isPlaying 
                      ? "bg-indigo-600 text-white border-indigo-600 shadow-md scale-95" 
                      : "bg-white text-slate-800 border-slate-200 hover:border-indigo-400 hover:bg-indigo-50/30"
                }`;

                cardBox.innerHTML = `
                    <span class="text-[10px] ${isPlaying ? 'text-indigo-200' : 'text-slate-400'} uppercase font-mono tracking-wider">Thanh ${i}</span>
                    <span class="text-2xl font-bold">${toneWord}</span>
                    ${isPlaying ? '<span class="absolute bottom-2 left-1/2 -translate-x-1/2 w-2 h-2 rounded-full bg-rose-400 animate-ping"></span>' : ''}
                `;

                cardBox.onclick = () => playSound(i, toneWord);
                tonesContainer.appendChild(cardBox);
            }
        }

        // Chọn Phụ âm mới
        function selectInitial(initial) {
            // Xác định phần vần (vận mẫu) hiện tại trước khi chuyển đổi
            let currentVowel = selectedSyllable;
            if (selectedInitial !== "zero_initial" && selectedSyllable.startsWith(selectedInitial)) {
                currentVowel = selectedSyllable.slice(selectedInitial.length);
            }

            selectedInitial = initial;
            const syllables = Object.keys(pinyinData.pinyin_tones_map[initial] || {});
            
            if (syllables.length > 0) {
                // Thử tìm xem phụ âm mới có đi kèm với vận mẫu cũ được không
                let targetSyllable = initial === "zero_initial" ? currentVowel : (initial + currentVowel);
                
                // Quy tắc chuyển đổi thông minh giữa zero_initial và các phụ âm khác
                if (!syllables.includes(targetSyllable)) {
                    if (currentVowel === "yi") {
                        const altSyllable = initial === "zero_initial" ? "yi" : (initial + "i");
                        if (syllables.includes(altSyllable)) targetSyllable = altSyllable;
                    } else if (currentVowel === "wu") {
                        const altSyllable = initial === "zero_initial" ? "wu" : (initial + "u");
                        if (syllables.includes(altSyllable)) targetSyllable = altSyllable;
                    } else if (currentVowel === "yu") {
                        const altSyllable = initial === "zero_initial" ? "yu" : (initial + "v");
                        if (syllables.includes(altSyllable)) targetSyllable = altSyllable;
                    } else if (currentVowel === "i" && initial === "zero_initial" && syllables.includes("yi")) {
                        targetSyllable = "yi";
                    } else if (currentVowel === "u" && initial === "zero_initial" && syllables.includes("wu")) {
                        targetSyllable = "wu";
                    } else if (currentVowel === "v" && initial === "zero_initial" && syllables.includes("yu")) {
                        targetSyllable = "yu";
                    }
                }

                if (syllables.includes(targetSyllable)) {
                    selectedSyllable = targetSyllable;
                } else {
                    // Nếu không có, dạt về âm đầu tiên của nhóm mới làm dự phòng
                    selectedSyllable = syllables[0];
                }
            }
            
            initConsonants();
            initVowels();
            renderTonesTable();
        }

        // Chọn Nguyên âm / Từ mới
        function selectSyllable(syllable) {
            selectedSyllable = syllable;
            initVowels();
            renderTonesTable();
        }

        // Phát âm thanh
        function playSound(toneIndex, textRepresentation) {
            // Đánh dấu âm đang phát
            currentPlayingTone = toneIndex;
            renderTonesTable();

            // Tạo đường dẫn âm thanh CDN
            const normalizedSyllable = selectedSyllable.toLowerCase();
            const audioUrl = `https://cdn.yoyochinese.com/audio/pychart/${normalizedSyllable}${toneIndex}.mp3`;

            if (activeAudio) {
                activeAudio.pause();
            }

            activeAudio = new Audio(audioUrl);
            
            activeAudio.play()
                .then(() => {
                    activeAudio.onended = () => {
                        currentPlayingTone = null;
                        renderTonesTable();
                    };
                })
                .catch(err => {
                    console.warn("Lỗi phát audio bản xứ bản chuẩn qua URL, tự động chuyển sang Web Speech Synthesis bảo phòng học tập.", err);
                    speakWithSynthesis(textRepresentation);
                });
        }

        // Giải pháp đọc máy Synthesis hỗ trợ nếu mạng chặn tiếng từ CDN
        function speakWithSynthesis(text) {
            if ("speechSynthesis" in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = "zh-CN";
                utterance.rate = 0.8;
                utterance.onend = () => {
                    currentPlayingTone = null;
                    renderTonesTable();
                };
                utterance.onerror = () => {
                    currentPlayingTone = null;
                    renderTonesTable();
                };
                window.speechSynthesis.speak(utterance);
            } else {
                currentPlayingTone = null;
                renderTonesTable();
            }
        }

        // Hàm giúp lấy nhóm lớp nút tương đương linh hoạt
        function getBtnClass(isActive, themeColor) {
            const baseClass = "px-4 py-2.5 rounded-xl text-sm md:text-base font-bold transition-all border ";
            if (themeColor === "indigo") {
                return baseClass + (isActive 
                    ? "bg-indigo-600 text-white border-indigo-600 shadow-sm" 
                    : "bg-white text-slate-600 border-slate-200 hover:bg-slate-100");
            } else if (themeColor === "emerald") {
                return baseClass + (isActive 
                    ? "bg-emerald-650 bg-emerald-600 text-white border-emerald-600 shadow-sm" 
                    : "bg-white text-slate-600 border-slate-200 hover:bg-slate-100");
            }
        }

        // Chạy khởi tạo lần đầu
        initConsonants();
        initVowels();
        renderTonesTable();
    </script>
