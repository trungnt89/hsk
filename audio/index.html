<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Drive Client Token Auth</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f8fafc; }
        .box { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; }
        .file-list { height: 150px; overflow-y: auto; border: 1px solid #f1f5f9; margin: 15px 0; font-size: 14px; }
        .item { padding: 8px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .item:hover { background: #f0f9ff; }
        button { padding: 10px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; }
        .btn-blue { background: #3b82f6; color: white; width: 100%; }
        .recorder { border-top: 1px solid #eee; margin-top: 20px; padding-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h3>🔑 Cấu hình Token</h3>
    <input type="password" id="tokenInput" placeholder="Dán Access Token của bạn vào đây">
    <button class="btn-blue" onclick="saveToken()">Lưu Token vào IndexedDB</button>

    <div class="file-list" id="list">Danh sách file sẽ hiện ở đây...</div>
    <button onclick="fetchFiles()" style="font-size: 12px;">🔄 Làm mới danh sách</button>

    <div class="recorder">
        <button id="startBtn" style="background:#ef4444; color:white" onclick="startRec()">Ghi âm</button>
        <button id="stopBtn" onclick="stopRec()" disabled>Dừng</button>
        <button id="saveBtn" style="background:#22c55e; color:white" onclick="upload()" disabled>Lưu lên Drive</button>
        <audio id="preview" controls style="width: 100%; margin-top: 15px;"></audio>
    </div>
</div>

<script>
    let mediaRec, chunks = [], audioBlob;
    const dbName = "ClientAuthDB";

    // --- 1. INDEXEDDB: LƯU VÀ LẤY TOKEN ---
    function getDB() {
        return new Promise((resolve) => {
            const req = indexedDB.open(dbName, 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore("auth");
            req.onsuccess = e => resolve(e.target.result);
        });
    }

    async function saveToken() {
        const token = document.getElementById('tokenInput').value;
        const db = await getDB();
        const tx = db.transaction("auth", "readwrite");
        tx.objectStore("auth").put(token, "current_token");
        alert("Đã lưu token vào trình duyệt!");
    }

    async function getToken() {
        const db = await getDB();
        return new Promise((resolve) => {
            const tx = db.transaction("auth", "readonly");
            const req = tx.objectStore("auth").get("current_token");
            req.onsuccess = () => resolve(req.result);
        });
    }

    // --- 2. API CALL: GỬI TOKEN TRONG HEADER ---
    async function fetchFiles() {
        const token = await getToken();
        if(!token) return alert("Vui lòng nhập token trước!");

        const res = await fetch('/api/drive', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if(data.error) return alert(data.error);

        document.getElementById('list').innerHTML = data.map(f => 
            `<div class="item" onclick="play('${f.id}')">🎵 ${f.name}</div>`
        ).join('');
    }

    async function upload() {
        const token = await getToken();
        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1];
            const res = await fetch('/api/drive', {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name: `Rec_${Date.now()}.mp3`, base64Audio })
            });
            if(res.ok) {
                alert("Đã lưu lên Drive!");
                fetchFiles();
            }
        };
    }

    // --- 3. RECORDER LOGIC (Rút gọn) ---
    async function startRec() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRec = new MediaRecorder(stream);
        chunks = [];
        mediaRec.ondataavailable = e => chunks.push(e.data);
        mediaRec.onstop = () => {
            audioBlob = new Blob(chunks, { type: 'audio/mpeg' });
            document.getElementById('preview').src = URL.createObjectURL(audioBlob);
            document.getElementById('saveBtn').disabled = false;
        };
        mediaRec.start();
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
    }

    function stopRec() {
        mediaRec.stop();
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
    }

    async function play(id) {
        const token = await getToken();
        const player = document.getElementById('preview');
        // Đối với phát nhạc, chúng ta fetch blob để gắn token vào header
        const res = await fetch(`/api/drive?id=${id}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const blob = await res.blob();
        player.src = URL.createObjectURL(blob);
        player.play();
    }
</script>
</body>
</html>
