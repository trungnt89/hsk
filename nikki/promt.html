<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Danh sách Prompt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-switch .form-check-input { width: 2.5em; height: 1.25em; cursor: pointer; }
        .container-fluid { max-width: 100% !important; }
    </style>
</head>
<body>
<div class="container-fluid px-4">
    <div class="row m-2 text-center">
        <div class="col-12">
            <h2>Hệ thống Quản lý Prompt</h2>
            <button class="btn btn-primary my-3" onclick="openModal()">+ Thêm Prompt Mới</button>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <span>Danh Sách Dữ Liệu</span>
                    <button class="btn btn-sm btn-light" onclick="fetchData()">Tải lại</button>
                </div>
                <div class="card-body">
                    <div id="loading-status" class="text-center my-3 text-primary" style="display: none;">Đang xử lý...</div>
                    <table class="table table-striped align-middle">
                        <thead><tr><th>ID</th><th>PROMPT</th><th>STATUS</th><th class="text-center">HÀNH ĐỘNG</th></tr></thead>
                        <tbody id="data-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="promptModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="form-title">Thêm Prompt</h5></div>
            <div class="modal-body">
                <form id="prompt-form">
                    <input type="hidden" id="prompt-id">
                    <textarea class="form-control" id="prompt-content" rows="5" placeholder="Nhập nội dung prompt..." required></textarea>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-success" onclick="saveData()">Lưu Dữ Liệu</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = 'https://hsk-gilt.vercel.app/api/gSheet';
    const SHEET_CONFIG = { sheet: "Promt", spread: "1UiAS_mUhl6j6wHyPkNiol9pclzkQJWD4qzPIZD2sx3k" };
    let isEditing = false;
    const modal = new bootstrap.Modal(document.getElementById('promptModal'));

    async function callAPI(body) {
        try {
            const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            return res.ok ? res.json() : null;
        } catch { return null; }
    }

    function openModal(id = '', prompt = '') {
        isEditing = !!id;
        document.getElementById('form-title').innerText = isEditing ? "Cập Nhật Prompt" : "Thêm Mới Prompt";
        document.getElementById('prompt-id').value = id;
        document.getElementById('prompt-content').value = prompt || '';
        modal.show();
    }

    async function fetchData() {
        document.getElementById('loading-status').style.display = 'block';
        const tbody = document.getElementById('data-table-body');
        tbody.innerHTML = '';
        const res = await callAPI({ ...SHEET_CONFIG, act: "read" });
        if (res && res.values) {
            res.values.forEach(row => {
                const id = row[0] || '';
                const prompt = row[1] || '';
                const status = row[2] ?? '0';
                tbody.innerHTML += `<tr><td>${id}</td><td>${prompt}</td>
                    <td><div class="form-check form-switch"><input class="form-check-input" type="checkbox" ${status == '1' ? 'checked' : ''} onchange="toggleStatus('${id}', '${prompt.replace(/'/g, "\\'")}', this.checked)"></div></td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-warning" onclick="openModal('${id}', '${prompt.replace(/'/g, "\\'")}')"><i class="bi bi-pencil-fill"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteData('${id}')"><i class="bi bi-trash-fill"></i></button>
                    </td></tr>`;
            });
        }
        document.getElementById('loading-status').style.display = 'none';
    }

    async function saveData() {
        const id = document.getElementById('prompt-id').value || Date.now().toString();
        const txt = document.getElementById('prompt-content').value;
        const body = { act: isEditing ? "updateByPosVal" : "add", pos: 0, val: id, data: JSON.stringify([id, txt, "0"]), ...SHEET_CONFIG };
        if (await callAPI(body)) { modal.hide(); fetchData(); } else alert('Lỗi!');
    }

    async function toggleStatus(id, prompt, isChecked) {
        await callAPI({ act: "updateByPosVal", pos: 0, val: id, data: JSON.stringify([id, prompt, isChecked ? "1" : "0"]), ...SHEET_CONFIG });
        fetchData();
    }

    async function deleteData(id) {
        if (confirm('Xóa?')) { await callAPI({ act: "deleteByPosVal", pos: 0, val: id, ...SHEET_CONFIG }); fetchData(); }
    }

    document.addEventListener('DOMContentLoaded', fetchData);
</script>
</body>
</html>
