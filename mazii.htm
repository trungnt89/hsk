<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mazii Test</title>
</head>
<body>

<h2>Test API Mazii</h2>

<input id="word" placeholder="Nhập từ..." />
<button onclick="search()">Dịch</button>

<pre id="result"></pre>

<script>
async function search() {
    const word = document.getElementById("word").value;

    try {
        const res = await fetch("https://mazii.net/api/search/word", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            credentials: "include", // QUAN TRỌNG
            body: JSON.stringify({
                dict: "javi",
                limit: 20,
                page: 1,
                query: word,
                type: "word"
            })
        });

        const data = await res.json();

        // render đẹp
        if (data.data) {
            let output = "";
            data.data.forEach(item => {
                output += `
🔤 ${item.word}
(${item.phonetic})
👉 ${item.mean}

-------------------
`;
            });
            document.getElementById("result").textContent = output;
        } else {
            document.getElementById("result").textContent =
                JSON.stringify(data, null, 2);
        }

    } catch (err) {
        document.getElementById("result").textContent =
            "Lỗi: " + err;
    }
}
</script>

</body>
</html>
