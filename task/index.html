<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="sticky top-0 bg-gray-100 py-3 z-30">
        <div class="flex justify-content-between items-center justify-between">
            <h2 class="text-2xl font-bold text-gray-800">Danh sách Task từ Server</h2>
            <div class="flex items-center gap-4">
                <!-- Toggle Switch theo phong cách iOS / Utility-First -->
                <label class="relative inline-flex items-center cursor-pointer text-xl">
                    <input type="checkbox" id="filterToggle" checked onchange="filterTasks()" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                </label>
                <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow" onclick="openModal('add')">Thêm Mới Task</button>
            </div>
        </div>
    </div>
    <div id="loading" class="my-4 text-gray-600 font-medium">Đang tải dữ liệu...</div>
    <table id="taskTable" class="min-w-full divide-y divide-gray-200 border border-gray-300 bg-white mt-4 shadow-sm rounded" style="display:none;">
        <thead class="bg-green-100">
            <tr id="headerRow"></tr>
        </thead>
        <tbody id="taskBody" class="divide-y divide-gray-200"></tbody>
    </table>
    <!-- Tailwind Custom Popup Modal -->
    <div id="taskModal" class="fixed inset-0 z-50 items-center justify-center bg-black bg-opacity-50" style="display: none;">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full m-4 overflow-hidden animate-fade-in">
            <div class="px-6 py-4 border-b border-gray-200">
                <h5 id="modalTitle" class="text-xl font-bold text-gray-800">Thêm Mới Task</h5>
            </div>
            <div class="px-6 py-4 max-h-[60vh] overflow-y-auto">
                <div id="dynamicFormContainer"></div>
            </div>
            <div class="px-6 py-4 bg-gray-50 flex justify-end gap-2 border-t border-gray-200">
                <button class="bg-gray-500 hover:bg-gray-600 text-white font-medium py-2 px-4 rounded" onclick="closeModal()">Hủy</button>
                <button class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded" onclick="submitModalForm()">Lưu</button>
            </div>
        </div>
    </div>
<script>
    const API_URL = 'https://hsk-gilt.vercel.app/api/gSheet';
    const G_SHEET = "TASK";
    const G_SPREAD = "1ezoFMSBVznSNcuufRRQRjxAmUmYyU9MjKDzl-v3wxl8";
    let allRowsData = [], currentModalMode = 'add', currentEditRowIndex = -1;
    async function fetchData() {
        console.log("Bắt đầu tải dữ liệu từ server...");
        try {
            const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ "sheet": G_SHEET, "act": "read", "spread": G_SPREAD }) });
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            console.log("Tải dữ liệu từ server thành công.", data);
            renderTable(data.values);
        } catch (error) {
            console.error("Lỗi xảy ra trong quá trình fetchData:", error);
            document.getElementById('loading').innerText = "Lỗi khi tải dữ liệu.";
        }
    }
    function formatLastTime(timeStr) {
        if (!timeStr) return "";
        if (timeStr.includes(":") && timeStr.split(":").length >= 2) {
            let t = timeStr.includes(" ") ? timeStr.split(" ")[1] : timeStr;
            let parts = t.split(":");
            return parts[0] + ":" + parts[1];
        }
        return timeStr;
    }
    function renderTable(values) {
        console.log("Bắt đầu dựng cấu trúc bảng hiển thị...");
        const headers = values[0], startColIdx = headers.indexOf("START");
        document.getElementById('headerRow').innerHTML = headers.filter(h => h !== "ID" && h !== "NOTE").map(h => `<th class="px-4 py-3 text-left text-xs font-semibold text-green-800 uppercase tracking-wider border-b border-gray-300">${h}</th>`).join('') + '<th class="px-4 py-3 text-left text-xs font-semibold text-green-800 uppercase tracking-wider border-b border-gray-300">HÀNH ĐỘNG</th>';
        document.getElementById('taskBody').innerHTML = "";
        allRowsData = JSON.parse(JSON.stringify(values));
        let dataRows = values.slice(1);
        if (startColIdx !== -1) dataRows.sort((a, b) => (a[startColIdx] || "").localeCompare(b[startColIdx] || ""));
        for (let i = 0; i < dataRows.length; i++) {
            if (dataRows[i].length < 2) continue;
            const origIdx = allRowsData.findIndex(r => r[0] === dataRows[i][0]), tr = document.createElement('tr');
            tr.setAttribute('data-id', dataRows[i][0]);
            tr.className = "hover:bg-gray-50 transition-colors";
            let rowHtml = "", isActive = dataRows[i][headers.indexOf("STATUS")] === "1";
            for (let j = 0; j < headers.length; j++) {
                if (headers[j] === "ID" || headers[j] === "NOTE") continue;
                let val = dataRows[i][j] || "";
                if (headers[j] === "LAST_TIME") val = formatLastTime(val);
                if (headers[j] === "STATUS") {
                    rowHtml += `<td class="px-4 py-3 whitespace-nowrap border border-gray-200"><label class="relative inline-flex items-center cursor-pointer text-xl"><input type="checkbox" ${isActive ? "checked" : ""} onchange="toggleStatus('${dataRows[i][0]}', this, ${origIdx})" class="sr-only peer"><div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div></label></td>`;
                } else {
                    rowHtml += `<td class="px-4 py-3 border border-gray-200 text-sm text-gray-700" contenteditable="true" onblur="updateCellData(this, ${origIdx}, ${j})">${val.replace(/\n/g, '<br>')}</td>`;
                }
            }
            tr.setAttribute('data-status-active', isActive ? "1" : "0");
            tr.innerHTML = rowHtml + `<td class="px-4 py-3 whitespace-nowrap border border-gray-200 text-sm"><div class="flex gap-2"><button class="bg-yellow-500 hover:bg-yellow-600 text-white font-medium py-1 px-3 rounded text-xs transition-colors" onclick="openModal('edit', ${origIdx})">Sửa</button><button class="bg-red-600 hover:bg-red-700 text-white font-medium py-1 px-3 rounded text-xs transition-colors" onclick="deleteTask('${dataRows[i][0]}', ${origIdx})">Xóa</button></div></td>`;
            document.getElementById('taskBody').appendChild(tr);
        }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('taskTable').style.display = 'table';
        console.log("Dựng bảng hoàn tất. Tiến hành chạy bộ lọc khởi tạo.");
        filterTasks();
    }
    function filterTasks() {
        const isEnforceActive = document.getElementById('filterToggle').checked;
        console.log(`Áp dụng bộ lọc hiển thị iPhone Toggle. Chỉ hiện status=1: ${isEnforceActive}`);
        document.querySelectorAll('#taskBody tr').forEach(row => row.style.display = (!isEnforceActive || row.getAttribute('data-status-active') === "1") ? '' : 'none');
    }
    function openModal(mode, rowIndex) {
        currentModalMode = mode;
        const headers = allRowsData[0], container = document.getElementById('dynamicFormContainer');
        container.innerHTML = "";
        document.getElementById('modalTitle').innerText = mode === 'add' ? "Thêm Mới Task" : "Chỉnh Sửa Task";
        currentEditRowIndex = mode === 'edit' ? rowIndex : -1;
        for (let j = 0; j < headers.length; j++) {
            if (headers[j] === "ID") continue;
            let val = mode === 'add' ? (headers[j] === "STATUS" ? "1" : "") : (allRowsData[rowIndex][j] || "");
            container.innerHTML += `<div class="mb-4 flex flex-col gap-1"><label class="text-xs font-semibold text-gray-600 uppercase mb-1">${headers[j]}</label><input type="text" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" id="modal_field_${j}" value="${val}"></div>`;
        }
        const modalEl = document.getElementById('taskModal');
        modalEl.style.display = 'flex';
    }
    function closeModal() {
        const modalEl = document.getElementById('taskModal');
        modalEl.style.display = 'none';
    }
    function submitModalForm() { currentModalMode === 'add' ? addTask() : updateRowFromModal(currentEditRowIndex); }
    async function addTask() {
        const headers = allRowsData[0], newRow = new Array(headers.length).fill("");
        newRow[0] = Date.now();
        for (let j = 1; j < headers.length; j++) {
            const el = document.getElementById(`modal_field_${j}`);
            newRow[j] = el ? el.value.trim() : "";
        }
        console.log(`Bắt đầu xử lý thêm mới Task qua Popup Modal`, newRow);
        try {
            const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ "act": "add", "sheet": G_SHEET, "spread": G_SPREAD, "data": JSON.stringify(newRow) }) });
            if (!response.ok) throw new Error('Mạng không ổn định khi append dữ liệu');
            console.log("Thêm mới Task lên server thành công.");
            allRowsData.push(newRow);
            closeModal();
            renderTable(allRowsData);
        } catch (error) { console.error("Lỗi khi thêm Task:", error); }
    }
    async function updateRowFromModal(rowIndex) {
        const headers = allRowsData[0], id = allRowsData[rowIndex][0];
        console.log(`Bắt đầu cập nhật toàn bộ dòng từ popup modal cho ID: ${id}`);
        for (let j = 0; j < headers.length; j++) {
            const el = document.getElementById(`modal_field_${j}`);
            if (el) allRowsData[rowIndex][j] = el.value.trim();
        }
        try {
            const response = await fetch(API_URL, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ "act": "updateByPosVal", "pos": 0, "val": id, "sheet": G_SHEET, "spread": G_SPREAD, "data": JSON.stringify(allRowsData[rowIndex]) }) });
            if (!response.ok) throw new Error('Lỗi hệ thống khi update dữ liệu từ modal');
            console.log(`Cập nhật dữ liệu từ popup cho Task ${id} thành công.`);
            closeModal();
            renderTable(allRowsData);
        } catch (error) { console.error("Lỗi khi update dữ liệu từ modal:", error); }
    }
    async function updateCellData(cellEl, rowIndex, colIndex) {
        const txt = cellEl.innerText.trim(), id = allRowsData[rowIndex][0];
        console.log(`Bắt đầu sự kiện cập nhật ô dữ liệu dòng ${rowIndex}, cột ${colIndex} -> Nội dung mới: ${txt}`);
        if (allRowsData[rowIndex][colIndex] === txt) return;
        allRowsData[rowIndex][colIndex] = txt;
        try {
            const response = await fetch(API_URL, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ "act": "updateByPosVal", "pos": 0, "val": id, "sheet": G_SHEET, "spread": G_SPREAD, "data": JSON.stringify(allRowsData[rowIndex]) }) });
            if (!response.ok) throw new Error('Lỗi mạng khi update nội dung ô');
            console.log(`Cập nhật nội dung ô của Task ${id} thành công.`);
            renderTable(allRowsData);
        } catch (error) { console.error("Lỗi khi update ô dữ liệu:", error); }
    }
    async function deleteTask(id, rowIndex) {
        if (!confirm("Bạn có chắc chắn muốn xóa Task này không?")) return;
        console.log(`Kích hoạt tiến trình xóa Task ID: ${id} tại hàng chỉ mục: ${rowIndex}`);
        try {
            const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ "act": "deleteByPosVal", "pos": 0, "val": id, "sheet": G_SHEET, "spread": G_SPREAD }) });
            if (!response.ok) throw new Error('Lỗi phản hồi hệ thống khi thực hiện lệnh xóa');
            console.log(`Xóa Task ${id} thành công khỏi cơ sở dữ liệu server.`);
            allRowsData.splice(rowIndex, 1);
            renderTable(allRowsData);
        } catch (error) { console.error(`Gặp lỗi nghiêm trọng khi thực hiện xóa Task ${id}:`, error); }
    }
    async function toggleStatus(id, el, rowIndex) {
        const newStatus = el.checked ? "1" : "0";
        console.log(`Bắt đầu cập nhật trạng thái Switch Toggle cho Task ID ${id}: ${newStatus}`);
        const statusColIdx = allRowsData[0].indexOf("STATUS");
        if (statusColIdx !== -1) allRowsData[rowIndex][statusColIdx] = newStatus;
        try {
            const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ "act": "updateByPosVal", "pos": 0, "val": id, "sheet": G_SHEET, "spread": G_SPREAD, "data": JSON.stringify(allRowsData[rowIndex]) }) });
            if (!response.ok) throw new Error('Không thể đồng bộ hóa trạng thái Switch');
            console.log(`Đồng bộ trạng thái Switch cho Task ID ${id} thành công.`);
            renderTable(allRowsData);
        } catch (error) { console.error("Lỗi khi thay đổi trạng thái Switch:", error); }
    }
    window.onload = fetchData;
</script>
</body>
</html>
