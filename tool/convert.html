<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Kanji → Hán Việt (1 chữ đầu)</title>
  <style>
    body { font-family: sans-serif; margin: 16px; }
    textarea { width: 48%; height: 260px; }
    .col { display: inline-block; vertical-align: top; }
    button { margin: 8px 0; padding: 6px 12px; }
    pre { background: #f5f5f5; padding: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Convert JSON: { kanji : "HÁN VIỆT (1 chữ đầu)" }</h2>

  <div class="col">
    <h3>Input JSON</h3>
    <textarea id="inputJson">
{
  "mode": "trans",
  "lang": "1",
  "input": ["一","七","万","丈","\n"],
  "message": "OK",
  "result": [
    { "t": 3, "i": "一", "o": ["nhất"], "c": true },
    { "t": 3, "i": "七", "o": ["thất"], "c": false }
  ]
}
    </textarea>
  </div>

  <div class="col" style="margin-left:4%;">
    <h3>Output JSON</h3>
    <textarea id="outputJson" readonly></textarea>
  </div>

  <div style="clear: both;"></div>
  <button onclick="convert()">Convert</button>

  <h3>Preview</h3>
  <pre id="preview"></pre>

  <script>
    function convert() {
      const inputEl = document.getElementById('inputJson');
      const outputEl = document.getElementById('outputJson');
      const previewEl = document.getElementById('preview');

      try {
        const data = JSON.parse(inputEl.value);
        const result = data.result || [];
        const map = {};

        result.forEach(item => {
          if (item && item.i && Array.isArray(item.o) && item.o.length > 0) {
            const kanji = item.i;
            const hv = item.o[0]; // chỉ lấy chữ Hán Việt đầu tiên
            map[kanji] = hv.toUpperCase(); // nếu muốn giữ nguyên thì bỏ .toUpperCase()
          }
        });

        const jsonOut = JSON.stringify(map, null, 2);
        outputEl.value = jsonOut;
        previewEl.textContent = jsonOut;
      } catch (e) {
        outputEl.value = 'Lỗi parse JSON: ' + e.message;
        previewEl.textContent = outputEl.value;
      }
    }
  </script>
</body>
</html>
