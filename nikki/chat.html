<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N3 Japanese Teacher AI - v2.5</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        h1 { color: var(--primary); text-align: center; border-bottom: 3px solid var(--accent); padding-bottom: 10px; }
        textarea { width: 100%; height: 150px; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 15px; }
        .output-box { background: #fffdf0; border-left: 5px solid var(--accent); padding: 20px; margin-top: 20px; white-space: pre-line; line-height: 1.8; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🇯🇵 N3 AI Teacher (Gemini 2.5)</h1>
    <textarea id="viInput" placeholder="Nhập câu tiếng Việt của bạn tại đây..."></textarea>
    <button id="genBtn" onclick="generate()">CHUYỂN ĐỔI SANG N3</button>
    <div id="jpOutput" class="output-box"></div>
</div>

<script>
    async function generate() {
        const btn = document.getElementById('genBtn');
        const output = document.getElementById('jpOutput');
        const input = document.getElementById('viInput').value;
        const API_KEY = "AIzaSyAys_Hy1nUvuwGwZhOuKRbccNJAnU_Sa1w";
        
        // CẬP NHẬT MODEL SANG 2.5-FLASH THEO KẾT QUẢ TEST CỦA BẠN
        const MODEL = "gemini-2.5-flash"; 
        const URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;

        btn.disabled = true;
        btn.innerText = "Đang xử lý bằng Gemini 2.5...";
        output.style.display = "block";
        output.innerText = "Đang suy nghĩ...";

        try {
            const res = await fetch(URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Tạo đoạn văn 500 chữ trình độ N3 với nội dung sau : ${input}` }] }]
                })
            });

            const data = await res.json();
            if (data.candidates) {
                output.innerText = data.candidates[0].content.parts[0].text;
            } else {
                output.innerText = "Lỗi: " + JSON.stringify(data.error);
            }
        } catch (e) {
            output.innerText = "Lỗi kết nối: " + e.message;
        } finally {
            btn.disabled = false;
            btn.innerText = "CHUYỂN ĐỔI SANG N3";
        }
    }
</script>
</body>
</html>
