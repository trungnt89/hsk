<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .sticky-header { position: sticky; top: 0; background-color: #f4f4f9; padding-top: 5px; padding-bottom: 5px; z-index: 20; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; position: sticky; top: 115px; z-index: 10; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .btn-open-add { background-color: #007AFF; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        .btn-edit { background-color: #FF9500; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .btn-delete { background-color: #ff3b30; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .editable-cell { background-color: #ffffff; cursor: pointer; border: 1px solid #ddd !important; }
        .action-buttons { display: flex; gap: 5px; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background-color: white; padding: 20px; border-radius: 8px; width: 400px; max-width: 90%; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .modal-header { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 14px; color: #333; font-weight: 500; }
        .form-group input, .form-group textarea { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; width: 100%; box-sizing: border-box; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px; }
        .btn-submit { background-color: #34C759; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-cancel { background-color: #8E8E93; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .switch { position: relative; display: inline-block; width: 50px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #E9E9EA; transition: .3s; border-radius: 30px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
        input:checked + .slider { background-color: #34C759; }
        input:checked + .slider:before { transform: translateX(20px); }
        .filter-container { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: bold; }
        .filter-label { color: #333; }
    </style>
</head>
<body>
    <div class="sticky-header">
        <h2>Danh sách Task từ Server</h2>
        <button class="btn-open-add" onclick="openModal('add')">Thêm Mới Task</button>
        <div class="filter-container">
            <span class="filter-label">Chỉ hiển thị Status = 1:</span>
            <label class="switch">
                <input type="checkbox" id="filterToggle" checked onchange="filterTasks()">
                <span class="slider"></span>
            </label>
        </div>
    </div>
    <div id="loading">Đang tải dữ liệu...</div>
    <table id="taskTable" style="display:none;">
        <thead>
            <tr id="headerRow"></tr>
                </thead>
        <tbody id="taskBody"></tbody>
    </table>
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div id="modalTitle" class="modal-header">Thêm Mới Task</div>
            <div id="dynamicFormContainer"></div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">Hủy</button>
                <button class="btn-submit" onclick="submitModalForm()">Lưu</button>
            </div>
        </div>
    </div>
<script>
    const API_URL = 'https://hsk-gilt.vercel.app/api/gSheet';
    const G_SHEET = "TASK";
    const G_SPREAD = "1ezoFMSBVznSNcuufRRQRjxAmUmYyU9MjKDzl-v3wxl8";
    let allRowsData = [], currentModalMode = 'add', currentEditRowIndex = -1;
    async function fetchData() {
        console.log("Bắt đầu tải dữ liệu từ server...");
        try {
            const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ "sheet": G_SHEET, "act": "read", "spread": G_SPREAD }) });
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            console.log("Tải dữ liệu từ server thành công.", data);
            renderTable(data.values);
        } catch (error) {
            console.error("Lỗi xảy ra trong quá trình fetchData:", error);
            document.getElementById('loading').innerText = "Lỗi khi tải dữ liệu.";
        }
    }
    function formatLastTime(timeStr) {
        if (!timeStr) return "";
        if (timeStr.includes(":") && timeStr.split(":").length >= 2) {
            let t = timeStr.includes(" ") ? timeStr.split(" ")[1] : timeStr;
            return t.split(":")[0] + ":" + t.split(":")[1];
        }
        return timeStr;
    }
    function renderTable(values) {
        console.log("Bắt đầu dựng cấu trúc bảng hiển thị...");
        const headers = values[0], startColIdx = headers.indexOf("START");
        document.getElementById('headerRow').innerHTML = headers.filter(h => h !== "ID" && h !== "NOTE").map(h => `<th>${h}</th>`).join('') + '<th>HÀNH ĐỘNG</th>';
        document.getElementById('taskBody').innerHTML = "";
        allRowsData = JSON.parse(JSON.stringify(values));
        let dataRows = values.slice(1);
        if (startColIdx !== -1) dataRows.sort((a, b) => (a[startColIdx] || "").localeCompare(b[startColIdx] || ""));
        for (let i = 0; i < dataRows.length; i++) {
            if (dataRows[i].length < 2) continue;
            const origIdx = allRowsData.findIndex(r => r[0] === dataRows[i][0]), tr = document.createElement('tr');
            tr.setAttribute('data-id', dataRows[i][0]);
            let rowHtml = "", isActive = dataRows[i][headers.indexOf("STATUS")] === "1";
            for (let j = 0; j < headers.length; j++) {
                if (headers[j] === "ID" || headers[j] === "NOTE") continue;
                let val = dataRows[i][j] || "";
                if (headers[j] === "LastTime") val = formatLastTime(val);
                rowHtml += headers[j] === "STATUS" ? `<td><label class="switch"><input type="checkbox" ${isActive ? "checked" : ""} onchange="toggleStatus('${dataRows[i][0]}', this, ${origIdx})"><span class="slider"></span></label></td>` : `<td class="editable-cell" contenteditable="true" onblur="updateCellData(this, ${origIdx}, ${j})">${val.replace(/\n/g, '<br>')}</td>`;
            }
            tr.setAttribute('data-status-active', isActive ? "1" : "0");
            tr.innerHTML = rowHtml + `<td><div class="action-buttons"><button class="btn-edit" onclick="openModal('edit', ${origIdx})">Sửa</button><button class="btn-delete" onclick="deleteTask('${dataRows[i][0]}', ${origIdx})">Xóa</button></div></td>`;
            document.getElementById('taskBody').appendChild(tr);
        }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('taskTable').style.display = 'table';
        console.log("Dựng bảng hoàn tất. Tiến hành chạy bộ lọc khởi tạo.");
        filterTasks();
    }
    function filterTasks() {
        const isEnforceActive = document.getElementById('filterToggle').checked;
        console.log(`Áp dụng bộ lọc hiển thị iPhone Toggle. Chỉ hiện status=1: ${isEnforceActive}`);
        document.querySelectorAll('#taskBody tr').forEach(row => row.style.display = (!isEnforceActive || row.getAttribute('data-status-active') === "1") ? '' : 'none');
    }
    function openModal(mode, rowIndex) {
        currentModalMode = mode;
        const headers = allRowsData[0], container = document.getElementById('dynamicFormContainer');
        container.innerHTML = "";
        document.getElementById('modalTitle').innerText = mode === 'add' ? "Thêm Mới Task" : "Chỉnh Sửa Task";
        currentEditRowIndex = mode === 'edit' ? rowIndex : -1;
        for (let j = 0; j < headers.length; j++) {
            if (headers[j] === "ID") continue;
            let val = mode === 'add' ? (headers[j] === "STATUS" ? "1" : "") : (allRowsData[rowIndex][j] || "");
            container.innerHTML += `<div class="form-group"><label>${headers[j]}</label><input type="text" id="modal_field_${j}" value="${val}"></div>`;
        }
        document.getElementById('taskModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('taskModal').style.display = 'none'; }
    function submitModalForm() { currentModalMode === 'add' ? addTask() : updateRowFromModal(currentEditRowIndex); }
    async function addTask() {
        const headers = allRowsData[0], newRow = new Array(headers.length).fill("");
        newRow[0] = Date.now();
        for (let j = 1; j < headers.length; j++) {
            const el = document.getElementById(`modal_field_${j}`);
            newRow[j] = el ? el.value.trim() : "";
        }
        console.log(`Bắt đầu xử lý thêm mới Task qua Popup Modal`, newRow);
        try {
            const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ "act": "add", "sheet": G_SHEET, "spread": G_SPREAD, "data": JSON.stringify(newRow) }) });
            if (!response.ok) throw new Error('Mạng không ổn định khi append dữ liệu');
            console.log("Thêm mới Task lên server thành công.");
            allRowsData.push(newRow);
            closeModal();
            renderTable(allRowsData);
        } catch (error) { console.error("Lỗi khi thêm Task:", error); }
    }
    async function updateRowFromModal(rowIndex) {
        const headers = allRowsData[0], id = allRowsData[rowIndex][0];
        console.log(`Bắt đầu cập nhật toàn bộ dòng từ popup modal cho ID: ${id}`);
        for (let j = 0; j < headers.length; j++) {
            const el = document.getElementById(`modal_field_${j}`);
            if (el) allRowsData[rowIndex][j] = el.value.trim();
        }
        try {
            const response = await fetch(API_URL, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ "act": "updateByPosVal", "pos": 0, "val": id, "sheet": G_SHEET, "spread": G_SPREAD, "data": JSON.stringify(allRowsData[rowIndex]) }) });
            if (!response.ok) throw new Error('Lỗi hệ thống khi update dữ liệu từ modal');
            console.log(`Cập nhật dữ liệu từ popup cho Task ${id} thành công.`);
            closeModal();
            renderTable(allRowsData);
        } catch (error) { console.error("Lỗi khi update dữ liệu từ modal:", error); }
    }
    async function updateCellData(cellEl, rowIndex, colIndex) {
        const txt = cellEl.innerText.trim(), id = allRowsData[rowIndex][0];
        console.log(`Bắt đầu sự kiện cập nhật ô dữ liệu dòng ${rowIndex}, cột ${colIndex} -> Nội dung mới: ${txt}`);
        if (allRowsData[rowIndex][colIndex] === txt) return;
        allRowsData[rowIndex][colIndex] = txt;
        try {
            const response = await fetch(API_URL, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ "act": "updateByPosVal", "pos": 0, "val": id, "sheet": G_SHEET, "spread": G_SPREAD, "data": JSON.stringify(allRowsData[rowIndex]) }) });
            if (!response.ok) throw new Error('Lỗi mạng khi update nội dung ô');
            console.log(`Cập nhật nội dung ô của Task ${id} thành công.`);
            renderTable(allRowsData);
        } catch (error) { console.error("Lỗi khi update ô dữ liệu:", error); }
    }
    async function deleteTask(id, rowIndex) {
        if (!confirm("Bạn có chắc chắn muốn xóa Task này không?")) return;
        console.log(`Kích hoạt tiến trình xóa Task ID: ${id} tại hàng chỉ mục: ${rowIndex}`);
        try {
            const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ "act": "deleteByPosVal", "pos": 0, "val": id, "sheet": G_SHEET, "spread": G_SPREAD }) });
            if (!response.ok) throw new Error('Lỗi phản hồi hệ thống khi thực hiện lệnh xóa');
            console.log(`Xóa Task ${id} thành công khỏi cơ sở dữ liệu server.`);
            allRowsData.splice(rowIndex, 1);
            renderTable(allRowsData);
        } catch (error) { console.error(`Gặp lỗi nghiêm trọng khi thực hiện xóa Task ${id}:`, error); }
    }
    async function toggleStatus(id, el, rowIndex) {
        const newStatus = el.checked ? "1" : "0";
        console.log(`Kích hoạt sự kiện thay đổi trạng thái Task ID: ${id} -> Trạng thái mới: ${newStatus}`);
        const statusColIdx = allRowsData[0].indexOf("STATUS") !== -1 ? allRowsData[0].indexOf("STATUS") : 2;
        allRowsData[rowIndex][statusColIdx] = newStatus;
        const targetRow = el.closest('tr');
        if (targetRow) targetRow.setAttribute('data-status-active', newStatus);
        try {
            const response = await fetch(API_URL, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ "act": "updateByPosVal", "pos": 0, "val": id, "sheet": G_SHEET, "spread": G_SPREAD, "data": JSON.stringify(allRowsData[rowIndex]) }) });
            if (!response.ok) throw new Error('Lỗi phản hồi hệ thống mạng khi gửi API update');
            console.log(`Đồng bộ trạng thái của Task ${id} lên hệ thống server thành công.`, await response.json());
            filterTasks();
        } catch (error) { console.error(`Xảy ra lỗi nghiêm trọng khi gọi API cập nhật trạng thái Task ${id}:`, error); }
    }
    fetchData();
</script>
</body>
</html>
