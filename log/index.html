<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JST Live Console</title>
    <script src="../com/assistive.js"></script>    
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; overflow: hidden; }
        .header { background: #111; padding: 10px 15px; border-bottom: 2px solid #222; display: flex; align-items: center; justify-content: space-between; height: 60px; box-sizing: border-box; }
        .container { padding: 10px; height: calc(100vh - 60px); overflow-y: auto; box-sizing: border-box; }
        
        #monitor-box {
            background: #050505;
            border: 1px solid #222;
            padding: 5px;
            min-height: 100%;
        }

        .log-entry {
            border-bottom: 1px solid #1a1a1a;
            padding: 10px 4px; 
            display: flex;
            gap: 10px; 
            align-items: flex-start;
            line-height: 1.4;
        }

        /* Cột 1: Thời gian - Thu nhỏ */
        .log-time { 
            color: #777; 
            flex: 0 0 155px; 
            font-family: 'Consolas', monospace; 
            font-size: 12px;
            white-space: nowrap; 
        }

        /* Cột 2: Level/Tag - Thu nhỏ */
        .log-level { 
            font-weight: 700; 
            flex: 0 0 75px; 
            font-size: 12px;
            text-transform: uppercase;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Cột 3: Nội dung chính - Làm nổi bật */
        .log-msg { 
            flex: 1; 
            word-break: break-word;
            white-space: pre-wrap;
            color: #ffffff; /* Trắng sáng hơn */
            font-size: 16px; /* To hơn hẳn hai cột đầu */
            font-weight: 500;
            margin-top: -2px; /* Căn chỉnh lại trục dọc so với chữ nhỏ */
        }

        .level-info, .level-voice_gas { color: #2ecc71; }
        .level-error { color: #e74c3c; }
        .level-warn { color: #f1c40f; }

        #clock {
            font-family: 'Consolas', monospace;
            font-size: 28px;
            font-weight: bold;
            color: #2ecc71;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.4);
        }
        h3 { font-size: 18px; margin: 0; color: #eee; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex; align-items:center; gap:15px;">
            <div style="width:12px; height:12px; background:#2ecc71; border-radius:50%; box-shadow: 0 0 10px #2ecc71;"></div>
            <h3>CONSOLE MONITOR (JST)</h3>
        </div>
        <div id="clock">--:--:--</div>
    </div>
    <div class="container">
        <div id="monitor-box">Đang kết nối hệ thống...</div>
    </div>

    <script src="../com/logger.js"></script>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxYrGbKghzwW1cKU37CJf-UFISCcvGkemZlTJZH1GWa7x4qrAOd2UKzVOR3vWAPOtyMww/exec";

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleString('ja-JP', {
                timeZone: 'Asia/Tokyo',
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false
            }).replace(/\//g, '-');
        }

        async function fetchLogs() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                const container = document.getElementById('monitor-box');
                
                if (!data || data.length === 0) return;

                container.innerHTML = data.map(log => {
                    const logDate = new Date(log.timestamp).toLocaleString('ja-JP', {
                        timeZone: 'Asia/Tokyo',
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit', second: '2-digit',
                        hour12: false
                    }).replace(/\//g, '-');

                    const levelClass = String(log.level).toLowerCase().replace(/\s+/g, '_');

                    return `
                        <div class="log-entry">
                            <span class="log-time">[${logDate}]</span>
                            <span class="log-level level-${levelClass}">${log.level}</span>
                            <span class="log-msg">${log.message}</span>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error("[SYNC] Error:", error);
            }
        }

        setInterval(updateClock, 1000);
        setInterval(fetchLogs, 10000);
        window.onload = () => { updateClock(); fetchLogs(); };
    </script>
</body>
</html>
