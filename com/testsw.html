<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Shadowing Pro - Fix Lặp Từ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f1f5f9; }
        .card { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #content-text { background: #f8fafc; padding: 15px; margin-bottom: 20px; font-size: 18px; line-height: 1.6; border-left: 4px solid #3b82f6; }
        #gamePanel { background: #1e293b; color: white; padding: 15px; border-radius: 8px; margin-top: 15px; display: none; flex-direction: column; }
        #gameInterim { color: #94a3b8; font-style: italic; min-height: 24px; margin-bottom: 10px; }
        #gameScore { font-size: 32px; font-weight: bold; color: #4ade80; text-align: right; }
        button { width: 100%; padding: 12px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: #3b82f6; color: white; }
        button.listening { background: #ef4444; }
    </style>
</head>
<body>

<div class="card">
    <div id="content-text">現代社会において、ストレスを完全になくすことはほぼ不可能です。</div>
    
    <button id="btnMic" onclick="ShadowGame.toggle()">🎤 Luyện Shadowing</button>

    <div id="gamePanel">
        <div id="gameInterim">Sẵn sàng...</div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:12px; color:#64748b;">KẾT QUẢ</span>
            <div id="gameScore">0%</div>
        </div>
    </div>
</div>

<script src="./shadow-game.js?v=1"></script>

</body>
</html>
