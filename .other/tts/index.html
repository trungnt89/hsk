<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HSK TTS Test - Full Japanese Voices</title>
    <script src="../com/TTSClient.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding-top: 30px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h3 { margin-top: 0; color: #2d3436; text-align: center; margin-bottom: 20px; }
        .setting-row { margin-bottom: 15px; display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.85rem; font-weight: 600; color: #636e72; }
        textarea { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 14px; resize: none; outline: none; }
        select { width: 100%; padding: 10px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 14px; background: white; outline: none; }
        button { width: 100%; padding: 14px; background: #00b894; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        #status { font-size: 13px; color: #b2bec3; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h3>🇯🇵 Full Japanese TTS</h3>
    
    <div class="setting-row">
        <label>Nội dung (Text):</label>
        <textarea id="inpText" rows="3">経済的な安定を手に入れるためには、複数の収入源を持つことが非常に大切だと感じています。特に理想的なのは、不労所得のような、自分が直接的に時間を費やさなくても得られる収入です。さらに言えば、その収入源となる仕事は、自分が心から好きで、一番やりがいを感じられるものであるべきだと思っています。なぜなら、本当に好きなことだからこそ、どんな困難があっても長く続けられ、そこから真の価値や財産を築き上げることができるからです。

このような追加の収入源があることは、本業が予期せぬ困難に直面したり、最悪の場合、職を失ってしまったりするリスクを大幅に減らしてくれます。本業に何かあったとしても、すぐに経済的に困窮する心配が少なくなるでしょう。加えて、それは単なる収入源にとどまりません。本業でストレスが溜まった時でも、好きなことに打ち込む時間は、生活に喜びと意味を与え、心のゆとりをもたらしてくれるはずです。

しかし、こう考えてみると、ふと疑問に思うことがあります。どうして最初から自分の好きなことを本業にし、そこに時間も情熱も100%注ぎ込まないのだろうか？もしそれが可能なら、私たちはもっと充実した人生を送れるのではないかと、深く考えさせられます。</textarea>
    </div>

    <div class="setting-row">
        <label>Giọng đọc (Voice):</label>
        <select id="voiceSelect">
            <optgroup label="Phổ biến">
                <option value="ja-JP-NanamiNeural">Nanami (Nữ - Tự nhiên)</option>
                <option value="ja-JP-KeitaNeural">Keita (Nam - Tự nhiên)</option>
            </optgroup>
            <optgroup label="Đa ngôn ngữ (Mới)">
                <option value="ja-JP-NanamiMultilingualNeural">Nanami (Nữ - Multilingual)</option>
                <option value="ja-JP-KeitaMultilingualNeural">Keita (Nam - Multilingual)</option>
            </optgroup>
            <optgroup label="Sắc thái khác">
                <option value="ja-JP-AoiNeural">Aoi (Nữ - Trẻ trung)</option>
                <option value="ja-JP-MayuNeural">Mayu (Nữ - Nhẹ nhàng)</option>
                <option value="ja-JP-ShioriNeural">Shiori (Nữ - Chuyên nghiệp)</option>
                <option value="ja-JP-MakiNeural">Maki (Nữ - Trưởng thành)</option>
                <option value="ja-JP-DaichiNeural">Daichi (Nam - Trầm ấm)</option>
                <option value="ja-JP-NaokiNeural">Naoki (Nam - Truyền cảm)</option>
                <option value="ja-JP-MasatoshiNeural">Masatoshi (Nam - Trung niên)</option>
                <option value="ja-JP-HinataNeural">Hinata (Bé gái - Đáng yêu)</option>
            </optgroup>
        </select>
    </div>

    <div class="setting-row">
        <label>Tốc độ (Rate):</label>
        <select id="rateSelect">
            <option value="0.8" selected>0.8x</option>
            <option value="1.0">1.0x</option>
        </select>
    </div>
    
    <button id="btnSpeak" onclick="testSpeak()">🔊 Phát âm thanh</button>
    <div id="status">Sẵn sàng</div>
</div>

<script>
    async function testSpeak() {
        const text = document.getElementById('inpText').value;
        const voice = document.getElementById('voiceSelect').value;
        const rate = document.getElementById('rateSelect').value;
        const status = document.getElementById('status');

        status.innerText = "Đang xử lý...";
        
        try {
            await speakCommon({
                text: text,
                voice: voice,
                rate: rate,
                filename: "JP_Voice_Test"
            });
            status.innerText = "Hoàn thành!";
        } catch (e) {
            status.innerText = "Lỗi!";
            console.error(e);
        }
    }
</script>

</body>
</html>
