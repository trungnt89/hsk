<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JST Live Console</title>
    <script src="../com/assistive.js"></script>    
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; overflow: hidden; }
        .header { background: #111; padding: 10px 15px; border-bottom: 2px solid #222; display: flex; align-items: center; justify-content: space-between; height: 60px; box-sizing: border-box; }
        .container { padding: 10px; height: calc(100vh - 60px); overflow-y: auto; box-sizing: border-box; }
        
        #monitor-box {
            background: #050505;
            border: 1px solid #222;
            font-size: 14px;
            padding: 5px;
            min-height: 100%;
        }

        .log-entry {
            border-bottom: 1px solid #1a1a1a;
            padding: 6px 0;
            display: flex;
            gap: 12px;
            align-items: flex-start; /* Giữ các cột canh đỉnh khi log dài */
            line-height: 1.5;
        }

        /* Cố định chiều rộng cột thời gian để không bị rớt dòng */
        .log-time { 
            color: #888; 
            flex: 0 0 190px; 
            font-family: 'Consolas', monospace; 
            white-space: nowrap; 
        }

        /* Cố định chiều rộng cột Level */
        .log-level { 
            font-weight: bold; 
            flex: 0 0 80px; 
            text-transform: uppercase; 
        }

        /* Cột nội dung tự động co giãn và ngắt dòng đúng cách */
        .log-msg { 
            flex: 1; 
            word-break: break-word; /* Ngắt dòng khi gặp từ quá dài */
            white-space: pre-wrap; /* Giữ nguyên định dạng xuống dòng nếu có */
            color: #ddd;
        }

        .level-info { color: #2ecc71; }
        .level-error { color: #e74c3c; }
        .level-warn { color: #f1c40f; }

        #clock {
            font-family: 'Consolas', monospace;
            font-size: 28px;
            font-weight: bold;
            color: #2ecc71;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.4);
        }
        h3 { font-size: 20px; margin: 0; color: #eee; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex; align-items:center; gap:15px;">
            <div style="width:12px; height:12px; background:#2ecc71; border-radius:50%; box-shadow: 0 0 10px #2ecc71;"></div>
            <h3>CONSOLE MONITOR (JST)</h3>
        </div>
        <div id="clock">--:--:--</div>
    </div>
    <div class="container">
        <div id="monitor-box">Đang kết nối hệ thống...</div>
    </div>

    <script src="../com/logger.js"></script>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxYrGbKghzwW1cKU37CJf-UFISCcvGkemZlTJZH1GWa7x4qrAOd2UKzVOR3vWAPOtyMww/exec";

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleString('ja-JP', {
                timeZone: 'Asia/Tokyo',
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false
            }).replace(/\//g, '-'); // Đổi / thành - cho đẹp
        }

        async function fetchLogs() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                const container = document.getElementById('monitor-box');
                
                if (!data || data.length === 0) {
                    container.innerHTML = "<div style='padding:10px; color:#555;'>Không có dữ liệu log.</div>";
                    return;
                }

                container.innerHTML = data.map(log => {
                    const logDate = new Date(log.timestamp).toLocaleString('ja-JP', {
                        timeZone: 'Asia/Tokyo',
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit', second: '2-digit',
                        hour12: false
                    });

                    return `
                        <div class="log-entry">
                            <span class="log-time">[${logDate}]</span>
                            <span class="log-level level-${String(log.level).toLowerCase()}">${log.level}</span>
                            <span class="log-msg">${log.message}</span>
                        </div>
                    `;
                }).join('');

                console.log("[SYNC] Success: " + new Date().toLocaleTimeString());
                
            } catch (error) {
                console.error("[SYNC] Error:", error);
                document.getElementById('monitor-box').innerHTML = "<div style='color:#e74c3c; padding:10px;'>Lỗi kết nối: " + error.message + "</div>";
            }
        }

        setInterval(updateClock, 1000);
        setInterval(fetchLogs, 10000);

        window.onload = () => {
            updateClock();
            fetchLogs();
            if (typeof LoggerModule !== 'undefined') LoggerModule.init("monitor-box");
        };
    </script>
</body>
</html>
