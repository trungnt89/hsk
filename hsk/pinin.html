    <title>Bảng Phát Âm Pinyin Tiếng Trung Đơn Giản</title>
    <!-- Nhúng Tailwind CSS để có giao diện hiện đại và sạch đẹp -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tinh chỉnh thanh cuộn ngang/dọc cho mượt */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* Chăn phóng to (zoom) khi click đúp trên điện thoại iOS/Safari */
        button, [role="button"], select, input {
            touch-action: manipulation;
        }
    </style>
</head>
<body class="bg-white text-slate-800 h-screen w-screen overflow-x-hidden overflow-y-auto m-0 p-0 font-sans">

    <div class="w-full min-h-full bg-white p-3 sm:p-5 space-y-3 flex flex-col justify-start">
        
        <!-- Tiêu đề -->
        <div class="border-b border-slate-100 pb-1.5 text-center sm:text-left">
            <h1 class="text-base sm:text-lg font-bold text-indigo-600">Bảng Phát Âm Pinyin Tiếng Trung</h1>
        </div>

        <!-- Dòng 1: Chọn Phụ Âm -->
        <div class="space-y-1">
            <label class="block text-[10px] sm:text-[11px] font-bold text-slate-500 uppercase tracking-wider">
                Thanh mẫu
            </label>
            <div id="consonantContainer" class="flex flex-wrap gap-1 p-1 bg-slate-50 rounded-xl border border-slate-150">
                <!-- Javascript tự động chèn nút bấm tại đây -->
            </div>
        </div>

        <!-- Dòng 2: Chọn Nguyên Âm -->
        <div class="space-y-1">
            <label class="block text-[10px] sm:text-[11px] font-bold text-slate-500 uppercase tracking-wider">
                Vận mẫu
            </label>

                <!-- Javascript tự động chèn nút bấm tại đây -->
            </div>
        </div>

        <!-- Kết quả bên dưới: Bảng 4 Thanh điệu -->
        <div class="pt-2 border-t border-slate-100 space-y-2">
            <div class="flex items-center justify-between">
                <span class="text-[11px] text-slate-450 font-medium">Từ đang ghép: <strong id="selectedWordLabel" class="text-indigo-600 uppercase font-mono text-sm sm:text-base ml-1">ba</strong></span>
                <!-- iPhone Toggle Style -->
                <label class="inline-flex items-center space-x-2 cursor-pointer select-none">
                    <span class="text-[11px] font-semibold text-slate-600">Tự động đọc</span>
                    <div class="relative inline-flex items-center">
                        <input type="checkbox" id="autoplayToggle" class="sr-only peer" onchange="toggleAutoplay()">
                        <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-4 peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500 transition-colors"></div>
                    </div>
                </label>
            </div>

                <!-- Các ô thanh điệu phát âm sẽ hiển thị tại đây -->

        let db = null;
        const DB_NAME = "PinyinAudioDB";
        const STORE_NAME = "audioCache";

        function initDB() {
            return new Promise((resolve) => {
                if (!window.indexedDB) {
                    console.warn("Trình duyệt không hỗ trợ IndexedDB.");
                    resolve(null);
                    return;
                }
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                request.onerror = (e) => {
                    console.error("Lỗi khởi tạo IndexedDB:", e.target.error);
                    resolve(null);
                };
            });
        }

        function getAudioFromCache(key) {
            return new Promise((resolve) => {
                if (!db) {
                    resolve(null);
                    return;
                }
                try {
                    const transaction = db.transaction([STORE_NAME], "readonly");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.get(key);
                    request.onsuccess = () => resolve(request.result || null);
                    request.onerror = () => resolve(null);
                } catch (e) {
                    console.error("Lỗi lấy dữ liệu từ IndexedDB:", e);
                    resolve(null);
                }
            });
        }

        function saveAudioToCache(key, blob) {
            if (!db) return;
            try {
                const transaction = db.transaction([STORE_NAME], "readwrite");
                const store = transaction.objectStore(STORE_NAME);
                store.put(blob, key);
            } catch (e) {
                console.error("Lỗi lưu dữ liệu vào IndexedDB:", e);
            }
        }

        // Mở khóa tiếng cho iOS Safari bằng cách phát chuỗi tiếng câm
        function unlockAudio() {
            if (globalAudio && globalAudio.paused) {
                const originalSrc = globalAudio.src;
                if (!originalSrc || originalSrc.startsWith("data:")) {
                    globalAudio.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA"; 
                    globalAudio.play().catch(() => {});
                }
            }
        }

        // Tải trước 4 âm phát của từ ghép đang chọn để lưu sẵn vào RAM (memoryAudioCache) cứu cánh Safari
        async function prefetchCurrentSyllableAudios() {
            const row = CSV_ROWS[selectedRowIdx];
            const syllable = row.syllables[selectedInitial];
            if (!syllable) return;

            for (let i = 1; i <= 4; i++) {
                const normalizedSyllable = syllable.toLowerCase();
                const audioUrl = `https://cdn.yoyochinese.com/audio/pychart/${normalizedSyllable}${i}.mp3`;
                
                if (memoryAudioCache.has(audioUrl)) continue;

                try {
                    let blob = null;
                    try {
                        blob = await getAudioFromCache(audioUrl);
                    } catch (dbErr) {
                        console.warn("Không đọc được từ IndexedDB khi prefetch:", dbErr);
                    }

                    if (!blob) {
                        const response = await fetch(audioUrl);
                        if (response.ok) {
                            blob = await response.blob();
                            // Lưu vào RAM ngay để phát tức thì
                            memoryAudioCache.set(audioUrl, blob);
                            
                            // Chạy ngầm việc lưu vào IndexedDB sau để không làm nghẽn luồng loading/prefetching
                            const capturedBlob = blob;
                            setTimeout(() => {
                                try {
                                    saveAudioToCache(audioUrl, capturedBlob);
                                } catch (saveErr) {
                                    console.warn("Lưu ngầm IndexedDB thất bại khi prefetch:", saveErr);
                                }
                            }, 50);
                        }
                    } else {
                        memoryAudioCache.set(audioUrl, blob);
                    }
                } catch (e) {
                    console.warn("Lỗi prefetch âm thanh:", audioUrl, e);
                }
            }
        }

        const consonantContainer = document.getElementById("consonantContainer");
        const vowelContainer = document.getElementById("vowelContainer");
        const tonesContainer = document.getElementById("tonesContainer");
        const selectedWordLabel = document.getElementById("selectedWordLabel");

        // Khởi tạo các Phụ Âm (Dòng 1)
        function initConsonants() {
            consonantContainer.innerHTML = "";
            CONSONANTS.forEach(initial => {
                const btn = document.createElement("button");
                const hasData = !!CSV_ROWS[selectedRowIdx]?.syllables[initial];
                btn.className = getBtnClass(initial === selectedInitial, hasData, "indigo");
                btn.textContent = INITIAL_PRETTY_NAMES[initial] || initial;
                btn.onclick = () => selectInitial(initial);
                consonantContainer.appendChild(btn);
            });
        }

        // Khởi tạo Nguyên Âm (Dòng 2) theo hàng (Vowels Grouping)
        function initVowels() {
            vowelContainer.innerHTML = "";
            VOWEL_GROUPS.forEach(group => {
                const groupRow = document.createElement("div");
                groupRow.className = "flex flex-wrap gap-1 items-center py-0.5 border-b border-slate-200 last:border-0";

                group.indices.forEach(idx => {
                    const row = CSV_ROWS[idx];
                    if (!row) return;

                    const btn = document.createElement("button");
                    const hasData = !!row.syllables[selectedInitial];
                    btn.className = getBtnClass(idx === selectedRowIdx, hasData, "emerald");
                    btn.textContent = row.final;
                    btn.onclick = () => selectRow(idx);
                    groupRow.appendChild(btn);
                });

                vowelContainer.appendChild(groupRow);
            });
        }

        // Cập nhật bảng 4 Thanh điệu phía dưới
        function renderTonesTable() {
            tonesContainer.innerHTML = "";
            const row = CSV_ROWS[selectedRowIdx];
            const syllable = row.syllables[selectedInitial];

            if (!syllable) {
                // If combination is not valid in standard Chinese
                selectedWordLabel.innerText = "Không ghép được";
                selectedWordLabel.className = "text-rose-500 font-bold text-sm sm:text-base ml-1";
                
                tonesContainer.className = "col-span-2 sm:col-span-4 flex flex-col items-center justify-center p-6 bg-slate-50 rounded-xl border border-dashed border-slate-350 text-slate-500 w-full min-h-[140px]";
                tonesContainer.innerHTML = `
                    <div class="text-3xl mb-1 text-slate-400">🚫</div>
                    <p class="text-xs font-semibold text-slate-600">Không có âm ghép này trong tiếng Trung</p>
                    <p class="text-[10px] text-slate-400 font-mono mt-1 uppercase">
                        ${selectedInitial === "zero_initial" ? "Ø" : selectedInitial} + ${row.final}
                    </p>
                `;
                return;
            }

            // Standard grid style
            tonesContainer.className = "grid grid-cols-1 gap-2 w-full";
            selectedWordLabel.innerText = syllable;
            selectedWordLabel.className = "text-indigo-600 uppercase font-mono text-sm sm:text-base ml-1";

            const tones = pinyinData.pinyin_tones_map[selectedInitial]?.[syllable] || [];
            
            for (let i = 1; i <= 4; i++) {
                const toneWord = tones[i - 1];
                if (!toneWord) {
                    // fall back generating if missing
                    continue;
                }

                const cardBox = document.createElement("button");
                const isPlaying = currentPlayingTone === i;
                const isSelected = selectedToneIndex === i;

                let bgBorderClass = "";
                if (isPlaying || isSelected) {
                    bgBorderClass = "bg-indigo-600 text-white border-indigo-600 shadow-md scale-[0.99]";
                } else {
                    bgBorderClass = "bg-white text-slate-800 border-slate-200 hover:border-indigo-400 hover:bg-indigo-50/30";
                }

                cardBox.className = `px-4 py-3 sm:py-4 rounded-xl border transition-all flex items-center justify-between cursor-pointer w-full relative ${bgBorderClass}`;

                const badgeClass = (isPlaying || isSelected)
                    ? 'bg-indigo-700 text-indigo-100' 
                    : 'bg-slate-100 text-slate-500';

                cardBox.innerHTML = `
                    <div class="flex items-center space-x-3.5">
                        <span class="text-xs font-semibold px-2.5 py-0.5 rounded ${badgeClass} uppercase font-mono">Thanh ${i}</span>
                        <span class="text-base sm:text-lg font-bold">${toneWord}</span>
                    </div>
                    <div class="flex items-center space-x-1.5">
                        ${isPlaying ? '<span class="w-1.5 h-1.5 rounded-full bg-rose-455 bg-rose-400 animate-ping"></span>' : `<span class="text-xs ${isSelected ? 'text-indigo-200' : 'text-slate-400'}">🔊</span>`}
                    </div>
                `;

                cardBox.onclick = () => {
                    // Mở khóa tiếng tức thì trước khi chạy bất kỳ đoạn code chứa await nào
                    unlockAudio();
                    // When clicked manually, we save the selected tone position and play it
                    selectedToneIndex = i;
                    playCurrentSelectedPosition();
                };
                tonesContainer.appendChild(cardBox);
            }
        }

        // Dừng tất cả âm thanh & bộ đếm đang hoạt động
        function stopAllPlaying() {
            if (globalAudio) {
                globalAudio.pause();
                globalAudio.onended = null;
            }
            if (playTimeout) {
                clearTimeout(playTimeout);
                playTimeout = null;
            }
            currentPlayingTone = null;
        }

        // Tự động lên lịch âm tiếp theo sau 800ms nghỉ tự nhiên
        function scheduleNextAutoTone() {
            if (playTimeout) {
                clearTimeout(playTimeout);
                playTimeout = null;
            }
            if (!isAutoPlaying) return;

            playTimeout = setTimeout(() => {
                if (!isAutoPlaying) return;
                
                // Lấy vị trí tiếp theo (hết thì quay về đầu: 1 -> 2 -> 3 -> 4 -> 1)
                selectedToneIndex = (selectedToneIndex % 4) + 1;
                playCurrentSelectedPosition();
            }, 800);
        }

        let currentObjectUrl = null;

        // Hàm phát âm thanh trực tiếp từ Blob hoặc URL liên kết trực tiếp (Đồng bộ tuyệt đối không await để chiều iOS/Safari)
        function playAudioSourceSynchronously(source, audioUrl, wasPlaying) {
            if (currentObjectUrl) {
                try {
                    URL.revokeObjectURL(currentObjectUrl);
                } catch (e) {}
                currentObjectUrl = null;
            }

            let finished = false;
            const onPlayFinished = () => {
                if (finished) return;
                finished = true;
                currentPlayingTone = null;
                renderTonesTable();

                if (currentObjectUrl) {
                    try {
                        URL.revokeObjectURL(currentObjectUrl);
                    } catch (e) {}
                    currentObjectUrl = null;
                }
                
                if (isAutoPlaying) {
                    scheduleNextAutoTone();
                }
            };

            try {
                if (source instanceof Blob) {
                    currentObjectUrl = URL.createObjectURL(source);
                    globalAudio.src = currentObjectUrl;
                } else if (typeof source === "string") {
                    globalAudio.src = source;
                } else {
                    throw new Error("Nguồn phát âm thanh không hợp lệ");
                }
                
                globalAudio.play()
                    .then(() => {
                        globalAudio.onended = onPlayFinished;
                    })
                    .catch(err => {
                        console.warn("Lỗi gọi play() đồng bộ:", err);
                        onPlayFinished();
                    });
            } catch (err) {
                console.warn("Lỗi gán nguồn phát âm thanh:", err);
                onPlayFinished();
            }
        }

        // Hàm chạy ngầm để tải và lưu tệp âm thanh vào IndexedDB & RAM cache
        function backgroundCacheAudio(audioUrl) {
            setTimeout(async () => {
                if (memoryAudioCache.has(audioUrl)) return;
                
                try {
                    let blob = null;
                    try {
                        blob = await getAudioFromCache(audioUrl);
                    } catch (dbErr) {
                        console.warn("Lỗi đọc cache ngầm từ IndexedDB:", dbErr);
                    }
                    
                    if (!blob) {
                        console.log(`[Cache Background] Đang tải mới ngầm từ mạng cho: ${audioUrl}`);
                        const response = await fetch(audioUrl);
                        if (response.ok) {
                            blob = await response.blob();
                            memoryAudioCache.set(audioUrl, blob);
                            try {
                                saveAudioToCache(audioUrl, blob);
                            } catch (saveErr) {
                                console.warn("Lỗi lưu ngầm IndexedDB:", saveErr);
                            }
                        }
                    } else {
                        memoryAudioCache.set(audioUrl, blob);
                    }
                } catch (err) {
                    console.warn("Lỗi chạy ngầm cache:", err);
                }
            }, 100);
        }

        // Hàm tải không đồng bộ từ cache IndexedDB hoặc phát trực tiếp từ link sau đó lưu ngầm
        async function loadAndPlayAudioAsync(audioUrl, wasPlaying) {
            let blob = null;
            try {
                // Thử lấy từ IndexedDB trước, nếu lỗi thì bỏ qua lỗi để phát trực tiếp từ mạng
                try {
                    blob = await getAudioFromCache(audioUrl);
                } catch (dbErr) {
                    console.warn("Không đọc được từ IndexedDB khi load:", dbErr);
                }
            } catch (err) {
                console.warn("Lỗi tải âm thanh async:", err);
            }

            if (blob) {
                console.log(`[Cache Hit] Lấy tệp âm thanh thành công từ IndexedDB: ${audioUrl}`);
                memoryAudioCache.set(audioUrl, blob);
                playAudioSourceSynchronously(blob, audioUrl, wasPlaying);
            } else {
                console.log(`[Cache Miss] Phát trực tiếp từ URL và tải ngầm lưu IndexedDB: ${audioUrl}`);
                // Phát trực tiếp từ CDN trước để phản hồi tức thì
                playAudioSourceSynchronously(audioUrl, audioUrl, wasPlaying);
                
                // Tận dụng chạy ngầm tải và lưu vào cache
                backgroundCacheAudio(audioUrl);
            }
        }

        // Phát âm thanh của vị trí đã chọn (selectedToneIndex)
        function playCurrentSelectedPosition() {
            const wasPlaying = isAutoPlaying;
            
            // Dừng các luồng phát cũ để tránh chồng chéo
            if (globalAudio) {
                globalAudio.pause();
                globalAudio.onended = null;
            }
            if (playTimeout) {
                clearTimeout(playTimeout);
                playTimeout = null;
            }

            const row = CSV_ROWS[selectedRowIdx];
            const syllable = row.syllables[selectedInitial];

            if (!syllable) {
                currentPlayingTone = null;
                renderTonesTable();
                return;
            }

            const tones = pinyinData.pinyin_tones_map[selectedInitial]?.[syllable] || [];
            const toneWord = tones[selectedToneIndex - 1];

            if (!toneWord) {
                // Nếu thanh này khuyết, tự động bỏ qua nếu đang nhảy liên tục
                if (wasPlaying) {
                    currentPlayingTone = null;
                    renderTonesTable();
                    scheduleNextAutoTone();
                } else {
                    currentPlayingTone = null;
                    renderTonesTable();
                }
                return;
            }

            currentPlayingTone = selectedToneIndex;
            renderTonesTable();

            const normalizedSyllable = syllable.toLowerCase();
            const audioUrl = `https://cdn.yoyochinese.com/audio/pychart/${normalizedSyllable}${selectedToneIndex}.mp3`;

            // Kiểm tra xem đã có sẵn trong bộ nhớ đệm RAM chưa để phát ĐỒNG BỘ chống chặn Safari
            const cachedBlob = memoryAudioCache.get(audioUrl);

            if (cachedBlob) {
                // Khớp bộ nhớ đệm RAM -> Phát đồng bộ 100% không qua bất kỳ await nào!
                playAudioSourceSynchronously(cachedBlob, audioUrl, wasPlaying);
            } else {
                // Không khớp RAM -> Phát bất đồng bộ
                loadAndPlayAudioAsync(audioUrl, wasPlaying);
            }
        }

        // Cập nhật chế độ AutoPlay khi thay đổi nút gạt iPhone
        function toggleAutoplay() {
            unlockAudio();
            const toggleCheckbox = document.getElementById("autoplayToggle");
            if (toggleCheckbox) {
                isAutoPlaying = toggleCheckbox.checked;
            } else {
                isAutoPlaying = !isAutoPlaying;
            }
            
            if (isAutoPlaying) {
                // Bắt đầu đọc tự động tại vị trí selected hiện tại
                playCurrentSelectedPosition();
            } else {
                stopAllPlaying();
                renderTonesTable();
            }
        }

        // Chọn Phụ âm mới
        function selectInitial(initial) {
            unlockAudio();
            selectedInitial = initial;
            initConsonants();
            initVowels();
            // Tải trước âm trong cache để phát đồng bộ
            prefetchCurrentSyllableAudios().then(() => {
                playCurrentSelectedPosition();
            }).catch(() => {
                playCurrentSelectedPosition();
            });
        }

        // Chọn Nguyên âm / Từ mới
        function selectRow(idx) {
            unlockAudio();
            selectedRowIdx = idx;
            initConsonants();
            initVowels();
            // Tải trước âm trong cache để phát đồng bộ
            prefetchCurrentSyllableAudios().then(() => {
                playCurrentSelectedPosition();
            }).catch(() => {
                playCurrentSelectedPosition();
            });
        }

        // Hàm giúp lấy nhóm lớp nút tương đương linh hoạt
        function getBtnClass(isActive, hasData, themeColor) {
            const baseClass = "w-[51px] sm:w-[63px] h-[30px] sm:h-[36px] flex items-center justify-center rounded-lg sm:rounded-xl text-[11px] sm:text-xs md:text-sm font-bold transition-all border shrink-0 text-center ";
            if (themeColor === "indigo") {
                if (isActive) {
                    return baseClass + "bg-indigo-600 text-white border-indigo-600 shadow-sm";
                }
                if (hasData) {
                    return baseClass + "bg-indigo-50 text-indigo-700 border-indigo-200 hover:bg-indigo-100";
                }
                return baseClass + "bg-white text-slate-600 border-slate-200 hover:bg-slate-100";
            } else if (themeColor === "emerald") {
                if (isActive) {
                    return baseClass + "bg-emerald-600 text-white border-emerald-600 shadow-sm";
                }
                if (hasData) {
                    return baseClass + "bg-emerald-50 text-emerald-700 border-emerald-200 hover:bg-emerald-100";
                }
                return baseClass + "bg-white text-slate-600 border-slate-200 hover:bg-slate-100";
            }
        }

        // Chặn phóng to (zoom) bằng hai ngón tay hoặc nhấp đúp trên iOS/Safari
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // Chạy khởi tạo lần đầu
        initDB().then(() => {
            initConsonants();
            initVowels();
            // Tải trước các file âm thanh vào cache RAM cho âm mặc định ban đầu
            prefetchCurrentSyllableAudios().then(() => {
                renderTonesTable();
            }).catch(() => {
                renderTonesTable();
            });
        }).catch(() => {
            initConsonants();
            initVowels();
            renderTonesTable();
        });
    </script>
</body>
</html>
