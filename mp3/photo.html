<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Media Scheduler Pro</title>
    <style>
        :root { --primary-color: #4285f4; }
        body { font-family: sans-serif; padding: 20px; }
        .file-item { padding: 10px; border-bottom: 1px solid #ccc; cursor: pointer; }
        #media-viewer { max-width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>🎶 Media Scheduler</h1>
    <button id="auth_button" onclick="handleAuthClick()">🔗 Kết nối Google Photos</button>
    <div id="file-list"></div>
    <div id="media-display"></div>

    <script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script>
        const CLIENT_ID = '468623053565-0km0r3d4du83a3vjsk94ilnkv35qplge.apps.googleusercontent.com';
        let tokenClient;

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/photoslibrary.readonly',
                callback: (resp) => {
                    if (resp.error) {
                        console.error("[LOG] Auth Error:", resp.error);
                        return;
                    }
                    console.log("[LOG] Auth Success, storing token.");
                    localStorage.setItem('google_access_token', resp.access_token);
                    listPhotos();
                }
            });
        }

        function handleAuthClick() {
            tokenClient.requestAccessToken({prompt: 'consent'});
        }

        async function listPhotos() {
            const token = localStorage.getItem('google_access_token');
            if (!token) {
                console.warn("[LOG] No token found, user must sign in.");
                return;
            }

            console.log("[LOG] Fetching media items...");

            try {
                const resp = await fetch('https://photoslibrary.googleapis.com/v1/mediaItems?pageSize=20', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (resp.status === 401) {
                    console.error("[LOG] 401 Unauthorized: Clearing token.");
                    localStorage.removeItem('google_access_token');
                    alert("Phiên hết hạn, vui lòng kết nối lại.");
                    return;
                }

                const data = await resp.json();
                console.log("[LOG] Data received:", data);

                const list = document.getElementById('file-list');
                list.innerHTML = '';
                
                if (data.mediaItems) {
                    data.mediaItems.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'file-item';
                        div.innerText = item.filename;
                        div.onclick = () => showMedia(item);
                        list.appendChild(div);
                    });
                }
            } catch (err) {
                console.error("[LOG] Fetch Error:", err);
            }
        }

        function showMedia(item) {
            console.log("[LOG] Displaying media:", item.filename);
            const container = document.getElementById('media-display');
            const url = item.baseUrl + "=w500-h500";
            container.innerHTML = `<img src="${url}" id="media-viewer">`;
        }
    </script>
</body>
</html>
