<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Shadowing Minimal</title>
</head>
<body>

    <h3 id="target-text">石の上にも三年。継続は力なり。</h3>

    <script type="module">
        import { ShadowGame } from './shadow-game.js';
        
        // Khởi tạo và gắn vào dưới thẻ h3
        const target = document.querySelector('h3');
        ShadowGame.init(target);
        
        // Gán vào window nếu muốn gọi từ console hoặc nơi khác
        window.ShadowGame = ShadowGame;
    </script>
</body>
</html>
