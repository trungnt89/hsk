<script>
    const dbPromise = new Promise((resolve) => {
        const req = indexedDB.open("AuthDB", 1);
        req.onupgradeneeded = () => req.result.createObjectStore("settings");
        req.onsuccess = () => resolve(req.result);
    });

    async function setToken(token) {
        const db = await dbPromise;
        db.transaction("settings", "readwrite").objectStore("settings").put(token, "refresh_token");
        location.reload();
    }

    async function getToken() {
        const db = await dbPromise;
        return new Promise(res => {
            const req = db.transaction("settings").objectStore("settings").get("refresh_token");
            req.onsuccess = () => res(req.result);
        });
    }

    async function initApp() {
        const token = await getToken();
        if (token) {
            document.getElementById('auth_button').style.display = 'none';
            document.getElementById('alarm-ui').style.display = 'block';
            // Hiển thị Token lên màn hình cho bạn xem
            const box = document.createElement('div');
            box.style.cssText = "font-size:9px; color:green; word-break:break-all; padding:5px;";
            box.innerText = "REFRESH_TOKEN: " + token;
            document.querySelector('.auth-box').appendChild(box);
            
            listFiles(token);
        }
    }

    async function listFiles(token) {
        try {
            const res = await fetch('/api/drive', { headers: { 'Authorization': `Bearer ${token}` } });
            const files = await res.json();
            allFiles = files;
            // ... Logic hiển thị vào Select và List giống như code cũ của bạn ...
        } catch (e) { console.error("Lỗi tải file", e); }
    }

    // Khi người dùng dán token vào một prompt (hoặc bạn dùng OAuth Playground để lấy)
    function handleAuthClick() {
        const token = prompt("Vui lòng dán Refresh Token lấy từ OAuth Playground vào đây:");
        if (token) setToken(token);
    }

    window.onload = initApp;
</script>
