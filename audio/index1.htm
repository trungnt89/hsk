<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Drive Media Player</title>
  <style>
    :root { --primary: #3b82f6; --danger: #ef4444; --success: #10b981; --bg: #f8fafc; }
    body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1e293b; display: flex; justify-content: center; }
    .app { width: 100%; max-width: 500px; }
    .card { background: #fff; padding: 20px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    
    /* Player area */
    #media-view { background: #000; border-radius: 12px; overflow: hidden; display: none; margin-bottom: 20px; animation: fadeIn 0.3s ease; }
    video, audio { width: 100%; display: block; outline: none; }
    
    /* List styling */
    .list { max-height: 400px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 20px; scrollbar-width: thin; }
    .folder-header { padding: 10px 15px; font-size: 11px; font-weight: 800; background: #f1f5f9; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; position: sticky; top: 0; z-index: 1; }
    .item { padding: 14px 15px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.2s; }
    .item:hover { background: #f8fafc; }
    .item:active { background: #f1f5f9; }
    .item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; font-weight: 500; }
    
    /* Controls */
    .rec-box { border-top: 2px dashed #f1f5f9; padding-top: 20px; text-align: center; }
    #status { font-size: 13px; margin-bottom: 12px; color: #64748b; font-weight: 600; min-height: 1.2em; }
    button { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: 700; font-size: 14px; margin: 5px 0; cursor: pointer; transition: all 0.2s; }
    button:active { transform: scale(0.98); }
    .btn-rec { background: var(--danger); color: #fff; }
    .btn-stop { background: #64748b; color: #fff; }
    .btn-save { background: var(--success); color: #fff; }
    button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="app">
  <div class="card">
    <div id="media-view"></div>
    <div id="fileList" class="list">Đang tải danh sách...</div>
    
    <div class="rec-box">
      <div id="status">Sẵn sàng</div>
      <button id="startBtn" class="btn-rec">BẮT ĐẦU GHI ÂM</button>
      <button id="stopBtn" class="btn-stop" disabled>DỪNG</button>
      <button id="uploadBtn" class="btn-save" disabled>LƯU LÊN DRIVE</button>
    </div>
  </div>
</div>

<script>
/**
 * Tối ưu hóa biến toàn cục và Selectors
 */
const state = {
  mediaRec: null,
  chunks: [],
  audioBlob: null
};

const dom = {
  list: document.getElementById('fileList'),
  view: document.getElementById('media-view'),
  status: document.getElementById('status'),
  btnStart: document.getElementById('startBtn'),
  btnStop: document.getElementById('stopBtn'),
  btnUpload: document.getElementById('uploadBtn')
};

// Khởi tạo sự kiện
window.onload = loadFiles;
dom.btnStart.onclick = startRec;
dom.btnStop.onclick = stopRec;
dom.btnUpload.onclick = upload;

/**
 * Tải danh sách file - Tối ưu Render
 */
async function loadFiles() {
  try {
    const res = await fetch(`/api/drive?_ts=${Date.now()}`, { cache: 'no-store' });
    if (!res.ok) throw new Error('Network error');
    
    const result = await res.json();
    const rawData = result.data || result;
    
    // Grouping dữ liệu
    const grouped = Array.isArray(rawData) 
      ? rawData.reduce((acc, f) => {
          const folder = f.folderName || 'Chung';
          if (!acc[folder]) acc[folder] = [];
          acc[folder].push(f);
          return acc;
        }, {})
      : rawData;

    renderList(grouped);
  } catch (e) {
    dom.list.innerHTML = `<div style="padding:20px;color:red;text-align:center">Lỗi kết nối máy chủ</div>`;
  }
}

function renderList(grouped) {
  const fragment = document.createDocumentFragment();
  dom.list.innerHTML = '';

  Object.entries(grouped).forEach(([folderName, files]) => {
    // Header folder
    const header = document.createElement('div');
    header.className = 'folder-header';
    header.textContent = `📁 ${folderName}`;
    fragment.appendChild(header);

    // Items
    files.forEach(f => {
      const isVideo = f.mimeType?.includes('video') || /\.(mp4|webm|mov)$/i.test(f.name);
      const item = document.createElement('div');
      item.className = 'item';
      item.innerHTML = `
        <span>${isVideo ? '🎥' : '🎵'}</span>
        <div class="item-text">${f.name}</div>
      `;
      item.onclick = () => playMedia(f.id, f.mimeType, f.name);
      fragment.appendChild(item);
    });
  });

  dom.list.appendChild(fragment);
}

/**
 * Trình phát Media - Tối ưu cho iOS
 */
function playMedia(id, mimeType, name) {
  dom.view.style.display = 'block';
  const url = `/api/drive?id=${id}`;
  const isVideo = mimeType?.includes('video') || /\.(mp4|webm|mov)$/i.test(name);

  // Giải phóng bộ nhớ trình phát cũ nếu có
  dom.view.innerHTML = ''; 

  if (isVideo) {
    const videoHtml = `
      <video controls autoplay playsinline webkit-playsinline>
        <source src="${url}" type="${mimeType}">
        Trình duyệt không hỗ trợ video.
      </video>`;
    dom.view.innerHTML = videoHtml;
  } else {
    const audioHtml = `
      <div style="padding:20px; background:#fff; text-align:center;">
        <div style="font-size:12px; color:#94a3b8; margin-bottom:10px; overflow:hidden; text-overflow:ellipsis;">${name}</div>
        <audio controls autoplay>
          <source src="${url}" type="${mimeType}">
        </audio>
      </div>`;
    dom.view.innerHTML = audioHtml;
  }
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/**
 * Ghi âm - Tối ưu Logic
 */
async function startRec() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    
    // Kiểm tra định dạng hỗ trợ cho iPhone (m4a/mp4)
    const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
    
    state.mediaRec = new MediaRecorder(stream, { mimeType });
    state.chunks = [];

    state.mediaRec.ondataavailable = e => e.data.size > 0 && state.chunks.push(e.data);
    
    state.mediaRec.onstop = () => {
      state.audioBlob = new Blob(state.chunks, { type: mimeType });
      dom.btnUpload.disabled = false;
    };

    state.mediaRec.start();
    
    updateUI(true);
    dom.status.innerText = '🔴 ĐANG GHI ÂM...';
  } catch (err) {
    console.error(err);
    alert('Không thể mở Micro. Vui lòng cấp quyền.');
  }
}

function stopRec() {
  if (state.mediaRec && state.mediaRec.state !== 'inactive') {
    state.mediaRec.stop();
    state.mediaRec.stream.getTracks().forEach(t => t.stop());
    updateUI(false);
    dom.status.innerText = 'Đã ghi xong - Sẵn sàng lưu';
  }
}

async function upload() {
  dom.btnUpload.innerText = '⏳ ĐANG TẢI LÊN...';
  dom.btnUpload.disabled = true;

  const reader = new FileReader();
  reader.readAsDataURL(state.audioBlob);
  reader.onloadend = async () => {
    const base64Audio = reader.result.split(',')[1];
    const extension = state.audioBlob.type.includes('mp4') ? 'm4a' : 'webm';

    try {
      const response = await fetch('/api/drive', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: `Rec_${new Date().getTime()}.${extension}`,
          base64Audio,
          mimeType: state.audioBlob.type
        })
      });

      if (response.ok) {
        dom.status.innerText = '✅ Đã lưu thành công!';
        loadFiles();
      } else {
        throw new Error();
      }
    } catch (e) {
      dom.status.innerText = '❌ Lỗi khi lưu';
      dom.btnUpload.disabled = false;
    } finally {
      dom.btnUpload.innerText = 'LƯU LÊN DRIVE';
    }
  };
}

function updateUI(isRecording) {
  dom.btnStart.disabled = isRecording;
  dom.btnStop.disabled = !isRecording;
  if (isRecording) dom.btnUpload.disabled = true;
}
</script>
</body>
</html>
