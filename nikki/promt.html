<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Danh sách Prompt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-switch .form-check-input { width: 2.5em; height: 1.25em; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="row m-2 text-center">
        <div class="col-12">
            <h2>Hệ thống Quản lý Prompt</h2>
            <p class="text-muted">Đồng bộ dữ liệu trực tiếp với Google Sheet</p>
        </div>
    </div>
    <div class="row mb-4">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header bg-primary text-white"><span id="form-title">Thêm Mới Prompt</span></div>
                <div class="card-body">
                    <form id="prompt-form">
                        <input type="hidden" id="prompt-id">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-10">
                                <label for="prompt-content" class="form-label">Prompt</label>
                                <input type="text" class="form-control" id="prompt-content" placeholder="Nhập nội dung prompt..." required>
                            </div>
                            <div class="col-md-2 text-end">
                                <button type="button" id="btn-cancel" class="btn btn-secondary d-none" onclick="resetForm()">Hủy</button>
                                <button type="submit" id="btn-submit" class="btn btn-success w-100">Lưu</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <span>Danh Sách Dữ Liệu (Sheet: Promt)</span>
                    <button class="btn btn-sm btn-light" onclick="fetchData()">Tải lại dữ liệu</button>
                </div>
                <div class="card-body">
                    <div id="loading-status" class="text-center my-3 text-primary" style="display: none;">
                        <div class="spinner-border spinner-border-sm"></div> <span> Đang xử lý dữ liệu với Google Sheet...</span>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th style="width: 15%">ID</th>
                                    <th style="width: 55%">PROMPT</th>
                                    <th style="width: 15%">STATUS</th>
                                    <th style="width: 15%" class="text-center">HÀNH ĐỘNG</th>
                                </tr>
                            </thead>
                            <tbody id="data-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = 'https://hsk-gilt.vercel.app/api/gSheet';
    const SHEET_CONFIG = { sheet: "Promt", spread: "1UiAS_mUhl6j6wHyPkNiol9pclzkQJWD4qzPIZD2sx3k" };
    let isEditing = false, currentPos = null;

    document.getElementById('prompt-form').addEventListener('submit', e => { e.preventDefault(); saveData(); });
    document.addEventListener('DOMContentLoaded', fetchData);

    const toggleLoading = show => document.getElementById('loading-status').style.display = show ? 'block' : 'none';

    async function callAPI(body) {
        try {
            const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            return res.ok ? res.json() : null;
        } catch { return null; }
    }

    async function fetchData() {
        toggleLoading(true);
        const tbody = document.getElementById('data-table-body');
        tbody.innerHTML = '';
        const res = await callAPI({ ...SHEET_CONFIG, act: "read" });
        if (res && res.values) {
            res.values.forEach((row, idx) => {
                const [id, prompt, status] = [row[0] || '', row[1] || '', row[2] ?? '0'];
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${id}</strong></td>
                    <td>${prompt}</td>
                    <td>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" ${status == '1' ? 'checked' : ''} onchange="toggleStatus(${idx}, '${id}', '${prompt.replace(/'/g, "\\'")}', this.checked)">
                        </div>
                    </td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-warning me-1" onclick="editMode(${idx}, '${id}', '${prompt.replace(/'/g, "\\'")}')">Sửa</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteData(${idx}, '${id}')">Xóa</button>
                    </td>`;
                tbody.appendChild(tr);
            });
        } else tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Không có dữ liệu hoặc lỗi kết nối.</td></tr>`;
        toggleLoading(false);
    }

    function editMode(idx, id, prompt) {
        isEditing = true; currentPos = idx;
        document.getElementById('form-title').innerText = "Cập Nhật Kỷ Lục Prompt";
        document.getElementById('prompt-id').value = id;
        document.getElementById('prompt-content').value = prompt;
        document.getElementById('btn-cancel').classList.remove('d-none');
        document.getElementById('btn-submit').className = "btn btn-warning w-100";
        document.getElementById('btn-submit').innerText = "Cập Nhật";
    }

    function resetForm() {
        isEditing = false; currentPos = null;
        document.getElementById('prompt-form').reset();
        document.getElementById('form-title').innerText = "Thêm Mới Prompt";
        document.getElementById('btn-cancel').classList.add('d-none');
        document.getElementById('btn-submit').className = "btn btn-success w-100";
        document.getElementById('btn-submit').innerText = "Lưu";
    }

    async function saveData() {
        toggleLoading(true);
        const txt = document.getElementById('prompt-content').value;
        const body = isEditing 
            ? { act: "updateByPosVal", pos: currentPos, val: document.getElementById('prompt-id').value, data: JSON.stringify([document.getElementById('prompt-id').value, txt, "0"]), ...SHEET_CONFIG }
            : { act: "add", data: JSON.stringify(["", txt, "0"]), ...SHEET_CONFIG };
        if (await callAPI(body)) { alert('Thành công!'); resetForm(); fetchData(); } else { alert('Lỗi!'); toggleLoading(false); }
    }

    async function toggleStatus(pos, id, prompt, isChecked) {
        toggleLoading(true);
        const body = { act: "updateByPosVal", pos, val: id, data: JSON.stringify([id, prompt, isChecked ? "1" : "0"]), ...SHEET_CONFIG };
        if (await callAPI(body)) fetchData(); else { alert('Lỗi khi đổi trạng thái!'); fetchData(); }
    }

    async function deleteData(pos, id) {
        if (!confirm('Bạn có chắc chắn muốn xóa?')) return;
        toggleLoading(true);
        if (await callAPI({ act: "deleteByPosVal", pos, val: id, ...SHEET_CONFIG })) fetchData(); else { alert('Lỗi!'); toggleLoading(false); }
    }
</script>
</body>
</html>
