        // Phát âm thủ công thẻ flashcard dựa trên mặt đang hiển thị (mặt trước: từ, mặt sau: ví dụ)
        function speakCurrentCardManual(event) {
            if (event && typeof event.stopPropagation === 'function') {
                event.stopPropagation();
            }
            if (!paginatedFlashcards || paginatedFlashcards.length === 0) return;
            const current = paginatedFlashcards[currentIndex];
            if (!current) return;
            const cardElement = document.getElementById('card');
            const isFlippedNow = cardElement && cardElement.classList.contains('flipped-vertical');
            const textToSpeak = isFlippedNow ? (current.exCn || current.word) : current.word;
            
            speakUniversalText(textToSpeak, false);
        }

        // Hiển thị danh sách từ dạng HTML, hỗ trợ tô đậm từ đang xem và đánh dấu thuộc/chưa thuộc trực tiếp
        function renderWordListItems(filterText = '') {
            const container = document.getElementById('word-list-items-container');
            container.innerHTML = '';
            
            const query = filterText.toLowerCase().trim();
            
            // Toàn bộ các từ khớp với từ khóa tìm kiếm (để tính tổng số lượng của từng trạng thái)
            const queryMatched = rawFlashcards.filter(item => {
                if (!query) return true;
                const wordHanViet = (window.getHanVietForWord && typeof window.getHanVietForWord === 'function') 
                    ? window.getHanVietForWord(item.word) 
                    : '';
                return (item.word && item.word.toLowerCase().includes(query)) ||
                       (item.pinyin && item.pinyin.toLowerCase().includes(query)) ||
                       (item.meaning && item.meaning.toLowerCase().includes(query)) ||
                       (wordHanViet && wordHanViet.toLowerCase().includes(query));
            });

            const totalCount = queryMatched.length;
            const masteredCount = queryMatched.filter(item => masteredIds.includes(currentHskLevel + '_' + item.stt)).length;
            const unmasteredCount = totalCount - masteredCount;

            // Cập nhật số đếm trực tiếp vào các tab lọc để người dùng dễ theo dõi (dạng icon nén gọn không bị tràn 2 dòng)
            const tabAll = document.getElementById('list-filter-all');
            const tabMastered = document.getElementById('list-filter-mastered');
            const tabUnmastered = document.getElementById('list-filter-unmastered');
            if (tabAll) {
                tabAll.innerHTML = `🗂️ <b>${totalCount}</b>`;
                tabAll.title = `Tất cả (${totalCount})`;
            }
            if (tabMastered) {
                tabMastered.innerHTML = `✅ <b>${masteredCount}</b>`;
                tabMastered.title = `Đã thuộc (${masteredCount})`;
            }
            if (tabUnmastered) {
                tabUnmastered.innerHTML = `⏳ <b>${unmasteredCount}</b>`;
                tabUnmastered.title = `Chưa thuộc (${unmasteredCount})`;
            }

            // Lọc danh sách hiển thị theo tab đã chọn
            const filtered = queryMatched.filter(item => {
                const isMastered = masteredIds.includes(currentHskLevel + '_' + item.stt);
                if (listFilterMode === 'mastered') {
                    return isMastered;
                } else if (listFilterMode === 'unmastered') {
                    return !isMastered;
                }
                return true;
            });

            if (filtered.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.style.textAlign = 'center';
                emptyMsg.style.padding = '40px 10px';
                emptyMsg.style.color = 'var(--text-muted)';
                emptyMsg.style.fontWeight = '500';
                emptyMsg.innerText = 'Không tìm thấy từ nào phù hợp.';
                container.appendChild(emptyMsg);
                return;
            }

            // Lấy từ đang hiển thị ở thẻ chính để bôi đậm
            const currentItem = paginatedFlashcards[currentIndex];

            filtered.forEach((item, idx) => {
                const isMastered = masteredIds.includes(currentHskLevel + '_' + item.stt);
                const isActive = currentItem && currentItem.stt === item.stt;
                
                const itemDiv = document.createElement('div');
                itemDiv.className = `word-list-item ${isActive ? 'active-word' : ''}`;
                itemDiv.setAttribute('data-stt', item.stt);
                
                // Khi nhấp dòng, phát âm thanh và nhảy thẳng đến thẻ đó
                itemDiv.onclick = () => {
                    speakWordFromList(null, item.word);
                    selectWordFromList(item.stt);
                };

                const wordHanViet = (window.getHanVietForWord && typeof window.getHanVietForWord === 'function') ? window.getHanVietForWord(item.word) : '';

                itemDiv.innerHTML = `
                    <div class="item-index">${idx + 1}</div>
                    <div class="item-word-info">
                        <div style="display: flex; align-items: baseline; gap: 8px; flex-wrap: nowrap; overflow: hidden; white-space: nowrap;">
                            <div class="item-word-zh" style="flex-shrink: 0; white-space: nowrap;">${item.word}</div>
                            ${wordHanViet ? `<span class="item-word-hv" style="color: #475569; font-size: 1.0rem; font-weight: 700; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; ${showListHanViet ? '' : 'display: none;'}">[${wordHanViet}]</span>` : ''}
                        </div>
                        <div class="item-word-py" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; ${showListPinyin ? '' : 'display: none;'}">${item.pinyin}</div>
                        <div class="item-word-meaning" style="${showListMeaning ? '' : 'display: none;'}">${item.meaning}</div>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center;" onclick="event.stopPropagation();">
                        <button class="item-action-btn ${isMastered ? 'item-mastered' : ''}" 
                                onclick="toggleMasteredFromList(event, '${item.stt}')" 
                                title="${isMastered ? 'Bỏ thuộc' : 'Đánh dấu thuộc'}">
                            ✓
                        </button>
                    </div>
                `;
                container.appendChild(itemDiv);
            });
        }

        // Chuyển đổi trạng thái bộ lọc của danh sách từ
        function changeListFilter(mode) {
            listFilterMode = mode;
            
            // Cập nhật trạng thái class active cho các phím lọc
            document.querySelectorAll('.list-filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            const filterBtn = document.getElementById('list-filter-' + mode);
            if (filterBtn) {
                filterBtn.classList.add('active');
            }
            
            // Vẽ lại danh sách từ theo bộ lọc mới
            const query = document.getElementById('word-search').value;
            renderWordListItems(query);
        }

        function filterWordListItems() {
            const searchInput = document.getElementById('word-search');
            const clearBtn = document.getElementById('word-search-clear');
            const query = searchInput ? searchInput.value : '';
            
            if (clearBtn) {
                clearBtn.style.display = query ? 'flex' : 'none';
            }
            renderWordListItems(query);
        }

        function clearWordSearch() {
            const searchInput = document.getElementById('word-search');
            if (searchInput) {
                searchInput.value = '';
                searchInput.focus();
            }
            filterWordListItems();
        }

        // Thay đổi hiển thị pinyin/nghĩa/hán việt trong danh sách từ và thẻ học
        function toggleListFormat(type) {
            if (type === 'pinyin') {
                const pinyinChk = document.getElementById('show-pinyin-setting');
                if (pinyinChk) {
                    showListPinyin = pinyinChk.checked;
                    saveSetting('showListPinyin', showListPinyin);
                }
            } else if (type === 'meaning') {
                const meaningChk = document.getElementById('show-meaning-setting');
                if (meaningChk) {
                    showListMeaning = meaningChk.checked;
                    saveSetting('showListMeaning', showListMeaning);
                }
            } else if (type === 'hanviet') {
                const hanvietChk = document.getElementById('show-hanviet-setting');
                if (hanvietChk) {
                    showListHanViet = hanvietChk.checked;
                    saveSetting('showListHanViet', showListHanViet);
                    // Cập nhật lại giao diện thẻ chính ngay lập tức để ẩn/hiện Hán Việt trên thẻ
                    renderCard();
                }
            }
            const queryInput = document.getElementById('word-search');
            const query = queryInput ? queryInput.value : '';
            renderWordListItems(query);
        }

        // Đồng bộ chuyển trang/vị trí thẻ khi click chọn từ từ danh sách
        function selectWordFromList(stt) {
            // Tìm từ trong toàn bộ danh sách HSK gốc
            const itemIndexInRaw = rawFlashcards.findIndex(item => item.stt === stt);
            if (itemIndexInRaw === -1) return;

            // Kiểm tra xem từ có nằm trong bộ lọc hiện không, nếu không thì reset bộ lọc về 'all'
            const matchInFiltered = filteredFlashcards.findIndex(item => item.stt === stt);
            if (matchInFiltered === -1) {
                currentFilter = 'all';
                const filterBtn = document.getElementById('filter-toggle');
                filterBtn.innerHTML = "🗂️";
                filterBtn.title = "Xem: Tất cả";
                filterBtn.classList.remove('active');
                saveSetting('currentFilter', currentFilter);
                
                // Nếu chế độ là ngẫu nhiên, ta đưa về tuần tự để có tính định vị tự nhiên
                if (displayMode === 'random') {
                    displayMode = 'sequential';
                    const modeBtn = document.getElementById('display-mode-toggle');
                    modeBtn.innerHTML = "🔁";
                    modeBtn.title = "Chế độ: Tuần tự";
                    modeBtn.classList.remove('active');
                    saveSetting('displayMode', displayMode);
                }
                
                filteredFlashcards = [...rawFlashcards];
                const masteredCount = rawFlashcards.filter(item => masteredIds.includes(currentHskLevel + '_' + item.stt)).length;
                const unmasteredCount = rawFlashcards.length - masteredCount;
                document.getElementById('stats-text').innerText = `Thuộc: ${masteredCount} | Chưa thuộc: ${unmasteredCount}`;
            }

            // Tìm lại vị trí trong filteredFlashcards (vốn là thứ tự sequential chuẩn)
            const finalIndex = filteredFlashcards.findIndex(item => item.stt === stt);
            if (finalIndex !== -1) {
                if (recordsPerPage === 'all') {
                    currentPage = 1;
                } else {
                    const size = parseInt(recordsPerPage);
                    currentPage = Math.floor(finalIndex / size) + 1;
                }
                saveSetting('currentPage_' + currentHskLevel, currentPage);
                
                // Đồng bộ hóa dropdown chọn trang
                const pageSelect = document.getElementById('page-select');
                const pageSelectLabel = document.getElementById('page-select-label');
                pageSelect.innerHTML = '';

                const pageItems = getPageSequentialItems();
                if (displayMode === 'random') {
                    paginatedFlashcards = shuffleList([...pageItems]);
                } else {
                    paginatedFlashcards = pageItems;
                }

                if (recordsPerPage === 'all') {
                    pageSelect.style.display = 'none';
                    pageSelectLabel.style.display = 'none';
                } else {
                    const size = parseInt(recordsPerPage);
                    const totalPages = Math.ceil(filteredFlashcards.length / size);

                    pageSelect.style.display = 'inline-block';
                    pageSelectLabel.style.display = 'inline-block';

                    for (let i = 1; i <= totalPages; i++) {
                        const option = document.createElement('option');
                        option.value = i;
                        option.innerText = `Trang ${i}`;
                        if (i === currentPage) {
                            option.selected = true;
                        }
                        pageSelect.appendChild(option);
                    }
                }

                // Định hướng đúng vị trí của stt đã chọn trong paginatedFlashcards (có thể đã shuffle)
                const foundIndex = paginatedFlashcards.findIndex(item => item.stt === stt);
                if (foundIndex !== -1) {
                    currentIndex = foundIndex;
                } else {
                    currentIndex = 0;
                }
                saveSetting('currentIndex_' + currentHskLevel, currentIndex);
                renderCard();
            }

            // Cập nhật trạng thái hiển thị 'active' của các phần tử trong danh sách từ mà không cần đóng modal hay vẽ lại toàn bộ
            const container = document.getElementById('word-list-items-container');
            if (container) {
                container.querySelectorAll('.word-list-item').forEach(el => {
                    if (el.getAttribute('data-stt') === String(stt)) {
                        el.classList.add('active-word');
                    } else {
                        el.classList.remove('active-word');
                    }
                });
            }
        }

        // Cho phép đánh dấu thuộc nhanh trực tiếp từ danh sách từ
        function toggleMasteredFromList(event, stt) {
            event.stopPropagation();
            const mKey = currentHskLevel + '_' + stt;
            
            const index = masteredIds.indexOf(mKey);
            let isNowMastered = false;
            if (index > -1) {
                masteredIds.splice(index, 1);
            } else {
                masteredIds.push(mKey);
                isNowMastered = true;
            }
            localStorage.setItem('hsk_mastered_ids', JSON.stringify(masteredIds));
            saveSetting('masteredIds', masteredIds);

            // Tìm thông tin từ gốc để sync lên Google Sheet
            const originalWordItem = rawFlashcards.find(item => item.stt === stt);
            if (originalWordItem) {
                updateMasteredOnSheet(originalWordItem, isNowMastered);
            }

            // Cập nhật bộ đếm trong app nền
            const masteredCount = rawFlashcards.filter(item => masteredIds.includes(currentHskLevel + '_' + item.stt)).length;
            const unmasteredCount = rawFlashcards.length - masteredCount;
            document.getElementById('stats-text').innerText = `Thuộc: ${masteredCount} | Chưa thuộc: ${unmasteredCount}`;

            // Vẽ lại danh sách từ để cập nhật trạng thái icon tick ✓
            const query = document.getElementById('word-search').value;
            renderWordListItems(query);

            // Cập nhật nút bôi đỏ/xanh mặt thẻ nếu thẻ hiện tại trùng từ vừa tick
            const currentItem = paginatedFlashcards[currentIndex];
            if (currentItem && currentItem.stt === stt) {
                const isMasteredNow = masteredIds.includes(mKey);
                const frontMarkBtn = document.getElementById('mark-btn-front');
                const backMarkBtn = document.getElementById('mark-btn-back');
                if (isMasteredNow) {
                    frontMarkBtn.classList.add('status-mastered');
                    backMarkBtn.classList.add('status-mastered');
                } else {
                    frontMarkBtn.classList.remove('status-mastered');
                    backMarkBtn.classList.remove('status-mastered');
                }
            }
        }

        // Khởi tạo ứng dụng sau khi load cấu hình IndexedDB xong
        window.addEventListener('DOMContentLoaded', async () => {
            await initDatabase();
            
            // Khôi phục các trạng thái cấu hình từ database
            isTtsEnabled = await loadSetting('isTtsEnabled', true);
            currentFilter = await loadSetting('currentFilter', 'all');
            displayMode = await loadSetting('displayMode', 'sequential');
            currentHskLevel = await loadSetting('currentHskLevel', 'HSK1');
            recordsPerPage = await loadSetting('recordsPerPage', 'all');
            showListPinyin = await loadSetting('showListPinyin', true);
            showListMeaning = await loadSetting('showListMeaning', true);
            showListHanViet = await loadSetting('showListHanViet', true);

            // Đồng bộ bộ nhớ danh sách đã học từ IndexedDB hoặc tự động nhập từ LocalStorage cũ nếu có
            const localMastered = JSON.parse(localStorage.getItem('hsk_mastered_ids') || '[]');
            masteredIds = await loadSetting('masteredIds', null);
            if (!masteredIds) {
                masteredIds = localMastered;
                saveSetting('masteredIds', masteredIds);
            }

            // Đồng bộ trạng thái UI tương ứng với cấu hình khôi phục
            document.getElementById('hsk-level-select').value = currentHskLevel;
            document.getElementById('records-per-page-select').value = recordsPerPage;
            
            const pinyinChk = document.getElementById('show-pinyin-setting');
            if (pinyinChk) pinyinChk.checked = showListPinyin;
            const meaningChk = document.getElementById('show-meaning-setting');
            if (meaningChk) meaningChk.checked = showListMeaning;
            const hanvietChk = document.getElementById('show-hanviet-setting');
            if (hanvietChk) hanvietChk.checked = showListHanViet;
            
            const ttsBtn = document.getElementById('tts-toggle');
            if (isTtsEnabled) {
                ttsBtn.innerHTML = "🔊";
                ttsBtn.title = "Âm thanh (TTS): BẬT";
                ttsBtn.classList.add('active');
            } else {
                ttsBtn.innerHTML = "🔇";
                ttsBtn.title = "Âm thanh (TTS): TẮT";
                ttsBtn.classList.remove('active');
            }

            const modeBtn = document.getElementById('display-mode-toggle');
            if (displayMode === 'random') {
                modeBtn.innerHTML = "🔀";
                modeBtn.title = "Chế độ: Ngẫu nhiên";
                modeBtn.classList.add('active');
            } else {
                modeBtn.innerHTML = "🔁";
                modeBtn.title = "Chế độ: Tuần tự";
                modeBtn.classList.remove('active');
            }

            const filterBtn = document.getElementById('filter-toggle');
            if (currentFilter === 'unmastered') {
                filterBtn.innerHTML = "⏳";
                filterBtn.title = "Xem: Chưa thuộc";
                filterBtn.classList.add('active');
            } else if (currentFilter === 'mastered') {
                filterBtn.innerHTML = "✅";
                filterBtn.title = "Xem: Đã thuộc";
                filterBtn.classList.add('active');
            } else {
                filterBtn.innerHTML = "🗂️";
                filterBtn.title = "Xem: Tất cả";
                filterBtn.classList.remove('active');
            }

            // Gọi tải dữ liệu và yêu cầu phục hồi đúng vị trí thẻ học của phiên làm việc trước đó
            fetchData(true);
        });
    </script>

    <!-- Word List Panel & Modal (Bottom Sheet style) -->
    <div id="word-list-modal" class="word-list-modal" onclick="closeWordListOnOverlay(event)">
        <div class="word-list-content">
            <div class="word-list-header" style="justify-content: flex-start; gap: 12px;">
                <button class="word-list-close" onclick="closeWordList(event)">✕</button>
                <h2 id="modal-title">Danh sách từ HSK</h2>
            </div>
            <div class="word-list-search-box">
                <div style="position: relative; width: 100%;">
                    <input type="text" id="word-search" class="search-input" placeholder="Tìm kiếm chữ Hán, Pinyin, nghĩa..." oninput="filterWordListItems()">
                    <button id="word-search-clear" onclick="clearWordSearch()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #cbd5e1; border: none; font-size: 0.75rem; color: #475569; cursor: pointer; display: none; padding: 0; border-radius: 50%; width: 20px; height: 20px; align-items: center; justify-content: center; line-height: 1; font-weight: bold; transition: all 0.2s;">✕</button>
                </div>
                <div style="display: flex; gap: 16px; margin: 8px 4px 6px; align-items: center; justify-content: flex-end; font-size: 0.8rem; font-weight: 600; color: #475569; flex-wrap: wrap;">
					<label style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none;">
                        <input type="checkbox" id="show-hanviet-setting" checked onchange="toggleListFormat('hanviet')" style="cursor: pointer; width: 15px; height: 15px; accent-color: var(--primary);">
                        Hán Việt
                    </label>
                    <label style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none;">
                        <input type="checkbox" id="show-pinyin-setting" checked onchange="toggleListFormat('pinyin')" style="cursor: pointer; width: 15px; height: 15px; accent-color: var(--primary);">
                        Pinyin
                    </label>
                    <label style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none;">
                        <input type="checkbox" id="show-meaning-setting" checked onchange="toggleListFormat('meaning')" style="cursor: pointer; width: 15px; height: 15px; accent-color: var(--primary);">
                        Nghĩa
                    </label>
                </div>
                <div class="list-filter-tabs">
                    <button id="list-filter-all" class="list-filter-btn active" onclick="changeListFilter('all')" title="Tất cả">🗂️ <b>-</b></button>
                    <button id="list-filter-mastered" class="list-filter-btn" onclick="changeListFilter('mastered')" title="Đã thuộc">✅ <b>-</b></button>
                    <button id="list-filter-unmastered" class="list-filter-btn" onclick="changeListFilter('unmastered')" title="Chưa thuộc">⏳ <b>-</b></button>
                </div>
            </div>
            <div class="word-list-body" id="word-list-items-container">
                <!-- Nội dung được tự động kết nạp từ JS -->
            </div>
        </div>
    </div>
</body>
</html>
