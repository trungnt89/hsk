<!DOCTYPE html> 
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Dashboard - Audio Optimized</title>
    <style>
        :root { --primary-color: #fe2c55; --bg-dark: #121212; }
        body { font-family: sans-serif; background-color: var(--bg-dark); color: #fff; margin: 0; padding: 20px; padding-top: 80px; }
        
        /* Thanh điều khiển cố định ở trên cùng */
        .top-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(30, 30, 30, 0.95);
            padding: 10px 0; z-index: 1000;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; max-width: 1600px; margin: 0 auto; 
        }

        .video-card { background: #1e1e1e; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .video-wrapper { position: relative; width: 100%; padding-top: 177.77%; background: #000; }

        .play-placeholder {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1;
        }

        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 2; }

        .nav-controls {
            position: absolute; bottom: 15px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 10px; z-index: 10;
        }
        
        .nav-btn {
            background: var(--primary-color); color: white; border: none;
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        .card-content { padding: 12px; }
        .timestamp { font-size: 11px; color: #888; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div id="status" style="font-size: 12px; color: #888; margin-bottom: 5px;">Sẵn sàng</div>
        <div style="font-size: 11px; color: var(--primary-color);">
            💡 Mẹo: Bấm vào video đầu tiên để "mở khóa" âm thanh cho toàn bộ trang.
        </div>
    </div>

    <div id="video-grid" class="container"></div>

    <script>
        let allVideos = [];
        let currentPlayingIndex = null;

        async function init() {
            try {
                const res = await fetch('./list.txt');
                const text = await res.text();
                const entries = text.trim().split(/\n\s*\n/);
                allVideos = entries.map((entry, index) => {
                    const urlMatch = entry.match(/Liên kết: (.*)/);
                    const dateMatch = entry.match(/Ngày: (.*)/);
                    const url = urlMatch ? urlMatch[1].trim().replace(/\/$/, "") : "";
                    return { index, id: url.split('/').pop(), date: dateMatch ? dateMatch[1] : '' };
                }).filter(v => v.id);
                render();
            } catch (err) { console.error(err); }
        }

        function render() {
            const grid = document.getElementById('video-grid');
            const fragment = document.createDocumentFragment();
            allVideos.forEach((video) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="video-wrapper" id="wrapper-${video.index}">
                        <div class="play-placeholder" onclick="playVideo(${video.index})">
                            <div style="font-size:40px;">▶</div>
                            <span>Video #${video.index + 1}</span>
                        </div>
                    </div>
                    <div class="card-content"><span class="timestamp">🗓️ ${video.date}</span></div>
                `;
                fragment.appendChild(card);
            });
            grid.appendChild(fragment);
        }

        function playVideo(index) {
            if (index < 0 || index >= allVideos.length) return;
            if (currentPlayingIndex !== null) resetPlaceholder(currentPlayingIndex);

            currentPlayingIndex = index;
            const video = allVideos[index];
            const wrapper = document.getElementById(`wrapper-${index}`);

            // NHÚNG VIDEO: Lưu ý bỏ qua tham số mute nếu trình duyệt đã được kích hoạt
            wrapper.innerHTML = `
                <iframe src="https://www.tiktok.com/embed/v2/${video.id}?autoplay=1" 
                        allow="autoplay; fullscreen" allowfullscreen></iframe>
                <div class="nav-controls">
                    <button class="nav-btn" onclick="playVideo(${index - 1})">⬅ Trước</button>
                    <button class="nav-btn" onclick="playVideo(${index + 1})">Sau ➡</button>
                </div>
            `;
            wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.getElementById('status').innerText = `Đang xem: Video #${index + 1} / ${allVideos.length}`;
        }

        function resetPlaceholder(index) {
            const wrapper = document.getElementById(`wrapper-${index}`);
            if (wrapper) {
                wrapper.innerHTML = `
                    <div class="play-placeholder" onclick="playVideo(${index})">
                        <div style="font-size:40px;">▶</div>
                        <span>Video #${index + 1}</span>
                    </div>`;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
