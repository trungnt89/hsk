<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Navigation Dashboard</title>
    <script src="../com/assistive.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #1e1e1e; }
        
        /* Sidebar */
        #sidebar {
            width: 250px;
            background: #252526;
            color: #ccc;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
            z-index: 10;
        }
        .sidebar-header { padding: 20px; font-weight: bold; color: #007acc; border-bottom: 1px solid #333; }
        .menu-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: 0.2s;
            border-left: 3px solid transparent;
        }
        .menu-item:hover { background: #2a2d2e; color: white; }
        .menu-item.active { background: #37373d; color: white; border-left: 3px solid #007acc; }

        /* Content Area */
        #content { flex-grow: 1; display: flex; flex-direction: column; position: relative; background: #252526; }
        
        /* Action Bar */
        .action-bar {
            padding: 8px 15px;
            background: #2d2d2d;
            display: flex;
            justify-content: flex-end;
            border-bottom: 1px solid #333;
        }
        .btn-open {
            background: #007acc;
            color: white;
            border: none;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 13px;
            border-radius: 3px;
            transition: 0.2s;
        }
        .btn-open:hover { background: #0062a3; }

        #main-frame {
            width: 100%;
            flex-grow: 1;
            border: none;
            background: white;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">MENU ĐIỀU HƯỚNG</div>
	
	<div class="menu-item" onclick="loadInternal(this, 'https://docs.google.com/spreadsheets/d/1UiAS_mUhl6j6wHyPkNiol9pclzkQJWD4qzPIZD2sx3k/edit?gid=0#gid=0')">Sheets NIKKI</div>
	
	<div class="menu-item" onclick="loadInternal(this, 'https://docs.google.com/spreadsheets/d/13lnWD6MxoMJNSn9iPqbJVDpyghthMt4JhjuiSE3F064/edit?gid=858088211#gid=858088211')">Sheets VOICE</div>
	
    <div class="menu-item" onclick="loadInternal(this, 'https://docs.google.com/spreadsheets/d/1g2COnzVdo8SlqJVq5osT5hfNVfdTsXqzYp0bN1S8ZIc/edit?gid=0#gid=0')">Sheets LOG</div>

	
	<div class="menu-item" onclick="loadInternal(this, 'https://aistudio.google.com/spend?project=gen-lang-client-0273316723')">Gemine Usage</div>
    <div class="menu-item" onclick="openExternal(this, 'https://platform.deepseek.com/usage')">DeepSeek Usage ↗</div>
    
	<div class="menu-item" onclick="openExternal(this, 'https://vercel.com/trungnt6541s-projects/hsk/deployments')">Vercel Deployments ↗</div>    
</div>

<div id="content">
    <div class="action-bar">
        <button class="btn-open" onclick="openCurrentInNewWindow()">Mở sang cửa sổ mới ↗</button>
    </div>
    <iframe id="main-frame" src="about:blank"></iframe>
</div>

<script>
    function openCurrentInNewWindow() {
        const url = document.getElementById('main-frame').src;
        if (url && url !== 'about:blank') {
            window.open(url, '_blank');
        }
    }

    function openExternal(el, url) {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        window.open(url, '_blank');
    }

    function loadInternal(el, url) {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('main-frame').src = url;
    }

    window.onload = () => {
        const firstInternal = document.querySelector('.menu-item[onclick^="loadInternal"]');
        if(firstInternal) firstInternal.click();
    }
</script>

</body>
</html>
