<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Upload Hub</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 500px; margin-bottom: 20px; }
        #cameraSection { display: none; margin-top: 15px; }
        video { width: 100%; border-radius: 8px; background: #000; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; width: 100%; max-width: 800px; }
        .gallery-item { border-radius: 8px; overflow: hidden; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .gallery-item img { width: 100%; height: 150px; object-fit: cover; display: block; }
        .btn { padding: 12px 24px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-open { background: #28a745; color: white; }
        .btn-capture { background: #007bff; color: white; margin-top: 10px; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <h2>Quản lý hình ảnh</h2>
    <button id="openCameraBtn" class="btn btn-open">Mở Camera Chụp Ảnh</button>
    <button id="switchCameraBtn" class="btn" style="display:none; background:#6c757d; color:white;">Đổi Camera</button>
    <div id="cameraSection">
        <video id="video" autoplay playsinline></video>
        <button id="captureBtn" class="btn btn-capture">Chụp & Tải lên</button>
        <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    </div>
</div>

<div id="gallery"></div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const openCameraBtn = document.getElementById('openCameraBtn');
    const cameraSection = document.getElementById('cameraSection');
    const captureBtn = document.getElementById('captureBtn');
    const gallery = document.getElementById('gallery');
    const switchBtn = document.getElementById('switchCameraBtn');
    
    let currentFacingMode = "user";
    const API_URL = 'https://hsk-gilt.vercel.app/api/gRecorder';
    const LESSION_ID = "IMG_";

    async function loadGallery() {
        console.log("[LOG] Đang truy vấn danh sách ảnh...");
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "list", lessionId: LESSION_ID })
            });
            const data = await response.json();
            
            gallery.innerHTML = ''; 
            const items = data.data || data; // Hỗ trợ cả trường hợp data là array hoặc object {data: []}
            
            if (Array.isArray(items)) {
                items.forEach(item => {
                    // Kiểm tra mimeType chính xác từ JSON của bạn
                    if (item.mimeType && item.mimeType.includes("image")) {
                        const div = document.createElement('div');
                        div.className = 'gallery-item';
                        // Sử dụng đúng link stream với fileId từ JSON
                        div.innerHTML = `<img src="${API_URL}?action=audio&fileId=${item.fileId}" alt="${item.name}" onerror="this.src='https://placehold.co/150?text=Error+Load'">`;
                        gallery.appendChild(div);
                    }
                });
            }
        } catch (err) {
            console.error("[LOG] Lỗi hiển thị gallery:", err);
        }
    }

    async function initCamera(facingMode) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode } });
            video.srcObject = stream;
            cameraSection.style.display = 'block';
            switchBtn.style.display = 'inline-block';
            openCameraBtn.style.display = 'none';
        } catch (err) {
            alert("Không thể mở camera.");
        }
    }

    openCameraBtn.addEventListener('click', () => initCamera(currentFacingMode));
    
    switchBtn.addEventListener('click', () => {
        currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
        if (video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
        initCamera(currentFacingMode);
    });

    captureBtn.addEventListener('click', async () => {
        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = canvas.toDataURL('image/png');
        
        if (imageData.length < 1000) {
            alert("Ảnh chụp không hợp lệ.");
            return;
        }

        stopCamera();
        alert("Đang tải lên...");
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: "uploadImage",
                    name: `IMG_${Date.now()}.png`,
                    base64Audio: imageData,
                    lessionId: LESSION_ID
                })
            });
            if (response.ok) {
                alert("Thành công!");
                loadGallery();
            }
        } catch (err) {
            console.error(err);
        }
    });

    function stopCamera() {
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
            cameraSection.style.display = 'none';
            switchBtn.style.display = 'none';
            openCameraBtn.style.display = 'block';
        }
    }

    window.onload = loadGallery;
</script>
</body>
</html>
