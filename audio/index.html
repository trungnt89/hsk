<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Media Player Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f8fafc; color: #1e293b; margin: 0; padding: 10px; display: flex; justify-content: center; }
        /* Yêu cầu 1: Độ rộng full page */
        .app { width: 100%; max-width: 100%; display: flex; flex-direction: column; min-height: 95vh; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
        .tab-content { display: none; flex-direction: column; flex: 1; }
        .tab-content.active { display: flex; }

        .card { background: #ffffff; padding: 15px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); flex: 1; display: flex; flex-direction: column; }
        
        /* Yêu cầu 4: Cho nhỏ lại để không chiếm diện tích */
        #media-view { background: #000; border-radius: 12px; overflow: hidden; display: none; position: sticky; bottom: 0; margin-top: 10px; z-index: 100; box-shadow: 0 -4px 10px rgba(0,0,0,0.2); }
        video, audio { width: 100%; display: block; height: 45px; }
        
        .list { flex: 1; max-height: 500px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 20px; background: #fff; }
        #text-display { flex: 1; padding: 15px; border: 1px solid #e2e8f0; border-radius: 10px; background: #fdfdfd; font-size: 16px; line-height: 1.6; white-space: pre-wrap; margin-bottom: 10px; min-height: 150px; overflow-y: auto; }
        #voice-script { padding: 10px; border: 1px dashed #2563eb; border-radius: 10px; background: #eff6ff; font-size: 14px; color: #1e40af; min-height: 60px; margin-bottom: 10px; font-style: italic; }
        
        .item { padding: 12px 15px; border-bottom: 1px solid #f8fafc; display: flex; flex-direction: column; gap: 5px; }
        .item-row { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .item-text { flex: 1; word-break: break-all; font-size: 13px; font-weight: 500; }
        
        /* Yêu cầu 2: Thêm các nút chức năng */
        .item-btns { display: flex; gap: 6px; justify-content: flex-end; margin-top: 5px; }
        .btn-action { padding: 6px 12px; font-size: 11px; border: 1px solid #e2e8f0; border-radius: 4px; background: #fff; cursor: pointer; font-weight: bold; }
        .btn-delete { color: #ef4444; border-color: #fee2e2; background: #fef2f2; }

        .rec-box { border-top: 1px solid #f1f5f9; padding-top: 20px; text-align: center; }
        .btn-main { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; }
        .btn-rec { background: #2563eb; color: white; transition: all 0.3s; }
        .btn-rec.recording { background: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        #status { font-size: 12px; margin-bottom: 10px; color: #64748b; font-weight: bold; }
    </style>
</head>
<body>
<div class="app">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(1)">Văn bản (Tab 1)</button>
        <button class="tab-btn" onclick="switchTab(2)">Ghi âm (Tab 2)</button>
    </div>

    <div class="card">
        <div id="tab1" class="tab-content active">
            <div id="voice-script">Script từ giọng nói sẽ hiển thị tại đây...</div>
            <div id="text-display">Đang tải nội dung...</div>
            
            <div class="rec-box">
                <div id="status">Sẵn sàng</div>
                <button id="mainRecBtn" class="btn-main btn-rec" onclick="toggleRec()">BẮT ĐẦU GHI ÂM</button>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="fileList" class="list">Đang tải danh sách...</div>
        </div>

        <div id="media-view"></div>
    </div>
</div>

<script>
    let mediaRec, chunks = [], audioBlob, recognition;
    let isRecording = false;
    const isIOS = () => /iPhone|iPad|iPod/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    window.onload = async () => {
        await loadFiles();
        await loadDiaryParagraph();
        initSpeechRecognition();
    };

    function initSpeechRecognition() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            recognition = new Speech();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'ja-JP';
            recognition.onresult = (e) => {
                let transcript = "";
                for (let i = e.resultIndex; i < e.results.length; i++) transcript += e.results[i][0].transcript;
                document.getElementById('voice-script').innerText = transcript;
            };
        }
    }

    function toggleRec() {
        if (!isRecording) startRec();
        else stopRec();
    }

    function switchTab(tabIndex) {
        document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === tabIndex - 1));
        document.querySelectorAll('.tab-content').forEach((content, i) => content.classList.toggle('active', i === tabIndex - 1));
    }

    function getUrlIdentifier() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('id') || "unknown";
    }

    async function loadDiaryParagraph() {
        const id = getUrlIdentifier();
        const request = indexedDB.open("DiaryDB");
        request.onsuccess = (event) => {
            const db = event.target.result;
            try {
                const transaction = db.transaction(["diaries"], "readonly");
                const store = transaction.objectStore("diaries");
                const getRequest = store.get(Number(id));
                getRequest.onsuccess = () => {
                    const data = getRequest.result;
                    if (data && data.paragraph) document.getElementById('text-display').innerText = data.paragraph;
                };
            } catch (e) { console.error(e); }
        };
    }

    async function loadFiles() {
        const identifier = getUrlIdentifier();
        try {
            const res = await fetch(`/api/drive?identifier=${identifier}`);
            const files = await res.json();
            renderFiles(files);
        } catch (err) { }
    }

    function renderFiles(files) {
        const container = document.getElementById('fileList');
        if (!files || files.length === 0) { container.innerHTML = '<div style="padding:15px;text-align:center">Trống</div>'; return; }
        
        // Yêu cầu 2: Thêm UI Điểm, Chi tiết, Xóa
        container.innerHTML = files.map(f => `
            <div class="item">
                <div class="item-row" onclick="playMedia('${f.id}', '${f.mimeType}')">
                    <span>${f.mimeType.includes('video') ? '🎥' : '🎵'}</span>
                    <div class="item-text">${f.name}</div>
                </div>
                <div class="item-btns">
                    <button class="btn-action">Điểm</button>
                    <button class="btn-action">Chi tiết</button>
                    <button class="btn-action btn-delete" onclick="deleteFile('${f.id}')">Xóa</button>
                </div>
            </div>`).join('');
    }

    // Yêu cầu 3: Click xóa gửi action lên server
    async function deleteFile(fileId) {
        if (!confirm("Bạn có chắc chắn muốn xóa file này không?")) return;
        
        try {
            const res = await fetch(`/api/drive?id=${fileId}`, { method: 'DELETE' });
            if (res.ok) {
                alert("Đã xóa file thành công");
                loadFiles(); // Load lại danh sách
            } else {
                alert("Lỗi khi xóa file");
            }
        } catch (err) {
            console.error("Delete error:", err);
        }
    }

    function playMedia(id, mimeType) {
        const view = document.getElementById('media-view');
        view.style.display = 'block';
        const url = `/api/drive?id=${id}`;
        
        // Yêu cầu 4: Không hiện tên, cho nhỏ lại
        view.innerHTML = mimeType.includes('video') 
            ? `<video src="${url}" controls autoplay playsinline></video>` 
            : `<audio src="${url}" controls autoplay></audio>`;
    }

    async function startRec() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRec = new MediaRecorder(stream);
        chunks = [];
        mediaRec.ondataavailable = e => chunks.push(e.data);
        mediaRec.onstop = async () => {
            const rawBlob = new Blob(chunks);
            audioBlob = isIOS() ? new Blob(chunks, { type: 'audio/mp4' }) : await convertToMp3(rawBlob);
            if (confirm("Ghi âm hoàn tất. Bạn có muốn LƯU lên Drive không?")) upload();
            else document.getElementById('status').innerText = "Đã hủy lưu";
        };
        mediaRec.start();
        if (recognition) recognition.start();
        isRecording = true;
        updateUI(true);
    }

    function stopRec() {
        mediaRec.stop();
        mediaRec.stream.getTracks().forEach(t => t.stop());
        if (recognition) recognition.stop();
        isRecording = false;
        updateUI(false);
    }

    function updateUI(rec) {
        const btn = document.getElementById('mainRecBtn');
        const status = document.getElementById('status');
        if (rec) {
            btn.innerText = "DỪNG GHI ÂM";
            btn.classList.add('recording');
            status.innerText = "🔴 ĐANG GHI ÂM...";
        } else {
            btn.innerText = "BẮT ĐẦU GHI ÂM";
            btn.classList.remove('recording');
            status.innerText = "Đã dừng";
        }
    }

    async function convertToMp3(blob) {
        const arrayBuffer = await blob.arrayBuffer();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        const samples = audioBuffer.getChannelData(0);
        const mp3encoder = new lamejs.Mp3Encoder(1, audioBuffer.sampleRate, 128);
        const samplesInt16 = new Int16Array(samples.length);
        for (let i = 0; i < samples.length; i++) {
            let s = Math.max(-1, Math.min(1, samples[i]));
            samplesInt16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        const mp3Data = [];
        for (let i = 0; i < samplesInt16.length; i += 1152) {
            const chunk = samplesInt16.subarray(i, i + 1152);
            const mp3buf = mp3encoder.encodeBuffer(chunk);
            if (mp3buf.length > 0) mp3Data.push(mp3buf);
        }
        const flush = mp3encoder.flush();
        if (flush.length > 0) mp3Data.push(flush);
        return new Blob(mp3Data, { type: 'audio/mp3' });
    }

    async function upload() {
        document.getElementById('status').innerText = "⏳ ĐANG LƯU...";
        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1];
            const identifier = getUrlIdentifier();
            const fileName = `id_${identifier}_${new Date().getTime()}.${isIOS() ? 'm4a' : 'mp3'}`;
            try {
                await fetch('/api/drive', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: fileName, base64Audio, identifier })
                });
                location.reload();
            } catch (err) { document.getElementById('status').innerText = "Lỗi upload"; }
        };
    }
</script>
</body>
</html>
