<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Clone - Swipe Mode</title>
    <style>
        :root { --primary-color: #fe2c55; --bg-dark: #000; }
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: var(--bg-dark); overflow: hidden; 
        }

        /* Container cuộn dọc */
        #video-container {
            width: 100%; height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; /* Lực hút cuộn dọc */
            scroll-behavior: smooth;
        }

        .video-section {
            width: 100%; height: 100vh;
            scroll-snap-align: start; /* Bắt dính từng khung hình */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        /* Frame video */
        .tiktok-frame {
            width: 100%; height: 100%;
            max-width: 500px; /* Giới hạn chiều rộng trên máy tính */
            position: relative;
        }

        iframe {
            width: 100%; height: 100%;
            border: none;
        }

        /* Lớp phủ chặn tương tác để ưu tiên vuốt */
        .touch-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 80%;
            z-index: 5; /* Để lại phần dưới cho các nút của TikTok nếu cần */
        }

        /* Nút kích hoạt âm thanh ban đầu */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        .start-btn {
            background: var(--primary-color);
            border: none; color: white;
            padding: 15px 40px; border-radius: 30px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            margin-top: 20px;
        }

        .info-overlay {
            position: absolute; bottom: 80px; left: 20px;
            z-index: 10; color: white; text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1>TikTok Dashboard</h1>
        <p>Nhấn nút bên dưới để bắt đầu và bật âm thanh</p>
        <button class="start-btn" onclick="startApp()">BẮT ĐẦU XEM</button>
    </div>

    <div id="video-container">
        </div>

    <script>
        let allVideos = [];
        let loadedIndices = new Set();

        async function init() {
            try {
                const res = await fetch('./list.txt');
                const text = await res.text();
                const entries = text.trim().split(/\n\s*\n/);
                
                allVideos = entries.map((entry, index) => {
                    const urlMatch = entry.match(/Liên kết: (.*)/);
                    const dateMatch = entry.match(/Ngày: (.*)/);
                    const url = urlMatch ? urlMatch[1].trim().replace(/\/$/, "") : "";
                    return {
                        id: url.split('/').pop(),
                        date: dateMatch ? dateMatch[1] : 'Không rõ ngày'
                    };
                }).filter(v => v.id);

                renderInitial();
            } catch (err) {
                alert("Không thể tải file list.txt");
            }
        }

        function renderInitial() {
            const container = document.getElementById('video-container');
            
            allVideos.forEach((video, index) => {
                const section = document.createElement('div');
                section.className = 'video-section';
                section.id = `section-${index}`;
                section.innerHTML = `
                    <div class="tiktok-frame" id="frame-${index}">
                        <div class="info-overlay">
                            <b>Video #${index + 1}</b><br>
                            <small>🗓️ ${video.date}</small>
                        </div>
                        <div class="touch-overlay"></div>
                        <div style="color:#333; text-align:center; padding-top:50vh;">Đang chờ vuốt...</div>
                    </div>
                `;
                container.appendChild(section);
            });

            // Lắng nghe sự kiện cuộn để load video động
            container.addEventListener('scroll', handleScroll);
        }

        function handleScroll() {
            const container = document.getElementById('video-container');
            const index = Math.round(container.scrollTop / window.innerHeight);
            
            if (!loadedIndices.has(index)) {
                loadIframe(index);
                // Dọn dẹp các video ở xa để tránh lag (cách 2 slide)
                unloadFarVideos(index);
            }
        }

        function loadIframe(index) {
            if (index < 0 || index >= allVideos.length) return;
            const frame = document.getElementById(`frame-${index}`);
            const video = allVideos[index];
            
            frame.innerHTML = `
                <iframe src="https://www.tiktok.com/embed/v2/${video.id}?autoplay=1" 
                        allow="autoplay; fullscreen" allowfullscreen></iframe>
                <div class="info-overlay">
                    <b>Video #${index + 1}</b><br>
                    <small>🗓️ ${video.date}</small>
                </div>
            `;
            loadedIndices.add(index);
            console.log(`[Log] Đã nạp video ${index}`);
        }

        function unloadFarVideos(currentIndex) {
            loadedIndices.forEach(idx => {
                if (Math.abs(idx - currentIndex) > 2) {
                    const frame = document.getElementById(`frame-${idx}`);
                    frame.innerHTML = `<div style="color:#333; text-align:center; padding-top:50vh;">Đã tạm dừng</div>`;
                    loadedIndices.delete(idx);
                }
            });
        }

        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';
            // Load video đầu tiên ngay khi bấm nút
            loadIframe(0);
        }

        window.onload = init;
    </script>
</body>
</html>
